# ============================================================
# Stock Analytics Platform — template-loader-tasks.yml
# Layer:   Loaders (ECS task definitions for data ingestion)
# Stack:   stocks-loaders
# Exports: StocksLoaders-* (task definition ARNs)
# Imports: From stocks-core (ECR repo, VPC), stocks-app (DB endpoint, secrets)
# Deploy:  .github/workflows/deploy-loaders.yml
# ============================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECS task definitions for all data loaders (63 loaders).
  Each loader is a Fargate task that can be triggered via aws ecs run-task.
  No services (DesiredCount=0) — loaders triggered manually or by EventBridge rules.

Parameters:
  FREDApiKey:
    Type: String
    NoEcho: true
    Description: "FRED API key for econ-data loader"
  IBKRUsername:
    Type: String
    NoEcho: true
    Description: "Your IBKR username (passed from GitHub Secret)"
  IBKRPassword:
    Type: String
    NoEcho: true
    Description: "Your IBKR password (passed from GitHub Secret)"

  AlpacaApiKeyId:
    Type: String
    NoEcho: true
    Description: "Alpaca paper-trading API key (passed from GitHub secret APCA_API_KEY_ID)"
    Default: ""
  AlpacaApiSecretKey:
    Type: String
    NoEcho: true
    Description: "Alpaca paper-trading API secret (passed from GitHub secret APCA_API_SECRET_KEY)"
    Default: ""
  AlpacaBaseUrl:
    Type: String
    Description: "Alpaca API base URL (paper or live)"
    Default: "https://paper-api.alpaca.markets"
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: AllowCreateCWLogGroups
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ecs/*"
        - PolicyName: AllowReadDBSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub
                  - '${SecretArn}*'
                  - SecretArn: !ImportValue StocksApp-SecretArn
              - Effect: Allow
                Action: kms:Decrypt
                Resource: '*'
        - PolicyName: AllowS3StagingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::stocks-app-data
                  - arn:aws:s3:::stocks-app-data/*

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AllowReadDBSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub
                  - '${SecretArn}*'
                  - SecretArn: !ImportValue StocksApp-SecretArn
              - Effect: Allow
                Action: kms:Decrypt
                Resource: '*'

  ########################################
  # B) CloudWatch Log Groups             #
  ########################################
  StockScoresLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/stock-scores-loader
      RetentionInDays: 7

  FactormetricsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/factormetrics-loader
      RetentionInDays: 7

  MomentumLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/momentum-loader
      RetentionInDays: 7

  PositioningLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/positioning-loader
      RetentionInDays: 7

  QualityMetricsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/quality-metrics-service
      RetentionInDays: 7

  GrowthMetricsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/growth-metrics-service
      RetentionInDays: 7

  BenchmarksLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/benchmarks-loader
      RetentionInDays: 7

  StockSymbolsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: stocksymbols-loader
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn:      !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: stocksymbols-loader
          Image: !Join [":", [!ImportValue StocksCore-ContainerRepositoryUri, :latest]]
          Essential: true
          Environment:
            - Name: DB_SECRET_ARN
              Value: !ImportValue StocksApp-SecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: S3_STAGING_BUCKET
              Value: stocks-app-data
            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
            - Name: USE_S3_STAGING
              Value: "true"
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/stocksymbols-loader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

