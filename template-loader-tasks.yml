            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
            - Name: USE_S3_STAGING
              Value: "true"
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/fundamentalmetrics-loader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

  EventBridgeECSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EventBridge-ECS-Role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeStepFunctionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource:
                  - !GetAtt LoaderOrchestrationStateMachine.Arn

  #########################################
  # Step Functions Orchestration          #
  # Well-Architected loader orchestration  #
  # with dependencies & controlled concurrency
  #########################################

  # IAM Role for Step Functions to invoke ECS tasks
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: ECSTaskExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                Resource:
                  - !Ref StockSymbolsTaskDefinition
                  - !Ref LoadDailyCompanyDataTaskDefinition
                  - !Ref EarningsEstimateTaskDefinition
                  - !Ref EarningsHistoryTaskDefinition
                  - !Ref EarningsMetricsTaskDefinition
                  - !Ref RevenueEstimateTaskDefinition
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt ECSExecutionRole.Arn
                  - !GetAtt ECSTaskRole.Arn
              - Effect: Allow
                Action:
                  - events:PutTargets
                  - events:PutRule
                  - events:DescribeRule
                Resource: '*'

  # Step Functions State Machine
  LoaderOrchestrationStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-loader-orchestrator"
      RoleArn: !GetAtt StepFunctionsRole.Arn
      DefinitionString:
        Fn::Sub:
          - |
            {
              "Comment": "Orchestrates data loaders: symbols â†’ info â†’ earnings/revenue",
              "StartAt": "Stage1-Symbols",
              "States": {
                "Stage1-Symbols": {
                  "Type": "Task",
                  "Resource": "arn:aws:states:::ecs:runTask.sync",
                  "Parameters": {
                    "LaunchType": "FARGATE",
                    "Cluster": "${ClusterArn}",
                    "TaskDefinition": "${StockSymbolsTaskDef}",
                    "NetworkConfiguration": {
                      "AwsvpcConfiguration": {
                        "Subnets": ["${Subnet1}", "${Subnet2}"],
                        "SecurityGroups": ["${SecurityGroup}"],
                        "AssignPublicIp": "ENABLED"
                      }
                    },
                    "Overrides": {
                      "ContainerOverrides": [{
                        "Name": "stocksymbols-loader",
                        "Command": ["python3", "loadstocksymbols.py"]
                      }]
                    }
                  },
                  "Retry": [{
                    "ErrorEquals": ["States.TaskFailed"],
                    "IntervalSeconds": 30,
                    "MaxAttempts": 2,
                    "BackoffRate": 2.0
                  }],
                  "Catch": [{
                    "ErrorEquals": ["States.ALL"],
                    "ResultPath": "$.error",
                    "Next": "NotifyFailure"
                  }],
                  "Next": "Stage2-LoadDailyCompanyData"
                },
                "Stage2-LoadDailyCompanyData": {
                  "Type": "Task",
                  "Resource": "arn:aws:states:::ecs:runTask.sync",
                  "Parameters": {
                    "LaunchType": "FARGATE",
                    "Cluster": "${ClusterArn}",
                    "TaskDefinition": "${LoadDailyCompanyDataTaskDef}",
                    "NetworkConfiguration": {
                      "AwsvpcConfiguration": {
                        "Subnets": ["${Subnet1}", "${Subnet2}"],
                        "SecurityGroups": ["${SecurityGroup}"],
                        "AssignPublicIp": "ENABLED"
                      }
                    },
                    "Overrides": {
                      "ContainerOverrides": [{
                        "Name": "companyprofile-loader",
                        "Command": ["python3", "companyprofile.py"]
                      }]
                    }
                  },
                  "Retry": [{
                    "ErrorEquals": ["States.TaskFailed"],
                    "IntervalSeconds": 30,
                    "MaxAttempts": 2,
                    "BackoffRate": 2.0
                  }],
                  "Catch": [{
                    "ErrorEquals": ["States.ALL"],
                    "ResultPath": "$.error",
                    "Next": "NotifyFailure"
                  }],
                  "Next": "Stage3-EarningsRevenue"
                },
                "Stage3-EarningsRevenue": {
                  "Type": "Parallel",
                  "Comment": "Run earnings and revenue loaders in parallel (max 4 concurrent)",
                  "Branches": [
                    {
                      "StartAt": "EarningsEstimate",
                      "States": {
                        "EarningsEstimate": {
                          "Type": "Task",
                          "Resource": "arn:aws:states:::ecs:runTask.sync",
                          "Parameters": {
                            "LaunchType": "FARGATE",
                            "Cluster": "${ClusterArn}",
                            "TaskDefinition": "${EarningsEstimateTaskDef}",
                            "NetworkConfiguration": {
                              "AwsvpcConfiguration": {
                                "Subnets": ["${Subnet1}", "${Subnet2}"],
                                "SecurityGroups": ["${SecurityGroup}"],
                                "AssignPublicIp": "ENABLED"
                              }
                            },
                            "Overrides": {
                              "ContainerOverrides": [{
                                "Name": "earningsestimate-loader",
                                "Command": ["python3", "loadearningsestimate.py"]
                              }]
                            }
                          },
                          "Retry": [{"ErrorEquals": ["States.TaskFailed"], "MaxAttempts": 2}],
                          "End": true
                        }
                      }
                    },
                    {
                      "StartAt": "EarningsHistory",
                      "States": {
                        "EarningsHistory": {
                          "Type": "Task",
                          "Resource": "arn:aws:states:::ecs:runTask.sync",
                          "Parameters": {
                            "LaunchType": "FARGATE",
                            "Cluster": "${ClusterArn}",
                            "TaskDefinition": "${EarningsHistoryTaskDef}",
                            "NetworkConfiguration": {
                              "AwsvpcConfiguration": {
                                "Subnets": ["${Subnet1}", "${Subnet2}"],
                                "SecurityGroups": ["${SecurityGroup}"],
                                "AssignPublicIp": "ENABLED"
                              }
                            },
                            "Overrides": {
                              "ContainerOverrides": [{
                                "Name": "earningshistory-loader",
                                "Command": ["python3", "loadearningshistory.py"]
                              }]
                            }
                          },
                          "Retry": [{"ErrorEquals": ["States.TaskFailed"], "MaxAttempts": 2}],
                          "End": true
                        }
                      }
                    },
                    {
                      "StartAt": "EarningsMetrics",
                      "States": {
                        "EarningsMetrics": {
                          "Type": "Task",
                          "Resource": "arn:aws:states:::ecs:runTask.sync",
                          "Parameters": {
                            "LaunchType": "FARGATE",
                            "Cluster": "${ClusterArn}",
                            "TaskDefinition": "${EarningsMetricsTaskDef}",
                            "NetworkConfiguration": {
                              "AwsvpcConfiguration": {
                                "Subnets": ["${Subnet1}", "${Subnet2}"],
                                "SecurityGroups": ["${SecurityGroup}"],
                                "AssignPublicIp": "ENABLED"
                              }
                            },
                            "Overrides": {
                              "ContainerOverrides": [{
                                "Name": "earningsmetrics-loader",
                                "Command": ["python3", "loadearningsmetrics.py"]
                              }]
                            }
                          },
                          "Retry": [{"ErrorEquals": ["States.TaskFailed"], "MaxAttempts": 2}],
                          "End": true
                        }
                      }
                    },
                    {
                      "StartAt": "RevenueEstimate",
                      "States": {
                        "RevenueEstimate": {
                          "Type": "Task",
                          "Resource": "arn:aws:states:::ecs:runTask.sync",
                          "Parameters": {
                            "LaunchType": "FARGATE",
                            "Cluster": "${ClusterArn}",
                            "TaskDefinition": "${RevenueEstimateTaskDef}",
                            "NetworkConfiguration": {
                              "AwsvpcConfiguration": {
                                "Subnets": ["${Subnet1}", "${Subnet2}"],
                                "SecurityGroups": ["${SecurityGroup}"],
                                "AssignPublicIp": "ENABLED"
                              }
                            },
                            "Overrides": {
                              "ContainerOverrides": [{
                                "Name": "revenueestimate-loader",
                                "Command": ["python3", "loadrevenueestimate.py"]
                              }]
                            }
                          },
                          "Retry": [{"ErrorEquals": ["States.TaskFailed"], "MaxAttempts": 2}],
                          "End": true
                        }
                      }
                    }
                  ],
                  "Catch": [{
                    "ErrorEquals": ["States.ALL"],
                    "ResultPath": "$.error",
                    "Next": "NotifyFailure"
                  }],
                  "Next": "Success"
                },
                "Success": {
                  "Type": "Succeed"
                },
                "NotifyFailure": {
                  "Type": "Pass",
                  "Comment": "TODO: Add SNS notification for failures",
                  "Next": "Fail"
                },
                "Fail": {
                  "Type": "Fail",
                  "Error": "LoaderOrchestrationFailed",
                  "Cause": "One or more loader stages failed after retries"
                }
              }
            }
          - ClusterArn: !ImportValue StocksApp-ClusterArn
            Subnet1: !ImportValue StocksCore-PublicSubnet1Id
            Subnet2: !ImportValue StocksCore-PublicSubnet2Id
            SecurityGroup: !ImportValue StocksApp-EcsTasksSecurityGroupId
            StockSymbolsTaskDef: !Ref StockSymbolsTaskDefinition
            LoadDailyCompanyDataTaskDef: !Ref LoadDailyCompanyDataTaskDefinition
            EarningsEstimateTaskDef: !Ref EarningsEstimateTaskDefinition
            EarningsHistoryTaskDef: !Ref EarningsHistoryTaskDefinition
            EarningsMetricsTaskDef: !Ref EarningsMetricsTaskDefinition
            RevenueEstimateTaskDef: !Ref RevenueEstimateTaskDefinition

  ########################################
  # Algo Loaders + Orchestrator          #
  ########################################
  TrendTemplateTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: trend-template-loader
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn:      !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: trend-template-loader
          Image: !Join [":", [!ImportValue StocksCore-ContainerRepositoryUri, :latest]]
          Essential: true
          Command:
            - load_trend_template_data.py
          Environment:
            - Name: DB_SECRET_ARN
              Value: !ImportValue StocksApp-SecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/trend-template-loader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

  MarketHealthTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: market-health-loader
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn:      !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: market-health-loader
          Image: !Join [":", [!ImportValue StocksCore-ContainerRepositoryUri, :latest]]
          Essential: true
          Command:
            - load_market_health_daily.py
          Environment:
            - Name: DB_SECRET_ARN
              Value: !ImportValue StocksApp-SecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/market-health-loader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

  AlgoMetricsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: algo-metrics-loader
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn:      !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: algo-metrics-loader
          Image: !Join [":", [!ImportValue StocksCore-ContainerRepositoryUri, :latest]]
          Essential: true
          Command:
            - load_algo_metrics_daily.py
          Environment:
            - Name: DB_SECRET_ARN
              Value: !ImportValue StocksApp-SecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/algo-metrics-loader
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

  AlgoOrchestratorTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: algo-orchestrator
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn:      !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: algo-orchestrator
          Image: !Join [":", [!ImportValue StocksCore-ContainerRepositoryUri, :latest]]
          Essential: true
          Command:
            - algo_orchestrator.py
          Environment:
            - Name: DB_SECRET_ARN
              Value: !ImportValue StocksApp-SecretArn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_HOST
              Value: !ImportValue StocksApp-DBEndpoint
            - Name: DB_PORT
              Value: !ImportValue StocksApp-DBPort
            - Name: DB_NAME
              Value: !ImportValue StocksApp-DBName
          # Alpaca creds pulled from AWS Secrets Manager at task start (best practice)
          Secrets:
            - Name: APCA_API_KEY_ID
              ValueFrom: !Join ["", [!ImportValue StocksApp-AlgoSecretsSecretArn, ":APCA_API_KEY_ID::"]]
            - Name: APCA_API_SECRET_KEY
              ValueFrom: !Join ["", [!ImportValue StocksApp-AlgoSecretsSecretArn, ":APCA_API_SECRET_KEY::"]]
            - Name: APCA_API_BASE_URL
              ValueFrom: !Join ["", [!ImportValue StocksApp-AlgoSecretsSecretArn, ":APCA_API_BASE_URL::"]]
            - Name: ALPACA_PAPER_TRADING
              ValueFrom: !Join ["", [!ImportValue StocksApp-AlgoSecretsSecretArn, ":ALPACA_PAPER_TRADING::"]]
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn: !ImportValue StocksApp-SecretArn
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn: !ImportValue StocksApp-SecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/algo-orchestrator
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
              awslogs-create-group: 'true'

  LoaderOrchestrationScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-loader-orchestration-test"
      Description: "Trigger loader orchestration - TEST at 20:41 UTC (one-time test)"
      ScheduleExpression: "cron(41 20 ? * * *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt LoaderOrchestrationStateMachine.Arn
          Id: "LoaderStateMachineTarget"
          RoleArn: !GetAtt EventBridgeECSRole.Arn

  #########################################
  # EventBridge â†’ ECS RunTask role         #
  # Lets EventBridge invoke ECS tasks     #
  # directly (without Step Functions)     #
  #########################################
  EventBridgeRunTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EventBridge-RunTask-Role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunECSTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt ECSExecutionRole.Arn

  #########################################
  # Algo orchestrator daily schedule       #
  # Runs at 13:35 UTC = 9:35 ET (EDT)     #
  # i.e. 5 minutes after market open      #
  #########################################
  AlgoOrchestratorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-algo-orchestrator-daily"
      Description: "Trigger algo orchestrator daily at 13:35 UTC (9:35 ET market open + 5min)"
      ScheduleExpression: "cron(35 13 ? * MON-FRI *)"
      State: ENABLED
      Targets:
        - Arn: !ImportValue StocksApp-ClusterArn
          Id: "AlgoOrchestratorTarget"
          RoleArn: !GetAtt EventBridgeRunTaskRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref AlgoOrchestratorTaskDefinition
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !ImportValue StocksCore-PublicSubnet1Id
                  - !ImportValue StocksCore-PublicSubnet2Id
                SecurityGroups:
                  - !ImportValue StocksApp-EcsTasksSecurityGroupId
                AssignPublicIp: ENABLED
            TaskCount: 1

  # Pre-market sync: refresh Alpaca positions 5min before open
  AlpacaPortfolioPreMarketScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-alpaca-portfolio-premarket"
      Description: "Sync Alpaca positions at 13:25 UTC (9:25 ET, 5min pre-open)"
      ScheduleExpression: "cron(25 13 ? * MON-FRI *)"
      State: ENABLED
      Targets:
        - Arn: !ImportValue StocksApp-ClusterArn
          Id: "AlpacaPortfolioTarget"
          RoleArn: !GetAtt EventBridgeRunTaskRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref AlgoOrchestratorTaskDefinition
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !ImportValue StocksCore-PublicSubnet1Id
                  - !ImportValue StocksCore-PublicSubnet2Id
                SecurityGroups:
                  - !ImportValue StocksApp-EcsTasksSecurityGroupId
                AssignPublicIp: ENABLED
            TaskCount: 1
          Input: |
            {
              "containerOverrides": [{
                "name": "algo-orchestrator",
                "command": ["loadalpacaportfolio.py"]
              }]
            }

  # Post-EOD: trend template loader (after price_daily refreshes overnight)
  TrendTemplateScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-trend-template-eod"
      Description: "Run trend-template loader nightly at 03:00 UTC after price refresh"
      ScheduleExpression: "cron(0 3 ? * TUE-SAT *)"
      State: ENABLED
      Targets:
        - Arn: !ImportValue StocksApp-ClusterArn
          Id: "TrendTemplateTarget"
          RoleArn: !GetAtt EventBridgeRunTaskRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TrendTemplateTaskDefinition
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !ImportValue StocksCore-PublicSubnet1Id
                  - !ImportValue StocksCore-PublicSubnet2Id
                SecurityGroups:
                  - !ImportValue StocksApp-EcsTasksSecurityGroupId
                AssignPublicIp: ENABLED
            TaskCount: 1

  # Post-EOD: market health (depends on trend_template)
