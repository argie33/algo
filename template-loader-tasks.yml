                AssignPublicIp: ENABLED
            TaskCount: 1

  # Post-EOD: algo metrics composite (after trend + market health)
  AlgoMetricsScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-algo-metrics-eod"
      Description: "Run algo-metrics composite loader nightly at 04:00 UTC"
