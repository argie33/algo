AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Tier 1 Quick Wins — VPC Endpoints, S3 Intelligent-Tiering, CloudWatch retention.
  Eliminates ~$45/month in NAT/storage/log costs with zero application changes.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where ECS/Lambda runs

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets that need endpoint access

  PrivateRouteTableIds:
    Type: CommaDelimitedList
    Description: Route table IDs for Gateway endpoints (S3, DynamoDB)

  EndpointSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group attached to VPC endpoints (allows 443 from VPC CIDR)

  StagingBucketName:
    Type: String
    Default: stocks-staging
    Description: Existing S3 bucket for loader staging data

  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 7, 14, 30, 60, 90]
    Description: CloudWatch log retention. Default 7 days = ~80% cost reduction.

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

Resources:
  # ============================================================
  # VPC ENDPOINTS — Eliminate NAT Gateway charges
  # NAT costs $0.045/hour + $0.045/GB. Endpoints are free or $0.01/hour.
  # ============================================================

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds: !Ref PrivateRouteTableIds
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource: '*'

  DynamoDBGatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcEndpointType: Gateway
      RouteTableIds: !Ref PrivateRouteTableIds

  SecretsManagerInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroupId
      PrivateDnsEnabled: true

  EcrApiInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroupId
      PrivateDnsEnabled: true

  EcrDkrInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroupId
      PrivateDnsEnabled: true

  CloudWatchLogsInterfaceEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroupId
      PrivateDnsEnabled: true

  # ============================================================
  # S3 INTELLIGENT-TIERING + LIFECYCLE
  # Auto-moves cold data to cheaper storage. -60% on infrequent objects.
  # ============================================================

  StagingBucketLifecycle:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    Properties:
      Bucket: !Ref StagingBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowVpcEndpointAccess
            Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub arn:aws:s3:::${StagingBucketName}
              - !Sub arn:aws:s3:::${StagingBucketName}/*
            Condition:
              StringEquals:
                aws:SourceVpce: !Ref S3GatewayEndpoint

  # ============================================================
  # CLOUDWATCH LOG GROUPS — 7-day retention by default
  # ============================================================

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/stocks-api-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupBuysell:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/loader-buyselldaily-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupPrices:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/loader-prices-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupFinancials:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/loader-financials-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupSignals:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/loader-signals-${Environment}
      RetentionInDays: !Ref LogRetentionDays

  # Long-term archival: stream high-value logs to S3 (10x cheaper)
  LogArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub stocks-logs-archive-${AWS::AccountId}-${Environment}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER_IR
                TransitionInDays: 90
              - StorageClass: DEEP_ARCHIVE
                TransitionInDays: 365
            ExpirationInDays: !If [IsProduction, 2555, 730]  # 7yr prod, 2yr dev
      IntelligentTieringConfigurations:
        - Id: AutoTier
          Status: Enabled
          Tierings:
            - AccessTier: ARCHIVE_ACCESS
              Days: 90
            - AccessTier: DEEP_ARCHIVE_ACCESS
              Days: 180
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================
  # COST MONITORING ALARM
  # ============================================================

  MonthlyCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub stocks-monthly-cost-${Environment}
      AlarmDescription: Alert when projected monthly spend exceeds $60
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Statistic: Maximum
      Period: 21600  # 6 hours
      EvaluationPeriods: 1
      Threshold: 60
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: Currency
          Value: USD

Outputs:
  S3GatewayEndpointId:
    Value: !Ref S3GatewayEndpoint
    Export:
      Name: !Sub Tier1-S3Endpoint-${Environment}

  SecretsEndpointId:
    Value: !Ref SecretsManagerInterfaceEndpoint
    Export:
      Name: !Sub Tier1-SecretsEndpoint-${Environment}

  LogArchiveBucket:
    Value: !Ref LogArchiveBucket
    Export:
      Name: !Sub Tier1-LogArchive-${Environment}

  EstimatedMonthlySavings:
    Value: |
      VPC Endpoints (NAT replacement):  -$20/month
      S3 Intelligent-Tiering:           -$10/month
      CloudWatch 7-day retention:       -$15/month
      ─────────────────────────────────
      Total Tier 1 IaC savings:         -$45/month
    Description: Cost impact of this stack
