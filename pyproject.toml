[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "algo"
version = "0.1.0"
description = "Stock Analytics Platform"
requires-python = ">=3.10"
dependencies = [
    "psycopg2-binary==2.9.9",
    "yfinance==1.4.1",
    "requests==2.33.0",
    "pandas==2.1.4",
    "scipy==1.13.0",
    "boto3==1.34.0",
    "Flask==3.1.3",
    "Flask-CORS==6.0.0",
    "Werkzeug==3.1.6",
    "urllib3==2.7.0",
    "xlrd==2.0.1",
    "openpyxl==3.1.0",
    "rich==13.9.4",
]

[tool.setuptools]
packages = [
    "algo",
    "utils",
    "lambda",
    "migrations",
    "loaders",
    "monitoring",
    "tools",
]

[tool.setuptools.package-data]
algo = ["*.py"]
utils = ["*.py"]
loaders = ["*.py"]
monitoring = ["*.py"]
migrations = ["*.py", "versions/*.py"]
tools = ["*.py", "**/*.py"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
ignore_missing_imports = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
exclude = [
    "^lambda/",
    "^migrations/",
    "^tests/",
]

[[tool.mypy.overrides]]
module = [
    "tests.*",
    "tools.dashboard.data_validation",
    "utils.loaders.helpers",
    "tools.dashboard.*",
]
ignore_errors = true

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "C90", "UP", "B", "C4", "PIE", "T10", "LOG", "RUF", "A"]
ignore = ["E203", "E501", "C901", "B904"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"migrations/*" = ["E402", "F401"]
"tests/*" = ["E402", "F401", "S101"]
"scripts/*" = ["E402"]
"load*.py" = ["E402", "F401"]
"conftest.py" = ["E402"]
"*_lambda.py" = ["E402"]
"dev_server.py" = ["E402"]
"api_proxy_server.py" = ["E402"]
"panels.py" = ["E402"]
"tools/dashboard/*.py" = ["E402", "C901", "N806", "E501"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.isort]
known-first-party = ["algo", "utils", "loaders", "lambda", "config", "tools", "monitoring"]
known-third-party = ["numpy", "pandas", "scipy", "boto3", "flask", "requests", "psycopg2"]
lines-after-imports = 2

[tool.pylint.messages_control]
disable = [
    "line-too-long",
    "missing-docstring",
    "too-many-arguments",
    "too-many-locals",
    "too-many-statements",
    "too-many-branches",
    "duplicate-code",
    "too-few-public-methods",
    "inconsistent-return-statements",
    "fixme",
]

[tool.pylint.variables]
ignored-argument-names = "_.*|^dummy_.*|^test_.*"

[tool.pylint.design]
max-attributes = 10
max-locals = 20

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--tb=short -v"
minversion = "7.0"

[tool.coverage.run]
source = ["algo", "utils", "loaders", "lambda"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if False:",
]
precision = 2
skip_covered = false
skip_empty = true
sort = "cover"

[tool.coverage.html]
directory = "htmlcov"
