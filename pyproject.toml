[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "algo"
version = "0.1.0"
description = "Stock Analytics Platform"
requires-python = ">=3.10"
dependencies = [
    "psycopg2-binary==2.9.9",
    "yfinance==1.4.1",
    "requests==2.33.0",
    "pandas==2.1.4",
    "scipy==1.13.0",
    "boto3==1.34.0",
    "Flask==3.1.3",
    "Flask-CORS==6.0.0",
    "Werkzeug==3.1.6",
    "urllib3==2.7.0",
    "xlrd==2.0.1",
    "openpyxl==3.1.0",
    "rich==13.9.4",
]

[tool.setuptools]
packages = [
    "algo",
    "utils",
    "migrations",
    "loaders",
    "monitoring",
    "dashboard",
    "config",
]

[tool.setuptools.package-data]
algo = ["*.py"]
utils = ["*.py"]
loaders = ["*.py"]
monitoring = ["*.py"]
migrations = ["*.py", "versions/*.py"]
dashboard = ["*.py", "**/*.py"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
exclude = [
    "^migrations/",
    "^tests/",
    "^lambda/",
]

[[tool.mypy.overrides]]
module = [
    "utils.loaders.helpers",
    "utils.decorators",
]
ignore_errors = true  # Unix-only signals (SIGALRM) — not available on Windows

[[tool.mypy.overrides]]
module = [
    "dashboard.dashboard",
]
warn_unused_ignores = false  # msvcrt is Windows-only; try/except ImportError block makes ignores platform-dependent

[[tool.mypy.overrides]]
module = [
    "utils.infrastructure.timeout",
]
ignore_errors = true  # Uses contextlib generics that require architectural rework

[[tool.mypy.overrides]]
module = [
    "dashboard.fetchers_config",
    "dashboard.fetchers_market",
    "dashboard.fetchers_portfolio",
    "dashboard.fetchers_signals",
    "dashboard.fetchers_external",
    "dashboard.fetchers_common",
]
disallow_untyped_defs = true  # Fetchers must be annotated — unannotated defs hide type errors from API data

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "C90", "UP", "B", "C4", "PIE", "T10", "LOG", "RUF", "A"]
ignore = ["E203", "E501", "UP031", "RUF012"]

[tool.ruff.lint.per-file-ignores]
"lambda/cognito-email-trigger/*" = ["N999"]
"lambda/data-completeness-verifier/*" = ["N999"]
"lambda/data-freshness-monitor/*" = ["N999"]
"lambda/db-init/*" = ["N999"]
"lambda/loader-result-logger/*" = ["N999"]
"lambda/rds-password-reset/*" = ["N999"]
"lambda/trigger-loaders/*" = ["N999"]
"__init__.py" = ["F401"]
"utils/exceptions/core.py" = ["N818", "A001"]
"utils/exceptions/__init__.py" = ["A001"]
"migrations/*" = ["E402", "F401"]
"tests/*" = ["E402", "F401", "S101"]
"scripts/*" = ["E402"]
"load*.py" = ["E402", "F401"]
"conftest.py" = ["E402"]
"*_lambda.py" = ["E402"]
"dev_server.py" = ["E402"]
"api_proxy_server.py" = ["E402"]
"panels.py" = ["E402"]
"dashboard/*.py" = ["E402", "C901"]
"*config*.py" = ["E402"]
"enrich_*.py" = ["E402"]
"orchestrator*.py" = ["E402"]
"validate_*.py" = ["E402"]
"verify_*.py" = ["E402"]
"diagnose_*.py" = ["E402"]
"migration_helper.py" = ["E402"]
"freshness.py" = ["E402"]
"routes/utils.py" = ["E402"]
"fix_casts_v2.py" = ["T201", "F401"]
# Orchestration phases, lambda handlers, and complex loaders are inherently high-complexity
# state machines — per-file ignores are intentional; splitting would harm readability
"algo/orchestrator/phase1_data_freshness.py" = ["C901"]
"algo/orchestrator/phase6_exit_execution.py" = ["C901"]
"algo/orchestrator/phase8_entry_execution.py" = ["C901"]
"algo/orchestrator/phase9_reconciliation.py" = ["C901"]
"algo/infrastructure/reconciliation.py" = ["C901"]
"algo/backtest/run_backtest.py" = ["C901"]
"algo/monitoring/position_monitor.py" = ["C901"]
"algo/orchestration/database_health_monitor.py" = ["C901"]
"algo/orchestration/orchestrator.py" = ["C901"]
"algo/risk/market_exposure.py" = ["C901"]
"algo/signals/signal_momentum.py" = ["C901"]
"algo/trading/executor_exit_handler.py" = ["C901"]
"algo/trading/exit_engine.py" = ["C901"]
"algo/trading/trade_validator.py" = ["C901"]
"config/credential_manager.py" = ["C901"]
"config/credential_validator.py" = ["C901"]
"loaders/load_prices.py" = ["C901"]
"loaders/load_signal_quality_scores.py" = ["C901"]
"loaders/enrich_buy_sell_daily_technical.py" = ["C901"]
"loaders/load_aaii_sentiment.py" = ["C901"]
"loaders/load_earnings_calendar.py" = ["C901"]
"loaders/load_economic_metrics_daily.py" = ["C901"]
"loaders/load_fear_greed_index.py" = ["C901"]
"loaders/load_buy_sell_daily.py" = ["C901"]
"loaders/load_fred_economic_data.py" = ["C901"]
"lambda/algo_orchestrator/lambda_function.py" = ["C901"]
"lambda/api/lambda_function.py" = ["C901"]
"lambda/api/routes/algo.py" = ["C901"]
"lambda/api/routes/algo_handlers/dashboard.py" = ["C901"]
"lambda/api/routes/algo_handlers/market.py" = ["C901"]
"lambda/api/routes/algo_handlers/metrics.py" = ["C901"]
"lambda/api/routes/economic.py" = ["C901"]
"lambda/api/routes/market.py" = ["C901"]
"lambda/api/routes/prices.py" = ["C901"]
"lambda/api/routes/sectors.py" = ["C901"]
"lambda/api/routes/sentiment.py" = ["C901"]
"lambda/db-init/lambda_function.py" = ["C901"]
"lambda/rds-password-reset/lambda_function.py" = ["C901"]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.ruff.lint.isort]
known-first-party = ["algo", "utils", "loaders", "lambda", "config", "dashboard", "monitoring"]
known-third-party = ["numpy", "pandas", "scipy", "boto3", "flask", "requests", "psycopg2"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'

[tool.pylint.messages_control]
disable = [
    "line-too-long",
    "missing-docstring",
    "too-many-arguments",
    "too-many-locals",
    "too-many-statements",
    "too-many-branches",
    "duplicate-code",
    "too-few-public-methods",
    "inconsistent-return-statements",
    "fixme",
    "assignment-from-no-return",
    "raising-bad-type",
    "no-member",
    "import-error",  # False positives: setup_imports modifies sys.path at runtime
    "no-name-in-module",  # False positives: setup_imports modifies sys.path at runtime
    "assignment-from-none",  # Incorrect annotations or false positives from runtime path setup
]

[tool.pylint.variables]
ignored-argument-names = "_.*|^dummy_.*|^test_.*"

[tool.pylint.design]
max-attributes = 10
max-locals = 20

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--tb=short -v"
minversion = "7.0"
markers = [
    "unit: mark test as a unit test",
    "edge: mark test as an edge case test",
    "integration: mark test as an integration test",
]

[tool.coverage.run]
source = ["algo", "utils", "loaders", "lambda", "dashboard"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if False:",
]
precision = 2
skip_covered = false
skip_empty = true
sort = "cover"

[tool.coverage.html]
directory = "htmlcov"
