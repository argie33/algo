[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "algo"
version = "0.1.0"
description = "Stock Analytics Platform"
requires-python = ">=3.10"
dependencies = [
    "psycopg2-binary==2.9.9",
    "yfinance==1.4.1",
    "requests==2.33.0",
    "pandas==2.1.4",
    "scipy==1.13.0",
    "boto3==1.34.0",
    "Flask==3.1.3",
    "Flask-CORS==6.0.0",
    "Werkzeug==3.1.6",
    "urllib3==2.7.0",
    "xlrd==2.0.1",
    "openpyxl==3.1.0",
    "rich==13.9.4",
]

[tool.setuptools]
packages = [
    "algo",
    "utils",
    "lambda",
    "migrations",
    "loaders",
    "monitoring",
    "tools",
]

[tool.setuptools.package-data]
algo = ["*.py"]
utils = ["*.py"]
loaders = ["*.py"]
monitoring = ["*.py"]
migrations = ["*.py", "versions/*.py"]
tools = ["*.py", "**/*.py"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
ignore_missing_imports = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true

[[tool.mypy.overrides]]
module = [
    "tests.*",
    "migrations.*",
    "tools.dashboard.data_validation",
    "utils.loaders.helpers",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--tb=short -v"
minversion = "7.0"

[tool.coverage.run]
source = ["algo", "utils", "loaders", "lambda"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if False:",
]
precision = 2
skip_covered = false
skip_empty = true
sort = "cover"

[tool.coverage.html]
directory = "htmlcov"
