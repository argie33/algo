AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Billing Circuit Breaker - Direct alert sender'

Parameters:
  PhoneNumber:
    Type: String
    Default: '+13123078620'
  EmailAddress:
    Type: String
    Default: 'argeropolos@gmail.com'
  MonthlyBudgetLimit:
    Type: Number
    Default: 100
  LambdaExecutionRoleArn:
    Type: String
    Default: 'arn:aws:iam::626216981288:role/stocks-algo-api-dev-us-east-1-lambdaRole'

Resources:
  BillingAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: billing-circuit-breaker-alerts

  AlertSenderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: '*'

  AlertSenderLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: billing-alert-sender
      Runtime: nodejs20.x
      Role: !GetAtt AlertSenderRole.Arn
      Handler: index.handler
      Environment:
        Variables:
          PHONE: !Ref PhoneNumber
          EMAIL: !Ref EmailAddress
      Code:
        ZipFile: |
          const aws = require('aws-sdk');
          const sns = new aws.SNS({region: 'us-east-1'});

          exports.handler = async (event) => {
            const phone = process.env.PHONE;
            const email = process.env.EMAIL;

            try {
              console.log('Sending SMS...');
              await sns.publish({
                PhoneNumber: phone,
                Message: event.message || 'AWS Billing Alert: Test message received'
              }).promise();

              console.log('Sending Email...');
              await sns.publish({
                TopicArn: 'arn:aws:sns:us-east-1:626216981288:billing-circuit-breaker-alerts',
                Subject: event.subject || 'AWS Billing Alert',
                Message: event.message || 'Test message'
              }).promise();

              return {statusCode: 200, body: 'Alerts sent'};
            } catch (e) {
              console.error(e);
              throw e;
            }
          };

Outputs:
  SNSTopicArn:
    Value: !Ref BillingAlertTopic
  LambdaArn:
    Value: !GetAtt AlertSenderLambda.Arn
