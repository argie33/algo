AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Billing Circuit Breaker'

Parameters:
  PhoneNumber:
    Type: String
    Default: '+13123078620'
  EmailAddress:
    Type: String
    Default: 'argeropolos@gmail.com'
  MonthlyBudgetLimit:
    Type: Number
    Default: 100
  LambdaExecutionRoleArn:
    Type: String
    Default: 'arn:aws:iam::626216981288:role/stocks-algo-api-dev-us-east-1-lambdaRole'

Resources:
  BillingAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: billing-circuit-breaker-alerts
      DisplayName: AWS Billing Circuit Breaker

  EmailSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref BillingAlertTopic
      Protocol: email
      Endpoint: !Ref EmailAddress

  SMSSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref BillingAlertTopic
      Protocol: sms
      Endpoint: !Ref PhoneNumber

Outputs:
  SNSTopicArn:
    Value: !Ref BillingAlertTopic
  TopicName:
    Value: billing-circuit-breaker-alerts
