    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref LatestDataNotificationTopic
      Endpoint: 'argeropolos@accenture.com'

  #############################################################
  # Step Functions State Machine
  #############################################################
  FinancialDataStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DependsOn: 
      - StepFunctionsExecutionRole
      - NotificationTopic
    Properties:
      StateMachineName: 'FinancialDataProcessingWorkflow'
      RoleArn: !GetAtt StepFunctionsExecutionRole.Arn
      DefinitionString: !Sub 
        - |
          {
            "Comment": "Financial Data Processing Workflow with Retries",
            "StartAt": "ProcessInitialData",
            "States": {
              "ProcessInitialData": {
                "Type": "Parallel",
                "Branches": [
                  {
                    "StartAt": "RunLoadInfo",
                    "States": {
                      "RunLoadInfo": {
                        "Type": "Task",
                        "Resource": "arn:aws:states:::ecs:runTask.sync",
                        "Parameters": {
                          "LaunchType": "FARGATE",
                          "Cluster": "${ClusterArn}",
                          "TaskDefinition": "${LoadInfoTaskDefArn}",
                          "NetworkConfiguration": {
                            "AwsvpcConfiguration": {
                              "Subnets": ["${Subnet1Id}", "${Subnet2Id}"],
                              "SecurityGroups": ["${SecurityGroupId}"],
                              "AssignPublicIp": "ENABLED"
                            }
                          }
                        },
                        "Retry": [
                          {
                            "ErrorEquals": ["States.ALL"],
                            "IntervalSeconds": 60,
                            "MaxAttempts": 2,
                            "BackoffRate": 2
                          }
                        ],
                        "End": true
                      }
                    }
                  },
                  {
                    "StartAt": "RunEpsTrend",
                    "States": {
                      "RunEpsTrend": {
                        "Type": "Task",
                        "Resource": "arn:aws:states:::ecs:runTask.sync",
                        "Parameters": {
                          "LaunchType": "FARGATE",
                          "Cluster": "${ClusterArn}",
                          "TaskDefinition": "${EpsTrendTaskDefArn}",
                          "NetworkConfiguration": {
                            "AwsvpcConfiguration": {
                              "Subnets": ["${Subnet1Id}", "${Subnet2Id}"],
                              "SecurityGroups": ["${SecurityGroupId}"],
                              "AssignPublicIp": "ENABLED"
                            }
                          }
                        },
                        "Retry": [
                          {
                            "ErrorEquals": ["States.ALL"],
                            "IntervalSeconds": 60,
                            "MaxAttempts": 2,
                            "BackoffRate": 2
                          }
                        ],
                        "End": true
                      }
                    }
                  }
                ],
                "ResultPath": "$.InitialDataResults",
                "Next": "CheckInitialDataSuccess",
                "Catch": [
                  {
                    "ErrorEquals": ["States.ALL"],
                    "Next": "NotifyError"
                  }
                ]
              },
              "CheckInitialDataSuccess": {
                "Type": "Choice",
                "Choices": [
                  {
                    "And": [
                      {
                        "Variable": "$.InitialDataResults[0].TaskResult.StopCode",
                        "NumericEquals": 0
                      },
                      {
                        "Variable": "$.InitialDataResults[1].TaskResult.StopCode",
                        "NumericEquals": 0
                      }
                    ],
                    "Next": "RunStockScreener"
                  }
                ],
                "Default": "NotifyError"
              },
              "RunStockScreener": {
                "Type": "Task",
                "Resource": "arn:aws:states:::ecs:runTask.sync",
                "Parameters": {
                  "LaunchType": "FARGATE",
                  "Cluster": "${ClusterArn}",
                  "TaskDefinition": "${StockScreenerTaskDefArn}",
                  "NetworkConfiguration": {
                    "AwsvpcConfiguration": {
                      "Subnets": ["${Subnet1Id}", "${Subnet2Id}"],
                      "SecurityGroups": ["${SecurityGroupId}"],
                      "AssignPublicIp": "ENABLED"
                    }
                  }
                },
                "Retry": [
                  {
                    "ErrorEquals": ["States.ALL"],
                    "IntervalSeconds": 60,
                    "MaxAttempts": 2,
                    "BackoffRate": 2
                  }
                ],
                "Next": "WorkflowSuccess",
                "Catch": [
                  {
                    "ErrorEquals": ["States.ALL"],
                    "Next": "NotifyError"
                  }
                ]
              },
              "WorkflowSuccess": {
                "Type": "Succeed"
              },
              "NotifyError": {
                "Type": "Task",
                "Resource": "arn:aws:states:::sns:publish",
                "Parameters": {
                  "TopicArn": "${NotificationTopicArn}",
                  "Message": "Financial data processing workflow failed. Please check CloudWatch logs for details."
              },
                "Next": "WorkflowFailed"
              },
              "WorkflowFailed": {
                "Type": "Fail",
                "Error": "FinancialDataProcessingFailed",
                "Cause": "One or more jobs failed after retry attempts"
              }
            }
          }
        - ClusterArn: !ImportValue StocksApp-ClusterArn
          LoadInfoTaskDefArn: !Ref LoadInfoTaskDefinition
          EpsTrendTaskDefArn: !Ref EpsTrendTaskDefinition
          StockScreenerTaskDefArn: !Ref StockScreenerTaskDefinition
          Subnet1Id: !ImportValue StocksCore-PublicSubnet1Id
          Subnet2Id: !ImportValue StocksCore-PublicSubnet2Id
          SecurityGroupId: !ImportValue StocksApp-EcsTasksSecurityGroupId
          NotificationTopicArn: !Ref NotificationTopic

  #############################################################
  # EventBridge Schedule to Trigger the Step Function
  #############################################################
  FinancialDataProcessingSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Run financial data processing workflow at 5:00 AM CT (10:00 UTC) on weekdays"
      ScheduleExpression: "cron(0 23 ? * MON-FRI *)"
      # This will start at 5:00 AM CT, allowing time for the whole workflow to complete
      State: ENABLED
      Targets:
        - Id: FinancialDataProcessingTarget
          Arn: !Ref FinancialDataStateMachine
          RoleArn: !GetAtt StepFunctionsExecutionRole.Arn

