    Properties:
      Protocol: sms
      TopicArn: !Ref NotificationTopic
      Endpoint: '+13123078620'

  # Email Subscription for the SNS Topic
  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref NotificationTopic
      Endpoint: 'argeropolos@accenture.com' 

  #############################################################
  # SNS Topic for Notifications
  #############################################################
  LatestDataNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: LatestDataProcessingNotifications
      DisplayName: Latest Data Processing Workflow Notifications
  # SMS Subscription for Latest Data Notifications
  LatestDataSMSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sms
      TopicArn: !Ref LatestDataNotificationTopic
      Endpoint: '+13123078620'

  # Email Subscription for Latest Data Notifications
