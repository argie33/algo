AWSTemplateFormatVersion: '2010-09-09'
Description: 'Database Optimizations - TimescaleDB, Indexing, Connection Pooling'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: 'Deployment environment'

  RDSInstanceId:
    Type: String
    Default: stocks-db
    Description: 'RDS instance identifier'

  EnableTimescaleDB:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable TimescaleDB extension for time-series optimization'

  EnablePgBouncer:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable pgBouncer connection pooling'

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  EnableTS: !Equals [!Ref EnableTimescaleDB, 'true']
  EnablePB: !Equals [!Ref EnablePgBouncer, 'true']

Resources:
  # CloudWatch Dashboard for Database Performance
  DatabasePerformanceDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'stocks-db-optimization-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/RDS", "CPUUtilization", {"stat": "Average"}],
                  [".", "DatabaseConnections", {"stat": "Average"}],
                  [".", "ReadIOPS", {"stat": "Sum"}],
                  [".", "WriteIOPS", {"stat": "Sum"}],
                  [".", "NetworkReceiveThroughput", {"stat": "Average"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "RDS Performance Metrics"
              }
            }
          ]
        }

  # Lambda Function to Execute TimescaleDB Setup
  TimescaleDBSetupFunction:
    Type: AWS::Lambda::Function
    Condition: EnableTS
    Properties:
      FunctionName: !Sub 'timescaledb-setup-${Environment}'
      Runtime: python3.11
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DB_INSTANCE_ID: !Ref RDSInstanceId
          ENVIRONMENT: !Ref Environment
          SECRET_ARN: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:prod/rds/stocks'
      Code:
        ZipFile: |
          import json
          import psycopg2
          import boto3
          import os
          from datetime import datetime

          secrets_client = boto3.client('secretsmanager')

          def get_db_credentials():
              """Retrieve RDS credentials from Secrets Manager."""
              try:
                  response = secrets_client.get_secret_value(
                      SecretId=os.getenv('SECRET_ARN')
                  )
                  secret = json.loads(response['SecretString'])
                  return {
                      'host': secret['host'],
                      'user': secret['username'],
                      'password': secret['password'],
                      'database': 'stocks'
                  }
              except Exception as e:
                  print(f"Error fetching credentials: {e}")
                  return None

          def enable_timescaledb(conn):
              """Enable TimescaleDB extension."""
              cur = conn.cursor()
              try:
                  cur.execute("CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;")
                  conn.commit()
                  print("✅ TimescaleDB extension enabled")
                  return True
              except Exception as e:
                  print(f"⚠️  {e}")
                  conn.rollback()
                  return False
              finally:
                  cur.close()

          def convert_to_hypertables(conn):
              """Convert price tables to hypertables."""
              cur = conn.cursor()
              tables = [
                  ('price_daily', 'date', '1 month'),
                  ('price_weekly', 'date', '3 months'),
                  ('price_monthly', 'date', '1 year'),
              ]

              for table, time_col, interval in tables:
                  try:
                      cur.execute(f"""
                          SELECT create_hypertable(
                              '{table}',
                              '{time_col}',
                              if_not_exists => TRUE,
                              chunk_time_interval => interval '{interval}'
                          )
                      """)
                      conn.commit()
                      print(f"✅ {table} converted to hypertable")
                  except Exception as e:
                      print(f"⚠️  {table}: {e}")
                      conn.rollback()
              cur.close()

          def handler(event, context):
              """Lambda handler for TimescaleDB setup."""
              creds = get_db_credentials()
              if not creds:
                  return {
                      'statusCode': 500,
                      'body': json.dumps('Failed to get credentials')
                  }

              try:
                  conn = psycopg2.connect(**creds)
                  enable_timescaledb(conn)
                  convert_to_hypertables(conn)
                  conn.close()

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'TimescaleDB optimization complete',
                          'timestamp': datetime.now().isoformat()
                      })
                  }
              except Exception as e:
                  print(f"Error: {e}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error: {str(e)}')
                  }

  # ECS Task for pgBouncer Connection Pooling
  PgBouncerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: EnablePB
    Properties:
      Family: !Sub 'pgbouncer-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ContainerDefinitions:
        - Name: pgbouncer
          Image: pgbouncer:latest
          PortMappings:
            - ContainerPort: 6432
              Protocol: tcp
          Environment:
            - Name: DATABASES_HOST
              Value: !Sub '${RDSInstanceId}.${AWS::Region}.rds.amazonaws.com'
            - Name: DATABASES_PORT
              Value: '5432'
            - Name: DATABASES_USER
              Value: stocks
            - Name: DATABASES_DBNAME
              Value: stocks
            - Name: PGBOUNCER_POOL_MODE
              Value: transaction
            - Name: PGBOUNCER_MAX_DB_CONNECTIONS
              Value: '50'
            - Name: PGBOUNCER_MIN_POOL_SIZE
              Value: '10'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref PgBouncerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: pgbouncer

  PgBouncerLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnablePB
    Properties:
      LogGroupName: !Sub '/ecs/pgbouncer-${Environment}'
      RetentionInDays: !If [IsProduction, 30, 7]

  # Auto Scaling for Connection Pool
  PgBouncerScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: EnablePB
    Properties:
      MaxCapacity: 10
      MinCapacity: 2
      ResourceId: !Sub 'service/${Environment}/pgbouncer'
      RoleARN: !GetAtt ScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PgBouncerScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: EnablePB
    Properties:
      PolicyName: !Sub 'pgbouncer-scaling-${Environment}'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PgBouncerScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 75
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

  # Cost Monitoring Alarm
  DailyCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'stocks-daily-cost-${Environment}'
      AlarmDescription: 'Alert when daily AWS spend exceeds $50'
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SNSAlarmTopic

  SNSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'stocks-alerts-${Environment}'
      DisplayName: Stock Analytics Alerts

  # Parameter Store for Optimization Status
  TimescaleDBStatus:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/stocks/${Environment}/timescaledb-enabled'
      Type: String
      Value: !Ref EnableTimescaleDB
      Description: 'TimescaleDB extension status'

  PgBouncerStatus:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/stocks/${Environment}/pgbouncer-enabled'
      Type: String
      Value: !Ref EnablePgBouncer
      Description: 'pgBouncer connection pooling status'

  OptimizationTimestamp:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/stocks/${Environment}/optimization-timestamp'
      Type: String
      Value: !Sub '${AWS::StackName}'
      Description: 'Last optimization timestamp'

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'

  # IAM Role for Auto Scaling
  ScalingRole:
    Type: AWS::IAM::Role
    Condition: EnablePB
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

Outputs:
  TimescaleDBFunctionArn:
    Condition: EnableTS
    Value: !GetAtt TimescaleDBSetupFunction.Arn
    Export:
      Name: !Sub 'TimescaleDBSetupArn-${Environment}'
    Description: 'Lambda function for TimescaleDB setup'

  PgBouncerTaskDefinition:
    Condition: EnablePB
    Value: !Ref PgBouncerTaskDefinition
    Export:
      Name: !Sub 'PgBouncerTaskDef-${Environment}'
    Description: 'ECS task definition for pgBouncer'

  DashboardURL:
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=stocks-db-optimization-${Environment}'
    Description: 'CloudWatch dashboard for database optimization'

  CostAlarmStatus:
    Value: !Ref DailyCostAlarm
    Description: 'CloudWatch alarm for daily cost monitoring'

  OptimizationStatus:
    Value: !Sub |
      TimescaleDB: ${EnableTimescaleDB}
      pgBouncer: ${EnablePgBouncer}
      Expected Speedup: 10-100x on time-series queries
      Expected Cost Savings: -$100/month
