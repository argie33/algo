AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Tier 1 API + Lambda optimizations.
  - HTTP API Gateway (70% cheaper than REST API, 30% faster)
  - Lambda SnapStart (10x faster cold starts, free)
  - Provisioned concurrency for hot path (eliminates cold starts entirely)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  LambdaFunctionName:
    Type: String
    Default: stocks-api
    Description: Existing Lambda function backing the API

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package

  LambdaCodeKey:
    Type: String
    Description: S3 key for Lambda deployment package

  CloudFrontDomain:
    Type: String
    Description: CloudFront distribution domain (used for CORS)

  ProvisionedConcurrency:
    Type: Number
    Default: 0
    Description: |
      Number of pre-warmed Lambda instances for the hot alias.
      Cost: ~$5/month per instance. Use 1-2 for prod, 0 for dev.

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  HasProvisionedConcurrency: !Not [!Equals [!Ref ProvisionedConcurrency, 0]]

Resources:
  # ============================================================
  # LAMBDA — SnapStart enabled, ARM Graviton for cost savings
  # ============================================================

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsAndRDS
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/stocks

  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Architectures: [arm64]  # Graviton: -20% cost vs x86
      Handler: webapp/lambda/index.handler
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      MemorySize: 1024
      Timeout: 30
      Role: !GetAtt ApiLambdaRole.Arn
      SnapStart:
        ApplyOn: PublishedVersions  # Free 10x cold start improvement
      Environment:
        Variables:
          NODE_ENV: !If [IsProduction, production, development]
          LOG_LEVEL: !If [IsProduction, info, debug]
      TracingConfig:
        Mode: Active  # X-Ray for distributed tracing
      LoggingConfig:
        LogFormat: JSON  # Structured logs for CloudWatch Insights

  # Published version for SnapStart + provisioned concurrency
  ApiLambdaVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref ApiLambda
      Description: !Sub Tier1-${Environment}

  ApiLambdaAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref ApiLambda
      FunctionVersion: !GetAtt ApiLambdaVersion.Version
      Name: live
      ProvisionedConcurrencyConfig: !If
        - HasProvisionedConcurrency
        - ProvisionedConcurrentExecutions: !Ref ProvisionedConcurrency
        - !Ref AWS::NoValue

  # ============================================================
  # HTTP API GATEWAY (v2) — 70% cheaper, 30% faster than REST API
  # ============================================================

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub stocks-http-api-${Environment}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${CloudFrontDomain}
          - http://localhost:5174
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
        AllowHeaders: [Content-Type, Authorization, X-Request-Id]
        MaxAge: 3600
        AllowCredentials: true

  ApiLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Ref ApiLambdaAlias
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 29000

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiLambdaAlias
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

  CatchAllRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /{proxy+}'
      Target: !Sub integrations/${ApiLambdaIntegration}

  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /'
      Target: !Sub integrations/${ApiLambdaIntegration}

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 1000
        ThrottlingRateLimit: 500
        DetailedMetricsEnabled: !If [IsProduction, true, false]
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogs.Arn
        Format: |
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency"}

  ApiAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${HttpApi}
      RetentionInDays: 7

  # ============================================================
  # CLOUDWATCH ALARMS — error rate, latency, throttling
  # ============================================================

  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub stocks-api-error-rate-${Environment}
      AlarmDescription: API error rate >1%
      MetricName: 5xx
      Namespace: AWS/ApiGateway
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
        - Name: Stage
          Value: $default
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub stocks-api-latency-${Environment}
      AlarmDescription: API p99 latency >1s
      MetricName: IntegrationLatency
      Namespace: AWS/ApiGateway
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiId
          Value: !Ref HttpApi
        - Name: Stage
          Value: $default

Outputs:
  ApiEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub Tier1-ApiEndpoint-${Environment}

  LambdaAliasArn:
    Value: !Ref ApiLambdaAlias
    Export:
      Name: !Sub Tier1-LambdaAlias-${Environment}

  EstimatedSavings:
    Value: |
      HTTP API vs REST API:        -$15/month (70% cheaper)
      Graviton ARM:                -$8/month  (-20% Lambda cost)
      SnapStart cold-start fix:    $0 cost, but better UX
      ─────────────────────────────────────
      Total API/Lambda savings:    -$23/month
