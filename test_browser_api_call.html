<!DOCTYPE html>
<html>
<head>
    <title>Test API Call Through Vite Proxy</title>
</head>
<body>
    <h1>API Proxy Test</h1>
    <p>This tests if the browser can call the API through the Vite proxy</p>

    <button onclick="testApi()">Test API Call</button>
    <button onclick="testApiWithAuth()">Test API Call with Auth</button>

    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 100px;">
        <pre id="output">Result will appear here...</pre>
    </div>

    <script>
        async function testApi() {
            const output = document.getElementById('output');
            output.textContent = 'Testing /api/algo/status without auth...\n';

            try {
                const resp = await fetch('/api/algo/status', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                output.textContent += `Status: ${resp.status}\n`;
                const data = await resp.json();
                output.textContent += JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent += `Error: ${e.message}`;
            }
        }

        async function testApiWithAuth() {
            const output = document.getElementById('output');
            output.textContent = 'Testing /api/algo/status with Bearer dev-admin...\n';

            try {
                const resp = await fetch('/api/algo/status', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer dev-admin'
                    }
                });

                output.textContent += `Status: ${resp.status}\n`;
                const data = await resp.json();
                output.textContent += JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent += `Error: ${e.message}`;
            }
        }
    </script>
</body>
</html>
