AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Application stack – RDS (public), Secrets (DB creds),
  ECS cluster, and ECS task execution role.

Parameters:
  RDSUsername:
    Type: String
    Description: RDS master username
  RDSPassword:
    Type: String
    NoEcho: true
    Description: RDS master password
  FREDApiKey:
    Type: String
    NoEcho: true
    Description: FRED API key for econ-data loader

Resources:

  ### 1) RDS Subnet Group (public) ### 
  StocksDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBSubnetGroupDescription: Public subnet group for RDS
      SubnetIds:
        - !ImportValue StocksCore-PublicSubnet1Id
        - !ImportValue StocksCore-PublicSubnet2Id

  ### 1.5) ECS Tasks Security Group (moved here to avoid circular dependency) ###
  EcsTasksSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS tasks
      VpcId: !ImportValue StocksCore-VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound traffic"

  ### 2) RDS Security Group ###
  StocksDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Postgres access from Lambda and ECS
      VpcId: !ImportValue StocksCore-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsTasksSecurityGroup
          Description: "Allow Postgres from ECS tasks"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: "10.0.0.0/16"
          Description: "Allow Postgres from VPC (includes ECS tasks)"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: "0.0.0.0/0"
          Description: "Allow Postgres from internet (for Lambda outside VPC)"
  ### 3) RDS Instance ###
  StocksDBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    DependsOn:
      - StocksDBSubnetGroup
      - StocksDBSecurityGroup
    Properties:
      DBName: stocks
      Engine: postgres
      DBInstanceClass: db.t3.small
      AllocatedStorage: 30
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      MasterUsername: !Ref RDSUsername
      MasterUserPassword: !Ref RDSPassword
      VPCSecurityGroups:
        - !Ref StocksDBSecurityGroup
      DBSubnetGroupName: !Ref StocksDBSubnetGroup
      PubliclyAccessible: true
      MultiAZ: false
      DeletionProtection: false
      EnableIAMDatabaseAuthentication: true
  ### 4) Secrets Manager: DB creds ###
  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    DependsOn: StocksDBInstance
    Properties:
      Name: !Sub 
        - stocks-db-secrets-${StackName}-${Region}-${UniqueId}
        - StackName: !Ref AWS::StackName
          Region: !Ref AWS::Region
          UniqueId: !Select [2, !Split ["/", !Ref AWS::StackId]]
      Description: JSON with username, password, host, port, dbname
      SecretString:
        Fn::Join:
          - ""
          - - '{"username":"'
            - !Ref RDSUsername
            - '","password":"'
            - !Ref RDSPassword
            - '","host":"'
            - !GetAtt StocksDBInstance.Endpoint.Address
            - '","port":"'
            - !GetAtt StocksDBInstance.Endpoint.Port
            - '","dbname":"stocks"}'
  ### 5) ECS Cluster ###
  StocksEcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: stocks-cluster
  ### 6) ECS Task Execution Role ###
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecs-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: AllowGetSecretValue
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBCredentialsSecret

  ### 7) ECR Lifecycle Policy for Automatic Cleanup ###
  ECRLifecycleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ECRLifecyclePolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:PutLifecyclePolicy
                  - ecr:GetLifecyclePolicy
                Resource: '*'

  ECRLifecyclePolicyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ecr-lifecycle-policy'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt ECRLifecycleRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse

          def lambda_handler(event, context):
              ecr = boto3.client('ecr')
              
              # Standard lifecycle policy to keep latest 10 images
              lifecycle_policy = {
                  "rules": [
                      {
                          "rulePriority": 1,
                          "description": "Keep latest 3 images",
                          "selection": {
                              "tagStatus": "any",
                              "countType": "imageCountMoreThan",
                              "countNumber": 3
                          },
                          "action": {
                              "type": "expire"
                          }
                      }
                  ]
              }
              
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  # Get all repositories that start with 'stocks-'
                  repositories = ecr.describe_repositories()['repositories']
                  stocks_repos = [repo['repositoryName'] for repo in repositories if repo['repositoryName'].startswith('stocks-')]
                  
                  results = []
                  for repo_name in stocks_repos:
                      try:
                          ecr.put_lifecycle_policy(
                              repositoryName=repo_name,
                              lifecyclePolicyText=json.dumps(lifecycle_policy)
                          )
                          results.append(f"Applied lifecycle policy to {repo_name}")
                      except Exception as e:
                          results.append(f"Failed to apply policy to {repo_name}: {str(e)}")
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Message': f'Applied lifecycle policies to {len(stocks_repos)} repositories',
                      'Results': results
                  })
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })

  ECRLifecyclePolicyTrigger:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ECRLifecyclePolicyFunction.Arn
      # This will trigger the Lambda to apply policies to all existing ECR repositories

  ### 8) Lambda Role for RDS Start/Stop ###
  RDSControlLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RDSStartStop
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds:StopDBInstance
                  - rds:StartDBInstance
                  - rds:DescribeDBInstances
                Resource: '*'

  ### 9) Lambda Functions to Stop/Start RDS ###
  StopRDSLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-stop-rds-nightly'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt RDSControlLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import os
          def lambda_handler(event, context):
              rds = boto3.client('rds')
              db_id = os.environ.get('DB_INSTANCE_ID')
              if not db_id:
                  raise Exception('DB_INSTANCE_ID env var not set')
              resp = rds.stop_db_instance(DBInstanceIdentifier=db_id)
              return {'status': 'stopping', 'db': db_id, 'response': str(resp)}
      Environment:
        Variables:
          DB_INSTANCE_ID: !Ref StocksDBInstance

  StartRDSLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-start-rds-morning'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt RDSControlLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import os
          def lambda_handler(event, context):
              rds = boto3.client('rds')
              db_id = os.environ.get('DB_INSTANCE_ID')
              if not db_id:
                  raise Exception('DB_INSTANCE_ID env var not set')
              resp = rds.start_db_instance(DBInstanceIdentifier=db_id)
              return {'status': 'starting', 'db': db_id, 'response': str(resp)}
      Environment:
        Variables:
          DB_INSTANCE_ID: !Ref StocksDBInstance

  ### 10) EventBridge Rules for Scheduling ###
  StopRDSNightlyRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: 'cron(0 23 * * ? *)' # 11:00pm UTC every day
      Targets:
        - Arn: !GetAtt StopRDSLambda.Arn
          Id: StopRDSLambdaTarget

  StartRDSMorningRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: 'cron(45 4 * * ? *)' # 4:45am UTC every day
      Targets:
        - Arn: !GetAtt StartRDSLambda.Arn
          Id: StartRDSLambdaTarget

  ### 11) Permissions for EventBridge to invoke Lambdas ###
  StopRDSLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StopRDSLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt StopRDSNightlyRule.Arn

  StartRDSLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StartRDSLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt StartRDSMorningRule.Arn

  ### 12) ECR Repository for Core Containers ###
  StocksCoreRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: stocks-core
      ImageScanningConfiguration:
        scanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images except latest 10",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  DBEndpoint:
    Description: RDS endpoint address
    Value: !GetAtt StocksDBInstance.Endpoint.Address
    Export:
      Name: StocksApp-DBEndpoint

  DBPort:
    Description: RDS endpoint port
    Value: !GetAtt StocksDBInstance.Endpoint.Port
    Export:
      Name: StocksApp-DBPort

  DBName:
    Description: Database name
    Value: stocks
    Export:
      Name: StocksApp-DBName

  DBUsername:
    Description: Master username
    Value: !Ref RDSUsername
    Export:
      Name: StocksApp-DBUsername

  SecretArn:
    Description: ARN of DB credentials secret
    Value: !Ref DBCredentialsSecret
    Export:
      Name: StocksApp-SecretArn

  ClusterArn:
    Description: ARN of ECS cluster
    Value: !GetAtt StocksEcsCluster.Arn
    Export:
      Name: StocksApp-ClusterArn
      
  EcsTaskExecutionRoleArn:
    Description: ARN of ECS Task Execution Role
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export:
      Name: StocksApp-EcsTaskExecutionRoleArn
      
  EcsTasksSecurityGroupId:
    Description: ID of Security Group for ECS Tasks
    Value: !GetAtt EcsTasksSecurityGroup.GroupId
    Export:
      Name: StocksApp-EcsTasksSecurityGroupId

  StocksCoreContainerRepositoryUri:
    Description: URI of the ECR repository for core containers
    Value: !GetAtt StocksCoreRepository.RepositoryUri
    Export:
      Name: StocksCoreContainerRepositoryUri
