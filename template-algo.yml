# ============================================================
# Stock Analytics Platform — template-algo.yml
# Layer:   Services (Algo trading orchestrator)
# Stack:   stocks-algo-dev
# Exports: ${AWS::StackName}-* (Lambda ARN, scheduler ARN)
# Imports: From stocks-data (secrets), stocks-core (artifacts bucket)
# Deploy:  .github/workflows/deploy-algo.yml
# ============================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Algo Orchestrator - Lambda + EventBridge scheduler for daily EOD execution'

Parameters:
  LambdaFunctionCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda function code zip

  LambdaFunctionCodeKey:
    Type: String
    Description: S3 key for Lambda function zip file

  DatabaseSecretArn:
    Type: String
    Description: ARN of the database credentials secret in Secrets Manager

  AlgoSecretsArn:
    Type: String
    Default: ''
    Description: ARN of the algo runtime secret (Alpaca API keys); empty = paper-only mode without keys

  DryRunMode:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Run in dry-run mode (preview trades, no execution)

  ExecutionMode:
    Type: String
    Default: 'paper'
    AllowedValues: ['paper', 'live']
    Description: Execution mode (paper=no real trades, live=real trades if enabled)

  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: Deployment environment

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']
  IsLive: !Equals [!Ref ExecutionMode, 'live']
  HasAlgoSecrets: !Not [!Equals [!Ref AlgoSecretsArn, '']]

Resources:
  # SNS Topic for alerts
  AlgoAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'algo-orchestrator-alerts-${Environment}'
      DisplayName: 'Algo Orchestrator Alerts'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda execution role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'algo-orchestrator-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AlgoOrchestratorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Secrets Manager access (database + Alpaca algo runtime secrets)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub '${DatabaseSecretArn}*'
                  - !If
                    - HasAlgoSecrets
                    - !Sub '${AlgoSecretsArn}*'
                    - !Ref 'AWS::NoValue'
              # SNS publish for alerts
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !GetAtt AlgoAlertTopic.TopicArn
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/algo-orchestrator:*'
              # CloudWatch Metrics (for monitoring)
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              # VPC access (for RDS in private subnet)
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: '*'

  # Lambda function
  AlgoOrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: algo-orchestrator
      Runtime: python3.11
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: lambda_function.lambda_handler
      Timeout: 900  # 15 minutes
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaFunctionCodeBucket
        S3Key: !Ref LambdaFunctionCodeKey
      Environment:
        Variables:
          EXECUTION_MODE: !Ref ExecutionMode
          DRY_RUN_MODE: !Ref DryRunMode
          ALERT_SNS_TOPIC_ARN: !GetAtt AlgoAlertTopic.TopicArn
          ENVIRONMENT: !Ref Environment
          DATABASE_SECRET_ARN: !Ref DatabaseSecretArn
          ALGO_SECRETS_ARN: !Ref AlgoSecretsArn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: AlgoOrchestrator

  # SQS queue for EventBridge dead-letter (must be SQS, not SNS)
  AlgoEventDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'algo-orchestrator-event-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Schedule role (assumed by EventBridge Scheduler service)
  ScheduleInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'algo-scheduler-invoke-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeAlgoLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt AlgoOrchestratorFunction.Arn
                  - !Sub '${AlgoOrchestratorFunction.Arn}:*'
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt AlgoEventDLQ.Arn

  # EventBridge Scheduler — weekdays at 5:30pm America/New_York (handles EDT/EST automatically)
  AlgoSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: algo-eod-orchestrator
      Description: Daily algo execution at 5:30pm ET (after market close), weekdays only
      ScheduleExpression: 'cron(30 17 ? * MON-FRI *)'
      ScheduleExpressionTimezone: America/New_York
      State: ENABLED
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt AlgoOrchestratorFunction.Arn
        RoleArn: !GetAtt ScheduleInvokeRole.Arn
        DeadLetterConfig:
          Arn: !GetAtt AlgoEventDLQ.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 2

  # CloudWatch alarm - Lambda errors
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'algo-orchestrator-errors-${Environment}'
      AlarmDescription: Alert when algo-orchestrator Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref AlgoOrchestratorFunction
      AlarmActions:
        - !GetAtt AlgoAlertTopic.TopicArn
      TreatMissingData: notBreaching

  # CloudWatch alarm - Lambda timeout
  LambdaTimeoutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'algo-orchestrator-timeout-${Environment}'
      AlarmDescription: Alert when algo-orchestrator Lambda times out
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Maximum
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 850000  # 850 seconds (14+ minutes of 15 min timeout)
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref AlgoOrchestratorFunction
      AlarmActions:
        - !GetAtt AlgoAlertTopic.TopicArn
      TreatMissingData: notBreaching

  # CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/algo-orchestrator'
      RetentionInDays: 30

  # DLQ monitoring — alerts if EventBridge fails to invoke Lambda
  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'algo-orchestrator-dlq-depth-${Environment}'
      AlarmDescription: 'Alert when algo scheduler dead-letter queue has messages (EventBridge invoke failure)'
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AlgoEventDLQ.QueueName
      AlarmActions:
        - !Ref AlgoAlertTopic
      TreatMissingData: notBreaching

  # Missed execution detection — alerts if algo doesn't run that day
  AlgoNotRunningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'algo-orchestrator-not-running-${Environment}'
      AlarmDescription: 'Alert if algo orchestrator did not complete its run (missing daily metric)'
      MetricName: AlgoRunCompleted
      Namespace: AlgoTrading
      Statistic: Sum
      Period: 86400  # 24 hours
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlgoAlertTopic
      TreatMissingData: breaching  # If no metric data, algo didn't run

Outputs:
  LambdaFunctionArn:
    Description: ARN of the algo-orchestrator Lambda function
    Value: !GetAtt AlgoOrchestratorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'

  LambdaFunctionName:
    Description: Name of the algo-orchestrator Lambda function
    Value: !Ref AlgoOrchestratorFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaName'

  ScheduleArn:
    Description: ARN of the EventBridge Scheduler schedule
    Value: !GetAtt AlgoSchedule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ScheduleArn'

  AlertTopicArn:
    Description: SNS topic ARN for algo alerts
    Value: !GetAtt AlgoAlertTopic.TopicArn
    Export:
      Name: !Sub '${AWS::StackName}-AlertTopicArn'

  Schedule:
    Description: EventBridge schedule (cron expression)
    Value: 'cron(30 17 ? * MON-FRI *) America/New_York'

  ScheduleDescription:
    Description: When the schedule runs
    Value: 'Weekdays at 5:30pm America/New_York (timezone-aware, no seasonal drift)'

  ExecutionMode:
    Description: Current execution mode
    Value: !Ref ExecutionMode

  DryRunMode:
    Description: Dry-run mode enabled
    Value: !Ref DryRunMode
