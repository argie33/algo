# ============================================================
# Stock Analytics Platform — template-data-infrastructure.yml
# Layer:   Data (RDS PostgreSQL, ECS cluster, Secrets)
# Stack:   stocks-data
# Exports: StocksApp-* (DBEndpoint, SecretArn, ClusterArn, etc)
# Imports: From stocks-core (VPC, subnets)
# Deploy:  .github/workflows/deploy-data-infrastructure.yml
# ============================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Data infrastructure stack - RDS PostgreSQL (private, accessed via ECS/Bastion),
  Secrets Manager (DB creds), ECS cluster, and ECS task execution role.
  Updated: 2026-05-06 - Moved RDS to private subnets for security

Parameters:
  RDSUsername:
    Type: String
    Description: RDS master username
  RDSPassword:
    Type: String
    NoEcho: true
    Description: RDS master password
  NotificationEmail:
    Type: String
    Description: Email address for contact form and alert notifications
    Default: ""
  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 7, 14, 30, 60, 90]
    Description: "CloudWatch log retention in days (default 7 saves ~$15/month vs 30)"

Resources:

  ### 1) RDS Subnet Group (private) ###
  StocksDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBSubnetGroupDescription: Private subnet group for RDS
      SubnetIds:
        - !ImportValue StocksCore-PrivateSubnet1Id
        - !ImportValue StocksCore-PrivateSubnet2Id
  ### 2) RDS Security Group ###
  StocksDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Postgres access from ECS tasks and Bastion
      VpcId: !ImportValue StocksCore-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsTasksSecurityGroup
          Description: "Allow Postgres from ECS tasks"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !ImportValue StocksCore-BastionSecurityGroupId
          Description: "Allow Postgres from Bastion host"

  ### 3) RDS Instance ###
  # NOTE: Current DB has 61GB allocated. Cannot reduce storage in RDS.
  # Keeping current values to prevent deployment failures.
  # NOTE: TimescaleDB is NOT available on AWS RDS PostgreSQL — its
  # shared_preload_libraries allowlist excludes it. Time-series query speedup
  # is delivered instead via BRIN indexes (see migrate_indexes.py), which are
  # native to vanilla PostgreSQL and require no extension.
  StocksDBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    DependsOn:
      - StocksDBSubnetGroup
      - StocksDBSecurityGroup
    Properties:
      DBInstanceIdentifier: stocks
      DBName: stocks
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 61
      MaxAllocatedStorage: 100
      MasterUsername: !Ref RDSUsername
      MasterUserPassword: !Ref RDSPassword
      VPCSecurityGroups:
        - !Ref StocksDBSecurityGroup
      DBSubnetGroupName: !Ref StocksDBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      Tags:
        - Key: StorageUpdate
          Value: "fixed-61gb-current-allocation"
  ### 4) Secrets Manager: DB creds ###
  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    DependsOn: StocksDBInstance
    Properties:
      Name: !Sub stocks-db-secrets-${AWS::StackName}-${AWS::Region}-001
      Description: JSON with username, password, host, port, dbname
      SecretString: !Sub |
        {
          "username": "${RDSUsername}",
          "password": "${RDSPassword}",
          "host": "${StocksDBInstance.Endpoint.Address}",
          "port": "${StocksDBInstance.Endpoint.Port}",
          "dbname": "stocks"
        }

  ### 4.1) Secrets Manager: Email Configuration ###
  EmailConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub stocks-email-config-${AWS::StackName}-${AWS::Region}
      Description: Email notification configuration
      SecretString: !Sub |
        {
          "contact_notification_email": "${NotificationEmail}",
          "email_from": "noreply@bullseyefinancial.com"
        }

  ### 4.2) Secrets Manager: Algo runtime secrets (Alpaca paper-trading) ###
  AlgoSecretsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub stocks-algo-secrets-${AWS::StackName}-${AWS::Region}
      Description: "Alpaca API credentials + algo runtime secrets — read by algo orchestrator + alpaca portfolio sync ECS tasks"
      SecretString: |
        {
          "APCA_API_KEY_ID": "",
          "APCA_API_SECRET_KEY": "",
          "APCA_API_BASE_URL": "",
          "ALPACA_PAPER_TRADING": "true"
        }
  ### 5) ECS Cluster ###
  StocksEcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: stocks-cluster

  ### 5.1) ECS Tasks Security Group ###
  EcsTasksSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS tasks
      VpcId: !ImportValue StocksCore-VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound traffic"

  ### 6) ECS Task Execution Role ###
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecs-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: AllowGetSecretValue
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DBCredentialsSecret
                  - !Ref EmailConfigSecret
                  - !Ref AlgoSecretsSecret
        - PolicyName: AllowSESEmail
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  ### 7) CloudWatch Log Groups — Cost Optimization (7-day retention saves $15/month) ###
  LoaderLogGroupBuySell:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/loader-buyselldaily
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupPrices:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/loader-prices
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupFinancials:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/loader-financials
      RetentionInDays: !Ref LogRetentionDays

  LoaderLogGroupSignals:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/loader-signals
      RetentionInDays: !Ref LogRetentionDays

  ### 8) S3 Log Archive Bucket — Long-term storage with Intelligent-Tiering ###
  LogArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub stocks-logs-archive-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER_IR
                TransitionInDays: 90
              - StorageClass: DEEP_ARCHIVE
                TransitionInDays: 365
            ExpirationInDays: 2555
      IntelligentTieringConfigurations:
        - Id: AutoTier
          Status: Enabled
          Tierings:
            - AccessTier: ARCHIVE_ACCESS
              Days: 90
            - AccessTier: DEEP_ARCHIVE_ACCESS
              Days: 180
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ### 9) CloudWatch Alarms — Monitor critical infrastructure ###
  RDSCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocks-rds-cpu-high
      AlarmDescription: Alert when RDS CPU exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref StocksDBInstance
      TreatMissingData: notBreaching

  RDSStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocks-rds-storage-low
      AlarmDescription: Alert when RDS free storage space drops below 10GB
      MetricName: FreeStorageSpace
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10737418240
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref StocksDBInstance
      TreatMissingData: notBreaching

  RDSConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocks-rds-connections-high
      AlarmDescription: Alert when RDS active connections exceed 50
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref StocksDBInstance
      TreatMissingData: notBreaching

Outputs:
  DBEndpoint:
    Description: RDS endpoint address
    Value: !GetAtt StocksDBInstance.Endpoint.Address
    Export:
      Name: StocksApp-DBEndpoint

  DBPort:
    Description: RDS endpoint port
    Value: !GetAtt StocksDBInstance.Endpoint.Port
    Export:
      Name: StocksApp-DBPort

  DBName:
    Description: Database name
    Value: stocks
    Export:
      Name: StocksApp-DBName

  DBUsername:
    Description: Master username
    Value: !Ref RDSUsername
    Export:
      Name: StocksApp-DBUsername

  EmailConfigSecretArn:
    Description: ARN of email configuration secret
    Value: !Ref EmailConfigSecret
    Export:
      Name: StocksApp-EmailConfigSecretArn

  AlgoSecretsSecretArn:
    Description: ARN of algo runtime secrets (Alpaca creds + paper trading config)
    Value: !Ref AlgoSecretsSecret
    Export:
      Name: StocksApp-AlgoSecretsSecretArn

  EmailNotificationEmail:
    Description: Email address for contact form notifications
    Value: !Ref NotificationEmail
    Export:
      Name: StocksApp-EmailNotificationEmail

  SecretArn:
    Description: ARN of DB credentials secret
    Value: !Ref DBCredentialsSecret
    Export:
      Name: StocksApp-SecretArn

  ClusterArn:
    Description: ARN of ECS cluster
    Value: !GetAtt StocksEcsCluster.Arn
    Export:
      Name: StocksApp-ClusterArn
  EcsTaskExecutionRoleArn:
    Description: ARN of ECS Task Execution Role
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export:
      Name: StocksApp-EcsTaskExecutionRoleArn
      
  EcsTasksSecurityGroupId:
    Description: ID of Security Group for ECS Tasks
    Value: !GetAtt EcsTasksSecurityGroup.GroupId
    Export:
      Name: StocksApp-EcsTasksSecurityGroupId

  LogArchiveBucketName:
    Description: Name of S3 bucket for long-term log archival
    Value: !Ref LogArchiveBucket
    Export:
      Name: StocksApp-LogArchiveBucketName

  CloudWatchOptimizationNotes:
    Description: Cost savings from CloudWatch optimizations
    Value: !Sub |
      Log retention: ${LogRetentionDays} days (saves ~$15/month vs 30-day default)
      Log archive: S3 Intelligent-Tiering with lifecycle rules
      Long-term storage at reduced cost (GLACIER_IR after 90d, DEEP_ARCHIVE after 365d)
