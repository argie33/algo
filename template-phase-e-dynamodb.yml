AWSTemplateFormatVersion: '2010-09-09'
Description: 'Phase E: Smart Incremental Loading - DynamoDB for execution metadata and caching'

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Deployment environment

Resources:
  # DynamoDB table for tracking loader execution metadata
  LoaderExecutionMetadata:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: loader_execution_metadata
      BillingMode: PAY_PER_REQUEST  # Auto-scaling for variable workloads
      AttributeDefinitions:
        - AttributeName: loader_name
          AttributeType: S
        - AttributeName: last_execution_time
          AttributeType: S
      KeySchema:
        - AttributeName: loader_name
          KeyType: HASH
        - AttributeName: last_execution_time
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Phase
          Value: E
        - Key: Purpose
          Value: IncrementalLoadingMetadata
        - Key: Environment
          Value: !Ref Environment

  # TTL configuration to auto-expire old execution records (7 days)
  LoaderExecutionMetadataTTL:
    Type: AWS::DynamoDB::TTL
    Properties:
      TableName: !Ref LoaderExecutionMetadata
      AttributeName: ttl

  # S3 bucket for caching API responses (leverages existing stocks-app-data)
  CacheBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: stocks-app-data
      PolicyText:
        Version: '2012-10-17'
        Statement:
          # Allow loaders to write cache files
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:role/ECSTaskExecutionRole'
                - !Sub 'arn:aws:iam::${AWS::AccountId}:role/DataLoadingTaskRole'
            Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:DeleteObject'
            Resource: 'arn:aws:s3:::stocks-app-data/cache/*'

  # IAM role for Lambda functions to access DynamoDB and S3 cache
  PhaseELambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PhaseEIncrementalLoadingRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt LoaderExecutionMetadata.Arn
        - PolicyName: S3CacheAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:HeadObject
                Resource: 'arn:aws:s3:::stocks-app-data/cache/*'

  # CloudWatch Log Group for Phase E execution tracking
  PhaseELogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /phase-e/incremental-loading
      RetentionInDays: 30

  # CloudWatch Dashboard for Phase E metrics
  PhaseEDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Phase-E-Incremental-Loading
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", {"stat": "Sum"}],
                  [".", "ConsumedReadCapacityUnits", {"stat": "Sum"}],
                  [".", "UserErrors", {"stat": "Sum"}],
                  [".", "SystemErrors", {"stat": "Sum"}]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "DynamoDB Metadata Table Usage"
              }
            },
            {
              "type": "log",
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /cache/ | stats count() as cache_operations by ispresent(@message)",
                "region": "${AWS::Region}",
                "title": "Cache Hit/Miss Ratio"
              }
            }
          ]
        }

Outputs:
  LoaderExecutionMetadataTableName:
    Description: DynamoDB table for execution metadata
    Value: !Ref LoaderExecutionMetadata
    Export:
      Name: Phase-E-MetadataTableName

  LoaderExecutionMetadataTableArn:
    Description: ARN of execution metadata table
    Value: !GetAtt LoaderExecutionMetadata.Arn
    Export:
      Name: Phase-E-MetadataTableArn

  PhaseELambdaRoleArn:
    Description: IAM role for Phase E Lambda functions
    Value: !GetAtt PhaseELambdaRole.Arn
    Export:
      Name: Phase-E-LambdaRoleArn

  PhaseELogGroupName:
    Description: CloudWatch log group for Phase E
    Value: !Ref PhaseELogGroup
    Export:
      Name: Phase-E-LogGroupName

  CacheBucketName:
    Description: S3 bucket for API response caching
    Value: stocks-app-data
    Export:
      Name: Phase-E-CacheBucketName
