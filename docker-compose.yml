version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: algo-postgres-dev
    environment:
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: stocks
      POSTGRES_DB: stocks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lambda/db-init/schema.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network

volumes:
  postgres_data:

networks:
  algo-network:
    driver: bridge
