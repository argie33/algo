version: '3.9'

services:
  # PostgreSQL database (matches RDS config)
  postgres:
    image: postgres:16-alpine
    container_name: stocks_db
    environment:
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: ''  # empty for local dev
      POSTGRES_DB: stocks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # Redis (for Bloom filter dedup, caching, optional LocalStack Lambda)
  redis:
    image: redis:7-alpine
    container_name: stocks_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # LocalStack for S3, Secrets Manager, CloudWatch, Lambda, etc.
  localstack:
    image: localstack/localstack:latest
    container_name: stocks_localstack
    environment:
      SERVICES: s3,secretsmanager,cloudwatch,logs,lambda,cloudformation,iam,eventbridge,scheduler
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LAMBDA_DOCKER_NETWORK: stocks_network
    ports:
      - "4566:4566"  # LocalStack Gateway
      - "4571:4571"  # S3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack-init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - stocks_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Database UI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stocks_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stocks_network
    profiles:
      - ui

  # Redis UI (Redis Commander)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: stocks_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocks_network
    profiles:
      - ui

networks:
  stocks_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
