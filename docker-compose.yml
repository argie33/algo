version: '3.9'

services:
  # PostgreSQL database (matches RDS config)
  postgres:
    image: postgres:15
    container_name: stocks_db
    environment:
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: stocks_local_password
      POSTGRES_DB: stocks
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=timescaledb"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # LocalStack for S3, Secrets Manager, CloudWatch, etc.
  localstack:
    image: localstack/localstack:latest
    container_name: stocks_localstack
    environment:
      SERVICES: s3,secretsmanager,cloudwatch,logs
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"  # LocalStack Gateway
      - "4571:4571"  # S3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack_init.sh:/docker-entrypoint-initdb.d/localstack-init.sh
    networks:
      - stocks_network
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stocks_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - stocks_network

networks:
  stocks_network:
    driver: bridge

volumes:
  postgres_data:
