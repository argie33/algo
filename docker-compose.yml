version: '3.9'

services:
  # PostgreSQL database (matches RDS config)
  postgres:
    image: postgres:16-alpine
    container_name: stocks_db
    environment:
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stocks
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # Redis (for Bloom filter dedup, caching, optional LocalStack Lambda)
  redis:
    image: redis:7-alpine
    container_name: stocks_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # Database UI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stocks_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stocks_network
    profiles:
      - ui

  # Redis UI (Redis Commander)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: stocks_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocks_network
    profiles:
      - ui

networks:
  stocks_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
