AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Financial Dashboard - Serverless Web Application with Lambda + API Gateway (Fixed Circular Dependency)'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: Environment name for resource naming
  
  DatabaseSecretArn:
    Type: String
    Description: ARN of the RDS database secret in Secrets Manager

  DatabaseEndpoint:
    Type: String
    Description: RDS database endpoint
    
  FrontendDomainName:
    Type: String
    Default: ''
    Description: Custom domain name for CloudFront (optional)
  
  ApiGatewayCacheClusterSize:
    Type: String
    Default: '0.5'
    AllowedValues: ['0.5', '1.6', '6.1', '13.5', '28.4', '58.2', '118', '237']
    Description: API Gateway cache cluster size in GB (affects cost and performance)
  EnablePerformanceOptimizations:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable performance optimizations (caching, provisioned concurrency, etc.)

  ApiGatewayThrottlingBurstLimit:
    Type: Number
    Default: 200
    MinValue: 10
    MaxValue: 5000
    Description: API Gateway throttling burst limit

  ApiGatewayThrottlingRateLimit:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 10000
    Description: API Gateway throttling rate limit (requests per second)

Conditions:
  EnableOptimizations: !Equals [!Ref EnablePerformanceOptimizations, 'true']

Globals:
  Function:
    Timeout: 90
    MemorySize: 1024
    Runtime: nodejs18.x
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        DB_SECRET_ARN: !Ref DatabaseSecretArn
        WEBAPP_AWS_REGION: !Ref AWS::Region
        DB_ENDPOINT: !Ref DatabaseEndpoint

Resources:
  # S3 Bucket for Frontend Static Files
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'financial-dashboard-frontend-${EnvironmentName}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  # CloudFront Origin Access Control
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'financial-dashboard-oac-${EnvironmentName}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Financial Dashboard - ${EnvironmentName}'
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        # S3 Origin for Frontend        
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref OriginAccessControl
        # API Gateway Origin
          - Id: APIOrigin
            DomainName: !Sub '${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: !Sub '/${EnvironmentName}'
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        
        # Cache Behaviors
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 86400
          MaxTTL: 31536000
          MinTTL: 0
          Compress: true
          # API Gateway caching - Optimized for performance
        CacheBehaviors:
          # Cache for financial data endpoints (stocks, prices, etc.)
          - PathPattern: '/api/stocks/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 300      # 5 minutes for stock data
            MaxTTL: 3600         # 1 hour max
            MinTTL: 60           # 1 minute minimum
            Compress: true
          
          # Cache for market data endpoints
          - PathPattern: '/api/market/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 180      # 3 minutes for market data
            MaxTTL: 1800         # 30 minutes max
            MinTTL: 30           # 30 seconds minimum
            Compress: true
          
          # Cache for fundamental data (less frequent updates)
          - PathPattern: '/api/fundamentals/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 3600     # 1 hour for fundamentals
            MaxTTL: 86400        # 24 hours max
            MinTTL: 300          # 5 minutes minimum
            Compress: true
          
          # Cache for earnings and estimates (moderate frequency)
          - PathPattern: '/api/earnings/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 1800     # 30 minutes for earnings
            MaxTTL: 21600        # 6 hours max
            MinTTL: 180          # 3 minutes minimum
            Compress: true
          
          # General API caching (fallback for other endpoints)
          - PathPattern: '/api/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type, X-Forwarded-For]
              Cookies:
                Forward: none
            DefaultTTL: 60       # 1 minute default
            MaxTTL: 3600         # 1 hour max
            MinTTL: 0            # No minimum for dynamic content
            Compress: true
        
        # Custom error pages
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CloudFrontDistribution
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # API Gateway CloudWatch Logs Role
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account Configuration
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn
  # Lambda Function IAM Role  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseSecretArn
        - PolicyName: RDSConnect
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub 'arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:stocks/*'
  # Lambda Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'financial-dashboard-api-${EnvironmentName}'
      CodeUri: webapp/lambda/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      # Enhanced performance optimizations
      Timeout: 29  # Just under API Gateway 30s limit
      MemorySize: !If 
        - EnableOptimizations
        - 1024  # Higher memory = faster execution + more CPU
        - 512   # Conservative default
      Runtime: nodejs18.x
      Architectures:
        - x86_64
      # Advanced Environment Variables for Performance
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DatabaseSecretArn
          DB_ENDPOINT: !Ref DatabaseEndpoint
          NODE_ENV: !Ref EnvironmentName
          WEBAPP_AWS_REGION: !Ref AWS::Region
          # Advanced Node.js performance tuning
          NODE_OPTIONS: '--enable-source-maps --max-old-space-size=768 --optimize-for-size'
          UV_THREADPOOL_SIZE: '8'  # Increased for better I/O concurrency
          # Database connection optimization
          DB_POOL_MAX: '5'
          DB_POOL_IDLE_TIMEOUT: '30000'
          DB_CONNECT_TIMEOUT: '10000'
          # API response optimization
          ENABLE_COMPRESSION: 'true'
          CACHE_HEADERS: 'true'
      Events:
        ApiGatewayAny:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
        ApiGatewayRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: ANY# API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'financial-dashboard-api-${EnvironmentName}'
      StageName: !Ref EnvironmentName
      # Performance optimizations
      BinaryMediaTypes:
        - 'application/json'
        - 'application/octet-stream'
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      # Define explicit OpenAPI definition for performance
      DefinitionBody:
        swagger: "2.0"
        info:
          title: !Sub "${AWS::StackName}-api"
          version: "1.0"
        basePath: !Sub "/${EnvironmentName}"
        schemes:
          - "https"
        x-amazon-apigateway-policy:
          Version: "2012-10-17"
          Statement:
            - Effect: "Allow"
              Principal: "*"
              Action: "execute-api:Invoke"
              Resource: "*"
        x-amazon-apigateway-request-validators:
          params-only:
            validateRequestParameters: true
            validateRequestBody: false
        x-amazon-apigateway-request-validator: "params-only"
        paths:
          /{proxy+}:
            x-amazon-apigateway-any-method:
              x-amazon-apigateway-integration:
                type: "aws_proxy"
                httpMethod: "POST"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: "'*'"
                      method.response.header.Cache-Control: "'public, max-age=300'"
                passthroughBehavior: "when_no_match"
                contentHandling: "CONVERT_TO_TEXT"
              responses:
                "200":
                  description: "200 response"
                  headers:
                    Access-Control-Allow-Origin:
                      type: "string"
                    Cache-Control:
                      type: "string"
          /:
            x-amazon-apigateway-any-method:
              x-amazon-apigateway-integration:
                type: "aws_proxy"
                httpMethod: "POST"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Origin: "'*'"
                passthroughBehavior: "when_no_match"
              responses:
                "200":
                  description: "200 response"
                  headers:
                    Access-Control-Allow-Origin:
                      type: "string"
      Cors:
        AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        AllowCredentials: false
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","responseLatency":"$context.responseLatency","integrationLatency":"$context.integrationLatency","cacheHitStatus":"$context.identity.cacheHitStatus"}'

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/financial-dashboard-${EnvironmentName}'
      RetentionInDays: 30

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/financial-dashboard-api-${EnvironmentName}'
      RetentionInDays: 30

  # API Gateway Deployment with Caching
  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiGateway
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: !Ref EnvironmentName
      StageDescription:
        CachingEnabled: true
        CacheClusterEnabled: true
        CacheClusterSize: !Ref ApiGatewayCacheClusterSize
        CacheTtlInSeconds: 300
        MethodSettings:
          - ResourcePath: "/*"
            HttpMethod: "*"
            LoggingLevel: ERROR
            DataTraceEnabled: false
            MetricsEnabled: true
            ThrottlingBurstLimit: !Ref ApiGatewayThrottlingBurstLimit
            ThrottlingRateLimit: !Ref ApiGatewayThrottlingRateLimit
          # High-frequency endpoints (stocks, technical)
          - ResourcePath: "/technical/*"
            HttpMethod: "GET" 
            CachingEnabled: !If [EnableOptimizations, true, false]
            CacheTtlInSeconds: 300
            ThrottlingBurstLimit: !If [EnableOptimizations, 300, 100]
            ThrottlingRateLimit: !If [EnableOptimizations, 150, 50]
          - ResourcePath: "/stocks/*"
            HttpMethod: "GET"
            CachingEnabled: !If [EnableOptimizations, true, false]
            CacheTtlInSeconds: 180
            ThrottlingBurstLimit: !If [EnableOptimizations, 250, 100]
            ThrottlingRateLimit: !If [EnableOptimizations, 125, 50]
          # Medium-frequency endpoints
          - ResourcePath: "/metrics/*"
            HttpMethod: "GET"
            CachingEnabled: !If [EnableOptimizations, true, false]
            CacheTtlInSeconds: 600
            ThrottlingBurstLimit: !If [EnableOptimizations, 150, 75]
            ThrottlingRateLimit: !If [EnableOptimizations, 75, 25]
          - ResourcePath: "/calendar/*"
            HttpMethod: "GET"
            CachingEnabled: !If [EnableOptimizations, true, false]
            CacheTtlInSeconds: 1800
            ThrottlingBurstLimit: !If [EnableOptimizations, 100, 50]
            ThrottlingRateLimit: !If [EnableOptimizations, 50, 25]

  # API Gateway Performance Monitoring
  ApiGatewayPerformanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-api-high-latency'
      AlarmDescription: 'Monitor API Gateway latency'
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000  # 5 seconds
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub 'financial-dashboard-api-${EnvironmentName}'
        - Name: Stage
          Value: !Ref EnvironmentName

  # Lambda Performance Monitoring
  LambdaPerformanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lambda-high-duration'
      AlarmDescription: 'Monitor Lambda function duration'
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000  # 10 seconds
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction

Outputs:
  # Frontend
  FrontendBucketName:
    Description: 'S3 bucket name for frontend'
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  CloudFrontDistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontId'

  WebsiteURL:
    Description: 'Website URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'

  # API
  ApiGatewayUrl:
    Description: 'API Gateway URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
  ApiGatewayId:
    Description: 'API Gateway ID'
    Value: !Ref ApiGateway
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'

  ApiGatewayCacheEnabled:
    Description: 'API Gateway caching status'
    Value: 'Enabled'
    Export:
      Name: !Sub '${AWS::StackName}-CacheStatus'
  
  # Lambda
  LambdaFunctionName:
    Description: 'Lambda function name'
    Value: !Ref ApiFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunction'

  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'
