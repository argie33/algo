AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Financial Dashboard - Serverless Web Application with Lambda + API Gateway'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: Environment name for resource naming
  
  DatabaseSecretArn:
    Type: String
    Description: ARN of the RDS database secret in Secrets Manager

  DatabaseEndpoint:
    Type: String
    Description: RDS database endpoint
    
  FrontendDomainName:
    Type: String
    Default: ''
    Description: Custom domain name for CloudFront (optional)
  
  ApiGatewayCacheClusterSize:
    Type: String
    Default: '0.5'
    AllowedValues: ['0.5', '1.6', '6.1', '13.5', '28.4', '58.2', '118', '237']
    Description: API Gateway cache cluster size in GB (affects cost and performance)
    
  EnablePerformanceOptimizations:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable performance optimizations (caching, provisioned concurrency, etc.)

  ApiGatewayThrottlingBurstLimit:
    Type: Number
    Default: 200
    MinValue: 10
    MaxValue: 5000
    Description: API Gateway throttling burst limit

  ApiGatewayThrottlingRateLimit:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 10000
    Description: API Gateway throttling rate limit (requests per second)

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref FrontendDomainName, '']]
  EnableOptimizations: !Equals [!Ref EnablePerformanceOptimizations, 'true']

Globals:
  Function:
    Timeout: 90
    MemorySize: 1024
    Runtime: nodejs18.x
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        DB_SECRET_ARN: !Ref DatabaseSecretArn
        WEBAPP_AWS_REGION: !Ref AWS::Region
        DB_ENDPOINT: !Ref DatabaseEndpoint

Resources:
  # S3 Bucket for Frontend Static Files 
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'financial-dashboard-frontend-${EnvironmentName}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  # Origin Access Control for CloudFront
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'financial-dashboard-oac-${EnvironmentName}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Financial Dashboard - ${EnvironmentName}'
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        
        # S3 Origin for Frontend        
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref OriginAccessControl
          # API Gateway Origin
          - Id: APIOrigin
            DomainName: !Sub '${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: !Sub '/${EnvironmentName}'
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        
        # Cache Behaviors
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 86400
          MaxTTL: 31536000
          MinTTL: 0
          Compress: true
          
        # API Gateway caching - Optimized for performance
        CacheBehaviors:
          # Cache for financial data endpoints (stocks, prices, etc.)
          - PathPattern: '/api/stocks/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 300      # 5 minutes for stock data
            MaxTTL: 3600         # 1 hour max
            MinTTL: 60           # 1 minute minimum
            Compress: true
          
          # Cache for market data endpoints
          - PathPattern: '/api/market/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 180      # 3 minutes for market data
            MaxTTL: 1800         # 30 minutes max
            MinTTL: 30           # 30 seconds minimum
            Compress: true
          
          # No cache for API endpoints that should be real-time
          - PathPattern: '/api/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type, X-Requested-With]
              Cookies:
                Forward: all
            DefaultTTL: 0        # No caching for dynamic API calls
            MaxTTL: 0
            MinTTL: 0
            Compress: true

        # Custom Error Pages
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300  # S3 Bucket Policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket}/*'
            Condition:
              StringLike:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

  # IAM Role for Lambda Function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'financial-dashboard-lambda-role-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref DatabaseSecretArn
        - PolicyName: RDSConnect
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub 'arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:stocks/*'

  # Explicit API Gateway to control stage name
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref EnvironmentName
      # Enable CORS
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      # Enable caching if optimizations are enabled
      CacheClusterEnabled: !Ref EnablePerformanceOptimizations
      CacheClusterSize: !If 
        - EnableOptimizations
        - !Ref ApiGatewayCacheClusterSize
        - !Ref AWS::NoValue
      # Throttling settings
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: !Ref ApiGatewayThrottlingBurstLimit
          ThrottlingRateLimit: !Ref ApiGatewayThrottlingRateLimit

  # Lambda Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'financial-dashboard-api-${EnvironmentName}'
      CodeUri: webapp/lambda/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      # Enhanced performance optimizations
      Timeout: 29  # Just under API Gateway 30s limit
      MemorySize: !If 
        - EnableOptimizations
        - 1024  # Higher memory = faster execution + more CPU
        - 512   # Conservative default
      Runtime: nodejs18.x
      Architectures:
        - x86_64
      # Advanced Environment Variables for Performance
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DatabaseSecretArn
          DB_ENDPOINT: !Ref DatabaseEndpoint
          NODE_ENV: !Ref EnvironmentName
          WEBAPP_AWS_REGION: !Ref AWS::Region
          # Advanced Node.js performance tuning
          NODE_OPTIONS: '--enable-source-maps --max-old-space-size=768'
          UV_THREADPOOL_SIZE: '8'  # Increased for better I/O concurrency
          # Database connection optimization
          DB_POOL_MAX: '5'
          DB_POOL_IDLE_TIMEOUT: '30000'
          DB_CONNECT_TIMEOUT: '10000'
          # API response optimization
          ENABLE_COMPRESSION: 'true'
          CACHE_HEADERS: 'true'
      Events:
        ApiGatewayAny:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
        ApiGatewayRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /            
            Method: ANY

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/financial-dashboard-${EnvironmentName}'
      RetentionInDays: 30

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/financial-dashboard-api-${EnvironmentName}'
      RetentionInDays: 30

Outputs:
  # Frontend
  FrontendBucketName:
    Description: 'S3 Bucket for Frontend Static Files'
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'
  CloudFrontDistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontId'
  WebsiteURL:
    Description: 'Website URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'
      
  # API
  ApiGatewayUrl:
    Description: 'API Gateway URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
  ApiGatewayId:
    Description: 'API Gateway ID'
    Value: !Ref ApiGateway
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'

  ApiGatewayCacheEnabled:
    Description: 'API Gateway caching status'
    Value: 'Enabled'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayCacheEnabled'
