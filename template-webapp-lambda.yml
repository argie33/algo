AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Financial Dashboard - Serverless Web Application with Lambda + API Gateway (Fixed Circular Dependency)'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: Environment name for resource naming
  
  DatabaseSecretArn:
    Type: String
    Description: ARN of the RDS database secret in Secrets Manager
  
  DatabaseEndpoint:
    Type: String
    Description: RDS database endpoint
      FrontendDomainName:
    Type: String
    Default: ''
    Description: Custom domain name for CloudFront (optional)
  
  ApiGatewayCacheClusterSize:
    Type: String
    Default: '0.5'
    AllowedValues: ['0.5', '1.6', '6.1', '13.5', '28.4', '58.2', '118', '237']
    Description: API Gateway cache cluster size in GB (affects cost and performance)

Globals:
  Function:
    Timeout: 90
    MemorySize: 1024
    Runtime: nodejs18.x
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        DB_SECRET_ARN: !Ref DatabaseSecretArn
        WEBAPP_AWS_REGION: !Ref AWS::Region
        DB_ENDPOINT: !Ref DatabaseEndpoint

Resources:
  # S3 Bucket for Frontend Static Files
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'financial-dashboard-frontend-${EnvironmentName}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  # CloudFront Origin Access Control
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'financial-dashboard-oac-${EnvironmentName}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Financial Dashboard - ${EnvironmentName}'
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        # S3 Origin for Frontend        
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref OriginAccessControl
        # API Gateway Origin
          - Id: APIOrigin
            DomainName: !Sub '${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: !Sub '/${EnvironmentName}'
            CustomOriginConfig:
              HTTPPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        
        # Cache Behaviors
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 86400
          MaxTTL: 31536000
          MinTTL: 0
          Compress: true
          # API Gateway caching - Optimized for performance
        CacheBehaviors:
          # Cache for financial data endpoints (stocks, prices, etc.)
          - PathPattern: '/api/stocks/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 300      # 5 minutes for stock data
            MaxTTL: 3600         # 1 hour max
            MinTTL: 60           # 1 minute minimum
            Compress: true
          
          # Cache for market data endpoints
          - PathPattern: '/api/market/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 180      # 3 minutes for market data
            MaxTTL: 1800         # 30 minutes max
            MinTTL: 30           # 30 seconds minimum
            Compress: true
          
          # Cache for fundamental data (less frequent updates)
          - PathPattern: '/api/fundamentals/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 3600     # 1 hour for fundamentals
            MaxTTL: 86400        # 24 hours max
            MinTTL: 300          # 5 minutes minimum
            Compress: true
          
          # Cache for earnings and estimates (moderate frequency)
          - PathPattern: '/api/earnings/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type]
              Cookies:
                Forward: none
            DefaultTTL: 1800     # 30 minutes for earnings
            MaxTTL: 21600        # 6 hours max
            MinTTL: 180          # 3 minutes minimum
            Compress: true
          
          # General API caching (fallback for other endpoints)
          - PathPattern: '/api/*'
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD, OPTIONS]
            ForwardedValues:
              QueryString: true
              Headers: [Authorization, Content-Type, X-Forwarded-For]
              Cookies:
                Forward: none
            DefaultTTL: 60       # 1 minute default
            MaxTTL: 3600         # 1 hour max
            MinTTL: 0            # No minimum for dynamic content
            Compress: true
        
        # Custom error pages
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CloudFrontDistribution
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # API Gateway CloudWatch Logs Role
  ApiGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account Configuration
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchLogsRole.Arn
  # Lambda Function IAM Role  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseSecretArn
        - PolicyName: RDSConnect
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub 'arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:stocks/*'
  # Lambda Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'financial-dashboard-api-${EnvironmentName}'
      CodeUri: webapp/lambda/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DatabaseSecretArn
          DB_ENDPOINT: !Ref DatabaseEndpoint
          NODE_ENV: !Ref EnvironmentName
          WEBAPP_AWS_REGION: !Ref AWS::Region
      Events:
        ApiGatewayAny:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY
        ApiGatewayRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: ANY
  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'financial-dashboard-api-${EnvironmentName}'
      StageName: !Ref EnvironmentName      # Enable server-side caching for better performance
      CacheClusterEnabled: true
      CacheClusterSize: !Ref ApiGatewayCacheClusterSize
      CachingEnabled: true
      CacheTtlInSeconds: 300   # 5 minutes default cache TTL
      CacheKeyParameters:
        - method.request.querystring.symbol
        - method.request.querystring.period
        - method.request.querystring.limit
      MethodSettings:
        - ResourcePath: '/stocks/*'
          HttpMethod: GET
          CachingEnabled: true
          CacheTtlInSeconds: 300  # 5 minutes for stock data
          CacheKeyParameters:
            - method.request.querystring.symbol
            - method.request.querystring.period
        - ResourcePath: '/market/*'
          HttpMethod: GET
          CachingEnabled: true
          CacheTtlInSeconds: 180  # 3 minutes for market data
        - ResourcePath: '/fundamentals/*'
          HttpMethod: GET
          CachingEnabled: true
          CacheTtlInSeconds: 3600  # 1 hour for fundamentals
        - ResourcePath: '/earnings/*'
          HttpMethod: GET
          CachingEnabled: true
          CacheTtlInSeconds: 1800  # 30 minutes for earnings
      Cors:
        AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        AllowCredentials: false
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","responseLatency":"$context.responseLatency","integrationLatency":"$context.integrationLatency","cacheHitStatus":"$context.identity.cacheHitStatus"}'

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/financial-dashboard-${EnvironmentName}'
      RetentionInDays: 30

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/financial-dashboard-api-${EnvironmentName}'
      RetentionInDays: 30

Outputs:
  # Frontend
  FrontendBucketName:
    Description: 'S3 bucket name for frontend'
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  CloudFrontDistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontId'

  WebsiteURL:
    Description: 'Website URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'

  # API
  ApiGatewayUrl:
    Description: 'API Gateway URL'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
  ApiGatewayId:
    Description: 'API Gateway ID'
    Value: !Ref ApiGateway
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'

  ApiGatewayCacheEnabled:
    Description: 'API Gateway caching status'
    Value: 'Enabled'
    Export:
      Name: !Sub '${AWS::StackName}-CacheStatus'
  
  # Lambda
  LambdaFunctionName:
    Description: 'Lambda function name'
    Value: !Ref ApiFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunction'

  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt ApiFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'
