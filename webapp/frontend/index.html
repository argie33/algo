    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Dashboard</title>
    <!-- FORCE CACHE BUST - 2025-07-11 22:00 - Debug React loading -->
    <meta name="description" content="Professional financial data dashboard with real-time stock metrics, market analysis, and portfolio tools." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // CRITICAL: Emergency F protection - Must run before ANY React chunks load
      (function() {
        console.log('🚨 EMERGENCY F PROTECTION ACTIVATED');
        
        // Pre-create a React-like object for F
        const emergencyReact = {
          useState: function(initial) { 
            console.warn('Emergency useState called');
            return [initial, function() {}]; 
          },
          useEffect: function(effect, deps) { 
            console.warn('Emergency useEffect called');
            try { effect(); } catch(e) { console.warn('Emergency useEffect error:', e); }
          },
          useLayoutEffect: function(effect, deps) { 
            console.warn('Emergency useLayoutEffect called');
            try { effect(); } catch(e) { console.warn('Emergency useLayoutEffect error:', e); }
          },
          useCallback: function(callback, deps) { return callback; },
          useMemo: function(factory, deps) { try { return factory(); } catch(e) { return null; } },
          useRef: function(initial) { return { current: initial }; },
          useContext: function(context) { return context?.defaultValue; },
          useReducer: function(reducer, initial) { return [initial, function() {}]; },
          createElement: function() { return {}; },
          version: '18.3.1-emergency'
        };
        
        // Ensure F is ALWAYS available
        Object.defineProperty(window, 'F', {
          get: function() { 
            return window.React || emergencyReact; 
          },
          set: function(value) { 
            // Allow setting but log it
            console.log('F was set to:', value);
          },
          configurable: true,
          enumerable: true
        });
        
        // Also ensure React is available
        window.React = window.React || emergencyReact;
        
        console.log('✅ Emergency F protection installed:', typeof window.F, typeof window.F.useLayoutEffect);
      })();
      
      // Initialize empty config - will be populated by config.js
      window.__CONFIG__ = window.__CONFIG__ || {
        ENVIRONMENT: 'development',
        VERSION: 'fallback',
        BUILD_TIME: new Date().toISOString(),
        API: {
          BASE_URL: null // Will be set by config.js based on environment
        },
        COGNITO: {
          USER_POOL_ID: null, // Must be configured via deployment
          CLIENT_ID: null,    // Must be configured via deployment
          REGION: 'us-east-1',
          DOMAIN: null,
          REDIRECT_SIGN_IN: window.location.origin,
          REDIRECT_SIGN_OUT: window.location.origin
        }
      };
      
      // Load config.js to override defaults if available
      var script = document.createElement('script');
      script.src = '/config.js?' + Date.now();
      script.onerror = function() {
        console.warn('⚠️ Failed to load config.js - using fallback config');
      };
      document.head.appendChild(script);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif;">
        <h2>Loading Financial Dashboard v1.0.6...</h2>
        <p>Initializing React application - API is working!</p>
        <div style="margin: 20px 0;">
          <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
        <style>
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
        <p><small>If this message persists, check browser console for errors.</small></p>
      </div>
    </div>
    <script>
      // CRITICAL: Global error interceptor for F.useLayoutEffect
      (function() {
        const originalError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          if (message && message.includes('useLayoutEffect') && message.includes('undefined')) {
            console.error('🚨 INTERCEPTED useLayoutEffect ERROR:', message);
            console.log('🔧 Attempting emergency F restoration...');
            
            // Emergency restoration
            if (typeof window.F === 'undefined' || !window.F.useLayoutEffect) {
              const emergencyReact = {
                useState: function(initial) { return [initial, function() {}]; },
                useEffect: function(effect) { try { effect(); } catch(e) {} },
                useLayoutEffect: function(effect) { try { effect(); } catch(e) {} },
                useCallback: function(callback) { return callback; },
                useMemo: function(factory) { try { return factory(); } catch(e) { return null; } },
                useRef: function(initial) { return { current: initial }; },
                createElement: function() { return {}; },
                version: '18.3.1-emergency-restore'
              };
              
              window.F = emergencyReact;
              window.React = window.React || emergencyReact;
              
              console.log('✅ Emergency F restored after error');
              
              // Try to reload the page to retry with F available
              setTimeout(() => {
                console.log('🔄 Reloading page to retry with F protection...');
                window.location.reload();
              }, 100);
              
              return true; // Prevent default error handling
            }
          }
          
          // Call original error handler if it exists
          if (originalError) {
            return originalError.apply(this, arguments);
          }
          return false;
        };
        
        // Also add unhandledrejection handler
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && 
              event.reason.message.includes('useLayoutEffect')) {
            console.error('🚨 INTERCEPTED Promise rejection for useLayoutEffect');
            event.preventDefault();
          }
        });
        
        console.log('✅ Global error interceptor installed for F.useLayoutEffect');
      })();
      
      // Show loading progress
      setTimeout(() => {
        const configStatus = document.getElementById('config-status');
        if (configStatus) {
          configStatus.innerHTML = window.__CONFIG__ ? 
            'Config loaded ✅' : 
            'Config failed to load ❌';
        }
      }, 1000);
      
      // Remove this timeout - let React load naturally
      // setTimeout(() => {
      //   const root = document.getElementById('root');
      //   if (root && root.innerHTML.includes('Loading Financial Dashboard')) {
      //     root.innerHTML = '<div style="padding: 20px; text-align: center; color: red;"><h1>Loading Failed</h1><p>React app failed to load. Check browser console for errors.</p></div>';
      //   }
      // }, 5000);
    </script>
    <script type="module" src="/src/main.jsx" onerror="console.error('Failed to load main.jsx')"></script>
