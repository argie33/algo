    <div id="root">
      <div style="padding: 20px; font-family: Arial, sans-serif;">

        <p>If you see this message, the HTML is loading but React is not starting.</p>
        <p id="debug-info">Checking JavaScript...</p>
      </div>
    </div>
    <script>
      console.log('🚀 HTML loaded successfully');
      document.getElementById('debug-info').textContent = 'HTML loaded, waiting for React...';
      
      // Log any errors
      window.addEventListener('error', function(e) {
        console.error('🚨 JavaScript Error:', e.error);
        document.getElementById('debug-info').innerHTML = 
          '<strong style="color: red;">JavaScript Error: ' + e.error.message + '</strong>';
      });
      
      // Check if root element exists
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Loading Financial Dashboard')) {
          document.getElementById('debug-info').innerHTML = 
            '<strong style="color: orange;">React failed to mount after 3 seconds</strong>';
        }
      }, 3000);
    </script>
