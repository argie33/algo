<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #eee; padding: 20px; }
        .section { margin: 20px 0; border: 1px solid #444; padding: 15px; }
        .result { white-space: pre-wrap; word-break: break-all; }
        .success { color: #4a4; }
        .error { color: #a44; }
    </style>
</head>
<body>
    <h1>Dashboard API Test</h1>

    <div class="section">
        <h2>1. Test Direct Lambda (/api/algo/markets via proxy)</h2>
        <button onclick="testProxyAPI()">Test</button>
        <div id="result1" class="result"></div>
    </div>

    <div class="section">
        <h2>2. Check Response Status</h2>
        <button onclick="testStatusOnly()">Test</button>
        <div id="result2" class="result"></div>
    </div>

    <div class="section">
        <h2>3. Test All Market APIs</h2>
        <button onclick="testAllAPIs()">Test</button>
        <div id="result3" class="result"></div>
    </div>

    <script>
        async function testProxyAPI() {
            const el = document.getElementById('result1');
            el.innerHTML = 'Loading...';
            try {
                const response = await fetch('/api/algo/markets');
                const data = await response.json();
                el.innerHTML = `<span class="success">✓ Status: ${response.status}</span>\n`;
                el.innerHTML += `Has market_health: ${!!data.data?.market_health}\n`;
                el.innerHTML += `Has current: ${!!data.data?.current}\n`;
                el.innerHTML += `Data keys: ${Object.keys(data.data || {}).join(', ')}\n`;
            } catch (err) {
                el.innerHTML = `<span class="error">✗ Error: ${err.message}</span>`;
            }
        }

        async function testStatusOnly() {
            const el = document.getElementById('result2');
            el.innerHTML = 'Testing...';
            try {
                const response = await fetch('/api/algo/markets', {
                    method: 'HEAD'
                }).catch(() => fetch('/api/algo/markets'));

                el.innerHTML = `<span class="${response.ok ? 'success' : 'error'}">Status: ${response.status} ${response.statusText}</span>\n`;
                el.innerHTML += `Content-Type: ${response.headers.get('content-type')}\n`;
                el.innerHTML += `Response length: ${response.headers.get('content-length')} bytes\n`;
            } catch (err) {
                el.innerHTML = `<span class="error">✗ ${err.message}</span>`;
            }
        }

        async function testAllAPIs() {
            const el = document.getElementById('result3');
            const endpoints = [
                '/api/algo/markets',
                '/api/market/sentiment?range=30d',
                '/api/health'
            ];

            let html = '';
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(endpoint, { timeout: 5000 });
                    html += `${endpoint}: <span class="${response.ok ? 'success' : 'error'}">${response.status}</span>\n`;
                } catch (err) {
                    html += `${endpoint}: <span class="error">✗ ${err.message}</span>\n`;
                }
                await new Promise(r => setTimeout(r, 500));
            }
            el.innerHTML = html;
        }
    </script>
</body>
</html>
