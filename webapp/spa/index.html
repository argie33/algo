<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stocks Dashboard</title>
  <meta name="api-gateway-url" content="PLACEHOLDER_API_GATEWAY_URL">
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Stocks Data</h1>
  <button id="load">Load Data</button>
  <div id="table"></div>
  <script>
    // Get API Gateway URL from meta tag (injected during deployment) 
    function getApiUrl() {
      const apiMeta = document.querySelector('meta[name="api-gateway-url"]');
      if (apiMeta && apiMeta.content && !apiMeta.content.includes('PLACEHOLDER')) {
        return apiMeta.content + '/stocks';
      }
      
      // Fallback: try window global variable
      if (window.APP_CONFIG && window.APP_CONFIG.API_URL) {
        return window.APP_CONFIG.API_URL + '/stocks';
      }
      
      // Error case - no API URL configured
      console.error('API Gateway URL not configured. Check deployment.');
      return null;
    }

    const API = getApiUrl();

    document.getElementById('load').onclick = async () => {
      const res = await fetch(API, { mode: 'cors' });
      const data = await res.json();
      if (!data.length) return;
      const cols = Object.keys(data[0]);
      let html = '<table><thead><tr>' +
        cols.map(c => `<th>${c}</th>`).join('') +
        '</tr></thead><tbody>';
      data.forEach(row => {
        html += '<tr>' + cols.map(c => `<td>${row[c]}</td>`).join('') + '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('table').innerHTML = html;
    };
  </script>
</body>
</html>
