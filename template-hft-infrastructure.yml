AWSTemplateFormatVersion: '2010-09-09'
Description: >
  High-Frequency Trading System Infrastructure
  Real-time market data processing, technical analysis, and automated trading

Parameters:
  EnvironmentName:
    Type: String
    Default: "hft-prod"
    Description: "Environment name for resource naming"
    
  KafkaInstanceType:
    Type: String
    Default: "kafka.m5.large"
    Description: "MSK instance type for Kafka cluster"
    
  RedisInstanceType:
    Type: String
    Default: "cache.r6g.xlarge"
    Description: "ElastiCache Redis instance type"
    
  EKSNodeInstanceType:
    Type: String
    Default: "c5n.2xlarge"
    Description: "EKS worker node instance type (network optimized)"

Resources:
  #############################################################
  # VPC and Networking (Optimized for Low Latency)
  #############################################################
  HftVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  # Private subnets in single AZ for ultra-low latency
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HftVPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HftVPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-subnet-2"

  # Public subnet for NAT Gateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HftVPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.100.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-subnet"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref HftVPC

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref HftVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-routes"

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref HftVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-routes"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  #############################################################
  # Security Groups
  #############################################################
  EKSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EKS cluster
      VpcId: !Ref HftVPC
      SecurityGroupIngress:
        - IpProtocol: -1
          SourceSecurityGroupId: !Ref EKSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-eks-sg"

  KafkaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Kafka cluster
      VpcId: !Ref HftVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9098
          SourceSecurityGroupId: !Ref EKSSecurityGroup
        - IpProtocol: tcp
          FromPort: 2181
          ToPort: 2181
          SourceSecurityGroupId: !Ref EKSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-kafka-sg"

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Redis cluster
      VpcId: !Ref HftVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EKSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-redis-sg"

  #############################################################
  # Amazon MSK (Managed Kafka)
  #############################################################
  KafkaSubnetGroup:
    Type: AWS::MSK::Configuration
    Properties:
      Name: !Sub "${EnvironmentName}-kafka-config"
      Description: "High-performance Kafka configuration for HFT"
      KafkaVersionsList:
        - "2.8.1"
      ServerProperties: |
        num.network.threads=8
        num.io.threads=16
        socket.send.buffer.bytes=102400
        socket.receive.buffer.bytes=102400
        socket.request.max.bytes=104857600
        num.partitions=8
        num.recovery.threads.per.data.dir=1
        offsets.topic.replication.factor=2
        transaction.state.log.replication.factor=2
        transaction.state.log.min.isr=1
        log.retention.hours=24
        log.segment.bytes=1073741824
        log.retention.check.interval.ms=300000
        zookeeper.connection.timeout.ms=18000
        group.initial.rebalance.delay.ms=0

  KafkaCluster:
    Type: AWS::MSK::Cluster
    Properties:
      BrokerNodeGroupInfo:
        InstanceType: !Ref KafkaInstanceType
        ClientSubnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: 100
        SecurityGroups:
          - !Ref KafkaSecurityGroup
      ClusterName: !Sub "${EnvironmentName}-kafka"
      KafkaVersion: "2.8.1"
      NumberOfBrokerNodes: 2
      ConfigurationInfo:
        Arn: !Ref KafkaSubnetGroup
        Revision: 1
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: PLAINTEXT
          InCluster: false
      ClientAuthentication:
        Sasl:
          Scram:
            Enabled: false
        Tls:
          Enabled: false

  #############################################################
  # ElastiCache Redis Cluster
  #############################################################
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: "Subnet group for Redis cluster"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub "${EnvironmentName}-redis"
      Description: "Redis cluster for HFT real-time calculations"
      NodeType: !Ref RedisInstanceType
      Engine: redis
      EngineVersion: "7.0"
      NumCacheClusters: 2
      PreferredCacheClusterAZs:
        - !Select [0, !GetAZs '']
        - !Select [1, !GetAZs '']
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      Port: 6379
      ParameterGroupName: default.redis7

  #############################################################
  # EKS Cluster
  #############################################################
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "${EnvironmentName}-eks"
      Version: "1.28"
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref EKSSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit

  EKSNodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub "${EnvironmentName}-nodegroup"
      NodeRole: !GetAtt EKSNodeGroupRole.Arn
      InstanceTypes:
        - !Ref EKSNodeInstanceType
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      ScalingConfig:
        MinSize: 2
        MaxSize: 10
        DesiredSize: 3
      UpdateConfig:
        MaxUnavailable: 1

  #############################################################
  # InfluxDB for Time Series Data
  #############################################################
  InfluxDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for InfluxDB
      VpcId: !Ref HftVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8086
          ToPort: 8086
          SourceSecurityGroupId: !Ref EKSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-influxdb-sg"

  # We'll deploy InfluxDB on EKS rather than RDS since AWS doesn't have managed InfluxDB

  #############################################################
  # Secrets for API Keys
  #############################################################
  IBKRCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/ibkr-credentials"
      Description: "IBKR API credentials for HFT system"
      SecretString: !Sub |
        {
          "username": "",
          "password": "",
          "account_id": "",
          "api_key": "",
          "secret_key": ""
        }

  AlpacaCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/alpaca-credentials"
      Description: "Alpaca API credentials for backup data feed"
      SecretString: !Sub |
        {
          "api_key": "",
          "secret_key": "",
          "base_url": "https://paper-api.alpaca.markets"
        }

Outputs:
  VPCId:
    Description: ID of the HFT VPC
    Value: !Ref HftVPC
    Export:
      Name: !Sub "${EnvironmentName}-VPC-ID"

  PrivateSubnet1Id:
    Description: ID of private subnet 1
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "${EnvironmentName}-PrivateSubnet1-ID"

  PrivateSubnet2Id:
    Description: ID of private subnet 2
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "${EnvironmentName}-PrivateSubnet2-ID"

  EKSClusterName:
    Description: Name of the EKS cluster
    Value: !Ref EKSCluster
    Export:
      Name: !Sub "${EnvironmentName}-EKS-Cluster"

  KafkaClusterArn:
    Description: ARN of the MSK Kafka cluster
    Value: !Ref KafkaCluster
    Export:
      Name: !Sub "${EnvironmentName}-Kafka-Cluster-ARN"

  RedisClusterEndpoint:
    Description: Redis cluster endpoint
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Export:
      Name: !Sub "${EnvironmentName}-Redis-Endpoint"

  IBKRSecretsArn:
    Description: ARN of IBKR credentials secret
    Value: !Ref IBKRCredentialsSecret
    Export:
      Name: !Sub "${EnvironmentName}-IBKR-Secrets-ARN"

  AlpacaSecretsArn:
    Description: ARN of Alpaca credentials secret
    Value: !Ref AlpacaCredentialsSecret
    Export:
      Name: !Sub "${EnvironmentName}-Alpaca-Secrets-ARN"
