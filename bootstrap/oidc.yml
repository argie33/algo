AWSTemplateFormatVersion: "2010-09-09"
Description: "GitHub OIDC Provider and IAM Role for GitOps Deployment"

Parameters:
  ProjectName:
    Type: String
    Default: stocks
    Description: Project name for resource naming
  
  GitHubOrg:
    Type: String
    Description: GitHub organization (e.g., argeropolos)
  
  GitHubRepo:
    Type: String
    Description: GitHub repository (e.g., algo)

Resources:
  # ============================================================
  # GitHub OIDC Provider (One-time setup)
  # ============================================================
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1  # GitHub's root CA thumbprint
      ClientIdList:
        - sts.amazonaws.com

  # ============================================================
  # IAM Role for GitHub Actions
  # ============================================================
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"

  # ============================================================
  # IAM Policy - S3 Terraform State Backend
  # ============================================================
  S3StatePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: s3-state-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketVersioning
            Resource: !Sub "arn:aws:s3:::stocks-terraform-state"
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::stocks-terraform-state/*"

  # ============================================================
  # IAM Policy - DynamoDB State Locking
  # ============================================================
  DynamoDBLockPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: dynamodb-lock-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:CreateTable
              - dynamodb:DescribeTable
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:DeleteItem
            Resource: !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/stocks-terraform-locks"

  # ============================================================
  # IAM Policy - IAM Management (for creating roles)
  # ============================================================
  IAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: iam-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:UpdateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:ListRoles
              - iam:PassRole
              - iam:CreatePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:instance-profile/${ProjectName}-*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/${ProjectName}-*"

  # ============================================================
  # IAM Policy - EC2 Resource Management
  # ============================================================
  EC2Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ec2-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:DescribeInstances
              - ec2:DescribeImages
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:DescribeSecurityGroups
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:CreateTags
              - ec2:DescribeTags
            Resource: "*"

  # ============================================================
  # IAM Policy - RDS Management
  # ============================================================
  RDSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: rds-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - rds:CreateDBInstance
              - rds:ModifyDBInstance
              - rds:DeleteDBInstance
              - rds:DescribeDBInstances
              - rds:CreateDBSubnetGroup
              - rds:DeleteDBSubnetGroup
              - rds:DescribeDBSubnetGroups
              - rds:CreateDBParameterGroup
              - rds:ModifyDBParameterGroup
              - rds:DeleteDBParameterGroup
              - rds:DescribeDBParameterGroups
              - rds:AddTagsToResource
            Resource: !Sub "arn:aws:rds:*:${AWS::AccountId}:*:${ProjectName}-*"

  # ============================================================
  # IAM Policy - Lambda Management
  # ============================================================
  LambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: lambda-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:ListFunctions
              - lambda:CreateEventSourceMapping
              - lambda:DeleteEventSourceMapping
              - lambda:ListEventSourceMappings
              - lambda:AddPermission
              - lambda:RemovePermission
            Resource: !Sub "arn:aws:lambda:*:${AWS::AccountId}:function:${ProjectName}-*"

  # ============================================================
  # IAM Policy - ECS Management
  # ============================================================
  ECSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ecs-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ecs:CreateCluster
              - ecs:DeleteCluster
              - ecs:DescribeClusters
              - ecs:RegisterTaskDefinition
              - ecs:DeregisterTaskDefinition
              - ecs:DescribeTaskDefinition
              - ecs:CreateService
              - ecs:UpdateService
              - ecs:DeleteService
              - ecs:DescribeServices
              - ecs:RunTask
              - ecs:ListTasks
            Resource: !Sub "arn:aws:ecs:*:${AWS::AccountId}:*/${ProjectName}-*"

  # ============================================================
  # IAM Policy - ECR Management
  # ============================================================
  ECRPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ecr-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ecr:CreateRepository
              - ecr:DeleteRepository
              - ecr:DescribeRepositories
              - ecr:PutLifecyclePolicy
              - ecr:GetLifecyclePolicy
            Resource: !Sub "arn:aws:ecr:*:${AWS::AccountId}:repository/${ProjectName}-*"

  # ============================================================
  # IAM Policy - S3 Bucket Management
  # ============================================================
  S3BucketPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: s3-bucket-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:ListBucket
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:GetBucketVersioning
              - s3:PutBucketVersioning
              - s3:GetBucketEncryption
              - s3:PutBucketEncryption
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketPublicAccessBlock
              - s3:GetLifecycleConfiguration
              - s3:PutLifecycleConfiguration
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub "arn:aws:s3:::${ProjectName}-*"
              - !Sub "arn:aws:s3:::${ProjectName}-*/*"

  # ============================================================
  # IAM Policy - Secrets Manager
  # ============================================================
  SecretsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: secrets-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:DescribeSecret
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
              - secretsmanager:TagResource
            Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:${ProjectName}-*"

  # ============================================================
  # IAM Policy - CloudWatch & Alarms
  # ============================================================
  CloudWatchPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: cloudwatch-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - cloudwatch:PutMetricAlarm
              - cloudwatch:DeleteAlarms
              - cloudwatch:DescribeAlarms
            Resource: "*"

  # ============================================================
  # IAM Policy - EventBridge
  # ============================================================
  EventBridgePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: eventbridge-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - events:PutRule
              - events:DeleteRule
              - events:DescribeRule
              - events:PutTargets
              - events:RemoveTargets
              - events:ListTargetsByRule
              - scheduler:CreateSchedule
              - scheduler:DeleteSchedule
              - scheduler:GetSchedule
              - scheduler:UpdateSchedule
            Resource: !Sub "arn:aws:events:*:${AWS::AccountId}:rule/${ProjectName}-*"

  # ============================================================
  # IAM Policy - API Gateway & Cognito
  # ============================================================
  APIPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: api-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - apigateway:*
              - cognito-idp:CreateUserPool
              - cognito-idp:DeleteUserPool
              - cognito-idp:UpdateUserPool
              - cognito-idp:DescribeUserPool
              - cognito-idp:CreateUserPoolClient
              - cognito-idp:DeleteUserPoolClient
              - cognito-idp:UpdateUserPoolClient
            Resource: "*"

  # ============================================================
  # IAM Policy - CloudFront & WAF
  # ============================================================
  CDNPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: cdn-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - cloudfront:CreateDistribution
              - cloudfront:UpdateDistribution
              - cloudfront:DeleteDistribution
              - cloudfront:GetDistribution
              - cloudfront:CreateCloudFrontOriginAccessControl
              - cloudfront:DeleteCloudFrontOriginAccessControl
              - wafv2:CreateWebACL
              - wafv2:DeleteWebACL
              - wafv2:GetWebACL
            Resource: "*"

Outputs:
  OIDCProviderArn:
    Description: ARN of the GitHub OIDC Provider
    Value: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
    Export:
      Name: !Sub "${ProjectName}-oidc-provider-arn"

  GitHubActionsRoleArn:
    Description: ARN of the GitHub Actions IAM Role
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub "${ProjectName}-github-actions-role-arn"

  GitHubActionsRoleName:
    Description: Name of the GitHub Actions IAM Role
    Value: !Ref GitHubActionsRole
    Export:
      Name: !Sub "${ProjectName}-github-actions-role-name"
