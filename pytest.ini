[pytest]
# Pytest configuration for algo trading system

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers for test categorization
markers =
    unit: unit tests (fast, no external deps)
    edge_case: edge case tests (position limits, partial fills, etc)
    integration: integration tests (full orchestrator, reconciliation)
    slow: slow tests (backtests, large datasets)
    db: tests requiring database connection

# Test paths
testpaths = tests

# Coverage options (when running with pytest-cov)
# Run: pytest --cov=. --cov-report=html
# Output: htmlcov/index.html
[coverage:run]
source =
    algo_*.py
    lambda_function.py
omit =
    tests/*
    setup.py
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
