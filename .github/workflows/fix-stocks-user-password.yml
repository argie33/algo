name: Fix Stocks User Password

# One-time workflow to sync stocks user password in RDS with Secrets Manager
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  fix:
    name: Fix Stocks User Password in RDS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get RDS Endpoint and Credentials
        id: rds
        run: |
          # Get RDS endpoint
          RDS_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier algo-db \
            --region $AWS_REGION \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)

          echo "rds_host=$RDS_HOST" >> $GITHUB_OUTPUT
          echo "RDS Host: $RDS_HOST"

          # Get master password from GitHub Secrets or use default
          echo "Master password source: GitHub Secrets"

      - name: Fix Stocks User Password
        env:
          DB_HOST: ${{ steps.rds.outputs.rds_host }}
          DB_PORT: 5432
          DB_NAME: stocks
          DB_MASTER_USER: postgres
          DB_MASTER_PASSWORD: ${{ secrets.RDS_PASSWORD }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          # Install psycopg2
          pip install -q psycopg2-binary boto3

          python3 << 'PYTHON'
          import json
          import logging
          import os
          import boto3
          import psycopg2

          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger(__name__)

          # Get RDS master credentials from environment
          db_host = os.environ.get('DB_HOST')
          db_port = int(os.environ.get('DB_PORT', 5432))
          db_name = os.environ.get('DB_NAME')
          db_master_user = os.environ.get('DB_MASTER_USER', 'postgres')
          db_master_password = os.environ.get('DB_MASTER_PASSWORD')

          if not all([db_host, db_name, db_master_user, db_master_password]):
              logger.error('Missing RDS master credentials')
              exit(1)

          # Get stocks user password from Secrets Manager
          sm = boto3.client('secretsmanager', region_name=os.environ.get('AWS_REGION', 'us-east-1'))
          try:
              secret = json.loads(sm.get_secret_value(SecretId='algo-db-credentials-dev')['SecretString'])
              stocks_password = secret['password']
              stocks_user = secret['username']
              logger.info(f"Retrieved credentials from Secrets Manager: user={stocks_user}")
          except Exception as e:
              logger.error(f"Failed to get credentials from Secrets Manager: {e}")
              exit(1)

          try:
              # Connect to RDS as master user
              logger.info(f"Connecting to RDS as {db_master_user}@{db_host}...")
              conn = psycopg2.connect(
                  host=db_host,
                  port=db_port,
                  database=db_name,
                  user=db_master_user,
                  password=db_master_password,
                  connect_timeout=15
              )

              conn.autocommit = True
              cursor = conn.cursor()

              # Create or update the stocks user with correct password
              logger.info(f"Updating {stocks_user} user password...")

              # Try to update existing user
              try:
                  # Escape username properly
                  cursor.execute(f"ALTER USER \"{stocks_user}\" WITH PASSWORD %s", (stocks_password,))
                  logger.info(f"✅ Updated existing {stocks_user} user password")
              except Exception as e:
                  logger.info(f"User doesn't exist or update failed: {e}. Creating new user...")
                  # Create user if doesn't exist
                  cursor.execute(f"CREATE USER \"{stocks_user}\" WITH PASSWORD %s", (stocks_password,))
                  logger.info(f"✅ Created new {stocks_user} user")

                  # Grant permissions
                  cursor.execute(f"GRANT CONNECT ON DATABASE \"{db_name}\" TO \"{stocks_user}\"")
                  cursor.execute(f"GRANT USAGE ON SCHEMA public TO \"{stocks_user}\"")
                  cursor.execute(f"GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO \"{stocks_user}\"")
                  cursor.execute(f"GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO \"{stocks_user}\"")
                  logger.info(f"✅ Granted permissions to {stocks_user}")

              cursor.close()
              conn.close()

              # Verify the fix
              logger.info(f"Verifying connection as {stocks_user}...")
              test_conn = psycopg2.connect(
                  host=db_host,
                  port=db_port,
                  database=db_name,
                  user=stocks_user,
                  password=stocks_password,
                  connect_timeout=15
              )
              test_conn.close()
              logger.info(f"✅ Verification successful - {stocks_user} can connect!")

          except Exception as e:
              logger.error(f"Failed: {str(e)}")
              exit(1)

          PYTHON

      - name: Re-invoke Loaders
        run: |
          echo "✅ Stocks user password fixed. Now triggering loaders..."
          gh workflow run "Manual - Invoke Loaders" --ref main
        env:
          GH_TOKEN: ${{ github.token }}
