name: Export Developer Credentials

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1
      
      - name: Retrieve Developer Credentials
        run: |
          echo "=== DEVELOPER IAM CREDENTIALS ==="
          aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region us-east-1 \
            --query SecretString \
            --output text | jq .
