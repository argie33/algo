name: Initialize RDS Schema

on:
  workflow_dispatch:

jobs:
  init-db:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install psycopg2-binary

      - name: Initialize RDS Schema
        env:
          DB_HOST: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          DB_USER: stocks
          DB_PASSWORD: stocks
          DB_NAME: stocks
        run: python3 scripts/init_database.py

      - name: Verify Tables
        env:
          DB_HOST: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          DB_USER: stocks
          DB_PASSWORD: stocks
          DB_NAME: stocks
        run: |
          python3 << 'PYEOF'
          import psycopg2
          import os
          
          conn = psycopg2.connect(
              host=os.getenv("DB_HOST"),
              user=os.getenv("DB_USER"),
              password=os.getenv("DB_PASSWORD"),
              database=os.getenv("DB_NAME")
          )
          
          cursor = conn.cursor()
          cursor.execute("SELECT table_name FROM information_schema.tables WHERE table_schema='public'")
          tables = [row[0] for row in cursor.fetchall()]
          
          print("✅ Database tables:")
          for table in sorted(tables):
              print(f"  - {table}")
          
          if "feature_flags" in tables:
              print("\n✅ feature_flags table exists!")
          else:
              print("\n❌ feature_flags table still missing!")
          
          conn.close()
          PYEOF
