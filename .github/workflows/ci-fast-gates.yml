name: CI — Fast Gates (Lint + Unit Tests)

# Runs on: every commit to main, every PR
# Duration: ~90 seconds
# Cost: negligible (within free tier)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-secrets:
    name: Security — Scan for Exposed Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to catch secrets in commits

      - name: TruffleHog — Detect secrets in commits
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.event.after || github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --debug --only-verified

      - name: Scan for generic API key patterns in new commits
        env:
          BEFORE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
          AFTER_SHA: ${{ github.event.after || github.event.pull_request.head.sha || github.sha }}
        run: |
          # TruffleHog above handles all known-secret pattern detection with --only-verified.
          # This step catches generic API key assignments added in new commits only.
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            DIFF=$(git show "${AFTER_SHA}" 2>/dev/null || true)
          else
            DIFF=$(git diff "${BEFORE_SHA}..${AFTER_SHA}" 2>/dev/null || true)
          fi

          FOUND=0
          # Check for hardcoded APCA key assignments (pattern: APCA_API_KEY_ID = PK...)
          if echo "$DIFF" | grep -qE '^\+[^+].*APCA_API_KEY_ID\s*=\s*PK[A-Z0-9]{20,}'; then
            echo "⚠️  Hardcoded APCA_API_KEY_ID added in new commit"
            FOUND=1
          fi
          # Check for hardcoded AWS access key IDs
          if echo "$DIFF" | grep -qE '^\+[^+].*AKIA[0-9A-Z]{16}'; then
            echo "⚠️  Hardcoded AWS access key ID added in new commit"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "❌ Hardcoded credentials detected in new commit — use AWS Secrets Manager"
            exit 1
          fi
          echo "✅ No hardcoded API key patterns in new commits"

  lint-and-type:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q black isort flake8 mypy

      - name: Black format check
        run: black --check algo_*.py tests/ 2>/dev/null || true

      - name: isort import check
        run: isort --check-only algo_*.py tests/ 2>/dev/null || true

      - name: Flake8 lint
        run: flake8 algo_*.py tests/ --max-line-length=120 --ignore=E501,W503 || true

      - name: MyPy type check
        run: mypy algo_*.py --ignore-missing-imports 2>/dev/null || true

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        test-module:
          - 'tests/unit/test_position_sizer.py'
          - 'tests/unit/test_circuit_breaker.py'
          - 'tests/unit/test_filter_pipeline.py'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv

      - name: Run unit tests — ${{ matrix.test-module }}
        run: pytest ${{ matrix.test-module }} -v --tb=short
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  edge-case-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv requests boto3

      - name: Run edge case tests
        run: pytest tests/edge_cases/ -v --tb=short
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv requests
          pip install -q yfinance pandas

      - name: Run integration tests
        run: pytest tests/integration/ -m "not db" --tb=short -q
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          ENVIRONMENT: ci
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  summary:
    runs-on: ubuntu-latest
    needs: [scan-secrets, lint-and-type, unit-tests, edge-case-tests, integration-tests]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "📋 CI Pipeline Summary"
          echo "════════════════════════════════════════"

          if [[ "${{ needs.scan-secrets.result }}" != "success" ]]; then
            echo "❌ Security scan failed — credentials detected"
            exit 1
          fi

          if [[ "${{ needs.lint-and-type.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.edge-case-tests.result }}" != "success" ]]; then
            echo "❌ CI Failed — fix issues before merge"
            exit 1
          fi

          if [[ "${{ needs.integration-tests.result }}" != "success" ]] && [[ "${{ needs.integration-tests.result }}" != "skipped" ]]; then
            echo "⚠️  Integration tests failed (allowed for now) — merge still OK"
          fi

          echo "✅ All fast gates passed (including security scan)"
