name: CI — Fast Gates (Lint + Unit Tests)

# Runs on: every commit to main, every PR
# Duration: ~90 seconds
# Cost: negligible (within free tier)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan-secrets:
    name: Security — Scan for Exposed Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to catch secrets in commits

      - name: TruffleHog — Detect secrets in commits
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.event.after || github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --debug --only-verified

      - name: Manual pattern scan for known compromised keys
        env:
          BEFORE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
          AFTER_SHA: ${{ github.event.after || github.event.pull_request.head.sha || github.sha }}
        run: |
          echo "🔍 Scanning NEW commits for hardcoded credentials..."
          echo "Range: ${BEFORE_SHA}..${AFTER_SHA}"

          # Scan only the NEW commits being pushed — these keys are in old history
          # already (tracked in CREDENTIALS_ROTATION_REQUIRED.md) and can't be
          # removed from git without a force push. TruffleHog above handles full
          # history scanning with --only-verified. This step catches accidental
          # re-introduction of known-bad keys in NEW commits.
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            DIFF_CMD="git show ${AFTER_SHA}"
          else
            DIFF_CMD="git diff ${BEFORE_SHA}..${AFTER_SHA}"
          fi

          PATTERNS=(
            "PKAZZLZK2HX7JB6P7GBVDORY76"
            "HEzu13fSdQwwDStWWwjEFyh25XjE17cfM9uJ7267mK73"
            "PK5NU6IU3BA5T5DYR2IP7FRKIL"
            "29MRDnC5prmJXYKBRE29bvc1BUiqPhdSaaqrtJNZwJeY"
            "450ae65f7efbaedbd1f1a8bb02582fcb"
            "PK3GYRST6COXMHJVEVP4AQRKVH"
            "53YmK3q7muMhn6fEndGTZvrQmNusRym9CzjYY9fC5f96"
          )

          FOUND=0
          DIFF_OUTPUT=$($DIFF_CMD 2>/dev/null || true)

          for pattern in "${PATTERNS[@]}"; do
            if echo "$DIFF_OUTPUT" | grep -q "$pattern"; then
              echo "❌ CRITICAL: Known compromised credential added in new commit: $pattern"
              FOUND=1
            fi
          done

          # Scan for generic API key patterns in new commits
          if echo "$DIFF_OUTPUT" | grep -qE 'APCA_API_KEY_ID\s*=\s*[A-Z0-9]{20,}'; then
            echo "⚠️  Found APCA_API_KEY_ID assignment in new commit"
            FOUND=1
          fi

          if echo "$DIFF_OUTPUT" | grep -qE 'aws_access_key_id\s*=\s*AKIA[0-9A-Z]{16}'; then
            echo "⚠️  Found AWS_ACCESS_KEY_ID in new commit"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "❌ CREDENTIAL SCAN FAILED — new commit adds known-compromised credentials"
            exit 1
          fi

          echo "✅ No known compromised credentials in new commits"

  lint-and-type:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q black isort flake8 mypy

      - name: Black format check
        run: black --check algo_*.py tests/ 2>/dev/null || true

      - name: isort import check
        run: isort --check-only algo_*.py tests/ 2>/dev/null || true

      - name: Flake8 lint
        run: flake8 algo_*.py tests/ --max-line-length=120 --ignore=E501,W503 || true

      - name: MyPy type check
        run: mypy algo_*.py --ignore-missing-imports 2>/dev/null || true

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        test-module:
          - 'tests/unit/test_position_sizer.py'
          - 'tests/unit/test_circuit_breaker.py'
          - 'tests/unit/test_filter_pipeline.py'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv

      - name: Run unit tests — ${{ matrix.test-module }}
        run: pytest ${{ matrix.test-module }} -v --tb=short
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  edge-case-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv requests boto3

      - name: Run edge case tests
        run: pytest tests/edge_cases/ -v --tb=short
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock
          pip install -q psycopg2-binary python-dotenv requests
          pip install -q yfinance pandas

      - name: Run integration tests
        run: pytest tests/integration/ -m "not db" --tb=short -q
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          ENVIRONMENT: ci
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  summary:
    runs-on: ubuntu-latest
    needs: [scan-secrets, lint-and-type, unit-tests, edge-case-tests, integration-tests]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "📋 CI Pipeline Summary"
          echo "════════════════════════════════════════"

          if [[ "${{ needs.scan-secrets.result }}" != "success" ]]; then
            echo "❌ Security scan failed — credentials detected"
            exit 1
          fi

          if [[ "${{ needs.lint-and-type.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.edge-case-tests.result }}" != "success" ]]; then
            echo "❌ CI Failed — fix issues before merge"
            exit 1
          fi

          if [[ "${{ needs.integration-tests.result }}" != "success" ]] && [[ "${{ needs.integration-tests.result }}" != "skipped" ]]; then
            echo "⚠️  Integration tests failed (allowed for now) — merge still OK"
          fi

          echo "✅ All fast gates passed (including security scan)"
