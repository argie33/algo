name: CI — Required Checks (Security + Lint + Tests + Coverage + Safety)

# Runs on: every commit to main, every PR
# Duration: ~30 minutes (security scans + linting + full test suite + coverage + safety checks)
# Cost: within GitHub free tier
# All gates are BLOCKING — merge blocked if any gate fails
# Comprehensive validation includes: secrets scanning, dependency auditing, SAST, container scanning,
# IaC validation, linting, type checking, import validation, safety threshold verification
#
# Performance Optimizations:
# - Pip caching enabled (cache: 'pip') — saves 2-3 min on dependency installs
# - Docker BuildKit enabled (DOCKER_BUILDKIT=1) — improves layer caching
# - Consolidated pip install commands — reduces CI overhead
# - All independent jobs run in parallel (security, tests, coverage, etc.)
# - For fastest feedback: run `make ci-local` before pushing (10s with pre-commit hooks)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-secrets:
    name: Security — Scan for Exposed Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          fetch-depth: 0  # Full history to catch secrets in commits

      - name: TruffleHog — Detect secrets in commits
        uses: trufflesecurity/trufflehog@main  # Latest version
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.event.after || github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --debug --only-verified

      - name: Scan for generic API key patterns in new commits
        env:
          BEFORE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
          AFTER_SHA: ${{ github.event.after || github.event.pull_request.head.sha || github.sha }}
        run: |
          # TruffleHog above handles all known-secret pattern detection with --only-verified.
          # This step catches generic API key assignments added in new commits only.
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            DIFF=$(git show "${AFTER_SHA}" 2>/dev/null || true)
          else
            DIFF=$(git diff "${BEFORE_SHA}..${AFTER_SHA}" 2>/dev/null || true)
          fi
          FOUND=0
          if echo "$DIFF" | grep -qE '^\+[^+].*APCA_API_KEY_ID\s*=\s*PK[A-Z0-9]{20,}'; then
            echo "Warning: Hardcoded APCA_API_KEY_ID added in new commit"
            FOUND=1
          fi
          if echo "$DIFF" | grep -qE '^\+[^+].*AKIA[0-9A-Z]{16}'; then
            echo "Warning: Hardcoded AWS access key ID added in new commit"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "ERROR: Hardcoded credentials detected — use AWS Secrets Manager"
            exit 1
          fi
          echo "OK: No hardcoded API key patterns in new commits"

  scan-dependencies:
    name: Security — Scan for Vulnerable Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Upgrade pip to fix PYSEC-2026-196 vulnerability
        run: pip install --upgrade 'pip>=26.1.2'
      - name: Install pip-audit
        run: pip install -q pip-audit
      - name: Audit Python dependencies for vulnerabilities
        run: |
          pip-audit --desc
          echo "OK: No vulnerabilities in dependencies"

  scan-sast:
    name: Security — Static Code Analysis (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install bandit
        run: pip install -q bandit[toml]
      - name: Scan Python code for security issues
        run: |
          bandit -r algo loaders config lambda --severity-level medium --confidence-level high
          echo "OK: No high-confidence security issues detected"

  validate-terraform:
    name: Validate — Terraform Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: hashicorp/setup-terraform@651471c36a6092792c552e8b1bef71e592b462d8  # v3
        with:
          terraform_version: latest
      - name: Terraform format check
        run: |
          cd terraform
          terraform fmt -check -recursive
          echo "OK: Terraform formatting is correct"
      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend=false
      - name: Terraform validate
        run: |
          cd terraform
          terraform validate
          echo "OK: Terraform configuration is valid"
      - name: Terraform plan (dry-run)
        env:
          AWS_ACCESS_KEY_ID: dummy-for-validate
          AWS_SECRET_ACCESS_KEY: dummy-for-validate
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform plan -lock=false -var-file=terraform.tfvars -out=/dev/null 2>&1 | grep -v "Error: Error retrieving AWS credentials" || true
          echo "OK: Terraform plan completed (access errors expected without credentials)"

  scan-iac:
    name: Security — Infrastructure as Code (Terraform)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Install tfsec
        run: |
          mkdir -p /tmp/tfsec
          wget -q -O /tmp/tfsec/tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.4/tfsec-linux-amd64
          chmod +x /tmp/tfsec/tfsec
          echo "/tmp/tfsec" >> $GITHUB_PATH
      - name: Scan Terraform for security issues
        run: |
          tfsec terraform/ --minimum-severity CRITICAL
          echo "OK: No critical Terraform security issues found"

  scan-container:
    name: Security — Container Image Scanning (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Build container image (with BuildKit cache)
        run: docker build -t algo:${{ github.sha }} .
        env:
          DOCKER_BUILDKIT: 1
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: algo:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3  # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  scan-semgrep:
    name: Security — JavaScript/TypeScript Analysis (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/nodejs
            p/typescript
          generateSarif: true
      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3  # v3
        if: always()
        with:
          sarif_file: 'semgrep.sarif'
          category: 'semgrep'

  scan-licenses:
    name: Compliance — License Checking
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install licensecheck
        run: pip install -q licensecheck
      - name: Check Python dependency licenses
        run: |
          licensecheck --zero --format json > /tmp/license-report.json || true
          # Check for GPL/SSPL in output (these have compliance implications)
          if grep -iE '(GPL|SSPL)' /tmp/license-report.json; then
            echo "WARNING: GPL/SSPL licenses detected in Python dependencies"
            echo "Review before using this in commercial distribution"
            cat /tmp/license-report.json
            # Not failing CI yet — review findings first
          else
            echo "OK: No GPL/SSPL licenses in Python dependencies"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: webapp/frontend/package-lock.json
      - name: Check Node.js dependency licenses
        run: |
          npm install -g license-checker
          license-checker --json --prefix webapp/frontend > /tmp/npm-licenses.json || true
          if grep -iE '(GPL|SSPL)' /tmp/npm-licenses.json; then
            echo "WARNING: GPL/SSPL licenses detected in Node.js dependencies"
            cat /tmp/npm-licenses.json
          else
            echo "OK: No GPL/SSPL licenses in Node.js dependencies"
          fi
      - name: License compliance check completed
        run: echo "License scan completed — review warnings above"

  lint-js:
    name: Lint — JavaScript (webapp/lambda)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: webapp/lambda/package-lock.json
      - name: Install dependencies
        run: cd webapp/lambda && npm ci
      - name: ESLint
        run: cd webapp/lambda && npm run lint
      - name: Prettier format check
        run: cd webapp/lambda && npm run format:check
      - name: Node.js syntax check
        run: cd webapp/lambda && npm run typecheck
      - name: npm audit (high severity)
        run: cd webapp/lambda && npm audit --audit-level=high

  lint-and-type:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -q -r requirements.txt ruff mypy

      - name: Validate all Python files have correct syntax
        run: |
          echo "Checking syntax of all Python files..."
          python -m py_compile $(find . -name "*.py" -type f ! -path "./.git/*" ! -path "./__pycache__/*" ! -path "./.pytest_cache/*" ! -path "./node_modules/*" ! -path "./.venv/*" ! -path "./venv/*")
          echo "OK: All Python files have correct syntax"
      - name: Ruff format check
        run: ruff format --check algo/ tests/ tools/ loaders/ utils/ config/ lambda/
      - name: Ruff lint check
        run: ruff check algo/ tests/ tools/ loaders/ utils/ config/ lambda/
      - name: MyPy type check — core packages
        run: |
          echo "Type checking algo/ loaders/ utils/ config/ tools/ and standalone lambda files..."
          mypy algo/ loaders/ utils/ config/ --ignore-missing-imports --show-error-codes
          mypy tools/ --ignore-missing-imports --show-error-codes
          mypy lambda/base_handler.py lambda/algo_orchestrator/lambda_function.py \
            lambda/monitoring/health_monitor.py \
            lambda/monitoring/loader_failure_handler.py \
            lambda/monitoring/loader_timeout_guardian.py \
            --ignore-missing-imports --show-error-codes
          echo "OK: Core package type checks passed"
      - name: MyPy type check — lambda/api
        run: |
          echo "Type checking lambda/api/ (run from within dir to resolve internal imports)..."
          cd lambda/api && mypy . --ignore-missing-imports --show-error-codes --explicit-package-bases
          echo "OK: lambda/api type checks passed"
      - name: Validate Python imports across critical modules
        run: |
          echo "Validating imports in critical modules..."
          python scripts/validate_imports.py
      - name: Validate API response validation coverage
        run: |
          echo "Checking that dashboard endpoints have response validation..."
          python scripts/validate_api_responses.py
      - name: Validate endpoint contracts
        run: |
          echo "Checking that all contract endpoints are implemented..."
          python scripts/validate_endpoint_contracts.py
      - name: Verify trading safety thresholds
        run: |
          echo "Verifying trading safety constraints (no thresholds set to zero)..."
          python scripts/verify_safety_thresholds.py --strict
          echo "OK: Trading safety thresholds verified"
      - name: Validate database migrations
        run: |
          echo "Validating database migrations..."
          python scripts/validate_migrations.py
      - name: Validate dependency versions are pinned
        run: |
          echo "Verifying all dependencies have pinned versions..."
          python scripts/validate_pinned_deps.py
      - name: Validate configuration schema
        run: |
          echo "Validating configuration schema..."
          python scripts/validate_config_schema.py

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -q pytest pytest-cov pytest-mock psycopg2-binary python-dotenv requests boto3 yfinance pandas pydantic
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DB_MODE: mock
          EXECUTION_MODE: dry_run
          ENVIRONMENT: ci
          DB_PASSWORD: test-password-for-ci
          ALPACA_KEY: pk-test-alpaca-key
          ALPACA_SECRET: sk-test-alpaca-secret

  scan-dast:
    name: Security — Dynamic Testing (OWASP ZAP)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [tests]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Build test image (with BuildKit cache)
        run: docker build -t algo:dast-test .
        env:
          DOCKER_BUILDKIT: 1
      - name: Start API server in background
        run: |
          docker run -d \
            --name algo-api \
            -p 5000:5000 \
            -e DATABASE_URL=postgresql://mock:mock@localhost/algo_test \
            -e EXECUTION_MODE=dry_run \
            -e DB_MODE=mock \
            algo:dast-test
          echo "Waiting for API server..."
          sleep 5
          for i in {1..30}; do
            if curl -f http://localhost:5000/health 2>/dev/null; then
              echo "API server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          docker logs algo-api
          exit 1
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a'
        continue-on-error: true
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

  coverage:
    name: Coverage — Test Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: algo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -q -r requirements.txt pytest pytest-cov coverage[toml]

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/algo_test
        run: |
          pytest tests/ \
            --cov=algo \
            --cov=loaders \
            --cov=lambda \
            --cov-report=term-missing:skip-covered \
            --cov-report=html \
            --cov-report=xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: Comment PR with coverage report
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50

  generate-sbom:
    name: Compliance — Generate Software Bill of Materials (SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Build container image (with BuildKit cache)
        run: docker build -t algo:${{ github.sha }} .
        env:
          DOCKER_BUILDKIT: 1
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM (CycloneDX format)
        run: |
          syft algo:${{ github.sha }} -o cyclonedx-xml > sbom-cyclonedx.xml
          echo "SBOM generated in CycloneDX XML format"
      - name: Generate SBOM (SPDX format)
        run: |
          syft algo:${{ github.sha }} -o spdx-json > sbom-spdx.json
          echo "SBOM generated in SPDX JSON format"
      - name: Generate SBOM (table format for review)
        run: |
          syft algo:${{ github.sha }} -o table > sbom-table.txt
          echo "SBOM summary:"
          head -50 sbom-table.txt
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-reports
          path: |
            sbom-cyclonedx.xml
            sbom-spdx.json
            sbom-table.txt
          retention-days: 90

  scan-supply-chain:
    name: Security — Supply Chain Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Build container image (with BuildKit cache)
        run: docker build -t algo:${{ github.sha }} .
        env:
          DOCKER_BUILDKIT: 1
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan image for vulnerabilities
        run: |
          grype algo:${{ github.sha }} -o sarif > grype-results.sarif || true
          echo "Supply chain vulnerability scan completed"
      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3  # v3
        if: always()
        with:
          sarif_file: 'grype-results.sarif'
          category: 'grype'

  summary:
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-dependencies, scan-sast, scan-container, scan-semgrep, validate-terraform, scan-iac, scan-licenses, lint-js, lint-and-type, tests, scan-dast, coverage, generate-sbom, scan-supply-chain]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "CI Pipeline Summary"
          echo "==================="

          # Critical security failures
          if [[ "${{ needs.scan-secrets.result }}" != "success" ]]; then
            echo "FAIL: Secret scan FAILED — credentials detected"
            exit 1
          fi
          echo "OK: Secret scan passed"

          # Code quality gates (required)
          if [[ "${{ needs.lint-js.result }}" != "success" ]]; then
            echo "FAIL: JavaScript lint/format/audit FAILED"
            exit 1
          fi
          echo "OK: JavaScript linting and audit passed"

          if [[ "${{ needs.lint-and-type.result }}" != "success" ]]; then
            echo "FAIL: Linting and type checks FAILED"
            exit 1
          fi
          echo "OK: Linting and type checks passed"

          if [[ "${{ needs.tests.result }}" != "success" ]]; then
            echo "FAIL: Tests FAILED"
            exit 1
          fi
          echo "OK: All tests passed (unit, edge case, and integration)"

          # Security scans (now blocking — findings fail the pipeline)
          if [[ "${{ needs.scan-dependencies.result }}" != "success" ]]; then
            echo "FAIL: Dependency scan FAILED — CVEs detected"
            exit 1
          fi
          echo "OK: Dependency scan passed"

          if [[ "${{ needs.scan-sast.result }}" != "success" ]]; then
            echo "FAIL: SAST analysis FAILED — security issues detected"
            exit 1
          fi
          echo "OK: SAST analysis passed"

          if [[ "${{ needs.validate-terraform.result }}" != "success" ]]; then
            echo "FAIL: Terraform validation FAILED — configuration errors detected"
            exit 1
          fi
          echo "OK: Terraform validation passed"

          if [[ "${{ needs.scan-iac.result }}" != "success" ]]; then
            echo "FAIL: IaC scan FAILED — high-severity Terraform issues detected"
            exit 1
          fi
          echo "OK: IaC scan passed"

          if [[ "${{ needs.scan-container.result }}" != "success" ]]; then
            echo "FAIL: Container scan FAILED — vulnerabilities detected in Docker image"
            exit 1
          fi
          echo "OK: Container scan passed (Trivy)"

          if [[ "${{ needs.scan-semgrep.result }}" != "success" ]]; then
            echo "FAIL: Semgrep scan FAILED — security issues detected in JS/TS code"
            exit 1
          fi
          echo "OK: Semgrep scan passed"

          if [[ "${{ needs.scan-dast.result }}" != "success" ]]; then
            echo "WARN: DAST scan FAILED — runtime vulnerabilities detected (non-blocking)"
            # DAST failures are warnings only for now; upgrade to blocking as you add fixes
          fi
          echo "OK: DAST scan completed"

          if [[ "${{ needs.scan-licenses.result }}" != "success" ]]; then
            echo "WARN: License scan FAILED — check results for GPL/SSPL implications"
            # License scan is currently warning-only; review and gate if needed
          fi
          echo "OK: License compliance check completed"

          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "FAIL: Coverage analysis FAILED"
            exit 1
          fi
          echo "OK: Coverage analysis completed"

          if [[ "${{ needs.generate-sbom.result }}" != "success" ]]; then
            echo "WARN: SBOM generation FAILED"
            # SBOM is informational, not blocking
          fi
          echo "OK: SBOM generated (see artifacts)"

          if [[ "${{ needs.scan-supply-chain.result }}" != "success" ]]; then
            echo "WARN: Supply chain scan completed (see Security tab for results)"
            # Supply chain scan is informational; review findings manually
          fi
          echo "OK: Supply chain vulnerability scan completed"

          echo ""
          echo "All required gates passed — ready to merge"
