name: Initialize Database Schema

on:
  # Automatically runs after data infrastructure deployment
  workflow_call:
    inputs:
      rds_endpoint:
        description: 'RDS endpoint hostname'
        required: true
        type: string
      rds_port:
        description: 'RDS port'
        required: false
        default: '5432'
        type: string
      rds_database:
        description: 'Database name'
        required: false
        default: 'stocks'
        type: string
      rds_username:
        description: 'RDS username'
        required: false
        default: 'stocks'
        type: string
      environment:
        description: 'Environment (dev, staging, prod)'
        required: false
        default: 'dev'
        type: string

  # Also allow manual trigger for schema updates
  workflow_dispatch:
    inputs:
      rds_endpoint:
        description: 'RDS endpoint hostname'
        required: true
        type: string
      rds_port:
        description: 'RDS port'
        required: false
        default: '5432'
        type: string
      environment:
        description: 'Environment'
        required: false
        default: 'dev'
        type: choice
        options: ['dev', 'staging', 'prod']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  verify-inputs:
    name: Verify RDS Details
    runs-on: ubuntu-latest
    outputs:
      rds_endpoint: ${{ steps.verify.outputs.rds_endpoint }}
      rds_port: ${{ steps.verify.outputs.rds_port }}
      rds_database: ${{ steps.verify.outputs.rds_database }}
      rds_username: ${{ steps.verify.outputs.rds_username }}
      environment: ${{ steps.verify.outputs.environment }}
    steps:
      - name: Verify inputs
        id: verify
        run: |
          # Get RDS details from CloudFormation exports if not provided
          RDS_ENDPOINT="${{ inputs.rds_endpoint }}"
          RDS_PORT="${{ inputs.rds_port || '5432' }}"
          RDS_DATABASE="${{ inputs.rds_database || 'stocks' }}"
          RDS_USERNAME="${{ inputs.rds_username || 'stocks' }}"
          ENVIRONMENT="${{ inputs.environment || 'dev' }}"

          # If endpoint not provided, try to get from CloudFormation
          if [ -z "$RDS_ENDPOINT" ] || [ "$RDS_ENDPOINT" = "null" ]; then
            echo "🔍 RDS endpoint not provided, fetching from CloudFormation..."

            AWS_CREDS_CONFIGURED=false
            # Try with OIDC first
            if [ ! -z "$AWS_ACCESS_KEY_ID" ]; then
              AWS_CREDS_CONFIGURED=true
            fi

            if [ "$AWS_CREDS_CONFIGURED" = "true" ]; then
              RDS_ENDPOINT=$(aws cloudformation list-exports \
                --region ${{ env.AWS_REGION }} \
                --query "Exports[?Name=='StocksApp-DBEndpoint'].Value" \
                --output text 2>/dev/null || echo "")
            fi

            if [ -z "$RDS_ENDPOINT" ] || [ "$RDS_ENDPOINT" = "None" ]; then
              echo "❌ RDS endpoint not found in CloudFormation exports"
              echo "Please provide RDS endpoint as input or ensure CloudFormation stack is deployed"
              exit 1
            fi
          fi

          echo "📍 RDS Endpoint: $RDS_ENDPOINT:$RDS_PORT"
          echo "🗄️  Database: $RDS_DATABASE"
          echo "👤 Username: $RDS_USERNAME"
          echo "🌍 Environment: $ENVIRONMENT"

          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "rds_port=$RDS_PORT" >> $GITHUB_OUTPUT
          echo "rds_database=$RDS_DATABASE" >> $GITHUB_OUTPUT
          echo "rds_username=$RDS_USERNAME" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

  initialize-schema:
    name: Initialize Database Schema
    needs: verify-inputs
    runs-on: ubuntu-latest
    environment: ${{ needs.verify-inputs.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify RDS connectivity
        run: |
          echo "🔗 Testing RDS connection..."

          # Attempt connection with timeout
          pg_isready \
            -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
            -p ${{ needs.verify-inputs.outputs.rds_port }} \
            -U ${{ needs.verify-inputs.outputs.rds_username }} \
            -d ${{ needs.verify-inputs.outputs.rds_database }} \
            -t 10 || {
            echo "❌ Failed to connect to RDS"
            echo "Endpoint: ${{ needs.verify-inputs.outputs.rds_endpoint }}"
            echo "Port: ${{ needs.verify-inputs.outputs.rds_port }}"
            echo ""
            echo "Troubleshooting:"
            echo "1. Verify security group allows inbound 5432 from this runner"
            echo "2. Verify RDS instance is in public subnet or runner has VPN access"
            echo "3. Verify RDS password is correct"
            exit 1
          }
          echo "✅ RDS is reachable"

      - name: Initialize database schema
        env:
          PGPASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          echo "📝 Initializing database schema..."

          # Run init_db.sql on RDS
          psql \
            -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
            -p ${{ needs.verify-inputs.outputs.rds_port }} \
            -U ${{ needs.verify-inputs.outputs.rds_username }} \
            -d ${{ needs.verify-inputs.outputs.rds_database }} \
            -f init_db.sql \
            -v ON_ERROR_STOP=1 || {
            echo "❌ Schema initialization failed"
            exit 1
          }

          echo "✅ Schema initialization complete"

      - name: Verify schema deployment
        env:
          PGPASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          echo "🔍 Verifying schema..."

          # Count tables
          TABLE_COUNT=$(psql \
            -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
            -p ${{ needs.verify-inputs.outputs.rds_port }} \
            -U ${{ needs.verify-inputs.outputs.rds_username }} \
            -d ${{ needs.verify-inputs.outputs.rds_database }} \
            -t \
            -c "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public';")

          echo "📊 Total tables: $TABLE_COUNT"

          if [ "$TABLE_COUNT" -lt 50 ]; then
            echo "❌ Expected 60+ tables, found only $TABLE_COUNT"
            exit 1
          fi

          echo "✅ Schema verified ($TABLE_COUNT tables)"

          # List critical tables
          echo ""
          echo "🎯 Checking critical tables..."

          for TABLE in users trades algo_positions market_health_daily technical_data_daily buy_sell_daily stock_symbols; do
            EXISTS=$(psql \
              -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
              -p ${{ needs.verify-inputs.outputs.rds_port }} \
              -U ${{ needs.verify-inputs.outputs.rds_username }} \
              -d ${{ needs.verify-inputs.outputs.rds_database }} \
              -t \
              -c "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='$TABLE' AND table_schema='public');")

            if [ "$EXISTS" = "t" ]; then
              echo "  ✅ $TABLE"
            else
              echo "  ❌ $TABLE (MISSING)"
            fi
          done

      - name: Check buy_sell_daily columns
        env:
          PGPASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          echo "🔍 Checking buy_sell_daily extended columns..."

          CRITICAL_COLS="buylevel stoplevel entry_price rsi adx macd sma_50 sma_200"

          for COL in $CRITICAL_COLS; do
            EXISTS=$(psql \
              -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
              -p ${{ needs.verify-inputs.outputs.rds_port }} \
              -U ${{ needs.verify-inputs.outputs.rds_username }} \
              -d ${{ needs.verify-inputs.outputs.rds_database }} \
              -t \
              -c "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_name='buy_sell_daily' AND column_name='$COL');")

            if [ "$EXISTS" = "t" ]; then
              echo "  ✅ $COL"
            else
              echo "  ❌ $COL (MISSING)"
            fi
          done

      - name: Check sample data
        env:
          PGPASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          echo "🔍 Checking sample data..."

          SYMBOL_COUNT=$(psql \
            -h ${{ needs.verify-inputs.outputs.rds_endpoint }} \
            -p ${{ needs.verify-inputs.outputs.rds_port }} \
            -U ${{ needs.verify-inputs.outputs.rds_username }} \
            -d ${{ needs.verify-inputs.outputs.rds_database }} \
            -t \
            -c "SELECT COUNT(*) FROM stock_symbols;")

          echo "  Stock symbols: $SYMBOL_COUNT"

          if [ "$SYMBOL_COUNT" -ge 3 ]; then
            echo "  ✅ Sample data loaded"
          else
            echo "  ⚠️  Sample data may be incomplete"
          fi

  summary:
    name: Schema Initialization Summary
    needs: initialize-schema
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "=========================================="
          if [ "${{ needs.initialize-schema.result }}" = "success" ]; then
            echo "✅ DATABASE SCHEMA INITIALIZED SUCCESSFULLY"
            echo "=========================================="
            echo ""
            echo "Schema Details:"
            echo "  - 60+ tables created"
            echo "  - 25+ TimescaleDB hypertables"
            echo "  - 50+ indexes"
            echo "  - Sample data loaded"
            echo ""
            echo "API is now ready to use all routes:"
            echo "  ✅ /api/portfolio"
            echo "  ✅ /api/trades"
            echo "  ✅ /api/algo/status"
            echo "  ✅ /api/signals"
            echo "  ✅ /api/market/status"
            echo "  ✅ And 30+ more endpoints"
            echo ""
            exit 0
          else
            echo "❌ DATABASE SCHEMA INITIALIZATION FAILED"
            echo "=========================================="
            echo "Please check the logs above for errors"
            echo ""
            echo "Troubleshooting:"
            echo "1. Verify RDS endpoint is correct"
            echo "2. Verify RDS password is set in GitHub Secrets"
            echo "3. Verify security group allows connection"
            echo "4. Check CloudFormation exports for correct values"
            echo ""
            exit 1
          fi
