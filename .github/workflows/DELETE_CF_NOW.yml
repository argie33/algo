name: DELETE_CF_NOW

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete all CloudFormation stacks
        run: |
          STACKS=$(aws cloudformation list-stacks \
            --region $AWS_REGION \
            --query "StackSummaries[?StackStatus!='DELETE_COMPLETE'].StackName" \
            --output text)

          if [ -z "$STACKS" ]; then
            echo "✅ No CloudFormation stacks to delete"
            exit 0
          fi

          echo "🗑️ Deleting stacks: $STACKS"
          for stack in $STACKS; do
            echo "Deleting: $stack"
            aws cloudformation delete-stack --stack-name "$stack" --region $AWS_REGION || echo "Failed to delete $stack"
          done

          echo "⏳ Waiting for deletion..."
          for stack in $STACKS; do
            aws cloudformation wait stack-delete-complete --stack-name "$stack" --region $AWS_REGION 2>/dev/null || true
          done

          echo "✅ All stacks deleted"

      - name: Delete this workflow file
        run: |
          rm -f .github/workflows/DELETE_CF_NOW.yml

      - name: Delete all CloudFormation workflows
        run: |
          rm -f .github/workflows/deploy-data-infrastructure.yml
          rm -f .github/workflows/deploy-staging.yml
          rm -f .github/workflows/deploy-core.yml
          rm -f .github/workflows/deploy-webapp.yml
          echo "✅ CloudFormation deployment workflows deleted"

      - name: Commit and push cleanup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "cleanup: All CloudFormation deleted - Terraform only

Deleted:
- All CF stacks from AWS
- All CF deployment workflows
- DELETE_CF_NOW.yml (this cleanup workflow)

Ready for fresh Terraform deployment." || echo "Nothing to commit"
          git push origin main || echo "Push failed - that's ok"
