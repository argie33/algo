name: Diagnose AWS Credentials

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: List IAM users and access keys
        run: |
          echo "=== IAM Users ==="
          aws iam list-users | grep UserName

          echo -e "\n=== Access Keys for algo-developer ==="
          aws iam list-access-keys --user-name algo-developer || echo "User not found or error listing keys"

      - name: Check Secrets Manager
        run: |
          echo "=== Checking algo/developer-credentials secret ==="
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region ${{ env.AWS_REGION }} \
            --query SecretString \
            --output text 2>/dev/null || echo "Secret not found")

          if [ "$SECRET" != "Secret not found" ]; then
            echo "Secret exists. Parsing..."
            echo "$SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Access Key ID: {d[\"access_key_id\"]}'); print(f'Secret Key: {d[\"secret_access_key\"][:10]}...')"
          else
            echo "Secret not found in Secrets Manager"
          fi

      - name: Create new access key for algo-developer
        run: |
          echo "=== Creating new IAM access key ==="
          NEW_KEY=$(aws iam create-access-key --user-name algo-developer --output json)

          ACCESS_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.AccessKeyId')
          SECRET_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.SecretAccessKey')

          echo "✓ New access key created: ${ACCESS_KEY:0:4}...${ACCESS_KEY: -4}"

          # Update Secrets Manager
          aws secretsmanager update-secret-value \
            --secret-id algo/developer-credentials \
            --secret-string "{\"access_key_id\": \"$ACCESS_KEY\", \"secret_access_key\": \"$SECRET_KEY\", \"user_name\": \"algo-developer\"}" \
            --region ${{ env.AWS_REGION }}

          echo "✓ Secrets Manager updated"

          # Delete old keys
          echo ""
          echo "=== Cleaning up old access keys ==="
          OLD_KEYS=$(aws iam list-access-keys --user-name algo-developer --query 'AccessKeyMetadata[?AccessKeyId!=`'$ACCESS_KEY'`].AccessKeyId' --output text)

          if [ -n "$OLD_KEYS" ]; then
            for key in $OLD_KEYS; do
              echo "Deleting old key: $key"
              aws iam delete-access-key --user-name algo-developer --access-key-id $key
            done
          else
            echo "No old keys to delete"
          fi

          # Output new credentials as artifact
          mkdir -p /tmp/aws-creds
          cat > /tmp/aws-creds/credentials << EOF
[algo-developer]
aws_access_key_id = $ACCESS_KEY
aws_secret_access_key = $SECRET_KEY
region = ${{ env.AWS_REGION }}
EOF

          echo ""
          echo "✓ New credentials saved to artifact"

      - name: Upload new credentials
        uses: actions/upload-artifact@v4
        with:
          name: dev-credentials
          path: /tmp/aws-creds/credentials
          retention-days: 1

      - name: Summary
        run: |
          echo "## New AWS Credentials Generated ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Old invalid keys deleted, new key created and stored in Secrets Manager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Run \`scripts/refresh-aws-credentials.ps1\` to fetch new credentials locally" >> $GITHUB_STEP_SUMMARY
