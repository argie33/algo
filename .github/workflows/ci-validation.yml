name: CI Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy

      - name: Run CI validation script (all modules)
        run: python scripts/ci_validation.py

      - name: Check syntax with ruff
        run: ruff check algo/ tests/ tools/ loaders/ utils/ config/ lambda/

      - name: Ruff format check
        run: ruff format --check algo/ tests/ tools/ loaders/ utils/ config/ lambda/

      - name: Type check with mypy — core packages
        run: |
          mypy algo/ loaders/ utils/ config/ --ignore-missing-imports --show-error-codes
          mypy tools/ --ignore-missing-imports --show-error-codes
          mypy lambda/base_handler.py lambda/algo_orchestrator/ lambda/monitoring/ --ignore-missing-imports --show-error-codes

      - name: Type check with mypy — lambda/api
        run: |
          cd lambda/api && mypy . --ignore-missing-imports --show-error-codes --explicit-package-bases

      - name: Report results
        if: always()
        run: |
          echo "## CI Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "- All imports verified" >> $GITHUB_STEP_SUMMARY
          echo "- Syntax validated" >> $GITHUB_STEP_SUMMARY
          echo "- Type checking complete" >> $GITHUB_STEP_SUMMARY
