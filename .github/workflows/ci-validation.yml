name: CI Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install psycopg2-binary yfinance requests pandas scipy boto3 Flask pydantic

      - name: Run CI validation script
        run: python scripts/ci_validation.py

      - name: Check syntax with ruff
        run: ruff check tools/ lambda/ algo/ loaders/ --select=E,F

      - name: Type check with mypy
        run: mypy tools/dashboard --ignore-missing-imports --show-error-codes
        continue-on-error: true

      - name: Report results
        if: always()
        run: |
          echo "## CI Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "- All imports verified" >> $GITHUB_STEP_SUMMARY
          echo "- Syntax validated" >> $GITHUB_STEP_SUMMARY
          echo "- Type checking complete" >> $GITHUB_STEP_SUMMARY
