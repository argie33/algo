name: auto-populate-on-first-deploy

# Automatically trigger data loading after initial infrastructure deployment
# Runs after deploy-all-infrastructure completes successfully on first deploy

on:
  workflow_run:
    workflows: ["Deploy All Infrastructure (Terraform)"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: us-east-1

jobs:
  check-if-first-deploy:
    name: "Check if first deployment"
    runs-on: ubuntu-latest
    outputs:
      should_populate: ${{ steps.check.outputs.should_populate }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if this is first deployment
        id: check
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_MACHINE_ARN="arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:algo-eod-pipeline-dev"

          # Skip if any executions are currently running (avoid concurrent runs)
          RUNNING_COUNT=$(aws stepfunctions list-executions \
            --state-machine-arn "$STATE_MACHINE_ARN" \
            --status-filter RUNNING \
            --region "${AWS_REGION}" \
            --query 'length(executions)' \
            --output text 2>/dev/null || echo "0")

          if [ "${RUNNING_COUNT}" -gt "0" ]; then
            echo "should_populate=false" >> $GITHUB_OUTPUT
            echo "Pipeline already running (${RUNNING_COUNT} execution(s)) — skipping to avoid concurrent runs"
            exit 0
          fi

          # Skip if a successful execution completed within the last 6 hours
          LAST_STOP=$(aws stepfunctions list-executions \
            --state-machine-arn "$STATE_MACHINE_ARN" \
            --status-filter SUCCEEDED \
            --region "${AWS_REGION}" \
            --max-results 1 \
            --query 'executions[0].stopDate' \
            --output text 2>/dev/null || echo "None")

          if [ "${LAST_STOP}" != "None" ] && [ -n "${LAST_STOP}" ]; then
            NOW=$(date +%s)
            SIX_HOURS=21600
            STOP_EPOCH=${LAST_STOP%.*}
            if [ $(( NOW - STOP_EPOCH )) -lt $SIX_HOURS ]; then
              echo "should_populate=false" >> $GITHUB_OUTPUT
              echo "Pipeline succeeded recently (within 6 hours) — skipping re-population"
              exit 0
            fi
          fi

          echo "should_populate=true" >> $GITHUB_OUTPUT
          echo "No running or recent successful pipeline — will populate database"

  trigger-data-load:
    name: "Auto-trigger EOD pipeline"
    needs: check-if-first-deploy
    if: |
      needs.check-if-first-deploy.outputs.should_populate == 'true' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      execution-arn: ${{ steps.trigger.outputs.execution-arn }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger EOD pipeline
        id: trigger
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_MACHINE_ARN="arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:algo-eod-pipeline-dev"

          echo "🚀 Triggering EOD pipeline..."
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "$STATE_MACHINE_ARN" \
            --name "auto-populate-$(date +%s)" \
            --region "${AWS_REGION}" \
            --query 'executionArn' \
            --output text)

          echo "✅ Pipeline execution started"
          echo "Execution ARN: $EXECUTION_ARN"
          echo ""
          echo "Monitor progress:"
          echo "  https://console.aws.amazon.com/states/home?region=${AWS_REGION}"

          # Output the ARN for the next step
          echo "execution-arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT

      - name: Wait for pipeline completion (optional)
        timeout-minutes: 120  # 2 hours max for full data load
        run: |
          EXECUTION_ARN="${{ steps.trigger.outputs.execution-arn }}"

          echo "⏳ Waiting for EOD pipeline to complete..."
          echo "(This may take 30-45 minutes)"
          echo ""
          echo "Using execution: $EXECUTION_ARN"

          # Poll until complete
          while true; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXECUTION_ARN" \
              --region "${AWS_REGION}" \
              --query 'status' \
              --output text)

            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Pipeline SUCCEEDED"
                echo "All data loaded successfully"
                exit 0
                ;;
              FAILED)
                echo "❌ Pipeline FAILED"
                CAUSE=$(aws stepfunctions describe-execution \
                  --execution-arn "$EXECUTION_ARN" \
                  --region "${AWS_REGION}" \
                  --query 'cause' \
                  --output text)
                echo "Error: $CAUSE"
                exit 1
                ;;
              ABORTED)
                echo "⚠️  Pipeline ABORTED"
                exit 1
                ;;
              RUNNING)
                echo "⏳ Still running... (status: $STATUS)"
                sleep 60
                ;;
              *)
                echo "Status: $STATUS"
                sleep 60
                ;;
            esac
          done
