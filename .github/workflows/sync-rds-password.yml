name: Sync RDS Password

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  sync-password:
    name: Sync RDS Master Password with Secrets Manager
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync RDS Master Password
        env:
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          if [ -z "$RDS_PASSWORD" ]; then
            echo "ERROR: RDS_PASSWORD secret not set"
            exit 1
          fi

          echo "Updating RDS master password for algo-db..."
          aws rds modify-db-instance \
            --db-instance-identifier algo-db \
            --master-user-password "$RDS_PASSWORD" \
            --apply-immediately \
            --region $AWS_REGION

          echo "Waiting for RDS to apply the change..."
          sleep 30

          echo "Checking RDS status..."
          aws rds describe-db-instances \
            --db-instance-identifier algo-db \
            --query 'DBInstances[0].DBInstanceStatus' \
            --output text --region $AWS_REGION

          echo "✅ RDS password synced. Updating Secrets Manager..."
          SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id algo-db-credentials-dev \
            --query 'ARN' --output text --region $AWS_REGION 2>/dev/null || echo "")

          if [ -n "$SECRET_ARN" ]; then
            SECRET_VAL=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_ARN" \
              --query 'SecretString' --output text --region $AWS_REGION)
            UPDATED=$(echo "$SECRET_VAL" | python3 -c "
import json, sys
s = json.load(sys.stdin)
s['password'] = '$RDS_PASSWORD'
print(json.dumps(s))
")
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_ARN" \
              --secret-string "$UPDATED" \
              --region $AWS_REGION
            echo "✅ Secrets Manager updated"
          fi

          echo "Done. RDS password is now synced."
