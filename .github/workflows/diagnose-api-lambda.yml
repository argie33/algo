name: Diagnose API Lambda Error

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  diagnose:
    name: Check API Lambda Logs & Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Lambda Configuration
        run: |
          echo "=== API LAMBDA CONFIGURATION ==="
          aws lambda get-function-configuration \
            --function-name algo-api-dev \
            --region $AWS_REGION \
            --query 'Layers[*].Arn' \
            --output text | grep -q "psycopg2" && echo "✓ psycopg2 layer attached" || echo "✗ psycopg2 layer NOT attached"
          
          echo ""
          echo "=== ENVIRONMENT VARIABLES ==="
          aws lambda get-function-configuration \
            --function-name algo-api-dev \
            --region $AWS_REGION \
            --query 'Environment.Variables' || echo "ERROR: Could not get env vars"

      - name: Get Recent Lambda Logs
        run: |
          echo "=== RECENT API LAMBDA LOGS (last 50 lines) ==="
          aws logs tail /aws/lambda/algo-api-dev \
            --region $AWS_REGION \
            --max-items 50 \
            --follow --since 5m || echo "No logs available yet"

      - name: Invoke Lambda with Detailed Error
        run: |
          echo "=== INVOKING API LAMBDA FOR DIAGNOSIS ==="
          aws lambda invoke \
            --function-name algo-api-dev \
            --log-type Tail \
            --region $AWS_REGION \
            --payload '{"resource": "/api/health", "path": "/api/health", "httpMethod": "GET"}' \
            /tmp/lambda-output.json > /tmp/invoke-response.json
          
          echo "Response:"
          cat /tmp/invoke-response.json | jq .
          
          echo ""
          echo "Lambda Output:"
          cat /tmp/lambda-output.json | jq .
