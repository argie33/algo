name: Monitor & Fix EOD Pipeline

on:
  workflow_dispatch:
    inputs:
      remediate:
        description: 'Abort stuck executions and trigger fresh single run if data is incomplete'
        required: false
        default: 'false'
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT: algo
  ENV: dev

jobs:
  monitor:
    name: Check Pipeline & Data Status
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      # ─── Step Functions: all executions from last 24 hours ───────────────────
      - name: Check Step Functions Executions
        id: sfn
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SM_ARN="arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:${PROJECT}-eod-pipeline-${ENV}"
          echo "State machine: $SM_ARN"
          echo ""

          echo "=== RUNNING executions ==="
          RUNNING=$(aws stepfunctions list-executions \
            --state-machine-arn "$SM_ARN" \
            --status-filter RUNNING \
            --region $AWS_REGION \
            --output json 2>/dev/null || echo '{"executions":[]}')
          RUNNING_COUNT=$(echo "$RUNNING" | jq '.executions | length')
          echo "Running: $RUNNING_COUNT"
          echo "$RUNNING" | jq -r '.executions[] | "  \(.name) started \(.startDate)"' || true
          echo "running_count=$RUNNING_COUNT" >> $GITHUB_OUTPUT

          echo ""
          echo "=== SUCCEEDED executions (last 24h) ==="
          SUCCEEDED=$(aws stepfunctions list-executions \
            --state-machine-arn "$SM_ARN" \
            --status-filter SUCCEEDED \
            --max-results 5 \
            --region $AWS_REGION \
            --output json 2>/dev/null || echo '{"executions":[]}')
          SUCCEEDED_COUNT=$(echo "$SUCCEEDED" | jq '.executions | length')
          echo "Succeeded recently: $SUCCEEDED_COUNT"
          echo "$SUCCEEDED" | jq -r '.executions[] | "  \(.name) stopped \(.stopDate)"' || true
          echo "succeeded_count=$SUCCEEDED_COUNT" >> $GITHUB_OUTPUT

          echo ""
          echo "=== FAILED executions (last 24h) ==="
          FAILED=$(aws stepfunctions list-executions \
            --state-machine-arn "$SM_ARN" \
            --status-filter FAILED \
            --max-results 10 \
            --region $AWS_REGION \
            --output json 2>/dev/null || echo '{"executions":[]}')
          FAILED_COUNT=$(echo "$FAILED" | jq '.executions | length')
          echo "Failed: $FAILED_COUNT"
          echo "$FAILED" | jq -r '.executions[] | "  \(.name) stopped \(.stopDate)"' || true

          # Get error detail from most recent failed execution
          LATEST_FAILED_ARN=$(echo "$FAILED" | jq -r '.executions[0].executionArn // empty')
          if [ -n "$LATEST_FAILED_ARN" ]; then
            echo ""
            echo "--- Most recent failure detail ---"
            aws stepfunctions describe-execution \
              --execution-arn "$LATEST_FAILED_ARN" \
              --region $AWS_REGION \
              --query '{status: status, cause: cause, error: error}' \
              --output json 2>/dev/null || true

            echo ""
            echo "--- Failed step history ---"
            aws stepfunctions get-execution-history \
              --execution-arn "$LATEST_FAILED_ARN" \
              --region $AWS_REGION \
              --query 'events[?type==`TaskFailed` || type==`ExecutionFailed`].{type:type,ts:timestamp,details:taskFailedEventDetails}' \
              --output json 2>/dev/null | head -60 || true
          fi

          echo "sm_arn=$SM_ARN" >> $GITHUB_OUTPUT

      # ─── CloudWatch: ECS task logs from failures ─────────────────────────────
      - name: Check CloudWatch Logs for ECS Failures
        run: |
          SINCE=$(date -u -d '24 hours ago' +%s)000
          FAILED_TASKS=()

          # Check EOD pipeline ECS task logs
          for LOADER in eod_bulk_refresh technical_data_daily market_health_daily \
                        trend_template_data stock_scores signals_daily signals_weekly signals_monthly \
                        signals_etf_daily signals_etf_weekly signals_etf_monthly \
                        algo_metrics_daily swing_trader_scores; do
            LOG_GROUP="/ecs/${PROJECT}-${LOADER}-loader"
            echo "=== $LOADER ==="
            ERRORS=$(aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --start-time "$SINCE" \
              --filter-pattern "ERROR" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text 2>/dev/null | head -5 || true)
            if [ -n "$ERRORS" ]; then
              echo "⚠️  ERRORS FOUND:"
              echo "$ERRORS"
              FAILED_TASKS+=("$LOADER")
            else
              # Check if it ran at all
              LAST_LOG=$(aws logs describe-log-streams \
                --log-group-name "$LOG_GROUP" \
                --order-by LastEventTime \
                --descending \
                --max-items 1 \
                --region $AWS_REGION \
                --query 'logStreams[0].lastEventTimestamp' \
                --output text 2>/dev/null || echo "None")
              if [ "$LAST_LOG" = "None" ] || [ -z "$LAST_LOG" ]; then
                echo "  (no logs — loader has never run or log group missing)"
              else
                echo "  ✅ last log at $(date -d @$(echo "$LAST_LOG / 1000" | bc) '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo "$LAST_LOG ms")"
              fi
            fi
          done

          echo ""
          echo "=== EventBridge-scheduled loaders (last 24h) ==="
          for LOADER in stock_symbols stock_prices_daily etf_prices_daily \
                        market_indices seasonality econ_data feargreed aaiidata naaim_data \
                        company_profile sectors industry_ranking; do
            LOG_GROUP="/ecs/${PROJECT}-${LOADER}-loader"
            LAST_LOG=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --max-items 1 \
              --region $AWS_REGION \
              --query 'logStreams[0].lastEventTimestamp' \
              --output text 2>/dev/null || echo "None")
            ERRORS=$(aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --start-time "$SINCE" \
              --filter-pattern "ERROR" \
              --region $AWS_REGION \
              --query 'length(events)' \
              --output text 2>/dev/null || echo "0")
            if [ "$LAST_LOG" = "None" ] || [ -z "$LAST_LOG" ]; then
              echo "  $LOADER: never ran / no logs"
            elif [ "${ERRORS:-0}" -gt "0" ] 2>/dev/null; then
              echo "  ⚠️ $LOADER: $ERRORS errors in last 24h"
            else
              echo "  ✅ $LOADER: last ran $(date -d @$(echo "$LAST_LOG / 1000" | bc) '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo "recently")"
            fi
          done

      # ─── Data counts: invoke API Lambda directly (bypasses API Gateway auth) ──
      - name: Query Table Row Counts via API Lambda
        run: |
          # Get the API Lambda name from Terraform outputs
          TF_OUT=$(aws lambda list-functions \
            --region $AWS_REGION \
            --query 'Functions[?starts_with(FunctionName, `algo-api`)].FunctionName | [0]' \
            --output text 2>/dev/null || echo "")
          API_FUNC="${TF_OUT:-algo-api-dev}"
          echo "API Lambda: $API_FUNC"
          echo ""

          echo "=== Querying /api/health/pipeline (data_loader_status table) ==="
          printf '{"rawPath":"/api/health/pipeline","rawQueryString":"","headers":{"host":"localhost"},"requestContext":{"http":{"method":"GET","path":"/api/health/pipeline","sourceIp":"127.0.0.1"}}}' \
            > /tmp/lambda_payload_pipeline.json

          aws lambda invoke \
            --function-name "$API_FUNC" \
            --payload file:///tmp/lambda_payload_pipeline.json \
            --region $AWS_REGION \
            /tmp/pipeline_health.json 2>&1 | grep -v "^$" || true

          [ -f /tmp/pipeline_health.json ] && cat /tmp/pipeline_health.json | python3 -c "
          import sys, json
          try:
            resp = json.load(sys.stdin)
            body = json.loads(resp.get('body', '{}'))
            data = body.get('data', body)
            print(f'Status: {data.get(\"status\", \"unknown\")}')
            print(f'Healthy tables: {data.get(\"healthy_count\", \"?\")}/{data.get(\"total_count\", \"?\")}')
            print()
            tables = data.get('tables', [])
            if tables:
              print(f'{\"Table\":<35} {\"Status\":<12} {\"Rows\":>12}  {\"Age (days)\":>10}')
              print('-' * 75)
              for t in sorted(tables, key=lambda x: x.get('table_name','')):
                rows = t.get('row_count') or 0
                age = t.get('age_days') or 0
                status = t.get('status', '?')
                icon = '✅' if status == 'HEALTHY' else '⚠️ ' if status == 'STALE' else '❌'
                print(f'{icon} {t[\"table_name\"]:<33} {status:<12} {rows:>12,}  {age:>10}')
            else:
              print('No table data returned — data_loader_status may be empty')
              print('Raw response:', json.dumps(data, indent=2)[:500])
          except Exception as e:
            print(f'Parse error: {e}')
            try:
              print('Raw:', open('/tmp/pipeline_health.json').read()[:1000])
            except Exception:
              print('(no output file created — Lambda invoke failed)')
          " || true

          echo ""
          echo "=== Direct row counts (key tables) ==="
          # Invoke with a DB query payload to check critical tables
          for PATH_QUERY in "/api/health/detailed"; do
            printf '{"rawPath":"%s","rawQueryString":"","headers":{"host":"localhost"},"requestContext":{"http":{"method":"GET","path":"%s","sourceIp":"127.0.0.1"}}}' \
              "$PATH_QUERY" "$PATH_QUERY" > /tmp/lambda_payload_detail.json
            aws lambda invoke \
              --function-name "$API_FUNC" \
              --payload file:///tmp/lambda_payload_detail.json \
              --region $AWS_REGION \
              /tmp/health_detail.json 2>&1 | grep -v "^$" || true
            cat /tmp/health_detail.json | python3 -c "
          import sys, json
          try:
            resp = json.load(sys.stdin)
            body = json.loads(resp.get('body', '{}'))
            data = body.get('data', body)
            db = data.get('database', {})
            print(f'DB status: {db.get(\"status\", \"?\")}')
            tables = db.get('tables', {})
            if tables:
              for k,v in sorted(tables.items()):
                icon = '✅' if isinstance(v, int) and v > 0 else '❌'
                print(f'  {icon} {k}: {v:,}' if isinstance(v, int) else f'  ⚠️  {k}: {v}')
            else:
              print('  (no table detail available in production mode)')
          except Exception as e:
            print(f'  Parse error: {e}')
            " || true
          done

      # ─── Remediate if requested ───────────────────────────────────────────────
      - name: Remediate — Abort Stuck Executions & Trigger Fresh Run
        if: inputs.remediate
        run: |
          SM_ARN="${{ steps.sfn.outputs.sm_arn }}"

          # ── Verify task definitions have correct LOADER_FILE values ──
          echo "=== Verifying ECS Task Definition LOADER_FILE values ==="
          declare -A EXPECTED_LOADER_FILE
          EXPECTED_LOADER_FILE["eod_bulk_refresh"]="loadpricedaily.py"
          EXPECTED_LOADER_FILE["technical_data_daily"]="loadtechnicaldaily.py"
          EXPECTED_LOADER_FILE["market_health_daily"]="load_market_health.py"
          EXPECTED_LOADER_FILE["trend_template_data"]="load_trend_criteria_data.py"
          EXPECTED_LOADER_FILE["stock_scores"]="load_stock_scores.py"
          EXPECTED_LOADER_FILE["signals_daily"]="load_signals.py"
          EXPECTED_LOADER_FILE["signals_weekly"]="load_signals.py"
          EXPECTED_LOADER_FILE["signals_monthly"]="load_signals.py"
          EXPECTED_LOADER_FILE["signals_etf_daily"]="load_signals.py"
          EXPECTED_LOADER_FILE["signals_etf_weekly"]="load_signals.py"
          EXPECTED_LOADER_FILE["signals_etf_monthly"]="load_signals.py"
          EXPECTED_LOADER_FILE["algo_metrics_daily"]="load_algo_metrics.py"
          EXPECTED_LOADER_FILE["swing_trader_scores"]="load_swing_trader_scores.py"

          SM_DEF=$(aws stepfunctions describe-state-machine \
            --state-machine-arn "$SM_ARN" \
            --query 'definition' \
            --output text 2>/dev/null || echo "")

          for LOADER in "${!EXPECTED_LOADER_FILE[@]}"; do
            TASK_FAMILY="algo-${LOADER}-loader"
            EXPECTED_FILE="${EXPECTED_LOADER_FILE[$LOADER]}"
            CURRENT_DEF=$(aws ecs describe-task-definition \
              --task-definition "$TASK_FAMILY" \
              --region $AWS_REGION \
              --output json 2>/dev/null || echo '{}')
            CURRENT_FILE=$(echo "$CURRENT_DEF" | jq -r '
              .taskDefinition.containerDefinitions[0].environment[]?
              | select(.name=="LOADER_FILE") | .value' 2>/dev/null || echo "")
            if [ "$CURRENT_FILE" = "$EXPECTED_FILE" ]; then
              echo "  ✅ $LOADER: $CURRENT_FILE"
            elif [ -z "$CURRENT_FILE" ]; then
              echo "  ⚠️ $LOADER: not found (skipping)"
            else
              echo "  ❌ $LOADER: has '$CURRENT_FILE', expected '$EXPECTED_FILE' — fixing"
              OLD_ARN=$(echo "$CURRENT_DEF" | jq -r '.taskDefinition.taskDefinitionArn' 2>/dev/null || echo "")
              NEW_DEF=$(echo "$CURRENT_DEF" | python3 -c "import sys,json;d=json.load(sys.stdin)['taskDefinition'];[d.pop(k,None)for k in('taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy')];d['containerDefinitions'][0]['environment']=[{'name':'LOADER_FILE','value':'$EXPECTED_FILE'}if e['name']=='LOADER_FILE'else e for e in d['containerDefinitions'][0].get('environment',[])];print(json.dumps(d))")
              NEW_ARN=$(aws ecs register-task-definition \
                --cli-input-json "$NEW_DEF" \
                --region $AWS_REGION \
                --query 'taskDefinition.taskDefinitionArn' \
                --output text 2>/dev/null || echo "")
              if [ -n "$NEW_ARN" ] && [ -n "$OLD_ARN" ] && [ -n "$SM_DEF" ]; then
                SM_DEF=$(echo "$SM_DEF" | sed "s|${OLD_ARN}|${NEW_ARN}|g")
                echo "    ✅ Registered $NEW_ARN (state machine will be updated)"
              fi
            fi
          done

          if [ -n "$SM_DEF" ]; then
            aws stepfunctions update-state-machine \
              --state-machine-arn "$SM_ARN" \
              --definition "$SM_DEF" \
              --region $AWS_REGION 2>/dev/null \
              && echo "✅ State machine definition updated" \
              || echo "⚠️ State machine update skipped (no changes or error)"
          fi
          echo ""

          RUNNING_COUNT="${{ steps.sfn.outputs.running_count }}"
          echo "Aborting $RUNNING_COUNT running executions..."

          # Abort all running executions
          RUNNING_ARNS=$(aws stepfunctions list-executions \
            --state-machine-arn "$SM_ARN" \
            --status-filter RUNNING \
            --region $AWS_REGION \
            --query 'executions[*].executionArn' \
            --output text 2>/dev/null || echo "")

          for ARN in $RUNNING_ARNS; do
            echo "Aborting: $ARN"
            aws stepfunctions stop-execution \
              --execution-arn "$ARN" \
              --error "ManualAbort" \
              --cause "Aborted by monitor-pipeline.yml — triggering fresh single run" \
              --region $AWS_REGION 2>/dev/null && echo "  ✅ Aborted" || echo "  ⚠️ Could not abort"
          done

          echo ""
          echo "Waiting 10s for aborts to settle..."
          sleep 10

          # Trigger fresh single execution
          echo "Triggering fresh single EOD pipeline execution..."
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "$SM_ARN" \
            --name "manual-fresh-$(date +%s)" \
            --region $AWS_REGION \
            --query 'executionArn' \
            --output text)
          echo "✅ Started: $EXECUTION_ARN"

          # Wait up to 90 minutes for completion
          echo ""
          echo "⏳ Monitoring execution (up to 90 min)..."
          for i in $(seq 1 90); do
            sleep 60
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXECUTION_ARN" \
              --region $AWS_REGION \
              --query 'status' \
              --output text 2>/dev/null || echo "UNKNOWN")
            echo "$(date -u '+%H:%M UTC')  status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Pipeline SUCCEEDED"
                exit 0
                ;;
              FAILED|ABORTED|TIMED_OUT)
                echo "❌ Pipeline $STATUS"
                aws stepfunctions describe-execution \
                  --execution-arn "$EXECUTION_ARN" \
                  --region $AWS_REGION \
                  --query '{cause: cause, error: error}' \
                  --output json 2>/dev/null || true
                exit 1
                ;;
            esac
          done
          echo "⏰ Timeout — pipeline still running after 90 min"
          exit 1
        timeout-minutes: 100
