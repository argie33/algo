name: Create/Rotate Developer Credentials

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create/rotate developer credentials
        run: |
          cd scripts
          python3 create_developer_credentials.py

      - name: Fetch new credentials
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region us-east-1 \
            --query SecretString \
            --output text)

          mkdir -p /tmp/aws-creds
          echo "[algo-developer]" > /tmp/aws-creds/credentials
          echo "$SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'aws_access_key_id = {d[\"access_key_id\"]}'); print(f'aws_secret_access_key = {d[\"secret_access_key\"]}'); print('region = us-east-1')" >> /tmp/aws-creds/credentials

      - name: Upload credentials artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-credentials
          path: /tmp/aws-creds/credentials
          retention-days: 1

      - name: Summary
        run: |
          echo "## Developer Credentials Created/Rotated ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "New credentials have been created and stored in AWS Secrets Manager." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Run \`scripts/refresh-aws-credentials.ps1\` to fetch locally" >> $GITHUB_STEP_SUMMARY
