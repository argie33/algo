name: Daily Fail-Fast Violation Scan

on:
  # Run on every commit to catch violations immediately
  push:
    branches: [main, develop]
  # Also run on schedule daily
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC daily

jobs:
  scan-violations:
    runs-on: ubuntu-latest
    name: Scan for fail-fast violations

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run daily violation scan
        run: |
          python scripts/daily_violation_scan.py
        continue-on-error: false

      - name: Check pre-commit hooks status
        run: |
          python scripts/check_precommit_violations.py
        continue-on-error: false

      - name: Report violations
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 FAIL-FAST VIOLATIONS DETECTED\n\nDaily scan found governance violations in this commit. See workflow logs for details.\n\nCritical violations must be fixed before merge.'
            })

  enforce-precommit-compliance:
    runs-on: ubuntu-latest
    name: Enforce pre-commit hook compliance

    steps:
      - uses: actions/checkout@v3

      - name: Verify no SKIP= in commits
        run: |
          # Check git log for SKIP= patterns in commit messages
          if git log --oneline --all | grep -i "SKIP="; then
            echo "ERROR: Found SKIP= in commit history - governance hooks were bypassed!"
            exit 1
          fi
          echo "OK: No governance hook bypasses detected"

      - name: Check hook installation
        run: |
          if [ ! -f .git/hooks/pre-commit ]; then
            echo "WARNING: pre-commit hook not installed"
            exit 1
          fi
          echo "OK: pre-commit hooks are installed"
