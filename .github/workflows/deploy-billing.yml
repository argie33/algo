name: deploy-billing-circuit-breaker

on:
  push:
    branches: [main]
    paths:
      - 'billing-circuit-breaker.yml'
      - '.github/workflows/deploy-billing.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Billing Circuit Breaker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: billing-deploy
          aws-region: us-east-1

      - name: Delete old stack
        run: |
          aws cloudformation delete-stack \
            --stack-name billing-circuit-breaker \
            --region us-east-1 2>/dev/null || true
          sleep 5

      - name: Deploy
        run: |
          aws cloudformation deploy \
            --template-file billing-circuit-breaker.yml \
            --stack-name billing-circuit-breaker \
            --region us-east-1

      - name: Send test alert
        run: |
          aws sns publish \
            --topic-arn arn:aws:sns:us-east-1:626216981288:billing-circuit-breaker-alerts \
            --region us-east-1 \
            --subject "✅ Billing Circuit Breaker Active" \
            --message "Your AWS billing protection system is ONLINE!

Alert Levels:
• $50 (50%) → Email + SMS warning
• $75 (75%) → Email + SMS aggressive alert
• $90 (90%) → Email + SMS critical alert
• $100+ (100%+) → HARD STOP - API disabled

If you received this via BOTH email AND SMS, protection is WORKING! ✅

System is now monitoring your AWS costs."
