name: deploy-billing-circuit-breaker

on:
  push:
    branches: [main]
    paths:
      - 'billing-circuit-breaker.yml'
      - '.github/workflows/deploy-billing.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Billing Circuit Breaker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: billing-deploy
          aws-region: us-east-1

      - name: Deploy
        run: |
          set -x
          aws cloudformation deploy \
            --template-file billing-circuit-breaker.yml \
            --stack-name billing-circuit-breaker \
            --region us-east-1 \
            --no-fail-on-empty-changeset \
            2>&1 | tee deploy.log

          cat deploy.log
