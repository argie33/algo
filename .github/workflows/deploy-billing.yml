name: deploy-billing-circuit-breaker

on:
  push:
    branches: [main]
    paths:
      - 'billing-circuit-breaker.yml'
      - '.github/workflows/deploy-billing.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Billing Circuit Breaker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: billing-deploy
          aws-region: us-east-1

      - name: Deploy
        run: |
          aws cloudformation deploy \
            --template-file billing-circuit-breaker.yml \
            --stack-name billing-circuit-breaker \
            --region us-east-1 \
            --no-fail-on-empty-changeset

      - name: Send test alert
        run: |
          TOPIC=$(aws cloudformation describe-stacks \
            --stack-name billing-circuit-breaker \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`SNSTopicArn`].OutputValue' \
            --output text)

          aws sns publish \
            --topic-arn "$TOPIC" \
            --region us-east-1 \
            --subject "Billing Circuit Breaker Active" \
            --message "Your AWS billing protection is now ACTIVE! If you got this via EMAIL and SMS, the system is working."
