name: Rotate Developer AWS Credentials Quarterly

# Automatically rotate algo-developer IAM access key every 3 months
# Triggered: First Monday of each quarter at 2:00 AM UTC
# Quarters: Feb 3 (Q1), May 5 (Q2), Aug 4 (Q3), Nov 3 (Q4)
#
# Process:
# 1. Terraform creates new IAM access key (old one is invalidated)
# 2. New credentials stored in algo/developer-credentials secret
# 3. Users refresh with: scripts/refresh-aws-credentials.ps1

on:
  schedule:
    # First Monday of February (Q1) at 02:00 UTC
    - cron: '0 2 3-9 2 1'
    # First Monday of May (Q2) at 02:00 UTC
    - cron: '0 2 3-9 5 1'
    # First Monday of August (Q3) at 02:00 UTC
    - cron: '0 2 3-9 8 1'
    # First Monday of November (Q4) at 02:00 UTC
    - cron: '0 2 3-9 11 1'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0

permissions:
  id-token: write
  contents: write

jobs:
  rotate:
    name: Rotate Developer Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -input=false \
            -reconfigure

      - name: Get current rotation date
        id: current_date
        working-directory: terraform
        run: |
          set +e
          ROTATION_DATE=$(terraform output -raw developer_key_rotation_date 2>&1)
          set -e
          if [ -z "$ROTATION_DATE" ] || [[ "$ROTATION_DATE" == *"Warning"* ]]; then
            ROTATION_DATE="2026-05-26"
          fi
          echo "rotation_date=$ROTATION_DATE" >> $GITHUB_OUTPUT

      - name: Update rotation date variable
        working-directory: terraform
        run: |
          TODAY=$(date +%Y-%m-%d)
          cat >> terraform.tfvars <<EOF
          developer_key_rotation_date = "$TODAY"
          EOF

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var="developer_key_rotation_date=$(date +%Y-%m-%d)" \
            2>&1 | tee tfplan.log

      - name: Verify key rotation in plan
        working-directory: terraform
        run: |
          if grep -q "aws_iam_access_key.developer will be replaced" tfplan.log; then
            echo "✓ Developer credentials will be rotated"
          else
            echo "✗ No key rotation detected. Plan may have failed or no changes needed."
            cat tfplan.log
            exit 1
          fi

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

      - name: Verify new credentials in Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region ${{ env.AWS_REGION }} \
            --query SecretString \
            --output text)

          if echo "$SECRET" | jq -e '.access_key_id and .secret_access_key' >/dev/null; then
            ACCESS_KEY=$(echo "$SECRET" | jq -r '.access_key_id')
            echo "✓ New credentials stored in Secrets Manager"
            echo "✓ Access Key ID: ${ACCESS_KEY:0:4}...${ACCESS_KEY: -4}"
          else
            echo "✗ Failed to retrieve credentials from Secrets Manager"
            exit 1
          fi

      - name: Test new credentials
        run: |
          aws sts get-caller-identity --region ${{ env.AWS_REGION }} > /dev/null && \
            echo "✓ New credentials verified working" || \
            echo "⚠ Credentials stored but verification pending (IAM propagation ~1 min)"

      - name: Create rotation summary
        run: |
          echo "## Developer Credentials Rotated ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scheduled rotation:** First Monday of each quarter at 02:00 UTC" >> $GITHUB_STEP_SUMMARY
          echo "**Last rotation:** $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Next rotation:** Q2 2026 (May 5)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users should refresh local credentials:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "scripts/refresh-aws-credentials.ps1" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Documentation:** See `steering/algo.md` → LOCAL AWS CREDENTIALS" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push (if changes)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add terraform/terraform.tfvars || true
          git commit -m "chore: rotate developer AWS credentials (quarterly maintenance)" || true
          git push origin main || true
