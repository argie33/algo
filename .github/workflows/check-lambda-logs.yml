name: Check Recent Lambda Logs

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Phase 2-7 Logs from c6ab6340 Lambda
        run: |
          LOG_GROUP="/aws/lambda/algo-algo-dev"
          
          # Get latest stream (c6ab6340)
          S0=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)
          
          echo "Stream: $S0"
          echo ""
          echo "=== EVENTS FROM 01:38:56 UTC onwards (Phase 2-7) ==="
          
          # Phase 1 completed at 01:38:56 = 1748651936 = timestamp 1748651936000
          # Get events starting from Phase 1 end
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$S0" \
            --start-time 1748651936000 \
            --region $AWS_REGION \
            --query 'events[*].message' \
            --output text | head -500
