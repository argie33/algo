name: Check Recent Lambda Logs

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Full Logs from Latest Lambda Stream
        run: |
          LOG_GROUP="/aws/lambda/algo-algo-dev"
          
          # Get the latest stream (c6ab6340 Lambda)
          S0=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)
          
          echo "=== FULL LOGS FROM LATEST STREAM ($S0) ==="
          # Get ALL events from this stream (no limit)
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$S0" \
            --region $AWS_REGION \
            --query 'events[*].message' \
            --output text | grep -E "(PHASE|Phase|HALT|halt|circuit|signal|trade|TRADE|waterfall|WATERFALL|qualified|entered|ENTERED|LOCK|lock|Position|position|Final|FINAL|Phase 2|Phase 3|Phase 4|Phase 5|Phase 6|Phase 7|ERROR|error|ok\]|OK\]|SUCCESS|success|market stage|Stage 2|SPY)" | head -200
