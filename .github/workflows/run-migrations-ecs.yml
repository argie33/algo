name: Run DB Migrations via ECS

# Runs pending SQL migrations inside the VPC using an ECS Fargate task.
# Use this when deploy-code.yml migrations fail (runner can't reach VPC DB).

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT: algo
  ENVIRONMENT: dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-migrations:
    name: Run Migrations via ECS (VPC)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Migrations via ECS Fargate (VPC access)
        run: |
          set -e
          CLUSTER="${{ env.PROJECT }}-cluster"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ env.PROJECT }}-market_health_daily-loader" \
            --query "taskDefinition.taskDefinitionArn" --output text 2>/dev/null)
          echo "Task definition: $TASK_DEF"

          SUBNET=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=*${{ env.PROJECT }}*private*" "Name=state,Values=available" \
            --query "Subnets[0].SubnetId" --output text 2>/dev/null)
          SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=*${{ env.PROJECT }}*ecs*" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null)

          echo "Network: subnet=$SUBNET sg=$SG"

          CONTAINER="${{ env.PROJECT }}-market_health_daily"
          export AWS_PAGER=""

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --no-cli-pager \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"${CONTAINER}\",\"command\":[\"python3\",\"migrations/run.py\",\"apply\",\"--all\"]}]}" \
            --region "${{ env.AWS_REGION }}" \
            --query "tasks[0].taskArn" --output text 2>&1)

          echo "Migration task ARN: $TASK_ARN"
          echo "Waiting for task to complete..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "${{ env.AWS_REGION }}"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" --output text 2>/dev/null)
          echo "Migration task exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "[ERROR] Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "[OK] Migrations completed successfully"
