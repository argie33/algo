name: Test Lambda Diagnostics

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update Lambda with diagnostic handler
        run: |
          # Create a minimal test package with just the diagnostic handler
          mkdir -p /tmp/test-lambda
          cp lambda/algo_orchestrator/test_handler.py /tmp/test-lambda/lambda_function.py
          
          cd /tmp/test-lambda
          zip -r lambda_test.zip lambda_function.py
          
          echo "Uploading diagnostic handler..."
          aws lambda update-function-code \
            --function-name algo-algo-dev \
            --zip-file fileb://lambda_test.zip \
            --region $AWS_REGION
          
          sleep 5
      
      - name: Run diagnostic test (synchronous)
        id: test
        run: |
          echo "Running diagnostic test..."
          timeout 60 aws lambda invoke \
            --function-name algo-algo-dev \
            --invocation-type RequestResponse \
            --payload '{"test":"diagnostics"}' \
            --region $AWS_REGION \
            /tmp/test_response.json || EXIT_CODE=$?
          
          if [ -f /tmp/test_response.json ]; then
            echo "Response received:"
            cat /tmp/test_response.json
          else
            echo "No response file (timeout or error)"
          fi
      
      - name: Check CloudWatch logs for diagnostic output
        run: |
          echo "Waiting for logs..."
          sleep 5
          
          # Get the latest log stream
          LATEST=$(aws logs describe-log-streams \
            --log-group-name "/aws/lambda/algo-algo-dev" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)
          
          if [ -n "$LATEST" ] && [ "$LATEST" != "None" ]; then
            echo "=== DIAGNOSTIC LOG OUTPUT ==="
            aws logs get-log-events \
              --log-group-name "/aws/lambda/algo-algo-dev" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text | tail -100
          else
            echo "No logs found yet"
          fi
      
      - name: Restore original Lambda handler
        if: always()
        run: |
          echo "Restoring original handler..."
          zip -r lambda_original.zip lambda/algo_orchestrator/lambda_function.py
          
          aws lambda update-function-code \
            --function-name algo-algo-dev \
            --zip-file fileb://lambda_original.zip \
            --region $AWS_REGION
