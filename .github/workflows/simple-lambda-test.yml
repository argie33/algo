name: Simple Lambda Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Lambda (Synchronous)
        run: |
          echo "Testing Lambda with synchronous invocation..."
          PAYLOAD='{"source":"test","test":"true"}'
          PAYLOAD_B64=$(echo -n "$PAYLOAD" | base64 -w 0)

          aws lambda invoke \
            --function-name algo-algo-dev \
            --invocation-type RequestResponse \
            --payload "$PAYLOAD_B64" \
            --region $AWS_REGION \
            --log-type Tail \
            /tmp/lambda_response.json 2>&1
          
          echo "=== Lambda Response ==="
          cat /tmp/lambda_response.json
          
          echo ""
          echo "=== Lambda Status ==="
          grep -q "FunctionError" /tmp/lambda_response.json && echo "❌ Lambda returned an error" || echo "✅ Lambda executed"
