name: Fix Schema - Add MACD Columns

on:
  workflow_dispatch:

jobs:
  fix-schema:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install psycopg2-binary boto3

      - name: Execute Schema Migration
        env:
          DB_HOST: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          DB_USER: stocks
          DB_PASSWORD: stocks
          DB_NAME: stocks
        run: python3 alter_schema.py

      - name: Verify Schema Update
        env:
          DB_HOST: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          DB_USER: stocks
          DB_PASSWORD: stocks
          DB_NAME: stocks
        run: |
          python3 << 'EOF'
          import psycopg2
          import os

          conn = psycopg2.connect(
              host=os.getenv("DB_HOST"),
              user=os.getenv("DB_USER"),
              password=os.getenv("DB_PASSWORD"),
              database=os.getenv("DB_NAME"),
              port=5432
          )

          cursor = conn.cursor()
          cursor.execute("""
              SELECT column_name FROM information_schema.columns
              WHERE table_name='buy_sell_daily' AND column_name IN ('macd', 'macd_signal')
          """)

          rows = cursor.fetchall()
          print("MACD Columns Status:")
          if len(rows) == 2:
              print("  macd: EXISTS")
              print("  macd_signal: EXISTS")
              print("SUCCESS: Schema updated!")
          else:
              print("  Columns: {} found (expected 2)".format(len(rows)))
              for row in rows:
                  print("    - {}".format(row[0]))

          conn.close()
          EOF
