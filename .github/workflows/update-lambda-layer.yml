name: Update Lambda with Layer

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  update-lambda:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Layer ARN
        id: layer
        run: |
          LAYER_ARN=$(aws lambda list-layer-versions \
            --layer-name algo-orchestrator-layer \
            --region $AWS_REGION \
            --query 'LayerVersions[0].LayerVersionArn' \
            --output text)

          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "Layer ARN: $LAYER_ARN"

      - name: Update Orchestrator Lambda
        run: |
          LAYER_ARN="${{ steps.layer.outputs.layer_arn }}"

          echo "Updating algo-algo-dev Lambda with layer..."
          aws lambda update-function-configuration \
            --function-name algo-algo-dev \
            --layers "$LAYER_ARN" \
            --region $AWS_REGION

          echo "✅ Orchestrator Lambda updated"

      - name: Update API Lambda
        run: |
          LAYER_ARN="${{ steps.layer.outputs.layer_arn }}"

          echo "Updating algo-api-dev Lambda with layer..."
          aws lambda update-function-configuration \
            --function-name algo-api-dev \
            --layers "$LAYER_ARN" \
            --region $AWS_REGION

          echo "✅ API Lambda updated"

      - name: Verify Lambda Functions
        run: |
          echo "=== Orchestrator Lambda ==="
          aws lambda get-function-configuration \
            --function-name algo-algo-dev \
            --region $AWS_REGION \
            --query 'Layers[*].{Arn: Arn, CodeSize: CodeSize}' \
            --output table

          echo ""
          echo "=== API Lambda ==="
          aws lambda get-function-configuration \
            --function-name algo-api-dev \
            --region $AWS_REGION \
            --query 'Layers[*].{Arn: Arn, CodeSize: CodeSize}' \
            --output table

      - name: Summary
        run: |
          echo "✅ Lambda functions updated with layer: algo-orchestrator-layer"
          echo ""
          echo "Next: Run test-orchestrator.yml to verify orchestrator works with dependencies"
