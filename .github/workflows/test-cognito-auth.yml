name: Test Cognito Auth Layer
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Resolve Cognito identifiers
        id: cognito_ids
        run: |
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region us-east-1 --query "UserPools[?Name=='algo-pool-dev'].Id" --output text)
          if [ -z "$POOL_ID" ]; then
            echo "ERROR: Could not find Cognito user pool 'algo-pool-dev'"
            exit 1
          fi
          echo "pool_id=$POOL_ID" >> $GITHUB_OUTPUT

          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$POOL_ID" --max-results 60 --region us-east-1 --query "UserPoolClients[?ClientName=='algo-app-dev'].ClientId" --output text)
          if [ -z "$CLIENT_ID" ]; then
            # Fallback: get the first client if the named client isn't found
            CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$POOL_ID" --max-results 1 --region us-east-1 --query "UserPoolClients[0].ClientId" --output text)
          fi
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT

      - name: "TEST 1: Direct Cognito Admin Auth (ADMIN_NO_SRP_AUTH)"
        run: |
          echo "=== TEST 1: Can Cognito authenticate with ADMIN_NO_SRP_AUTH? ==="
          echo ""

          POOL_ID="${{ steps.cognito_ids.outputs.pool_id }}"
          CLIENT_ID="${{ steps.cognito_ids.outputs.client_id }}"

          result=$(aws cognito-idp admin-initiate-auth \
            --user-pool-id "$POOL_ID" \
            --client-id "$CLIENT_ID" \
            --auth-flow ADMIN_NO_SRP_AUTH \
            --auth-parameters USERNAME="admin@stocks.local",PASSWORD="Test1234!@##" \
            --region us-east-1 2>&1) || true

          echo "$result" | jq . 2>/dev/null || echo "$result"

          if echo "$result" | grep -q "AccessToken"; then
            echo "✅ ADMIN_NO_SRP_AUTH works - Cognito auth layer OK"
          else
            echo "❌ ADMIN_NO_SRP_AUTH failed"
          fi

      - name: "TEST 2: User Password Auth (USER_PASSWORD_AUTH)"
        run: |
          echo ""
          echo "=== TEST 2: Can Cognito authenticate with USER_PASSWORD_AUTH? ==="
          echo "(This is what the frontend uses via Amplify)"
          echo ""

          CLIENT_ID="${{ steps.cognito_ids.outputs.client_id }}"

          result=$(aws cognito-idp initiate-auth \
            --client-id "$CLIENT_ID" \
            --auth-flow USER_PASSWORD_AUTH \
            --auth-parameters USERNAME="admin@stocks.local",PASSWORD="Test1234!@##" \
            --region us-east-1 2>&1) || true

          echo "$result" | jq . 2>/dev/null || echo "$result"

          if echo "$result" | grep -q "AccessToken"; then
            echo "✅ USER_PASSWORD_AUTH works - Frontend auth should work"
          else
            echo "❌ USER_PASSWORD_AUTH failed - Frontend can't log in"
          fi

      - name: "TEST 3: App Client Auth Flows"
        run: |
          echo ""
          echo "=== TEST 3: What auth flows does the app client support? ==="
          echo ""

          POOL_ID="${{ steps.cognito_ids.outputs.pool_id }}"
          CLIENT_ID="${{ steps.cognito_ids.outputs.client_id }}"

          aws cognito-idp describe-user-pool-client \
            --user-pool-id "$POOL_ID" \
            --client-id "$CLIENT_ID" \
            --region us-east-1 | jq '{
              ClientName: .UserPoolClient.ClientName,
              ExplicitAuthFlows: .UserPoolClient.ExplicitAuthFlows,
              AllowExplicitAuthFlows: .UserPoolClient.AllowExplicitAuthFlows,
              PreventUserExistenceErrors: .UserPoolClient.PreventUserExistenceErrors
            }'

      - name: "TEST 4: User Status"
        run: |
          echo ""
          echo "=== TEST 4: Is the user account enabled and confirmed? ==="
          echo ""

          POOL_ID="${{ steps.cognito_ids.outputs.pool_id }}"

          aws cognito-idp admin-get-user \
            --user-pool-id "$POOL_ID" \
            --username "admin@stocks.local" \
            --region us-east-1 | jq '{
              Username: .Username,
              UserStatus: .UserStatus,
              Enabled: .Enabled,
              MFAOptions: .MFAOptions,
              Attributes: [.UserAttributes[] | select(.Name | IN("email", "email_verified")) | {Name, Value}]
            }'
