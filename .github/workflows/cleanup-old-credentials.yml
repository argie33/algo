name: Clean Up Old Developer Credentials

# Removes old IAM access key after grace period (7 days after rotation).
# Run this workflow manually or it will be triggered automatically 7 days post-rotation.

on:
  workflow_dispatch:
  schedule:
    # Check daily if cleanup is needed (will be a no-op if grace period not expired)
    - cron: '0 3 * * *'  # Daily at 3 AM ET

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: write

jobs:
  cleanup-if-ready:
    name: Delete Old Key If Grace Period Expired
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f677139edd7e1a88de8eca0c779ba8c1bcb14f1f  # v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Check if cleanup is needed
        id: check_cleanup
        run: |
          import json
          import sys
          from datetime import datetime, timezone

          # Get current credential state from Secrets Manager
          import subprocess
          result = subprocess.run([
              'aws', 'secretsmanager', 'get-secret-value',
              '--secret-id', 'algo/developer-credentials',
              '--region', 'us-east-1',
              '--query', 'SecretString',
              '--output', 'text'
          ], capture_output=True, text=True)

          if result.returncode != 0:
              print("ERROR: Could not retrieve credentials from Secrets Manager")
              sys.exit(1)

          creds = json.loads(result.stdout)

          # Check if we're in dual-credentials mode
          if creds.get('status') != 'dual_credentials_active':
              print("Not in dual-credentials mode, skipping cleanup")
              sys.exit(0)

          cleanup_date_str = creds.get('old_key_cleanup_date')
          if not cleanup_date_str:
              print("No cleanup date found in credentials")
              sys.exit(0)

          cleanup_date = datetime.strptime(cleanup_date_str, '%Y-%m-%d').replace(tzinfo=timezone.utc)
          now = datetime.now(timezone.utc)

          if now >= cleanup_date:
              print(f"Grace period expired. Ready to cleanup old key: {creds.get('old_access_key_id')}")
              with open('cleanup_needed.txt', 'w') as f:
                  f.write(creds.get('old_access_key_id', ''))
          else:
              days_remaining = (cleanup_date - now).days
              print(f"Grace period still active ({days_remaining} days remaining)")
        shell: python

      - name: Delete old access key
        if: success() && hashFiles('cleanup_needed.txt') != ''
        id: delete_key
        run: |
          OLD_KEY=$(cat cleanup_needed.txt)

          if [ -z "$OLD_KEY" ] || [ "$OLD_KEY" = "null" ]; then
              echo "No old key to delete"
              exit 0
          fi

          echo "Deleting old access key: $OLD_KEY"
          aws iam delete-access-key \
              --user-name algo-developer \
              --access-key-id "$OLD_KEY"

          echo "deleted_key=$OLD_KEY" >> $GITHUB_OUTPUT

      - name: Update Secrets Manager (cleanup complete)
        if: success() && hashFiles('cleanup_needed.txt') != ''
        run: |
          OLD_KEY=$(cat cleanup_needed.txt)
          CURRENT_DATE=$(date +%Y-%m-%d)

          # Get current secrets to preserve new key
          SECRET=$(aws secretsmanager get-secret-value \
              --secret-id algo/developer-credentials \
              --region us-east-1 \
              --query SecretString \
              --output text)

          # Update secret to show cleanup is complete
          NEW_SECRET_JSON=$(cat <<EOF
          {
            "access_key_id": "$(echo "$SECRET" | python3 -c "import json, sys; print(json.load(sys.stdin).get('access_key_id'))")",
            "secret_access_key": "$(echo "$SECRET" | python3 -c "import json, sys; print(json.load(sys.stdin).get('secret_access_key'))")",
            "user_name": "algo-developer",
            "rotation_date": "$(echo "$SECRET" | python3 -c "import json, sys; print(json.load(sys.stdin).get('rotation_date'))")",
            "cleanup_date": "$CURRENT_DATE",
            "old_key_deleted": "$OLD_KEY",
            "status": "active"
          }
          EOF
          )

          aws secretsmanager update-secret \
              --secret-id algo/developer-credentials \
              --secret-string "$NEW_SECRET_JSON" \
              --region ${{ env.AWS_REGION }}

          echo "Updated Secrets Manager: Old key cleanup recorded"

      - name: Post cleanup summary
        if: success() && hashFiles('cleanup_needed.txt') != ''
        run: |
          OLD_KEY=$(cat cleanup_needed.txt)

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Old Developer Credentials Cleaned Up

          **Status:** Cleanup completed successfully

          **What happened:**
          - ✓ Old access key deleted: `$OLD_KEY`
          - ✓ Secrets Manager updated
          - ✓ All developers should now be using new credentials

          **For developers:**
          - If you haven't already, run `scripts/refresh-aws-credentials.ps1` to ensure you have the new credentials
          - Old key will no longer work after this cleanup

          **Verification:**
          - Check that your credentials still work: `aws sts get-caller-identity --profile algo-developer`
          - If you get an error, run `scripts/refresh-aws-credentials.ps1` again
          EOF

      - name: Send notification if grace period not expired
        if: failure() == false && hashFiles('cleanup_needed.txt') == ''
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Old Credentials Cleanup Check

          **Status:** Grace period still active

          **Next steps:**
          - Developers have time to update their credentials
          - Old credentials will be cleaned up automatically when grace period expires
          - Check back later
          EOF
