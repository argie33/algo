name: Fix RDS Password (Simple)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  fix:
    name: Set RDS Password
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Set RDS Password + Sync Secrets Manager
        env:
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          echo "Setting RDS password to match GitHub secret..."

          aws rds modify-db-instance \
            --db-instance-identifier algo-db \
            --master-user-password "$RDS_PASSWORD" \
            --apply-immediately \
            --region $AWS_REGION

          echo "Waiting for RDS to apply change (60s)..."
          sleep 60

          echo "Updating Secrets Manager..."
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo-db-credentials-dev \
            --query 'SecretString' --output text --region $AWS_REGION)

          UPDATED=$(echo "$SECRET" | jq --arg pw "$RDS_PASSWORD" '.password = $pw')

          aws secretsmanager put-secret-value \
            --secret-id algo-db-credentials-dev \
            --secret-string "$UPDATED" \
            --region $AWS_REGION

          echo "✅ RDS password and Secrets Manager updated"
