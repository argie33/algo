name: ci-integration-tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'  # Daily 6 AM

permissions:
  contents: read

env:
  NODE_VERSION: '20.19'
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '16'

jobs:
  ################################################################################
  # 1) API ENDPOINT TESTS
  ################################################################################
  test-api-endpoints:
    name: Test API Endpoints (30+)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stocks
          POSTGRES_USER: stocks
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize database schema
        env:
          PGPASSWORD: ''
        run: |
          echo "📝 Initializing database schema..."
          psql -h localhost -U stocks -d stocks -f init_db.sql -v ON_ERROR_STOP=1

      - name: Verify schema
        env:
          PGPASSWORD: ''
        run: |
          TABLE_COUNT=$(psql -h localhost -U stocks -d stocks -t -c "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public';")
          echo "✅ Database has $TABLE_COUNT tables"
          if [ "$TABLE_COUNT" -lt 50 ]; then
            echo "❌ Expected 60+, found $TABLE_COUNT"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lambda dependencies
        run: |
          cd webapp/lambda
          npm ci

      - name: Start API server
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: stocks
          POSTGRES_PASSWORD: ''
          POSTGRES_DB: stocks
          ALPACA_PAPER_TRADING: 'true'
        run: |
          cd webapp/lambda
          npm start &
          echo $! > server.pid
          sleep 3

      - name: Test API endpoints
        run: |
          echo "🧪 Testing API endpoints..."
          echo ""

          API_BASE="http://localhost:3001"
          PASSED=0
          TOTAL=0

          test_endpoint() {
            local name="$1"
            local endpoint="$2"
            local expected_status="${3:-200}"

            TOTAL=$((TOTAL + 1))

            response=$(curl -s -w "\n%{http_code}" "$API_BASE$endpoint" 2>/dev/null)
            status=$(echo "$response" | tail -n1)

            if [ "$status" = "$expected_status" ]; then
              echo "✅ $name ($status)"
              PASSED=$((PASSED + 1))
            else
              echo "❌ $name (expected $expected_status, got $status)"
            fi
          }

          # Test core endpoints
          echo "📍 CORE ENDPOINTS:"
          test_endpoint "Health" "/health"
          test_endpoint "API Info" "/api"

          # Test business endpoints
          echo ""
          echo "📊 BUSINESS ENDPOINTS:"
          test_endpoint "Stocks" "/api/stocks?limit=5" "200"
          test_endpoint "Market Status" "/api/market/status" "200"
          test_endpoint "Signals" "/api/signals?limit=10" "200"
          test_endpoint "Scores" "/api/scores?limit=5" "200"

          # Test portfolio/trading (may require auth)
          echo ""
          echo "💼 PORTFOLIO/TRADING ENDPOINTS:"
          test_endpoint "Portfolio" "/api/portfolio" "200"
          test_endpoint "Trades" "/api/trades" "200"
          test_endpoint "Algo Status" "/api/algo/status" "200"

          # Summary
          echo ""
          echo "=========================================="
          echo "📊 API TEST RESULTS: $PASSED/$TOTAL passed"
          echo "=========================================="

          if [ $PASSED -lt $((TOTAL * 70 / 100)) ]; then
            echo "❌ Less than 70% endpoints working"
            exit 1
          fi

      - name: Stop API server
        if: always()
        run: |
          if [ -f webapp/lambda/server.pid ]; then
            kill $(cat webapp/lambda/server.pid) 2>/dev/null || true
          fi

  ################################################################################
  # 2) ALGO ORCHESTRATOR TESTS
  ################################################################################
  test-algo-orchestrator:
    name: Test Algo Orchestrator (7-Phase)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stocks
          POSTGRES_USER: stocks
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize database schema
        env:
          PGPASSWORD: ''
        run: |
          psql -h localhost -U stocks -d stocks -f init_db.sql -v ON_ERROR_STOP=1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run algo (dry run mode)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: stocks
          POSTGRES_PASSWORD: ''
          POSTGRES_DB: stocks
          ALPACA_PAPER_TRADING: 'true'
          DRY_RUN: 'true'
        run: |
          echo "🤖 Testing Algo Orchestrator (7-Phase)..."
          echo ""

          python3 algo_run_daily.py --dry-run 2>&1 | tee algo_test.log

          echo ""
          echo "✅ Algo orchestrator completed without errors"

      - name: Check algo phases
        run: |
          echo "📋 Checking phases completed..."

          log_file="algo_test.log"

          for phase in "Phase 1" "Phase 2" "Phase 3" "Phase 4" "Phase 5" "Phase 6" "Phase 7"; do
            if grep -q "$phase" "$log_file"; then
              echo "✅ $phase"
            else
              echo "⚠️  $phase (may have skipped)"
            fi
          done

  ################################################################################
  # 3) DATA LOADER TESTS
  ################################################################################
  test-data-loaders:
    name: Test Data Loaders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Test loader syntax
        run: |
          echo "🔍 Checking Python syntax for all loaders..."
          echo ""

          FAILED=0
          for loader in load*.py; do
            if python3 -m py_compile "$loader" 2>/dev/null; then
              echo "✅ $loader"
            else
              echo "❌ $loader (syntax error)"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo ""
            echo "❌ $FAILED loaders have syntax errors"
            exit 1
          fi

          echo ""
          echo "✅ All loaders have valid syntax"

  ################################################################################
  # 4) SECURITY CHECKS
  ################################################################################
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail deployment on security warnings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit Node dependencies
        run: |
          echo "🔒 Auditing Node.js dependencies..."
          cd webapp/lambda
          npm audit --production --audit-level=moderate || true
          echo "✅ Audit complete"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python dependencies
        run: |
          echo "🔒 Checking Python dependencies..."
          pip install safety
          safety check || true
          echo "✅ Check complete"

  ################################################################################
  # 5) SUMMARY
  ################################################################################
  summary:
    name: Integration Tests Summary
    needs: [test-api-endpoints, test-algo-orchestrator, test-data-loaders, security-audit]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Report results
        run: |
          echo "=========================================="
          echo "🧪 INTEGRATION TEST RESULTS"
          echo "=========================================="
          echo ""

          API_STATUS="${{ needs.test-api-endpoints.result }}"
          ALGO_STATUS="${{ needs.test-algo-orchestrator.result }}"
          LOADER_STATUS="${{ needs.test-data-loaders.result }}"
          SECURITY_STATUS="${{ needs.security-audit.result }}"

          echo "✅ API Endpoints:        $API_STATUS"
          echo "✅ Algo Orchestrator:    $ALGO_STATUS"
          echo "✅ Data Loaders:         $LOADER_STATUS"
          echo "⚠️  Security:            $SECURITY_STATUS (non-blocking)"
          echo ""

          if [ "$API_STATUS" = "failure" ] || [ "$ALGO_STATUS" = "failure" ] || [ "$LOADER_STATUS" = "failure" ]; then
            echo "❌ TESTS FAILED"
            echo "=========================================="
            exit 1
          else
            echo "✅ ALL TESTS PASSED"
            echo "=========================================="
            exit 0
          fi
