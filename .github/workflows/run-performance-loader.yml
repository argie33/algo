name: Run Performance Metrics Loader

# Manually invoke the orchestrator Lambda to run Phase 7 (performance metrics loader)
# This populates the R-metrics data needed by perf_anl API endpoint

on:
  workflow_dispatch:

jobs:
  run-loader:
    name: Trigger Performance Metrics Loader
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: Trigger ECS Performance Metrics Loader
        run: |
          echo "Triggering ECS task to run performance metrics loader..."

          python3 << 'PYTHON_EOF'
          import boto3
          import json

          ecs = boto3.client('ecs', region_name='us-east-1')
          ec2 = boto3.client('ec2', region_name='us-east-1')

          # Get VPC info
          vpcs = ec2.describe_vpcs()['Vpcs']
          vpc_id = vpcs[0]['VpcId']

          subnets = ec2.describe_subnets(Filters=[
              {'Name': 'vpc-id', 'Values': [vpc_id]}
          ])['Subnets']
          subnet_id = subnets[0]['SubnetId']

          sgs = ec2.describe_security_groups(Filters=[
              {'Name': 'vpc-id', 'Values': [vpc_id]}
          ])['SecurityGroups']
          sg_id = sgs[0]['GroupId'] if sgs else None

          # List task definitions and get the latest one (project_name = "algo" in terraform.tfvars)
          task_defs = ecs.list_task_definitions(
              familyPrefix='algo-compute_performance_metrics',
              sort='DESC'
          )

          if not task_defs['taskDefinitionArns']:
              # Try legacy project name if needed
              task_defs = ecs.list_task_definitions(
                  familyPrefix='stocks-compute_performance_metrics',
                  sort='DESC'
              )

          if not task_defs['taskDefinitionArns']:
              # Try without project prefix as last resort
              task_defs = ecs.list_task_definitions(
                  familyPrefix='compute_performance_metrics',
                  sort='DESC'
              )

          if not task_defs['taskDefinitionArns']:
              # List all to debug
              all_tasks = ecs.list_task_definitions(sort='DESC', maxResults=100)
              print("Available task definitions:")
              for t in all_tasks['taskDefinitionArns'][:10]:
                  print(f"  - {t}")
              print("ERROR: No compute_performance_metrics task definition found")
              exit(1)

          task_def_arn = task_defs['taskDefinitionArns'][0]
          print(f"Using task definition: {task_def_arn}")

          # Run the ECS task
          response = ecs.run_task(
              cluster='algo-cluster',
              taskDefinition=task_def_arn,
              launchType='FARGATE',
              networkConfiguration={
                  'awsvpcConfiguration': {
                      'subnets': [subnet_id],
                      'securityGroups': [sg_id] if sg_id else [],
                      'assignPublicIp': 'DISABLED'
                  }
              }
          )

          if response.get('failures'):
              print(f"ERROR launching task:")
              for failure in response['failures']:
                  print(f"  {failure['reason']}")
              exit(1)

          task_arn = response['tasks'][0]['taskArn']
          task_id = task_arn.split('/')[-1]

          print(f"✓ ECS task launched successfully!")
          print(f"Task ID: {task_id}")
          print(f"Monitor at: https://console.aws.amazon.com/ecs/home#/clusters/algo-cluster/tasks/{task_id}")
          PYTHON_EOF

          echo "Orchestrator Lambda invoked successfully!"
          echo ""
          echo "The orchestrator will run Phase 7 (performance metrics loader):"
          echo "  - Computes performance metrics from trades"
          echo "  - Inserts R-metrics (avg_win_r, avg_loss_r, expectancy)"
          echo "  - Populates data needed by perf_anl endpoint"
          echo ""
          echo "Monitor logs:"
          echo "  ECS Loader: /ecs/algo-compute_performance_metrics-loader"

      - name: Check orchestrator logs
        if: always()
        run: |
          echo "To monitor the loader, check:"
          echo "  1. AWS Console: https://console.aws.amazon.com/cloudwatch/home#logStream:group=/aws/lambda/algo-orchestrator"
          echo "  2. Or: aws logs tail /aws/lambda/algo-orchestrator --follow"
