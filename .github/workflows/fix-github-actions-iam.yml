name: Fix GitHub Actions IAM Permissions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  add-permissions:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (direct)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Add AccessKeyRotation permissions to GitHub Actions role
        run: |
          set -e

          ROLE_NAME="algo-svc-github-actions-dev"
          POLICY_NAME="algo-github-actions-identity"

          echo "Adding AccessKeyRotation permissions to $ROLE_NAME..."

          # Get existing policy
          EXISTING_POLICY=$(aws iam get-role-policy \
            --role-name $ROLE_NAME \
            --policy-name $POLICY_NAME \
            --output json)

          # Add new statement for access key rotation
          UPDATED_POLICY=$(echo "$EXISTING_POLICY" | jq '.RolePolicyDocument.Statement += [
            {
              "sid": "AccessKeyRotation",
              "effect": "Allow",
              "actions": [
                "iam:GetUser",
                "iam:CreateAccessKey",
                "iam:ListAccessKeys",
                "iam:UpdateAccessKey",
                "iam:DeleteAccessKey"
              ],
              "resources": [
                "arn:aws:iam::'${{ secrets.AWS_ACCOUNT_ID }}':user/algo-developer"
              ]
            }
          ]')

          # Check if AccessKeyRotation already exists
          if echo "$EXISTING_POLICY" | jq '.RolePolicyDocument.Statement[] | select(.sid=="AccessKeyRotation")' | grep -q "AccessKeyRotation"; then
            echo "✅ AccessKeyRotation statement already exists"
            exit 0
          fi

          # Update the role policy
          aws iam put-role-policy \
            --role-name $ROLE_NAME \
            --policy-name $POLICY_NAME \
            --policy-document "$(echo "$UPDATED_POLICY" | jq -c '.RolePolicyDocument')"

          echo "✅ Added AccessKeyRotation permissions"

      - name: Verify permissions were added
        run: |
          set -e

          ROLE_NAME="algo-svc-github-actions-dev"
          POLICY_NAME="algo-github-actions-identity"

          echo "Verifying AccessKeyRotation statement..."

          POLICY=$(aws iam get-role-policy \
            --role-name $ROLE_NAME \
            --policy-name $POLICY_NAME \
            --output json)

          # Check for each permission
          for ACTION in "iam:GetUser" "iam:CreateAccessKey" "iam:ListAccessKeys" "iam:UpdateAccessKey" "iam:DeleteAccessKey"; do
            if echo "$POLICY" | jq '.RolePolicyDocument.Statement[] | select(.sid=="AccessKeyRotation") | .actions[]' | grep -q "$ACTION"; then
              echo "  ✅ $ACTION"
            else
              echo "  ❌ $ACTION MISSING"
              exit 1
            fi
          done

          echo ""
          echo "✅ All permissions verified!"

      - name: Report success
        if: success()
        run: |
          cat << 'EOF'

          ╔════════════════════════════════════════════════════════════════╗
          ║  GitHub Actions IAM Permissions Fixed                          ║
          ╚════════════════════════════════════════════════════════════════╝

          ✅ Added to algo-svc-github-actions-dev role:
             • iam:GetUser
             • iam:CreateAccessKey
             • iam:ListAccessKeys
             • iam:UpdateAccessKey
             • iam:DeleteAccessKey

          🎯 Resource: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:user/algo-developer

          ✅ NEXT: Run credentials rotation workflow
             gh workflow run rotate-aws-credentials.yml --repo argie33/algo

          EOF
