name: Debug Loader CloudWatch Logs

on:
  workflow_dispatch:
    inputs:
      loader_name:
        description: 'Loader name (e.g. stock_prices_daily)'
        required: true
        default: 'stock_prices_daily'
      status_only:
        description: 'Skip CloudWatch logs, only check task status'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: algo-cluster

jobs:
  debug-logs:
    name: "Read CloudWatch logs for ${{ inputs.loader_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Diagnose VPC network resources
        if: inputs.status_only != 'true'
        run: |
          echo "=== ALL VPCs tagged Name=algo-vpc (expect exactly 1) ==="
          aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=algo-vpc" \
            --query 'Vpcs[*].{VpcId:VpcId,CidrBlock:CidrBlock,State:State}' \
            --output table 2>/dev/null

          # Use ManagedBy=Terraform to avoid selecting orphaned duplicate VPCs
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=algo-vpc" "Name=tag:ManagedBy,Values=Terraform" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null)
          echo "Terraform VPC (used by workflow): $VPC_ID"

          echo ""
          echo "=== VPC of Terraform-state subnets (subnet-0988e8d04bba87486, subnet-0ccb7db133dd4071e) ==="
          for SN in subnet-0988e8d04bba87486 subnet-0ccb7db133dd4071e; do
            aws ec2 describe-subnets --subnet-ids "$SN" \
              --query 'Subnets[0].{SubnetId:SubnetId,VpcId:VpcId,CidrBlock:CidrBlock,AZ:AvailabilityZone}' \
              --output json 2>/dev/null || echo "$SN: not found"
          done

          echo ""
          echo "=== All subnets tagged Tier=Private ==="
          aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Tier,Values=Private" \
            --query 'Subnets[*].{SubnetId:SubnetId,CidrBlock:CidrBlock,AZ:AvailabilityZone,MapPublicIp:MapPublicIpOnLaunch}' \
            --output table 2>/dev/null

          echo ""
          echo "=== All SGs tagged Name=algo-ecs-tasks-sg ==="
          aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=algo-ecs-tasks-sg" \
            --query 'SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,Description:Description}' \
            --output table 2>/dev/null

          echo ""
          echo "=== SG by group-name=algo-ecs-tasks-sg (what workflow now uses) ==="
          aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=algo-ecs-tasks-sg" \
            --query 'SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,Egress:IpPermissionsEgress[*].IpProtocol}' \
            --output json 2>/dev/null

          echo ""
          echo "=== RDS instance current state + attached SG IDs ==="
          RDS_INFO=$(aws rds describe-db-instances \
            --db-instance-identifier algo-db \
            --query 'DBInstances[0].{Status:DBInstanceStatus,AZ:AvailabilityZone,MultiAZ:MultiAZ,Endpoint:Endpoint.Address,Port:Endpoint.Port,SubnetGroup:DBSubnetGroup.DBSubnetGroupName,SubnetIds:DBSubnetGroup.Subnets[*].SubnetIdentifier,SGIds:VpcSecurityGroups[*].VpcSecurityGroupId}' \
            --output json 2>/dev/null)
          echo "$RDS_INFO"

          # Extract the actual SG(s) attached to the RDS instance
          RDS_SGS=$(echo "$RDS_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(sg) for sg in d.get('SGIds',[])]" 2>/dev/null)
          echo ""
          echo "=== Inbound rules of each SG currently attached to RDS ==="
          for SG_ID in $RDS_SGS; do
            echo "--- SG: $SG_ID ---"
            aws ec2 describe-security-groups --group-ids "$SG_ID" \
              --query 'SecurityGroups[0].{Name:GroupName,Inbound:IpPermissions[*].{Proto:IpProtocol,From:FromPort,To:ToPort,Sources:UserIdGroupPairs[*].GroupId,CidrSources:IpRanges[*].CidrIp}}' \
              --output json 2>/dev/null
          done

          echo ""
          echo "=== NACL for ECS task subnet (subnet-02192047f0db772fe) ==="
          NACL_ID=$(aws ec2 describe-network-acls \
            --filters "Name=association.subnet-id,Values=subnet-02192047f0db772fe" \
            --query 'NetworkAcls[0].NetworkAclId' --output text 2>/dev/null)
          echo "NACL: $NACL_ID"
          if [ -n "$NACL_ID" ] && [ "$NACL_ID" != "None" ]; then
            aws ec2 describe-network-acls --network-acl-ids "$NACL_ID" \
              --query 'NetworkAcls[0].Entries[*].{RuleNum:RuleNumber,Proto:Protocol,Action:RuleAction,Egress:Egress,CidrBlock:CidrBlock,PortFrom:PortRange.From,PortTo:PortRange.To}' \
              --output table 2>/dev/null
          fi

          echo ""
          echo "=== NACL for Terraform private subnets (subnet-0988e8d04bba87486, subnet-0ccb7db133dd4071e) ==="
          for SUBNET in subnet-0988e8d04bba87486 subnet-0ccb7db133dd4071e; do
            echo "-- Subnet: $SUBNET --"
            TF_NACL=$(aws ec2 describe-network-acls \
              --filters "Name=association.subnet-id,Values=$SUBNET" \
              --query 'NetworkAcls[0].NetworkAclId' --output text 2>/dev/null)
            echo "NACL: $TF_NACL"
          done

          echo ""
          echo "=== ENIs in subnet-02192047f0db772fe (ECS task subnet) ==="
          aws ec2 describe-network-interfaces \
            --filters "Name=subnet-id,Values=subnet-02192047f0db772fe" \
            --query 'NetworkInterfaces[*].{ID:NetworkInterfaceId,PrivateIP:PrivateIpAddress,Status:Status,Desc:Description,Type:InterfaceType}' \
            --output table 2>/dev/null | head -30

          echo ""
          echo "=== Route table for subnet-02192047f0db772fe ==="
          RT=$(aws ec2 describe-route-tables \
            --filters "Name=association.subnet-id,Values=subnet-02192047f0db772fe" \
            --query 'RouteTables[0].RouteTableId' --output text 2>/dev/null)
          echo "Route table: $RT"
          if [ -n "$RT" ] && [ "$RT" != "None" ]; then
            aws ec2 describe-route-tables --route-table-ids $RT \
              --query 'RouteTables[0].Routes[*].{Dest:DestinationCidrBlock,State:State,Target:GatewayId,NatGW:NatGatewayId,LocalGW:LocalGatewayId}' \
              --output table 2>/dev/null
          fi

      - name: Read recent CloudWatch logs
        id: read_logs
        if: inputs.status_only != 'true'
        run: |
          LOADER="${{ inputs.loader_name }}"
          LOG_GROUP="/ecs/algo-${LOADER}-loader"
          echo "log_group=$LOG_GROUP" >> $GITHUB_OUTPUT

          echo "=== Listing recent log streams ==="
          aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --query 'logStreams[*].[logStreamName,lastEventTimestamp]' \
            --output table 2>&1 || echo "Log group not found or no streams"

          # Get the most recent stream
          LATEST_STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)

          if [ -z "$LATEST_STREAM" ] || [ "$LATEST_STREAM" = "None" ]; then
            echo "No log streams found"
            exit 0
          fi

          echo ""
          echo "=== START of most recent stream: $LATEST_STREAM ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST_STREAM" \
            --start-from-head \
            --limit 100 \
            --query 'events[*].message' \
            --output text 2>&1

          echo ""
          echo "=== END of most recent stream ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST_STREAM" \
            --limit 100 \
            --query 'events[*].message' \
            --output text 2>&1

          # Also show second-most-recent stream for comparison
          PREV_STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --query 'logStreams[1].logStreamName' \
            --output text 2>/dev/null)

          if [ -n "$PREV_STREAM" ] && [ "$PREV_STREAM" != "None" ]; then
            echo ""
            echo "=== START of previous stream: $PREV_STREAM ==="
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$PREV_STREAM" \
              --start-from-head \
              --limit 60 \
              --query 'events[*].message' \
              --output text 2>&1
          fi

      - name: Check running tasks
        if: always()
        run: |
          echo "=== ALL recently stopped tasks (newest 3) ==="
          aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status STOPPED \
            --query 'taskArns[:3]' --output text 2>/dev/null | tr '\t' '\n' | while read ARN; do
            if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
              aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $ARN \
                --query 'tasks[0].{StopCode:stopCode,ExitCode:containers[0].exitCode,Created:createdAt,Stopped:stoppedAt,Image:containers[0].image,Reason:stoppedReason,Subnets:attachments[0].details[?name==`subnetId`].value,SecurityGroups:attachments[0].details[?name==`securityGroupId`].value}' \
                --output json 2>/dev/null
            fi
          done
          echo ""
          echo "=== Currently running tasks for ${{ inputs.loader_name }} ==="
          RUNNING=$(aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status RUNNING \
            --query 'taskArns' --output text 2>/dev/null)
          if [ -n "$RUNNING" ] && [ "$RUNNING" != "None" ]; then
            echo "Running: $RUNNING"
            aws ecs describe-tasks \
              --cluster $ECS_CLUSTER \
              --tasks $RUNNING \
              --query 'tasks[*].{Status:lastStatus,Created:createdAt,Started:startedAt,StopCode:stopCode,Reason:stoppedReason,ExitCode:containers[0].exitCode}' \
              --output table 2>/dev/null
          else
            echo "No running tasks"
          fi

          echo ""
          echo "=== Recently stopped tasks ==="
          STOPPED=$(aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status STOPPED \
            --query 'taskArns[0]' --output text 2>/dev/null)
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            aws ecs describe-tasks \
              --cluster $ECS_CLUSTER \
              --tasks $STOPPED \
              --query 'tasks[0].{StopCode:stopCode,Reason:stoppedReason,ExitCode:containers[0].exitCode,Image:containers[0].image}' \
              --output json 2>/dev/null
          fi
