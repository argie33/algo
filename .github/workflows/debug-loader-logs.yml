name: Debug Loader CloudWatch Logs

on:
  workflow_dispatch:
    inputs:
      loader_name:
        description: 'Loader name (e.g. stock_prices_daily)'
        required: true
        default: 'stock_prices_daily'
      status_only:
        description: 'Skip CloudWatch logs, only check task status'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: algo-cluster

jobs:
  debug-logs:
    name: "Read CloudWatch logs for ${{ inputs.loader_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Read recent CloudWatch logs
        id: read_logs
        if: inputs.status_only != 'true'
        run: |
          LOADER="${{ inputs.loader_name }}"
          LOG_GROUP="/ecs/algo-${LOADER}-loader"
          echo "log_group=$LOG_GROUP" >> $GITHUB_OUTPUT

          echo "=== Listing recent log streams ==="
          aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --query 'logStreams[*].[logStreamName,lastEventTimestamp]' \
            --output table 2>&1 || echo "Log group not found or no streams"

          # Get the most recent stream
          LATEST_STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null)

          if [ -z "$LATEST_STREAM" ] || [ "$LATEST_STREAM" = "None" ]; then
            echo "No log streams found"
            exit 0
          fi

          echo ""
          echo "=== START of most recent stream: $LATEST_STREAM ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST_STREAM" \
            --start-from-head \
            --limit 100 \
            --query 'events[*].message' \
            --output text 2>&1

          echo ""
          echo "=== END of most recent stream ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST_STREAM" \
            --limit 100 \
            --query 'events[*].message' \
            --output text 2>&1

          # Also show second-most-recent stream for comparison
          PREV_STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 5 \
            --query 'logStreams[1].logStreamName' \
            --output text 2>/dev/null)

          if [ -n "$PREV_STREAM" ] && [ "$PREV_STREAM" != "None" ]; then
            echo ""
            echo "=== START of previous stream: $PREV_STREAM ==="
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$PREV_STREAM" \
              --start-from-head \
              --limit 60 \
              --query 'events[*].message' \
              --output text 2>&1
          fi

      - name: Check running tasks
        if: always()
        run: |
          echo "=== ALL recently stopped tasks (newest 3) ==="
          aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status STOPPED \
            --query 'taskArns[:3]' --output text 2>/dev/null | tr '\t' '\n' | while read ARN; do
            if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
              aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $ARN \
                --query 'tasks[0].{StopCode:stopCode,ExitCode:containers[0].exitCode,Created:createdAt,Stopped:stoppedAt,Image:containers[0].image,Reason:stoppedReason}' \
                --output json 2>/dev/null
            fi
          done
          echo ""
          echo "=== Currently running tasks for ${{ inputs.loader_name }} ==="
          RUNNING=$(aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status RUNNING \
            --query 'taskArns' --output text 2>/dev/null)
          if [ -n "$RUNNING" ] && [ "$RUNNING" != "None" ]; then
            echo "Running: $RUNNING"
            aws ecs describe-tasks \
              --cluster $ECS_CLUSTER \
              --tasks $RUNNING \
              --query 'tasks[*].{Status:lastStatus,Created:createdAt,Started:startedAt,StopCode:stopCode,Reason:stoppedReason,ExitCode:containers[0].exitCode}' \
              --output table 2>/dev/null
          else
            echo "No running tasks"
          fi

          echo ""
          echo "=== Recently stopped tasks ==="
          STOPPED=$(aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --family "algo-${{ inputs.loader_name }}-loader" \
            --desired-status STOPPED \
            --query 'taskArns[0]' --output text 2>/dev/null)
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            aws ecs describe-tasks \
              --cluster $ECS_CLUSTER \
              --tasks $STOPPED \
              --query 'tasks[0].{StopCode:stopCode,Reason:stoppedReason,ExitCode:containers[0].exitCode,Image:containers[0].image}' \
              --output json 2>/dev/null
          fi
