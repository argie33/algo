name: Deploy Financial Dashboard - Serverless

on:
  push:
    branches: ["**"]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
  AWS_ROLE_SESSION: github-deploy-webapp
  NODE_VERSION: '18'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            webapp/lambda/package-lock.json
            webapp/frontend/package-lock.json

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-webapp

      # Debug OIDC authentication
      - name: Verify OIDC Bootstrap Stack
        run: |
          echo "🔍 Checking OIDC bootstrap stack..."
          
          # Check if bootstrap stack exists
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name stocks-oidc-bootstrap \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "❌ ERROR: Bootstrap stack 'stocks-oidc-bootstrap' not found"
            echo "Please run the bootstrap workflow first to create OIDC provider and role"
            exit 1
          fi
          
          echo "✅ Bootstrap stack status: $STACK_STATUS"
          
          # Verify the role exists
          ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole"
          echo "🔍 Verifying role exists: $ROLE_ARN"
          
          aws iam get-role --role-name GitHubActionsDeployRole > /dev/null
          echo "✅ GitHubActionsDeployRole exists and is accessible"

      - name: Debug AWS authentication
        run: |
          echo "Testing AWS authentication..."
          echo "GitHub Token Info:"
          echo "  Repository: $GITHUB_REPOSITORY"
          echo "  Ref: $GITHUB_REF"
          echo "  Actor: $GITHUB_ACTOR"
          echo "  Run ID: $GITHUB_RUN_ID"
          echo "  Event: $GITHUB_EVENT_NAME"
          
          echo "Expected OIDC Subject: repo:$GITHUB_REPOSITORY:ref:$GITHUB_REF"
          
          echo "Testing AWS STS assume role..."
          aws sts get-caller-identity
          
          echo "Testing CloudFormation access..."
          aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE --query 'StackSummaries[0:3].[StackName,StackStatus]' --output table
          
          echo "AWS authentication successful"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # Verify required infrastructure exists
      - name: Verify Prerequisites
        run: |
          echo "🔍 Checking required AWS resources..."
          
          # Check if S3 bucket for SAM exists
          S3_BUCKET="stocks-cf-templates"
          if ! aws s3 ls "s3://$S3_BUCKET" > /dev/null 2>&1; then
            echo "❌ ERROR: S3 bucket '$S3_BUCKET' not found"
            echo "This bucket is required for SAM deployments"
            echo "Please ensure the core infrastructure is deployed first"
            exit 1
          fi
          echo "✅ S3 bucket for templates exists: $S3_BUCKET"
          
          # List available CloudFormation exports
          echo "🔍 Available CloudFormation exports:"
          aws cloudformation list-exports --query "Exports[?starts_with(Name, 'StocksApp')].Name" --output table

      # Build Lambda Function
      - name: Install Lambda dependencies
        working-directory: webapp/lambda
        run: |
          npm ci --production
          echo "Lambda dependencies installed"

      - name: Prepare Lambda deployment package
        working-directory: webapp/lambda
        run: |
          # Remove development dependencies and reinstall production only
          rm -rf node_modules
          npm ci --only=production
          
          # Create deployment directory structure
          mkdir -p ../deploy/lambda
          
          # Copy all necessary files for Lambda deployment
          cp -r . ../deploy/lambda/
          
          echo "Lambda package prepared"
          
      # Build Frontend
      - name: Install Frontend dependencies
        working-directory: webapp/frontend
        run: npm ci

      - name: Build Frontend with API URL
        working-directory: webapp/frontend
        run: |
          # Get API URL from CloudFormation stack (if already deployed)
          STACK_NAME="financial-dashboard-${{ github.event.inputs.environment || 'prod' }}"
          
          # Try to get existing API URL, use placeholder if stack doesn't exist yet
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayUrl'].OutputValue" \
            --output text 2>/dev/null || echo "PLACEHOLDER_API_URL")
          
          echo "Building frontend with API URL: $API_URL"
          
          # Create production environment file
          cat > .env.production << EOF
          VITE_SERVERLESS=true
          VITE_API_URL=$API_URL
          VITE_APP_TITLE=Financial Dashboard
          VITE_APP_DESCRIPTION=Professional Financial Data Analysis Platform
          EOF
          
          npm run build
          echo "Frontend built successfully"
          
      # Deploy Infrastructure
      - name: Deploy CloudFormation Stack
        id: deploy-stack
        run: |
          STACK_NAME="financial-dashboard-${{ github.event.inputs.environment || 'prod' }}"
          TEMPLATE_FILE="webapp/template-webapp-lambda.yml"
          
          echo "🚀 Starting deployment of stack: $STACK_NAME"
          
          # Validate CloudFormation template first
          aws cloudformation validate-template --template-body file://$TEMPLATE_FILE
          
          # Get database secret ARN from exports (same way as your other workflows)
          echo "🔍 Looking up database exports..."
          DB_SECRET_ARN=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksApp-SecretArn'].Value" \
            --output text)
          
          if [ "$DB_SECRET_ARN" = "None" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "ERROR: Database secret not found in CloudFormation exports"
            echo "Available exports:"
            aws cloudformation list-exports --query "Exports[?starts_with(Name, 'StocksApp')].Name" --output table
            exit 1
          fi
          
          echo "✅ Using database secret: $DB_SECRET_ARN"
          
          # Get database endpoint from exports
          DB_ENDPOINT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksApp-DBEndpoint'].Value" \
            --output text)
          
          if [ "$DB_ENDPOINT" = "None" ] || [ -z "$DB_ENDPOINT" ]; then
            echo "ERROR: Database endpoint not found in CloudFormation exports"
            echo "Available exports:"
            aws cloudformation list-exports --query "Exports[?starts_with(Name, 'StocksApp')].Name" --output table
            exit 1
          fi
          
          echo "✅ Using database endpoint: $DB_ENDPOINT"
          
          # Create samconfig.toml for deployment
          cat > samconfig.toml << EOF
          version = 0.1
          [default]
          [default.deploy]
          [default.deploy.parameters]
          stack_name = "$STACK_NAME"
          s3_bucket = "stocks-cf-templates"
          region = "${{ env.AWS_REGION }}"
          capabilities = "CAPABILITY_IAM"
          parameter_overrides = "EnvironmentName=${{ github.event.inputs.environment || 'prod' }} DatabaseSecretArn=$DB_SECRET_ARN DatabaseEndpoint=$DB_ENDPOINT"
          no_fail_on_empty_changeset = true
          EOF
          
          # Deploy with SAM using the config file
          echo "🚀 Deploying with SAM..."
          sam deploy \
            --template-file $TEMPLATE_FILE \
            --config-file samconfig.toml
          
          # Get outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayUrl'].OutputValue" \
            --output text)
          
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteURL'].OutputValue" \
            --output text)
          
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          
          echo "Infrastructure deployed successfully"

      # Rebuild Frontend with correct API URL
      - name: Rebuild Frontend with API Gateway URL
        working-directory: webapp/frontend
        run: |
          API_URL="${{ steps.deploy-stack.outputs.api_url }}"
          
          echo "Rebuilding frontend with correct API URL: $API_URL"
          
          # Create production environment file with correct API URL
          cat > .env.production << EOF
          VITE_SERVERLESS=true
          VITE_API_URL=$API_URL
          VITE_APP_TITLE=Financial Dashboard
          VITE_APP_DESCRIPTION=Professional Financial Data Analysis Platform
          EOF
          
          # Rebuild with correct API URL
          npm run build
          echo "Frontend rebuilt with correct API URL"

      # Deploy Frontend to S3
      - name: Deploy Frontend to S3
        run: |
          BUCKET_NAME="${{ steps.deploy-stack.outputs.bucket_name }}"
          
          # Sync frontend files to S3
          aws s3 sync webapp/frontend/dist s3://$BUCKET_NAME \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "service-worker.js"
          
          # Upload HTML files with shorter cache (for SPA routing)
          aws s3 sync webapp/frontend/dist s3://$BUCKET_NAME \
            --cache-control "public, max-age=300" \
            --include "*.html" \
            --include "service-worker.js"
          
          echo "Frontend deployed to S3"

      # Invalidate CloudFront Cache
      - name: Invalidate CloudFront
        run: |
          CLOUDFRONT_ID="${{ steps.deploy-stack.outputs.cloudfront_id }}"
          
          # Create CloudFront invalidation
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_ID \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          
          echo "CloudFront invalidation created: $INVALIDATION_ID"
          echo "Cache invalidation initiated for distribution: $CLOUDFRONT_ID"

      # Test Deployment
      - name: Test API Health
        run: |
          API_URL="${{ steps.deploy-stack.outputs.api_url }}"
          
          echo "Testing API health endpoint..."
          
          # Wait for API to be ready
          sleep 10
          
          # Test API health
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ API health check passed"
          else
            echo "⚠️  API health check returned status: $RESPONSE"
            echo "API may still be initializing..."
          fi

      # Test Frontend
      - name: Test Frontend
        run: |
          WEBSITE_URL="${{ steps.deploy-stack.outputs.website_url }}"
          
          echo "Testing frontend availability..."
          
          # Wait for CloudFront to propagate
          sleep 15
          
          # Test frontend
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$WEBSITE_URL" || echo "000")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Frontend health check passed"
          else
            echo "⚠️  Frontend returned status: $RESPONSE"
            echo "CloudFront may still be propagating..."
          fi

      # Output deployment info
      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo ""
          echo "📊 Deployment Details:"
          echo "  Environment: ${{ github.event.inputs.environment || 'prod' }}"
          echo "  Stack Name: financial-dashboard-${{ github.event.inputs.environment || 'prod' }}"
          echo "  Region: ${{ env.AWS_REGION }}"
          echo ""
          echo "🔗 Access URLs:"
          echo "  Frontend: ${{ steps.deploy-stack.outputs.website_url }}"
          echo "  API: ${{ steps.deploy-stack.outputs.api_url }}"
          echo ""
          echo "☁️  AWS Resources:"
          echo "  S3 Bucket: ${{ steps.deploy-stack.outputs.bucket_name }}"
          echo "  CloudFront ID: ${{ steps.deploy-stack.outputs.cloudfront_id }}"
          echo ""
          echo "✅ Financial Dashboard deployed and ready to use!"

      # Notify on success
      - name: Notify Success
        if: success()
        run: |
          echo "🎯 SUCCESS: Financial Dashboard deployed successfully!"
          echo "🌐 Access your dashboard at: ${{ steps.deploy-stack.outputs.website_url }}"

  # Cleanup on failure 
  cleanup-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    steps:      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-webapp
          
      - name: Cleanup failed deployment
        run: |
          STACK_NAME="financial-dashboard-${{ github.event.inputs.environment || 'prod' }}"
          
          echo "🧹 Checking if cleanup is needed for stack: $STACK_NAME"
          
          # Check if stack exists and is in a failed state
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [[ "$STACK_STATUS" == *"FAILED"* ]] || [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" ]]; then
            echo "⚠️  Stack is in failed state: $STACK_STATUS"
            echo "🗑️  Deleting failed stack to allow retry..."
            
            aws cloudformation delete-stack --stack-name $STACK_NAME
            echo "Stack deletion initiated. You can retry the deployment once deletion completes."
          else
            echo "ℹ️  Stack status: $STACK_STATUS - No cleanup needed"
          fi
