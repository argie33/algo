name: Deploy Financial Dashboard WebApp

on:
  push:
    branches: [ "**" ]
    paths:
      - 'webapp/**'
      - 'template-webapp.yml'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: financial-dashboard-backend
  FRONTEND_BUCKET_PREFIX: financial-dashboard-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set environment variables
      run: |
        if [ "${{ github.event.inputs.environment }}" != "" ]; then
          echo "DEPLOY_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
        elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
        else
          echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
        fi    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build backend Docker image
      run: |
        # Build the backend Docker image
        if [ -f "webapp/backend/Dockerfile" ]; then
          cd webapp/backend
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
        else
          echo "Backend Dockerfile not found, skipping backend build"
        fi

    - name: Push backend image to ECR
      run: |
        if [ -f "webapp/backend/Dockerfile" ]; then
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          echo "BACKEND_IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_ENV
        else
          # Use a placeholder image URI if no backend
          echo "BACKEND_IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest" >> $GITHUB_ENV
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'webapp/frontend/package-lock.json'

    - name: Install frontend dependencies
      run: |
        if [ -f "webapp/frontend/package.json" ]; then
          cd webapp/frontend
          npm ci
        else
          echo "Frontend package.json not found, creating basic React app structure"
          mkdir -p webapp/frontend/build
          echo '<!DOCTYPE html><html><head><title>Financial Dashboard</title></head><body><h1>Financial Dashboard</h1><p>Coming Soon...</p></body></html>' > webapp/frontend/build/index.html
        fi

    - name: Build frontend
      run: |
        if [ -f "webapp/frontend/package.json" ]; then
          cd webapp/frontend
          npm run build
        fi
      env:
        REACT_APP_API_URL: placeholder-will-be-replaced-after-deployment

    - name: Deploy CloudFormation stack
      run: |
        aws cloudformation deploy \
          --template-file template-webapp.yml \
          --stack-name financial-dashboard-webapp-${{ env.DEPLOY_ENV }} \
          --parameter-overrides \
            Environment=${{ env.DEPLOY_ENV }} \
            BackendImageUri=${{ env.BACKEND_IMAGE_URI }} \
            AppStackName=financial-data-app-${{ env.DEPLOY_ENV }} \
            FrontendBucketName=${{ env.FRONTEND_BUCKET_PREFIX }} \
          --capabilities CAPABILITY_NAMED_IAM \
          --region ${{ env.AWS_REGION }}

    - name: Get stack outputs
      id: stack-outputs
      run: |
        STACK_NAME="financial-dashboard-webapp-${{ env.DEPLOY_ENV }}"
        
        FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
          --stack-name $STACK_NAME \
          --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
          --output text \
          --region ${{ env.AWS_REGION }})
        
        WEBSITE_URL=$(aws cloudformation describe-stacks \
          --stack-name $STACK_NAME \
          --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
          --output text \
          --region ${{ env.AWS_REGION }})
          
         API_URL=$(aws cloudformation describe-stacks \
          --stack-name $STACK_NAME \
          --query 'Stacks[0].Outputs[?OutputKey==`ApiGatewayUrl`].OutputValue' \
          --output text \
          --region ${{ env.AWS_REGION }})
          echo "FRONTEND_BUCKET=$FRONTEND_BUCKET" >> $GITHUB_ENV
        echo "WEBSITE_URL=$WEBSITE_URL" >> $GITHUB_ENV
        echo "API_URL=$API_URL" >> $GITHUB_ENV
        
        echo "frontend-bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
        echo "website-url=$WEBSITE_URL" >> $GITHUB_OUTPUT
        echo "api-url=$API_URL" >> $GITHUB_OUTPUT

    - name: Update frontend config with real API URL
      run: |
        # Replace placeholder in SPA files with proper config injection
        if [ -f "webapp/spa/index.html" ]; then
          echo "Updating SPA index.html with API URL: $API_URL"
          # Use sed to replace the meta tag content
          sed -i "s|PLACEHOLDER_API_GATEWAY_URL|$API_URL|g" webapp/spa/index.html
        fi
        
        # For React frontend, update any config files
        if [ -f "webapp/frontend/build/index.html" ]; then
          echo "Updating React build files with API URL: $API_URL"
          # Find and replace placeholder in all HTML, JS, and JSON files
          find webapp/frontend/build -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" \) -exec grep -l "placeholder-will-be-replaced-after-deployment" {} \; | while read file; do
            echo "Updating: $file"
            sed -i "s|placeholder-will-be-replaced-after-deployment|$API_URL|g" "$file"
          done
        fi- name: Sync frontend to S3
      run: |
        # Upload SPA files if they exist
        if [ -f "webapp/spa/index.html" ]; then
          aws s3 cp webapp/spa/index.html s3://$FRONTEND_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region ${{ env.AWS_REGION }}
          echo "SPA uploaded to S3"
        fi
        
        # Upload React frontend build if it exists
        if [ -d "webapp/frontend/build" ]; then
          # Upload all files except HTML with long cache
          aws s3 sync webapp/frontend/build/ s3://$FRONTEND_BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --region ${{ env.AWS_REGION }}
          
          # Upload HTML files with no-cache headers
          aws s3 sync webapp/frontend/build/ s3://$FRONTEND_BUCKET/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region ${{ env.AWS_REGION }}
          echo "React frontend uploaded to S3"
        else
          echo "No React frontend build found, only SPA uploaded"
        fi

    - name: Invalidate CloudFront distribution
      run: |
        DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
          --stack-name financial-dashboard-webapp-${{ env.DEPLOY_ENV }} \
          --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
          --output text \
          --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
        
        if [ "$DISTRIBUTION_ID" != "" ]; then
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*" \
            --region ${{ env.AWS_REGION }}
        else
          echo "CloudFront distribution ID not found, skipping invalidation"
        fi

    - name: Output deployment info
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "📱 Website URL: ${{ env.WEBSITE_URL }}"
        echo "🔗 API URL: ${{ env.API_URL }}"
        echo "🪣 S3 Bucket: ${{ env.FRONTEND_BUCKET }}"
        echo "🌍 Environment: ${{ env.DEPLOY_ENV }}"

    - name: Run health checks
      run: |
        echo "Running health checks..."
        
        # Check if website is accessible
        if curl -f -s "${{ env.WEBSITE_URL }}" > /dev/null; then
          echo "✅ Website is accessible"
        else
          echo "❌ Website health check failed"
          exit 1
        fi
        
        # Check API health endpoint (if it exists)
        if curl -f -s "${{ env.API_URL }}/health" > /dev/null; then
          echo "✅ API health check passed"
        else
          echo "⚠️ API health endpoint not accessible (this may be expected if backend is not yet implemented)"
        fi