name: Deploy Infrastructure (RDS/ECS/Secrets)

on:
  push:
    branches:
      - main
    paths:
      - template-data-infrastructure.yml
      - .github/workflows/deploy-data-infrastructure.yml
  workflow_dispatch:
  workflow_call:

concurrency:
  group: deploy-app-infrastructure-stocks-data
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: stocks-data
  RDS_ID: stocks

jobs:
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify dependency stacks exist
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name stocks-core \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "MISSING")
          if [[ "$STATUS" != *"COMPLETE"* ]]; then
            echo "ERROR: stocks-core must be deployed first (status: $STATUS)"
            exit 1
          fi
          echo "✅ stocks-core: $STATUS"

      - name: Verify core exports exist
        run: |
          for EXPORT in StocksCore-VpcId StocksCore-PrivateSubnet1Id StocksCore-PrivateSubnet2Id; do
            VALUE=$(aws cloudformation list-exports \
              --query "Exports[?Name=='$EXPORT'].Value" \
              --output text 2>/dev/null || echo "")
            if [ -z "$VALUE" ] || [ "$VALUE" = "None" ]; then
              echo "ERROR: Export $EXPORT not found in stocks-core"
              exit 1
            fi
            echo "✅ $EXPORT: $VALUE"
          done

  deploy:
    name: Deploy stocks-data
    needs: pre-flight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Look up SNS topic ARN from algo stack
        id: sns
        run: |
          ALERT_TOPIC=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksAlgo-AlertTopicArn'].Value" \
            --output text 2>/dev/null || echo "")
          echo "alert_topic=$ALERT_TOPIC" >> $GITHUB_OUTPUT

      - name: Inspect current state (stack + orphan RDS)
        id: state
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NOT_FOUND)
          echo "stack_status=$STACK_STATUS"
          echo "stack_status=$STACK_STATUS" >> $GITHUB_OUTPUT

          RDS_EXISTS=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_ID" --region "$AWS_REGION" \
            --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo NONE)
          echo "rds_exists=$RDS_EXISTS"
          echo "rds_exists=$RDS_EXISTS" >> $GITHUB_OUTPUT

      - name: Get CloudFormation templates bucket from core stack
        id: bucket
        run: |
          CF_BUCKET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-CfTemplatesBucketName'].Value" \
            --output text --region "$AWS_REGION")
          if [ -z "$CF_BUCKET" ] || [ "$CF_BUCKET" = "None" ]; then
            echo "Core stack export StocksCore-CfTemplatesBucketName not found - core deploy must run first"
            exit 1
          fi
          echo "bucket=$CF_BUCKET" >> $GITHUB_OUTPUT

      - name: Upload template to S3 (template > 51200 bytes for inline)
        run: |
          aws s3 cp template-data-infrastructure.yml "s3://${{ steps.bucket.outputs.bucket }}/template-data-infrastructure.yml"

      - name: Path A — IMPORT existing RDS into new stack, then UPDATE to add the rest
        if: steps.state.outputs.stack_status == 'NOT_FOUND' && steps.state.outputs.rds_exists != 'NONE'
        run: |
          echo "Stack does not exist but RDS '$RDS_ID' is orphaned. Importing it into a new stack to preserve data."

          CHANGE_SET=import-rds-$(date +%s)
          # IMPORT change-sets must use a template that contains ONLY the resource being
          # imported (or the imported resource plus exactly the resources already in the
          # stack). For a brand-new stack, that means a stub template with just the RDS.
          # We then UPDATE with the full template to materialize everything else.
          cat > /tmp/import-stub.yml <<STUB
          AWSTemplateFormatVersion: '2010-09-09'
          Description: Import-only stub for stocks-data (RDS only)
          Parameters:
            RDSUsername: { Type: String }
            RDSPassword: { Type: String, NoEcho: true }
          Resources:
            StocksDBInstance:
              Type: AWS::RDS::DBInstance
              DeletionPolicy: Retain
              UpdateReplacePolicy: Retain
              Properties:
                DBInstanceIdentifier: $RDS_ID
                DBName: stocks
                Engine: postgres
                DBInstanceClass: db.t3.micro
                AllocatedStorage: 61
                MasterUsername: !Ref RDSUsername
                MasterUserPassword: !Ref RDSPassword
                PubliclyAccessible: true
          STUB

          aws s3 cp /tmp/import-stub.yml \
            "s3://${{ steps.bucket.outputs.bucket }}/template-app-stocks-import-stub.yml"

          aws cloudformation create-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET" \
            --change-set-type IMPORT \
            --resources-to-import "[{\"ResourceType\":\"AWS::RDS::DBInstance\",\"LogicalResourceId\":\"StocksDBInstance\",\"ResourceIdentifier\":{\"DBInstanceIdentifier\":\"$RDS_ID\"}}]" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-app-stocks-import-stub.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
            --region "$AWS_REGION"

          echo "Waiting for change set..."
          aws cloudformation wait change-set-create-complete \
            --stack-name "$STACK_NAME" --change-set-name "$CHANGE_SET" \
            --region "$AWS_REGION"

          echo "Executing import..."
          aws cloudformation execute-change-set \
            --stack-name "$STACK_NAME" --change-set-name "$CHANGE_SET" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-import-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"
          echo "Import complete. Now updating to materialize the full template..."

          aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-data-infrastructure.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
              ParameterKey=AlertTopicArn,ParameterValue="${{ steps.sns.outputs.alert_topic }}" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-update-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"
          echo "Stack fully populated."

      - name: Path B — CREATE fresh stack (no existing RDS)
        if: steps.state.outputs.stack_status == 'NOT_FOUND' && steps.state.outputs.rds_exists == 'NONE'
        run: |
          echo "No stack and no RDS — creating fresh."
          aws cloudformation create-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-data-infrastructure.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
              ParameterKey=AlertTopicArn,ParameterValue="${{ steps.sns.outputs.alert_topic }}" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-create-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"

      - name: Path C — UPDATE existing stack
        if: steps.state.outputs.stack_status != 'NOT_FOUND' && steps.state.outputs.stack_status != 'CREATE_FAILED' && steps.state.outputs.stack_status != 'ROLLBACK_COMPLETE' && steps.state.outputs.stack_status != 'DELETE_IN_PROGRESS' && steps.state.outputs.stack_status != 'DELETE_FAILED'
        run: |
          echo "Stack exists (status=${{ steps.state.outputs.stack_status }}). Running update."
          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-data-infrastructure.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,UsePreviousValue=true \
              ParameterKey=RDSPassword,UsePreviousValue=true \
              ParameterKey=LogRetentionDays,UsePreviousValue=true \
              ParameterKey=AlertTopicArn,ParameterValue="${{ steps.sns.outputs.alert_topic }}" \
            --region "$AWS_REGION" 2>&1) || true

          if echo "$UPDATE_OUTPUT" | grep -iq "No updates are to be performed"; then
            echo "No updates needed."
          elif echo "$UPDATE_OUTPUT" | grep -q "StackId"; then
            aws cloudformation wait stack-update-complete \
              --stack-name "$STACK_NAME" --region "$AWS_REGION"
            echo "Update complete."
          else
            echo "Unexpected response:"
            echo "$UPDATE_OUTPUT"
            exit 1
          fi

      - name: Path D — Wait for DELETE to complete, then CREATE fresh
        if: steps.state.outputs.stack_status == 'DELETE_IN_PROGRESS' || steps.state.outputs.stack_status == 'DELETE_FAILED'
        run: |
          echo "Stack is in DELETE state. Handling deletion..."

          # If in DELETE_FAILED, retry deletion once (in case template fixes enable success)
          if [ "${{ steps.state.outputs.stack_status }}" = "DELETE_FAILED" ]; then
            echo "Stack in DELETE_FAILED. Retrying delete with updated template..."
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" 2>&1 || true
            sleep 3
          fi

          # Wait up to 15 minutes for deletion to complete or stabilize
          for i in {1..180}; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "✓ Stack deletion complete. Creating fresh stack..."
              aws cloudformation create-stack \
                --stack-name "$STACK_NAME" \
                --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-data-infrastructure.yml" \
                --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
                --parameters \
                  ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
                  ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
                  ParameterKey=AlertTopicArn,ParameterValue="${{ steps.sns.outputs.alert_topic }}" \
                --region "$AWS_REGION"

              aws cloudformation wait stack-create-complete \
                --stack-name "$STACK_NAME" --region "$AWS_REGION"
              echo "Stack creation complete."
              exit 0
            elif [[ "$STATUS" == *"DELETE"* ]]; then
              echo "[$i/180] Still deleting (status: $STATUS)... waiting 5s"
              sleep 5
            else
              echo "ERROR: Unexpected status during deletion wait: $STATUS"
              exit 1
            fi
          done
          echo "ERROR: Stack deletion did not complete within timeout (DELETE_FAILED persists - may need manual intervention)"
          exit 1

      - name: Diagnose stack events on failure
        if: failure()
        run: |
          echo "=== Root-cause events (cascade noise filtered) ==="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" --max-items 60 \
            --query 'reverse(StackEvents[?ResourceStatusReason != null && ResourceStatusReason != `Resource creation cancelled` && ResourceStatusReason != `Resource update cancelled`].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason])' \
            --output table || echo "(no events)"
          echo ""
          echo "=== Stack status ==="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query 'Stacks[0].[StackStatus,StackStatusReason]' --output table || echo "(no stack)"

      - name: Verify exports for downstream stacks
        if: success()
        run: |
          echo "=== StocksApp-* exports (downstream needs these) ==="
          aws cloudformation list-exports --region "$AWS_REGION" \
            --query "Exports[?starts_with(Name, 'StocksApp-')].[Name,Value]" \
            --output table

  rollback-on-failure:
    name: Rollback on failure
    needs: [deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up failed stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo MISSING)
          if [[ "$STATUS" =~ FAILED|ROLLBACK ]]; then
            echo "Cleaning up ${{ env.STACK_NAME }} (status: $STATUS)..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}" || true
            echo "✅ Stack cleaned. Re-run deploy workflow to retry."
          else
            echo "Stack is in '$STATUS' state — no cleanup needed"
          fi
