name: Invoke Orchestrator

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  resolve-function-name:
    name: Resolve Algo Lambda Function Name
    runs-on: ubuntu-latest
    outputs:
      algo_lambda_name: ${{ steps.names.outputs.algo_lambda_name }}

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init (read-only)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      - name: Resolve Function Name
        id: names
        working-directory: terraform
        run: |
          TF_OUT=$(terraform output -json 2>/dev/null || echo "{}")
          ALGO_LAMBDA=$(echo "$TF_OUT" | jq -r '.algo_lambda_function_name.value // "stocks-algo-dev"')
          echo "algo_lambda_name=${ALGO_LAMBDA}" >> $GITHUB_OUTPUT
          echo "✅ Resolved Algo Lambda: ${ALGO_LAMBDA}"

  run-orchestrator:
    name: Invoke Orchestrator Lambda
    needs: resolve-function-name
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Orchestrator Lambda (Async)
        run: |
          FUNC="${{ needs.resolve-function-name.outputs.algo_lambda_name }}"
          echo "Invoking orchestrator (async): $FUNC"

          # Create JSON payload and encode as base64
          PAYLOAD='{"source":"manual","date":"2026-05-26","run_identifier":"manual-live-test"}'
          ENCODED=$(echo -n "$PAYLOAD" | base64 -w0)

          # Use Event (async) instead of RequestResponse to avoid timeout
          aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type Event \
            --payload "$ENCODED" \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json

          echo "=== Async Invocation Triggered ==="
          cat /tmp/response.json
          echo ""
          echo "✅ Orchestrator Lambda invoked asynchronously (Status 202 = success)"
          echo "Monitor CloudWatch logs for execution: /aws/lambda/$FUNC"
