name: Execute User Isolation Database Setup

on:
  workflow_dispatch:
    inputs:
      admin_cognito_sub:
        description: 'Admin user Cognito sub (UUID)'
        required: true
        default: 'b4f87418-8081-70f3-1e2f-8cc69d5557e1'

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Get RDS credentials
        id: rds
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id algo-db-credentials-dev --region us-east-1 --query SecretString --output text)
          echo "db_password=$(echo $SECRET | jq -r '.password')" >> $GITHUB_OUTPUT

          INSTANCE=$(aws rds describe-db-instances --db-instance-identifier algo-db --region us-east-1 --query 'DBInstances[0].[Endpoint.Address,DBName,MasterUsername]' --output text)
          echo "db_host=$(echo $INSTANCE | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "db_name=$(echo $INSTANCE | cut -d' ' -f2)" >> $GITHUB_OUTPUT
          echo "db_user=$(echo $INSTANCE | cut -d' ' -f3)" >> $GITHUB_OUTPUT

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Execute database updates
        env:
          DB_HOST: ${{ steps.rds.outputs.db_host }}
          DB_PORT: 5432
          DB_USER: ${{ steps.rds.outputs.db_user }}
          DB_PASSWORD: ${{ steps.rds.outputs.db_password }}
          DB_NAME: ${{ steps.rds.outputs.db_name }}
          ADMIN_SUB: ${{ github.event.inputs.admin_cognito_sub }}
        run: |
          python3 << 'EOF'
          import psycopg2
          import os

          try:
              conn = psycopg2.connect(
                  host=os.getenv('DB_HOST'),
                  port=5432,
                  user=os.getenv('DB_USER'),
                  password=os.getenv('DB_PASSWORD'),
                  database=os.getenv('DB_NAME')
              )

              cursor = conn.cursor()
              admin_sub = os.getenv('ADMIN_SUB')

              tables = ['algo_positions', 'algo_trades', 'algo_portfolio_snapshots', 'algo_trade_adds']

              print("Executing database updates...")
              for table in tables:
                  sql = f"UPDATE {table} SET cognito_sub = %s WHERE cognito_sub = 'admin-user';"
                  cursor.execute(sql, (admin_sub,))
                  print(f"✓ {table}: {cursor.rowcount} rows updated")

              conn.commit()
              cursor.close()
              conn.close()

              print()
              print("✅ DATABASE UPDATES COMPLETE")

          except Exception as e:
              print(f"❌ Error: {e}")
              import traceback
              traceback.print_exc()
              exit(1)
          EOF

      - name: Verify updates
        env:
          DB_HOST: ${{ steps.rds.outputs.db_host }}
          DB_PORT: 5432
          DB_USER: ${{ steps.rds.outputs.db_user }}
          DB_PASSWORD: ${{ steps.rds.outputs.db_password }}
          DB_NAME: ${{ steps.rds.outputs.db_name }}
          ADMIN_SUB: ${{ github.event.inputs.admin_cognito_sub }}
        run: |
          python3 << 'EOF'
          import psycopg2
          import os

          conn = psycopg2.connect(
              host=os.getenv('DB_HOST'),
              port=5432,
              user=os.getenv('DB_USER'),
              password=os.getenv('DB_PASSWORD'),
              database=os.getenv('DB_NAME')
          )

          cursor = conn.cursor()
          admin_sub = os.getenv('ADMIN_SUB')

          print("Verification Results:")
          print("=" * 50)

          tables = ['algo_positions', 'algo_trades', 'algo_portfolio_snapshots', 'algo_trade_adds']

          for table in tables:
              cursor.execute(f"SELECT COUNT(*) FROM {table} WHERE cognito_sub = %s;", (admin_sub,))
              count = cursor.fetchone()[0]
              print(f"{table}: {count} rows with admin sub")

          cursor.close()
          conn.close()

          print()
          print("✅ VERIFICATION COMPLETE - User isolation setup ready!")
          EOF
