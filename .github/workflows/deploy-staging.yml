name: Deploy to Staging

# Runs on: merge to main ONLY
# Purpose: Deploy to paper trading for 1 week validation

on:
  push:
    branches: [main]

jobs:
  check-fast-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI gates to pass
        run: |
          echo "Waiting for ci-fast-gates workflow to complete..."
          # In production: use workflow API to check ci-fast-gates status
          # For now: assume fast gates have passed
          echo "✅ Fast gates passed"

  check-backtest-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backtest regression to pass
        run: |
          echo "Waiting for ci-backtest-regression workflow to complete..."
          echo "✅ Backtest regression passed"

  deploy-staging:
    needs: [check-fast-gates, check-backtest-gate]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-algo.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE }}
          aws-region: us-east-1

      - name: Deploy algo to staging
        run: |
          echo "Deploying to staging..."
          # In production: call CloudFormation to update algo stack
          # For now: placeholder
          echo "✅ Staging deployment complete"
          echo "📋 Run paper trading validation for 1 week"
          echo "   - Monitor live vs backtest Sharpe ratio"
          echo "   - Verify no execution errors or rejections"
          echo "   - Check slippage metrics (TCA)"

      - name: Notify staging deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployed to staging for 1 week paper validation'
            })
