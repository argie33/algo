name: Deploy Staging (N+1)

# Deploys Lambda functions to the staging environment (algo-algo-staging, algo-api-staging).
# Reuses dev VPC, subnets, security groups, and RDS — no additional infrastructure cost.
# ORCHESTRATOR_DRY_RUN=true is forced — staging never executes real or paper trades.
# No EventBridge schedules — invoke manually to test new code against live data.
#
# Usage:
#   Push to the `staging` branch to trigger automatic deploy.
#   Invoke staging Lambda manually:
#     aws lambda invoke --function-name algo-algo-staging \
#       --payload '{"source":"manual-test","dry_run":true}' \
#       /tmp/staging-response.json --region us-east-1

on:
  push:
    branches: [staging]
    paths:
      - 'algo/**'
      - 'lambda/**'
      - 'config/**'
      - 'utils/**'
      - 'monitoring/**'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEV_ALGO_FUNCTION: algo-algo-dev
  STAGING_ALGO_FUNCTION: algo-algo-staging
  STAGING_API_FUNCTION: algo-api-staging

jobs:
  deploy-staging-algo:
    name: Deploy Staging Algo Lambda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Resolve dev Lambda config (VPC, role, credentials)
        id: dev_config
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import os

          region = os.environ['AWS_REGION']
          dev_func = os.environ['DEV_ALGO_FUNCTION']

          print(f"Reading dev Lambda config from: {dev_func}")
          result = subprocess.run([
            'aws', 'lambda', 'get-function-configuration',
            '--function-name', dev_func,
            '--region', region,
            '--output', 'json'
          ], capture_output=True, text=True, check=True)
          config = json.loads(result.stdout)

          vpc = config.get('VpcConfig', {})
          role = config.get('Role', '')
          env_vars = config.get('Environment', {}).get('Variables', {})

          subnet_ids = ','.join(vpc.get('SubnetIds', []))
          sg_ids = ','.join(vpc.get('SecurityGroupIds', []))
          db_host = env_vars.get('DB_HOST', '')
          db_port = env_vars.get('DB_PORT', '5432')
          db_name = env_vars.get('DB_NAME', 'algo')
          db_secret_arn = env_vars.get('DB_SECRET_ARN', '')
          algo_secrets_arn = env_vars.get('ALGO_SECRETS_ARN', '')

          print(f"  Role ARN: {role}")
          print(f"  Subnets: {subnet_ids}")
          print(f"  Security Groups: {sg_ids}")
          print(f"  DB Host: {db_host}:{db_port}/{db_name}")

          gho = os.environ.get('GITHUB_OUTPUT', '')
          if gho:
            with open(gho, 'a') as f:
              f.write(f"role_arn={role}\n")
              f.write(f"subnet_ids={subnet_ids}\n")
              f.write(f"sg_ids={sg_ids}\n")
              f.write(f"db_host={db_host}\n")
              f.write(f"db_port={db_port}\n")
              f.write(f"db_name={db_name}\n")
              f.write(f"db_secret_arn={db_secret_arn}\n")
              f.write(f"algo_secrets_arn={algo_secrets_arn}\n")

          print("[OK] Dev config resolved")
          EOF

      - name: Build Orchestrator Lambda Layer
        run: |
          python3 scripts/build-lambda-layers.py \
            --layer orchestrator \
            --runtime python3.12 \
            --output-dir terraform

      - name: Package Algo Lambda Function Code
        run: |
          python3 << 'PYTHON_SCRIPT'
          import zipfile
          from pathlib import Path

          # Function code: handler only (dependencies come from layer)
          zip_path = Path("algo_lambda.zip")
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
            handler_path = Path("lambda/algo_orchestrator/lambda_function.py")
            if not handler_path.exists():
              raise FileNotFoundError(f"Handler not found: {handler_path}")
            zf.write(handler_path, "lambda_function.py")
          print(f"Function code: {zip_path.stat().st_size / 1024:.1f} KB")
          PYTHON_SCRIPT

      - name: Publish Orchestrator Layer & Extract ARN
        id: publish_layer
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import os
          from pathlib import Path

          region = os.environ['AWS_REGION']
          account_id = '${{ secrets.AWS_ACCOUNT_ID }}'
          layer_name = "algo-orchestrator-layer-staging"
          layer_zip = Path("terraform/orchestrator-layer.zip")

          if not layer_zip.exists():
            print(f"ERROR: Layer ZIP not found: {layer_zip}")
            exit(1)

          size_mb = layer_zip.stat().st_size / (1024 * 1024)
          print(f"Publishing layer: {layer_name} ({size_mb:.1f}MB)")

          # Publish layer
          cmd = [
            'aws', 'lambda', 'publish-layer-version',
            '--layer-name', layer_name,
            '--compatible-runtimes', 'python3.11', 'python3.12',
            '--region', region,
            '--output', 'json'
          ]

          # Use S3 if layer > 50 MB (inline limit)
          if size_mb > 50:
            s3_bucket = f"algo-svc-artifacts-{account_id}"
            s3_key = f"lambda-layers/{layer_name}/orchestrator-layer.zip"
            print(f"  Uploading to S3: s3://{s3_bucket}/{s3_key}")
            subprocess.run([
              'aws', 's3', 'cp', str(layer_zip),
              f"s3://{s3_bucket}/{s3_key}",
              '--region', region
            ], check=True, capture_output=True)
            cmd.extend(['--content', f'S3Bucket={s3_bucket},S3Key={s3_key}'])
          else:
            cmd.extend(['--zip-file', f'fileb://{layer_zip}'])

          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          output = json.loads(result.stdout)
          layer_arn = output['LayerVersionArn']
          layer_version = output['Version']

          print(f"[OK] Layer published: version {layer_version}")
          print(f"  ARN: {layer_arn}")

          # Output for next steps
          with open(os.environ.get('GITHUB_OUTPUT', '/tmp/gh_output'), 'a') as f:
            f.write(f"layer_arn={layer_arn}\n")
            f.write(f"layer_version={layer_version}\n")

          # Also set as ENV for backward compatibility
          with open(os.environ.get('GITHUB_ENV', '/tmp/gh_env'), 'a') as f:
            f.write(f"STAGING_LAYER_ARN={layer_arn}\n")
          EOF

      - name: Create or update staging algo Lambda
        env:
          ROLE_ARN: ${{ steps.dev_config.outputs.role_arn }}
          SUBNET_IDS: ${{ steps.dev_config.outputs.subnet_ids }}
          SG_IDS: ${{ steps.dev_config.outputs.sg_ids }}
          DB_HOST: ${{ steps.dev_config.outputs.db_host }}
          DB_PORT: ${{ steps.dev_config.outputs.db_port }}
          DB_NAME: ${{ steps.dev_config.outputs.db_name }}
          DB_SECRET_ARN: ${{ steps.dev_config.outputs.db_secret_arn }}
          ALGO_SECRETS_ARN: ${{ steps.dev_config.outputs.algo_secrets_arn }}
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import os
          import tempfile

          region = os.environ['AWS_REGION']
          account_id = '${{ secrets.AWS_ACCOUNT_ID }}'
          func = os.environ['STAGING_ALGO_FUNCTION']
          role_arn = os.environ['ROLE_ARN']
          raw_subnets = os.environ.get('SUBNET_IDS', '')
          raw_sgs = os.environ.get('SG_IDS', '')
          subnet_ids = [s for s in raw_subnets.split(',') if s]
          sg_ids = [s for s in raw_sgs.split(',') if s]
          layer_arn = os.environ['STAGING_LAYER_ARN']

          # FIXED F-07: Staging uses isolated RDS (algo-db-staging) if available, otherwise falls back to dev RDS
          # To set up staging RDS isolation, run:
          #   scripts/setup-staging-infrastructure.sh
          region = os.environ['AWS_REGION']
          account_id = '${{ secrets.AWS_ACCOUNT_ID }}'

          # Query for staging RDS endpoint (algo-db-staging)
          staging_rds_host = None
          try:
            result = subprocess.run([
              'aws', 'rds', 'describe-db-instances',
              '--filters', 'Name=db-instance-id,Values=algo-db-staging',
              '--region', region,
              '--query', 'DBInstances[0].Endpoint.Address',
              '--output', 'text'
            ], capture_output=True, text=True, timeout=10)
            if result.returncode == 0 and result.stdout.strip() and result.stdout.strip() != 'None':
              staging_rds_host = result.stdout.strip()
              print(f"[F-07] Using isolated staging RDS: {staging_rds_host}")
            else:
              print(f"[F-07] Staging RDS (algo-db-staging) not found. Using dev RDS as fallback.")
              print(f"       To isolate staging: run 'scripts/setup-staging-infrastructure.sh'")
          except Exception as e:
            print(f"[F-07] Could not query staging RDS ({e}). Using dev RDS as fallback.")

          # Use staging RDS if available, otherwise use dev RDS
          db_host = staging_rds_host if staging_rds_host else os.environ.get('DB_HOST', '')

          # Staging always forces dry_run=true — no trades ever execute
          env_vars = {
            "DB_SECRET_ARN": os.environ.get('DB_SECRET_ARN', ''),
            "DB_HOST": db_host,
            "DB_PORT": os.environ.get('DB_PORT', '5432'),
            "DB_NAME": os.environ.get('DB_NAME', 'algo'),
            "DB_USER": "stocks",
            "ALGO_SECRETS_ARN": os.environ.get('ALGO_SECRETS_ARN', ''),
            "APCA_API_BASE_URL": "https://paper-api.alpaca.markets",
            "ALPACA_PAPER_TRADING": "true",
            "ALGO_LIVE_TRADING": "",
            "ORCHESTRATOR_DRY_RUN": "true",
            "EXECUTION_MODE": "auto",
            "STAGING": "true",
            "ALERT_WEBHOOK_URL": "",
            "ALERT_EMAIL_TO": ""
          }

          # Check if function already exists
          exists = subprocess.run([
            'aws', 'lambda', 'get-function',
            '--function-name', func,
            '--region', region
          ], capture_output=True, text=True).returncode == 0

          if not exists:
            print(f"Creating new staging Lambda: {func}")
            cmd = [
              'aws', 'lambda', 'create-function',
              '--function-name', func,
              '--runtime', 'python3.12',
              '--role', role_arn,
              '--handler', 'lambda_function.lambda_handler',
              '--zip-file', 'fileb://algo_lambda.zip',
              '--timeout', '600',
              '--memory-size', '512',
              '--layers', layer_arn,
              '--environment', json.dumps({"Variables": env_vars}),
              '--region', region
            ]
            if subnet_ids and sg_ids:
              cmd += ['--vpc-config', json.dumps({
                "SubnetIds": subnet_ids,
                "SecurityGroupIds": sg_ids
              })]
            subprocess.run(cmd, check=True)
          else:
            print(f"Updating existing staging Lambda: {func}")
            subprocess.run([
              'aws', 'lambda', 'update-function-code',
              '--function-name', func,
              '--zip-file', 'fileb://algo_lambda.zip',
              '--region', region
            ], check=True)
            subprocess.run([
              'aws', 'lambda', 'wait', 'function-updated',
              '--function-name', func,
              '--region', region
            ], capture_output=True)

            config = {
              "FunctionName": func,
              "Environment": {"Variables": env_vars},
              "Layers": [layer_arn]
            }
            with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False, dir='/tmp', newline='') as f:
              f.write(json.dumps(config))
              config_file = f.name
            try:
              subprocess.run([
                'aws', 'lambda', 'update-function-configuration',
                '--cli-input-json', f'file://{config_file}',
                '--region', region
              ], check=True)
            finally:
              try:
                os.unlink(config_file)
              except:
                pass

          print(f"[OK] {func} deployed")
          print("  ORCHESTRATOR_DRY_RUN=true — no trades will execute")
          print("  No EventBridge schedules — invoke manually to test")
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Staging Deploy (N+1) Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda** | \`${{ env.STAGING_ALGO_FUNCTION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | true (no trades) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Schedules** | disabled |" >> $GITHUB_STEP_SUMMARY
          echo "| **RDS** | isolated (algo-db-staging) if available, else shared with dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manually invoke staging to test:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "aws lambda invoke \\" >> $GITHUB_STEP_SUMMARY
          echo "  --function-name ${{ env.STAGING_ALGO_FUNCTION }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --payload '\''{"source":"manual-test","dry_run":true}'\'' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --region us-east-1 /tmp/staging-response.json" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### When ready to promote N+1 to N:" >> $GITHUB_STEP_SUMMARY
          echo "1. Merge \`staging\` into \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "2. \`deploy-code.yml\` automatically updates \`algo-algo-dev\`" >> $GITHUB_STEP_SUMMARY
