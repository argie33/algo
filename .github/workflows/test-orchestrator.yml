name: Test Orchestrator Execution

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Execute & Verify Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Orchestrator Lambda (Synchronous)
        id: invoke
        run: |
          echo "Invoking algo-algo-dev in LIVE mode (synchronous)..."

          FUNC="algo-algo-dev"
          PAYLOAD_JSON='{"source":"test-live-execution","test":"true","timeout":120}'

          # Base64 encode payload (AWS Lambda requires this format)
          PAYLOAD=$(echo -n "$PAYLOAD_JSON" | base64 -w 0)

          # Use timeout to prevent hanging indefinitely
          # RequestResponse invocation will wait for Lambda to complete
          timeout 180 aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type RequestResponse \
            --payload "$PAYLOAD" \
            --region $AWS_REGION \
            /tmp/response.json || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️  Lambda invocation timed out after 3 minutes (Lambda may still be executing)"
              else
                echo "❌ Lambda invocation failed with exit code: $EXIT_CODE"
              fi
              exit 0
            }

          echo "Orchestrator invoked at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Check response
          if [ -f /tmp/response.json ]; then
            echo "Lambda Response:"
            cat /tmp/response.json | head -50
            echo ""
          fi

          echo "timestamp=$(date -u +%s)" >> $GITHUB_OUTPUT

      - name: Check Lambda Response
        run: |
          if [ -f /tmp/response.json ]; then
            echo "Full Lambda response:"
            jq . /tmp/response.json 2>/dev/null || cat /tmp/response.json
          else
            echo "No response file found (Lambda may still be executing in background)"
          fi

      - name: Wait for Execution & Check Logs (up to 5 minutes)
        id: execution
        run: |
          FUNC="algo-algo-dev"
          LOG_GROUP="/aws/lambda/$FUNC"

          echo "Waiting for CloudWatch logs from Lambda execution..."

          COMPLETED="false"
          ELAPSED=0
          while [ $ELAPSED -lt 300 ]; do
            # Get latest log stream
            LATEST=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --limit 1 \
              --region $AWS_REGION \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || echo "")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "⏳ Waiting for logs... ($ELAPSED/300s)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              continue
            fi

            # Get execution logs
            LOGS=$(aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text 2>/dev/null || echo "")

            # Check for completion indicators
            if echo "$LOGS" | grep -q "Phase 7"; then
              echo "✅ Phase 7 found - orchestrator completed"
              COMPLETED="true"
              break
            fi

            # Check for critical errors
            if echo "$LOGS" | grep -qE "FATAL|password authentication failed"; then
              echo "❌ FATAL ERROR: $(echo "$LOGS" | grep -E 'FATAL|password authentication' | head -1)"
              break
            fi

            if echo "$LOGS" | grep -qE "ERROR|Exception|FAILED"; then
              echo "⚠️ Errors found in logs"
            fi

            echo "⏳ Checking for Phase 7... ($ELAPSED/300s)"
            echo "Latest log stream: $LATEST"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ "$COMPLETED" = "true" ]; then
            echo "✅ Orchestrator execution completed"
          else
            echo "⚠️ Orchestrator execution status unknown (may still be running)"
          fi

          echo "completed=$COMPLETED" >> $GITHUB_OUTPUT

      - name: Retrieve & Report Logs
        run: |
          FUNC="algo-algo-dev"
          LOG_GROUP="/aws/lambda/$FUNC"

          LATEST=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$LATEST" ] && [ "$LATEST" != "None" ]; then
            echo "=== ORCHESTRATOR EXECUTION LOG ==="
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text | tail -150
          else
            echo "No logs found for function: $FUNC"
            echo "Log group: $LOG_GROUP"
          fi

      - name: Verify Results
        run: |
          COMPLETED="${{ steps.execution.outputs.completed }}"

          echo ""
          echo "=== TEST RESULT ==="

          if [ "$COMPLETED" = "true" ]; then
            echo "✅ SUCCESS: Orchestrator completed execution"
            exit 0
          else
            echo "⚠️ INCOMPLETE: Orchestrator did not complete within timeout"
            exit 1
          fi
