name: Test Orchestrator Lambda

on:
  workflow_dispatch

env:
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  test-orchestrator:
    name: Invoke & Test Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Orchestrator
        run: |
          PAYLOAD='{"source":"manual-test"}'
          ENCODED=$(echo -n "$PAYLOAD" | base64 -w0)

          echo "📤 Invoking algo-algo-dev..."
          aws lambda invoke \
            --function-name algo-algo-dev \
            --payload "$ENCODED" \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json

          echo "Response:"
          cat /tmp/response.json
          echo ""

      - name: Check Logs
        run: |
          echo "📋 Lambda logs from last 5 minutes:"
          aws logs tail /aws/lambda/algo-algo-dev \
            --since 5m \
            --region ${{ env.AWS_REGION }} \
            --format short 2>/dev/null | head -100 || echo "No logs available"
