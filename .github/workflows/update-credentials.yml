name: Update Credentials in Secrets Manager

# Syncs GitHub Secrets → AWS Secrets Manager → triggers redeploy.
# This is the ONLY way credentials get into production — never via code or config files.
#
# Rotation procedure:
#   1. Get new keys from Alpaca dashboard (alpaca.markets → API Keys)
#      OR new FRED key from fred.stlouisfed.org/docs/api/fred-api-key.html
#   2. Update GitHub Secrets:
#      gh secret set ALPACA_API_KEY_ID --body "new_paper_key"
#      gh secret set ALPACA_API_SECRET_KEY --body "new_paper_secret"
#      (for live: ALPACA_API_KEY and ALPACA_SECRET_KEY)
#   3. Run this workflow:
#      gh workflow run update-credentials.yml -f trading_mode=paper
#   4. Update local PowerShell profile manually with same values

on:
  workflow_dispatch:
    inputs:
      trading_mode:
        description: 'Which credential set to push to Secrets Manager'
        required: true
        type: choice
        options:
          - paper
          - live
      update_fred:
        description: 'Also update FRED API key in Secrets Manager'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read
  actions: write

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  update-secrets:
    name: Sync credentials to AWS Secrets Manager
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Update algo/alpaca Secrets Manager
        env:
          PAPER_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          PAPER_SECRET: ${{ secrets.ALPACA_API_SECRET_KEY }}
          LIVE_KEY_ID: ${{ secrets.ALPACA_API_KEY }}
          LIVE_SECRET: ${{ secrets.ALPACA_SECRET_KEY }}
          TRADING_MODE: ${{ github.event.inputs.trading_mode }}
        run: |
          if [ "$TRADING_MODE" = "live" ]; then
            API_KEY="$LIVE_KEY_ID"
            API_SECRET="$LIVE_SECRET"
            echo "Updating algo/alpaca with LIVE credentials"
          else
            API_KEY="$PAPER_KEY_ID"
            API_SECRET="$PAPER_SECRET"
            echo "Updating algo/alpaca with PAPER credentials"
          fi

          if [ -z "$API_KEY" ] || [ -z "$API_SECRET" ]; then
            echo "ERROR: Missing credentials for $TRADING_MODE mode in GitHub Secrets"
            exit 1
          fi

          SECRET_JSON=$(printf '{"api_key":"%s","api_secret":"%s"}' "$API_KEY" "$API_SECRET")

          aws secretsmanager update-secret \
            --secret-id algo/alpaca \
            --region us-east-1 \
            --secret-string "$SECRET_JSON"

          echo "✅ algo/alpaca updated for $TRADING_MODE trading"

      - name: Update algo/fred Secrets Manager
        if: ${{ github.event.inputs.update_fred == 'true' }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "WARN: FRED_API_KEY GitHub Secret is empty — skipping"
          else
            SECRET_JSON=$(printf '{"api_key":"%s"}' "$FRED_API_KEY")
            aws secretsmanager update-secret \
              --secret-id algo/fred \
              --region us-east-1 \
              --secret-string "$SECRET_JSON" || \
            aws secretsmanager create-secret \
              --name algo/fred \
              --region us-east-1 \
              --secret-string "$SECRET_JSON"
            echo "✅ algo/fred updated"
          fi

      - name: Trigger code redeploy
        run: |
          echo "Triggering deploy-code workflow to pick up new credentials..."
          gh workflow run deploy-code.yml --repo ${{ github.repository }}
          echo "✅ Redeploy triggered — Lambda will pick up new credentials within ~5 minutes"
        env:
          GH_TOKEN: ${{ github.token }}
