name: Test API Endpoint (Real HTTP Request)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test-api-live:
    name: Test API with Real HTTP Requests
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway Endpoint
        id: endpoint
        run: |
          # Get API Gateway v2 endpoint
          ENDPOINT=$(aws apigatewayv2 get-apis \
            --region $AWS_REGION \
            --query 'Items[0].ApiEndpoint' \
            --output text 2>/dev/null || echo "")

          if [ -z "$ENDPOINT" ] || [ "$ENDPOINT" = "None" ]; then
            echo "No API Gateway v2 found, checking v1 REST API..."
            ENDPOINT=$(aws apigateway get-rest-apis \
              --region $AWS_REGION \
              --query 'items[0].id' \
              --output text 2>/dev/null || echo "")

            if [ -n "$ENDPOINT" ] && [ "$ENDPOINT" != "None" ]; then
              STAGE=$(aws apigateway get-stages \
                --rest-api-id "$ENDPOINT" \
                --region $AWS_REGION \
                --query 'item[0].stageName' \
                --output text 2>/dev/null || echo "dev")
              ENDPOINT="https://${ENDPOINT}.execute-api.${AWS_REGION}.amazonaws.com/${STAGE}"
            fi
          fi

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "API Endpoint: $ENDPOINT"

      - name: Test /api/health (No Auth Required)
        if: steps.endpoint.outputs.endpoint != ''
        run: |
          ENDPOINT="${{ steps.endpoint.outputs.endpoint }}"
          echo "Testing: ${ENDPOINT}/api/health"

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" "$ENDPOINT/api/health")
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/response.json | jq . 2>/dev/null || cat /tmp/response.json

          if [ "$HTTP_CODE" = "500" ]; then
            echo "❌ ERROR: API returned 500"
            exit 1
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "✓ API returned 200"
          else
            echo "⚠️ Unexpected status: $HTTP_CODE"
          fi

      - name: Test /api/health/detailed
        if: steps.endpoint.outputs.endpoint != ''
        run: |
          ENDPOINT="${{ steps.endpoint.outputs.endpoint }}"
          echo "Testing: ${ENDPOINT}/api/health/detailed"

          HTTP_CODE=$(curl -s -o /tmp/detailed.json -w "%{http_code}" "$ENDPOINT/api/health/detailed")
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/detailed.json | jq . 2>/dev/null || cat /tmp/detailed.json

          if [ "$HTTP_CODE" = "500" ]; then
            echo "❌ ERROR: API returned 500"
            exit 1
          elif [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "503" ]; then
            echo "✓ API responded"
          fi

      - name: Test /api/signals (Public Endpoint)
        if: steps.endpoint.outputs.endpoint != ''
        continue-on-error: true
        run: |
          ENDPOINT="${{ steps.endpoint.outputs.endpoint }}"
          echo "Testing: ${ENDPOINT}/api/signals/stocks"

          HTTP_CODE=$(curl -s -o /tmp/signals.json -w "%{http_code}" "$ENDPOINT/api/signals/stocks?limit=5")
          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/signals.json | jq . 2>/dev/null || cat /tmp/signals.json

          if [ "$HTTP_CODE" = "500" ]; then
            echo "❌ ERROR: API returned 500"
            exit 1
          fi

      - name: If No API Gateway Found
        if: steps.endpoint.outputs.endpoint == ''
        run: |
          echo "❌ ERROR: No API Gateway endpoint found!"
          echo "Checking what infrastructure exists..."

          echo ""
          echo "=== API Gateway v2 APIs ==="
          aws apigatewayv2 get-apis --region $AWS_REGION --output json | jq '.' || echo "None"

          echo ""
          echo "=== REST APIs ==="
          aws apigateway get-rest-apis --region $AWS_REGION --output json | jq '.' || echo "None"

          echo ""
          echo "=== Lambda Functions ==="
          aws lambda list-functions --region $AWS_REGION --output json | jq '.Functions[].FunctionName' || echo "None"

          exit 1
