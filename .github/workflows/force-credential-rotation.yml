name: Force Credential Rotation

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0

permissions:
  id-token: write
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Taint IAM access key to force recreation
        working-directory: terraform
        run: |
          terraform taint 'module.iam.aws_iam_access_key.developer'
          echo "✓ Marked aws_iam_access_key.developer for recreation"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var="developer_key_rotation_date=$(date +%Y-%m-%d)" \
            2>&1 | tee tfplan.log

      - name: Verify key recreation in plan
        working-directory: terraform
        run: |
          if grep -q "aws_iam_access_key.developer will be replaced" tfplan.log; then
            echo "✓ Access key will be recreated"
          else
            echo "⚠ Plan output:"
            cat tfplan.log
          fi

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

      - name: Verify new credentials in Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region ${{ env.AWS_REGION }} \
            --query SecretString \
            --output text)

          if echo "$SECRET" | jq -e '.access_key_id and .secret_access_key' >/dev/null; then
            ACCESS_KEY=$(echo "$SECRET" | jq -r '.access_key_id')
            echo "✓ New credentials stored in Secrets Manager"
            echo "✓ New Access Key ID: ${ACCESS_KEY:0:4}...${ACCESS_KEY: -4}"
          else
            echo "✗ Failed to retrieve credentials from Secrets Manager"
            exit 1
          fi

      - name: Test new credentials
        run: |
          aws sts get-caller-identity --region ${{ env.AWS_REGION }} && \
            echo "✓ New credentials verified working" || \
            echo "⚠ Credentials stored but verification pending (IAM propagation ~1 min)"

      - name: Summary
        run: |
          echo "## Developer Credentials Rotated ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Forced recreation of IAM access key" >> $GITHUB_STEP_SUMMARY
          echo "**New Key ID:** ${ACCESS_KEY:0:4}...${ACCESS_KEY: -4}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users should refresh local credentials:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "scripts/refresh-aws-credentials.ps1" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
