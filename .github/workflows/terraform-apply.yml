# ============================================================
# GitHub Actions Workflow - Terraform Apply
# ============================================================

name: Terraform Apply

on:
  push:
    branches: [ main ]
    paths:
      - "terraform/**"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_ref_path: ${{ github.ref }}
  TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Bootstrap AWS prerequisites
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x .github/workflows/bootstrap.sh
          .github/workflows/bootstrap.sh "${{ env.AWS_REGION }}" "${{ secrets.AWS_ACCOUNT_ID }}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Destroy all managed resources
        run: |
          cd terraform
          echo "Destroying all Terraform-managed resources..."
          terraform destroy -auto-approve -no-color || true
          echo "Resources destroyed"
          sleep 5

      - name: Delete orphaned resources
        run: |
          echo "Deleting orphaned AWS resources..."
          REGION=${{ env.AWS_REGION }}

          # Delete ECR repositories
          echo "Deleting ECR repositories..."
          aws ecr describe-repositories --region $REGION --query 'repositories[*].repositoryName' --output text | \
            xargs -I {} aws ecr delete-repository --repository-name {} --force --region $REGION 2>/dev/null || true

          # Delete CloudWatch log groups
          echo "Deleting CloudWatch log groups..."
          aws logs describe-log-groups --region $REGION --query 'logGroups[*].logGroupName' --output text | \
            while read LG; do
              [ -n "$LG" ] && aws logs delete-log-group --log-group-name "$LG" --region $REGION 2>/dev/null || true
            done

          # Delete RDS parameter groups (except default ones)
          echo "Deleting RDS parameter groups..."
          aws rds describe-db-parameter-groups --region $REGION --query 'DBParameterGroups[*].DBParameterGroupName' --output text | \
            while read PG; do
              [[ "$PG" != "default."* ]] && [ -n "$PG" ] && aws rds delete-db-parameter-group --db-parameter-group-name "$PG" --region $REGION 2>/dev/null || true
            done

          # Delete IAM roles (those matching our pattern)
          echo "Deleting IAM roles..."
          aws iam list-roles --query "Roles[?contains(RoleName, 'stocks-')].RoleName" --output text | \
            while read ROLE; do
              [ -n "$ROLE" ] && {
                # Detach all policies first
                aws iam list-role-policies --role-name "$ROLE" --query 'RolePolicyNames[*]' --output text | \
                  xargs -I {} aws iam delete-role-policy --role-name "$ROLE" --policy-name {} 2>/dev/null || true
                # Detach managed policies
                aws iam list-attached-role-policies --role-name "$ROLE" --query 'AttachedPolicies[*].PolicyArn' --output text | \
                  xargs -I {} aws iam detach-role-policy --role-name "$ROLE" --policy-arn {} 2>/dev/null || true
                # Delete the role
                aws iam delete-role --role-name "$ROLE" 2>/dev/null || true
              }
            done

          echo "Orphaned resource cleanup complete"
          sleep 5

      - name: Clear backend state and locks
        run: |
          echo "Clearing Terraform state backend..."
          aws s3 rm s3://stocks-terraform-state/dev/terraform.tfstate --region ${{ env.AWS_REGION }} || true
          aws dynamodb scan --table-name stocks-terraform-locks --region ${{ env.AWS_REGION }} \
            --query 'Items[*].LockID.S' --output text 2>/dev/null | \
            xargs -I {} aws dynamodb delete-item --table-name stocks-terraform-locks \
            --key '{"LockID":{"S":"{}"}}' --region ${{ env.AWS_REGION }} 2>/dev/null || true
          echo "Backend cleared"
          sleep 3

      - name: Terraform init clean
        run: |
          cd terraform
          terraform init -upgrade -reconfigure

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan.bin

      - name: Terraform apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -no-color tfplan.bin

      - name: Capture outputs
        id: outputs
        run: |
          cd terraform
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Create deployment summary
        run: |
          echo "✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Backup state
        if: success()
        run: |
          aws s3 cp \
            s3://stocks-terraform-state/dev/terraform.tfstate \
            s3://stocks-terraform-state/backups/terraform.tfstate.$(date +%s).backup \
            --region ${{ env.AWS_REGION }}

  rollback-on-failure:
    name: Rollback on failure
    needs: [ apply ]
    if: failure()
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Check last successful state
        run: |
          echo "❌ Terraform Apply Failed"
          echo ""
          echo "To rollback:"
          echo "1. Review the error logs above"
          echo "2. Fix the Terraform code"
          echo "3. Re-run the workflow manually via: gh workflow run terraform-apply.yml"
          echo ""
          echo "If you need to revert to the last known good state:"
          echo "aws s3 cp s3://stocks-terraform-state/backups/terraform.tfstate.XXX.backup s3://stocks-terraform-state/dev/terraform.tfstate"

      - name: Notify on Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Terraform Apply Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply Failed*\nRepository: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
