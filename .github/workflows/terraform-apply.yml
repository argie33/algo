# ============================================================
# GitHub Actions Workflow - Terraform Apply
# ============================================================

name: Terraform Apply

on:
  push:
    branches: [ main ]
    paths:
      - "terraform/**"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_ref_path: ${{ github.ref }}
  TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Bootstrap AWS prerequisites
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x .github/workflows/bootstrap.sh
          .github/workflows/bootstrap.sh "${{ env.AWS_REGION }}" "${{ secrets.AWS_ACCOUNT_ID }}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Destroy all managed resources
        run: |
          cd terraform
          echo "Destroying all Terraform-managed resources..."
          terraform destroy -auto-approve -no-color || true
          echo "Resources destroyed"

      - name: Clean up orphaned VPCs
        run: |
          echo "Cleaning up orphaned VPCs (keeping default)..."
          # Get all non-default VPCs
          VPC_IDS=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=isDefault,Values=false" \
            --query 'Vpcs[*].VpcId' --output text)

          if [ -z "$VPC_IDS" ]; then
            echo "No orphaned VPCs found"
            exit 0
          fi

          for VPC_ID in $VPC_IDS; do
            echo "Processing VPC: $VPC_ID"

            # Delete all subnets
            SUBNET_IDS=$(aws ec2 describe-subnets --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query 'Subnets[*].SubnetId' --output text)
            for SUBNET_ID in $SUBNET_IDS; do
              aws ec2 delete-subnet --subnet-id $SUBNET_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Delete all security groups (except default)
            SG_IDS=$(aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=!default" \
              --query 'SecurityGroups[*].GroupId' --output text)
            for SG_ID in $SG_IDS; do
              aws ec2 delete-security-group --group-id $SG_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Delete NAT gateways
            NAT_GW_IDS=$(aws ec2 describe-nat-gateways --region ${{ env.AWS_REGION }} \
              --filter "Name=vpc-id,Values=$VPC_ID" \
              --query 'NatGateways[*].NatGatewayId' --output text)
            for NAT_GW_ID in $NAT_GW_IDS; do
              aws ec2 delete-nat-gateway --nat-gateway-id $NAT_GW_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Delete internet gateways
            IGW_IDS=$(aws ec2 describe-internet-gateways --region ${{ env.AWS_REGION }} \
              --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
              --query 'InternetGateways[*].InternetGatewayId' --output text)
            for IGW_ID in $IGW_IDS; do
              aws ec2 detach-internet-gateway --internet-gateway-id $IGW_ID --vpc-id $VPC_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id $IGW_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Delete route tables
            RT_IDS=$(aws ec2 describe-route-tables --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=association.main,Values=false" \
              --query 'RouteTables[*].RouteTableId' --output text)
            for RT_ID in $RT_IDS; do
              aws ec2 delete-route-table --route-table-id $RT_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Delete network ACLs
            NACL_IDS=$(aws ec2 describe-network-acls --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=default,Values=false" \
              --query 'NetworkAcls[*].NetworkAclId' --output text)
            for NACL_ID in $NACL_IDS; do
              aws ec2 delete-network-acl --network-acl-id $NACL_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            done

            # Finally delete the VPC
            sleep 5
            aws ec2 delete-vpc --vpc-id $VPC_ID --region ${{ env.AWS_REGION }} 2>/dev/null || true
            echo "Deleted VPC: $VPC_ID"
          done
          echo "VPC cleanup complete"

      - name: Clear backend state and locks
        run: |
          echo "Clearing Terraform state backend..."
          aws s3 rm s3://stocks-terraform-state/dev/terraform.tfstate --region ${{ env.AWS_REGION }} || true
          aws dynamodb scan --table-name stocks-terraform-locks --region ${{ env.AWS_REGION }} \
            --query 'Items[*].LockID.S' --output text 2>/dev/null | \
            xargs -I {} aws dynamodb delete-item --table-name stocks-terraform-locks \
            --key '{"LockID":{"S":"{}"}}' --region ${{ env.AWS_REGION }} 2>/dev/null || true
          echo "Backend cleared"
          sleep 2

      - name: Terraform init clean
        run: |
          cd terraform
          terraform init -upgrade -reconfigure

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan.bin

      - name: Terraform apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -no-color tfplan.bin

      - name: Capture outputs
        id: outputs
        run: |
          cd terraform
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Create deployment summary
        run: |
          echo "✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Backup state
        if: success()
        run: |
          aws s3 cp \
            s3://stocks-terraform-state/dev/terraform.tfstate \
            s3://stocks-terraform-state/backups/terraform.tfstate.$(date +%s).backup \
            --region ${{ env.AWS_REGION }}

  rollback-on-failure:
    name: Rollback on failure
    needs: [ apply ]
    if: failure()
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Check last successful state
        run: |
          echo "❌ Terraform Apply Failed"
          echo ""
          echo "To rollback:"
          echo "1. Review the error logs above"
          echo "2. Fix the Terraform code"
          echo "3. Re-run the workflow manually via: gh workflow run terraform-apply.yml"
          echo ""
          echo "If you need to revert to the last known good state:"
          echo "aws s3 cp s3://stocks-terraform-state/backups/terraform.tfstate.XXX.backup s3://stocks-terraform-state/dev/terraform.tfstate"

      - name: Notify on Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Terraform Apply Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply Failed*\nRepository: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
