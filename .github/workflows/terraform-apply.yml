# ============================================================
# GitHub Actions Workflow - Terraform Apply
# ============================================================

name: Terraform Apply

on:
  push:
    branches: [ main ]
    paths:
      - "terraform/**"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_ref_path: ${{ github.ref }}
  TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Bootstrap AWS prerequisites
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x .github/workflows/bootstrap.sh
          .github/workflows/bootstrap.sh "${{ env.AWS_REGION }}" "${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Comprehensive AWS cleanup (with basic auth)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Running comprehensive AWS resource cleanup..."
          REGION=${{ env.AWS_REGION }}

          # Delete S3 buckets
          echo "[1/4] Deleting S3 buckets..."
          for BUCKET in $(aws s3api list-buckets --query 'Buckets[?starts_with(Name, `stocks-`)].Name' --output text 2>/dev/null || echo ""); do
            [ -n "$BUCKET" ] && {
              echo "  Removing objects from $BUCKET..."
              aws s3 rm "s3://$BUCKET" --recursive --region $REGION 2>/dev/null || true
              echo "  Deleting $BUCKET..."
              aws s3api delete-bucket --bucket "$BUCKET" --region $REGION 2>/dev/null && echo "    ✅ Deleted $BUCKET" || true
            }
          done

          # Delete CloudFront OAC
          echo "[2/4] Deleting CloudFront OAC..."
          for OAC_ID in $(aws cloudfront list-origin-access-controls --query 'OriginAccessControlList.Items[?Name==`stocks-frontend-oac-dev`].Id' --output text 2>/dev/null || echo ""); do
            [ -n "$OAC_ID" ] && aws cloudfront delete-origin-access-control --id "$OAC_ID" --e-tag "placeholder" 2>/dev/null || true
          done

          # Delete all stocks-* IAM roles
          echo "[3/4] Deleting all stocks-* IAM roles..."
          for ROLE in $(aws iam list-roles --query "Roles[?starts_with(RoleName, \`stocks-\`)].RoleName" --output text 2>/dev/null || echo ""); do
            [ -n "$ROLE" ] && {
              echo "  Deleting inline policies from $ROLE..."
              for POLICY in $(aws iam list-role-policies --role-name "$ROLE" --query 'RolePolicyNames[*]' --output text 2>/dev/null || echo ""); do
                [ -n "$POLICY" ] && aws iam delete-role-policy --role-name "$ROLE" --policy-name "$POLICY" 2>/dev/null || true
              done
              echo "  Detaching managed policies from $ROLE..."
              for POLICY_ARN in $(aws iam list-attached-role-policies --role-name "$ROLE" --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || echo ""); do
                [ -n "$POLICY_ARN" ] && aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$POLICY_ARN" 2>/dev/null || true
              done
              echo "  Deleting $ROLE..."
              aws iam delete-role --role-name "$ROLE" 2>/dev/null && echo "    ✅ Deleted $ROLE" || true
            }
          done

          # Delete instance profiles that might be lingering
          echo "[4/4] Deleting orphaned EC2 instance profiles..."
          for PROFILE in $(aws iam list-instance-profiles --query 'InstanceProfiles[?starts_with(InstanceProfileName, `stocks-`)].InstanceProfileName' --output text 2>/dev/null || echo ""); do
            [ -n "$PROFILE" ] && {
              echo "  Removing roles from $PROFILE..."
              for ROLE in $(aws iam get-instance-profile --instance-profile-name "$PROFILE" --query 'InstanceProfile.Roles[*].RoleName' --output text 2>/dev/null || echo ""); do
                [ -n "$ROLE" ] && aws iam remove-role-from-instance-profile --instance-profile-name "$PROFILE" --role-name "$ROLE" 2>/dev/null || true
              done
              echo "  Deleting $PROFILE..."
              aws iam delete-instance-profile --instance-profile-name "$PROFILE" 2>/dev/null && echo "    ✅ Deleted $PROFILE" || true
            }
          done

          echo "Cleanup complete"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete all non-default VPCs (force cleanup for VPC limit)
        run: |
          echo "Aggressively deleting ALL non-default VPCs to free VPC quota..."
          REGION=${{ env.AWS_REGION }}
          MAX_ATTEMPTS=3

          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            echo ""
            echo "=== Cleanup Attempt $ATTEMPT/$MAX_ATTEMPTS ==="

            VPC_COUNT=$(aws ec2 describe-vpcs --region $REGION --filters "Name=isDefault,Values=false" --query 'length(Vpcs)' --output text 2>&1 || echo "0")
            echo "Non-default VPCs found: $VPC_COUNT"

            for VPC_ID in $(aws ec2 describe-vpcs --region $REGION --filters "Name=isDefault,Values=false" --query 'Vpcs[*].VpcId' --output text 2>&1 || echo ""); do
              [ -z "$VPC_ID" ] && continue
              echo ""
              echo "Processing VPC: $VPC_ID"

              # Force delete all network interfaces
              echo "  Deleting ENIs..."
              for ENI in $(aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text 2>&1 || echo ""); do
                [ -z "$ENI" ] && continue
                aws ec2 delete-network-interface --network-interface-id "$ENI" --region $REGION 2>&1 && echo "    ✓ Deleted: $ENI" || echo "    ✗ Failed: $ENI"
              done

              # Delete all subnets
              echo "  Deleting subnets..."
              for SUBNET in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'Subnets[*].SubnetId' --output text 2>&1 || echo ""); do
                [ -z "$SUBNET" ] && continue
                aws ec2 delete-subnet --subnet-id "$SUBNET" --region $REGION 2>&1 && echo "    ✓ Deleted: $SUBNET" || echo "    ✗ Failed: $SUBNET"
              done

              # Delete internet gateways
              echo "  Deleting IGWs..."
              for IGW in $(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$VPC_ID" --region $REGION --query 'InternetGateways[*].InternetGatewayId' --output text 2>&1 || echo ""); do
                [ -z "$IGW" ] && continue
                aws ec2 detach-internet-gateway --internet-gateway-id "$IGW" --vpc-id "$VPC_ID" --region $REGION 2>&1 || true
                aws ec2 delete-internet-gateway --internet-gateway-id "$IGW" --region $REGION 2>&1 && echo "    ✓ Deleted: $IGW" || echo "    ✗ Failed: $IGW"
              done

              # Delete route tables (except main)
              echo "  Deleting route tables..."
              for RTB in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'RouteTables[?Associations[0].Main!=`true`].RouteTableId' --output text 2>&1 || echo ""); do
                [ -z "$RTB" ] && continue
                aws ec2 delete-route-table --route-table-id "$RTB" --region $REGION 2>&1 && echo "    ✓ Deleted: $RTB" || echo "    ✗ Failed: $RTB"
              done

              # Delete the VPC
              echo "  Deleting VPC..."
              aws ec2 delete-vpc --vpc-id "$VPC_ID" --region $REGION 2>&1 && echo "  ✅ Deleted VPC: $VPC_ID" || echo "  ⚠️  Could not delete VPC (dependencies remain)"
            done

            sleep 2
          done

          FINAL_COUNT=$(aws ec2 describe-vpcs --region $REGION --filters "Name=isDefault,Values=false" --query 'length(Vpcs)' --output text 2>&1 || echo "?")
          echo ""
          echo "Final non-default VPC count: $FINAL_COUNT"

      - name: Delete orphaned resources before init
        run: |
          echo "Deleting ALL orphaned AWS resources before Terraform init..."
          REGION=${{ env.AWS_REGION }}

          # Delete ECR repositories
          echo "[1/6] Deleting ECR repositories..."
          for REPO in $(aws ecr describe-repositories --region $REGION --query 'repositories[*].repositoryName' --output text 2>/dev/null || echo ""); do
            [ -n "$REPO" ] && aws ecr delete-repository --repository-name "$REPO" --force --region $REGION 2>/dev/null && echo "  Deleted ECR: $REPO"
          done

          # Delete CloudWatch log groups
          echo "[2/6] Deleting CloudWatch log groups..."
          for LG in $(aws logs describe-log-groups --region $REGION --query 'logGroups[*].logGroupName' --output text 2>/dev/null || echo ""); do
            [ -n "$LG" ] && aws logs delete-log-group --log-group-name "$LG" --region $REGION 2>/dev/null && echo "  Deleted log group: $LG"
          done

          # Delete Secrets Manager secrets
          echo "[3/6] Deleting Secrets Manager secrets..."
          for SECRET in $(aws secretsmanager list-secrets --region $REGION --query 'SecretList[*].Name' --output text 2>/dev/null || echo ""); do
            [ -n "$SECRET" ] && aws secretsmanager delete-secret --secret-id "$SECRET" --force-delete-without-recovery --region $REGION 2>/dev/null && echo "  Deleted secret: $SECRET"
          done

          # Delete RDS parameter groups (except default ones)
          echo "[4/6] Deleting RDS parameter groups..."
          for PG in $(aws rds describe-db-parameter-groups --region $REGION --query 'DBParameterGroups[*].DBParameterGroupName' --output text 2>/dev/null || echo ""); do
            [[ "$PG" != "default."* ]] && [ -n "$PG" ] && aws rds delete-db-parameter-group --db-parameter-group-name "$PG" --region $REGION 2>/dev/null && echo "  Deleted RDS param group: $PG"
          done

          echo "[5/6] Skipping IAM role deletion (will be replaced by Terraform)"
          echo "[6/6] Skipping instance profile deletion (will be replaced by Terraform)"

          echo "Orphaned resource cleanup complete (ECR, logs, secrets, RDS params)"
          sleep 5

      - name: Clear corrupted Terraform state (force reset)
        run: |
          echo "Clearing corrupted Terraform state files..."

          # Delete S3 state files (the main fix)
          echo "Deleting S3 state files..."
          aws s3 rm s3://stocks-terraform-state/dev/ --recursive 2>/dev/null || true

          # Clear DynamoDB lock table entries (don't delete table, just clear locks)
          echo "Clearing stale DynamoDB lock entries..."
          aws dynamodb scan \
            --table-name stocks-terraform-locks \
            --projection-expression "LockID" \
            --region us-east-1 \
            --query 'Items[].LockID.S' \
            --output text 2>/dev/null | xargs -I {} \
            aws dynamodb delete-item \
              --table-name stocks-terraform-locks \
              --key "{\"LockID\":{\"S\":\"{}\"}}" \
              --region us-east-1 2>/dev/null || true

          echo "✅ State cleared and ready for fresh init"

      - name: Terraform init
        run: |
          cd terraform
          terraform init -upgrade -reconfigure -backend-config="encrypt=true"

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan.bin

      - name: Terraform apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -no-color tfplan.bin

      - name: Capture outputs
        id: outputs
        run: |
          cd terraform
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Create deployment summary
        run: |
          echo "✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Backup state
        if: success()
        run: |
          aws s3 cp \
            s3://stocks-terraform-state/dev/terraform.tfstate \
            s3://stocks-terraform-state/backups/terraform.tfstate.$(date +%s).backup \
            --region ${{ env.AWS_REGION }}

  rollback-on-failure:
    name: Rollback on failure
    needs: [ apply ]
    if: failure()
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Check last successful state
        run: |
          echo "❌ Terraform Apply Failed"
          echo ""
          echo "To rollback:"
          echo "1. Review the error logs above"
          echo "2. Fix the Terraform code"
          echo "3. Re-run the workflow manually via: gh workflow run terraform-apply.yml"
          echo ""
          echo "If you need to revert to the last known good state:"
          echo "aws s3 cp s3://stocks-terraform-state/backups/terraform.tfstate.XXX.backup s3://stocks-terraform-state/dev/terraform.tfstate"

      - name: Notify on Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Terraform Apply Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply Failed*\nRepository: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
