# ============================================================
# GitHub Actions Workflow - Terraform Apply
# ============================================================

name: Terraform Apply

on:
  push:
    branches: [ main ]
    paths:
      - "terraform/**"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_ref_path: ${{ github.ref }}
  TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Bootstrap AWS prerequisites
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x .github/workflows/bootstrap.sh
          .github/workflows/bootstrap.sh "${{ env.AWS_REGION }}" "${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Comprehensive AWS cleanup (with basic auth)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Running comprehensive AWS resource cleanup..."
          REGION=${{ env.AWS_REGION }}

          # Delete S3 buckets
          echo "[1/4] Deleting S3 buckets..."
          for BUCKET in $(aws s3api list-buckets --query 'Buckets[?starts_with(Name, `stocks-`)].Name' --output text 2>/dev/null || echo ""); do
            [ -n "$BUCKET" ] && {
              echo "  Removing objects from $BUCKET..."
              aws s3 rm "s3://$BUCKET" --recursive --region $REGION 2>/dev/null || true
              echo "  Deleting $BUCKET..."
              aws s3api delete-bucket --bucket "$BUCKET" --region $REGION 2>/dev/null && echo "    ✅ Deleted $BUCKET" || true
            }
          done

          # Delete CloudFront OAC
          echo "[2/4] Deleting CloudFront OAC..."
          for OAC_ID in $(aws cloudfront list-origin-access-controls --query 'OriginAccessControlList.Items[?Name==`stocks-frontend-oac-dev`].Id' --output text 2>/dev/null || echo ""); do
            [ -n "$OAC_ID" ] && aws cloudfront delete-origin-access-control --id "$OAC_ID" --e-tag "placeholder" 2>/dev/null || true
          done

          # Delete all stocks-* IAM roles
          echo "[3/4] Deleting all stocks-* IAM roles..."
          for ROLE in $(aws iam list-roles --query "Roles[?starts_with(RoleName, \`stocks-\`)].RoleName" --output text 2>/dev/null || echo ""); do
            [ -n "$ROLE" ] && {
              echo "  Deleting inline policies from $ROLE..."
              for POLICY in $(aws iam list-role-policies --role-name "$ROLE" --query 'RolePolicyNames[*]' --output text 2>/dev/null || echo ""); do
                [ -n "$POLICY" ] && aws iam delete-role-policy --role-name "$ROLE" --policy-name "$POLICY" 2>/dev/null || true
              done
              echo "  Detaching managed policies from $ROLE..."
              for POLICY_ARN in $(aws iam list-attached-role-policies --role-name "$ROLE" --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || echo ""); do
                [ -n "$POLICY_ARN" ] && aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$POLICY_ARN" 2>/dev/null || true
              done
              echo "  Deleting $ROLE..."
              aws iam delete-role --role-name "$ROLE" 2>/dev/null && echo "    ✅ Deleted $ROLE" || true
            }
          done

          # Run deep VPC cleanup and wait
          echo "[4/4] Running deep VPC cleanup..."
          RUN_ID=$(gh workflow run deep-cleanup-vpc.yml --repo argie33/algo --json id -q)
          echo "Deep VPC cleanup workflow triggered (run_id: $RUN_ID)"

          # Wait for the workflow to complete
          echo "Waiting for deep VPC cleanup to complete..."
          TIMEOUT=600  # 10 minutes
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gh run view "$RUN_ID" --repo argie33/algo --json conclusion -q 2>/dev/null || echo "in_progress")
            if [ "$STATUS" != "in_progress" ] && [ -n "$STATUS" ]; then
              echo "Deep VPC cleanup completed with status: $STATUS"
              if [ "$STATUS" != "success" ]; then
                echo "Warning: Deep VPC cleanup did not succeed, continuing anyway..."
              fi
              break
            fi
            echo "  Still running... ($ELAPSED/$TIMEOUT seconds)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Warning: Deep VPC cleanup timed out after 10 minutes, continuing anyway..."
          fi

          echo "Cleanup complete"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete orphaned resources before init
        run: |
          echo "Deleting ALL orphaned AWS resources before Terraform init..."
          REGION=${{ env.AWS_REGION }}

          # Delete ECR repositories
          echo "[1/6] Deleting ECR repositories..."
          for REPO in $(aws ecr describe-repositories --region $REGION --query 'repositories[*].repositoryName' --output text 2>/dev/null || echo ""); do
            [ -n "$REPO" ] && aws ecr delete-repository --repository-name "$REPO" --force --region $REGION 2>/dev/null && echo "  Deleted ECR: $REPO"
          done

          # Delete CloudWatch log groups
          echo "[2/6] Deleting CloudWatch log groups..."
          for LG in $(aws logs describe-log-groups --region $REGION --query 'logGroups[*].logGroupName' --output text 2>/dev/null || echo ""); do
            [ -n "$LG" ] && aws logs delete-log-group --log-group-name "$LG" --region $REGION 2>/dev/null && echo "  Deleted log group: $LG"
          done

          # Delete Secrets Manager secrets
          echo "[3/6] Deleting Secrets Manager secrets..."
          for SECRET in $(aws secretsmanager list-secrets --region $REGION --query 'SecretList[*].Name' --output text 2>/dev/null || echo ""); do
            [ -n "$SECRET" ] && aws secretsmanager delete-secret --secret-id "$SECRET" --force-delete-without-recovery --region $REGION 2>/dev/null && echo "  Deleted secret: $SECRET"
          done

          # Delete RDS parameter groups (except default ones)
          echo "[4/6] Deleting RDS parameter groups..."
          for PG in $(aws rds describe-db-parameter-groups --region $REGION --query 'DBParameterGroups[*].DBParameterGroupName' --output text 2>/dev/null || echo ""); do
            [[ "$PG" != "default."* ]] && [ -n "$PG" ] && aws rds delete-db-parameter-group --db-parameter-group-name "$PG" --region $REGION 2>/dev/null && echo "  Deleted RDS param group: $PG"
          done

          echo "[5/6] Skipping IAM role deletion (will be replaced by Terraform)"
          echo "[6/6] Skipping instance profile deletion (will be replaced by Terraform)"

          echo "Orphaned resource cleanup complete (ECR, logs, secrets, RDS params)"
          sleep 5

      - name: Terraform init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Destroy all managed resources
        run: |
          cd terraform
          echo "Destroying all Terraform-managed resources..."
          terraform destroy -auto-approve -no-color || true
          echo "Resources destroyed"
          sleep 5

      - name: Clear backend state and locks
        run: |
          echo "Clearing Terraform state backend..."
          aws s3 rm s3://stocks-terraform-state/dev/terraform.tfstate --region ${{ env.AWS_REGION }} || true
          aws dynamodb scan --table-name stocks-terraform-locks --region ${{ env.AWS_REGION }} \
            --query 'Items[*].LockID.S' --output text 2>/dev/null | \
            xargs -I {} aws dynamodb delete-item --table-name stocks-terraform-locks \
            --key '{"LockID":{"S":"{}"}}' --region ${{ env.AWS_REGION }} 2>/dev/null || true
          echo "Backend cleared"
          sleep 3

      - name: Terraform init clean
        run: |
          cd terraform
          terraform init -upgrade -reconfigure

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan.bin

      - name: Terraform apply
        id: apply
        run: |
          cd terraform
          terraform apply -auto-approve -no-color tfplan.bin

      - name: Capture outputs
        id: outputs
        run: |
          cd terraform
          terraform output -json > /tmp/outputs.json
          cat /tmp/outputs.json

      - name: Create deployment summary
        run: |
          echo "✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Backup state
        if: success()
        run: |
          aws s3 cp \
            s3://stocks-terraform-state/dev/terraform.tfstate \
            s3://stocks-terraform-state/backups/terraform.tfstate.$(date +%s).backup \
            --region ${{ env.AWS_REGION }}

  rollback-on-failure:
    name: Rollback on failure
    needs: [ apply ]
    if: failure()
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Check last successful state
        run: |
          echo "❌ Terraform Apply Failed"
          echo ""
          echo "To rollback:"
          echo "1. Review the error logs above"
          echo "2. Fix the Terraform code"
          echo "3. Re-run the workflow manually via: gh workflow run terraform-apply.yml"
          echo ""
          echo "If you need to revert to the last known good state:"
          echo "aws s3 cp s3://stocks-terraform-state/backups/terraform.tfstate.XXX.backup s3://stocks-terraform-state/dev/terraform.tfstate"

      - name: Notify on Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Terraform Apply Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply Failed*\nRepository: ${{ github.repository }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
