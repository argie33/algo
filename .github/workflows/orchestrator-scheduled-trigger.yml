name: Orchestrator Scheduled Trigger

# Scheduled daily orchestrator execution (workaround while EventBridge Scheduler is unavailable)
# Triggers orchestrator Lambda at key trading times:
# - 9:30 AM ET (market open - primary trading run)
# - 1:00 PM ET (midday rebalance)
# - 3:00 PM ET (pre-close final actions)
# - 5:30 PM ET (after-close reconciliation)

on:
  schedule:
    # Market open (9:30 AM ET = 2:30 PM UTC on business days)
    - cron: '30 14 * * MON-FRI'
    # Midday rebalance (1:00 PM ET = 6:00 PM UTC)
    - cron: '0 18 * * MON-FRI'
    # Pre-close (3:00 PM ET = 8:00 PM UTC)
    - cron: '0 20 * * MON-FRI'
    # After-close reconciliation (5:30 PM ET = 10:30 PM UTC)
    - cron: '30 22 * * MON-FRI'
  workflow_dispatch:

jobs:
  trigger-orchestrator:
    runs-on: ubuntu-latest
    name: Trigger Orchestrator Lambda
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Determine run identifier
        id: run-id
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "14" ]; then
            RUN_ID="morning"
          elif [ "$HOUR" = "18" ]; then
            RUN_ID="afternoon"
          elif [ "$HOUR" = "20" ]; then
            RUN_ID="preclose"
          else
            RUN_ID="evening"
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Orchestrator run: $RUN_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invoke Orchestrator Lambda
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          RUN_IDENTIFIER="gh-actions-${{ steps.run-id.outputs.run_id }}-${TIMESTAMP}-${GITHUB_RUN_ID}"

          echo "Invoking orchestrator Lambda"
          echo "Run Identifier: $RUN_IDENTIFIER"

          aws lambda invoke \
            --function-name algo-algo-dev \
            --region us-east-1 \
            --invocation-type RequestResponse \
            --payload "$(cat <<EOF
          {
            "source": "github-actions-scheduler",
            "run_identifier": "$RUN_IDENTIFIER",
            "execution_mode": "paper",
            "run_type": "${{ steps.run-id.outputs.run_id }}"
          }
          EOF
          )" \
            response.json

          echo "Lambda invocation response:"
          cat response.json

          # Extract status code
          STATUS=$(grep -o '"statusCode":[0-9]*' response.json | grep -o '[0-9]*')
          echo "Status Code: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✓ Orchestrator executed successfully"
            exit 0
          else
            echo "❌ Orchestrator execution failed"
            exit 1
          fi

      - name: Report Success
        if: success()
        run: |
          echo "✓ Orchestrator run completed successfully (${{ steps.run-id.outputs.run_id }})"

      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Orchestrator run failed (${{ steps.run-id.outputs.run_id }})"
          exit 1
