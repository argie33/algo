name: Deploy Algo Orchestrator

on:
  push:
    paths:
      - 'algo_*.py'
      - 'lambda_function.py'
      - 'template-algo-orchestrator.yml'
      - 'requirements.txt'
      - '.github/workflows/deploy-algo-orchestrator.yml'
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy Algo Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Lambda package
        run: |
          mkdir -p lambda-pkg
          cd lambda-pkg

          # Copy all algo code
          cp ../lambda_function.py .
          cp ../algo_*.py .
          cp ../run_eod_loaders.sh . 2>/dev/null || true

          # Install dependencies with binary support for Amazon Linux
          pip install -r ../requirements.txt -t . --only-binary=:all:

          # Create deployment zip
          zip -r ../algo-orchestrator.zip . -x "*.pyc" "__pycache__/*" ".git/*"

          cd ..
          ls -lh algo-orchestrator.zip
          unzip -l algo-orchestrator.zip | grep -E "psycopg2|algo_|lambda"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name algo-orchestrator \
            --zip-file fileb://algo-orchestrator.zip \
            --region ${{ env.AWS_REGION }}

          # Wait for update
          sleep 5

          # Test the function
          aws lambda invoke \
            --function-name algo-orchestrator \
            --region ${{ env.AWS_REGION }} \
            --payload '{}' \
            /tmp/test-output.json

          cat /tmp/test-output.json

      - name: Success
        if: success()
        run: echo "Lambda deployed successfully"
