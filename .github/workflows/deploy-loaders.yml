# DEPRECATED — loaders are ECS tasks defined in Terraform. Use deploy-all-infrastructure.yml.
# Docker image is built by build-push-ecr.yml.
name: deploy-loaders (deprecated)

on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: 'Auto approve Terraform deployment'
        required: false
        default: 'false'
  workflow_call:

concurrency:
  group: deploy-loaders
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Terraform loaders module validation
        run: |
          cd terraform/modules/loaders
          terraform init -backend=false
          terraform validate

  plan:
    name: Plan Terraform Deployment
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend-config=backend-config.hcl

      - name: Terraform plan
        run: |
          cd terraform
          terraform plan -target=module.loaders -out=loaders.tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: terraform/loaders.tfplan

  deploy:
    name: Deploy Loaders
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download plan artifact
        uses: actions/download-artifact@v3
        with:
          name: terraform-plan
          path: terraform/

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend-config=backend-config.hcl

      - name: Terraform apply
        run: |
          cd terraform
          terraform apply loaders.tfplan

      - name: Verify loaders deployment
        run: |
          echo "=== ECS Task Definitions ==="
          aws ecs list-task-definitions \
            --family-prefix stocks-loaders \
            --region us-east-1 \
            --query 'taskDefinitionArns | length(@)' || echo "0"

          echo ""
          echo "=== EventBridge Rules ==="
          aws events list-rules \
            --name-prefix stocks \
            --region us-east-1 \
            --query 'Rules[?contains(Name, `loader`)] | length(@)' || echo "0"

          echo ""
          echo "=== CloudWatch Log Groups ==="
          aws logs describe-log-groups \
            --log-group-name-prefix "/ecs/stocks" \
            --region us-east-1 \
            --query 'logGroups[?contains(logGroupName, `loader`)] | length(@)' || echo "0"

  rollback-on-failure:
    name: Rollback on failure
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend-config=backend-config.hcl

      - name: Terraform destroy (rollback)
        run: |
          cd terraform
          terraform destroy -target=module.loaders -auto-approve
        continue-on-error: true

      - name: Post failure notification
        run: |
          echo "⚠️ Loaders deployment failed and rollback attempted"
          echo "Check logs above for details"
          echo "To retry: Push to main branch or manually trigger workflow"
