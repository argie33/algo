name: Sync RDS Password Once

# Simple one-time workflow to ensure RDS password matches GitHub Secrets + Secrets Manager.
# After this runs successfully, main deploy workflow will keep everything in sync.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  sync:
    name: Sync RDS Password with Secrets Manager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Set RDS Password (and verify)
        env:
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          if [ -z "$RDS_PASSWORD" ]; then
            echo "❌ RDS_PASSWORD secret not set in GitHub Secrets"
            exit 1
          fi

          echo "Setting RDS password..."
          aws rds modify-db-instance \
            --db-instance-identifier algo-db \
            --master-user-password "$RDS_PASSWORD" \
            --apply-immediately \
            --region $AWS_REGION

          echo "Waiting 60s for RDS to apply password change..."
          sleep 60

          echo "Updating Secrets Manager..."
          aws secretsmanager put-secret-value \
            --secret-id algo-db-credentials-dev \
            --secret-string "$(aws secretsmanager get-secret-value \
              --secret-id algo-db-credentials-dev \
              --query 'SecretString' --output text | \
              jq --arg pw "$RDS_PASSWORD" '.password = $pw')" \
            --region $AWS_REGION

          echo "Verifying connection with psycopg2..."
          python3 << 'PYTHON'
          import subprocess
          subprocess.run(['pip', 'install', '-q', 'psycopg2-binary'])

          import psycopg2
          import json
          import os
          import boto3

          # Get credentials from Secrets Manager
          sm = boto3.client('secretsmanager', region_name='us-east-1')
          secret = json.loads(sm.get_secret_value(SecretId='algo-db-credentials-dev')['SecretString'])

          try:
              conn = psycopg2.connect(
                  host=secret['host'],
                  port=secret['port'],
                  user=secret['username'],
                  password=secret['password'],
                  database=secret['dbname'],
                  connect_timeout=10
              )
              cursor = conn.cursor()
              cursor.execute("SELECT version();")
              version = cursor.fetchone()
              print(f"✅ Connection verified! PostgreSQL: {version[0][:50]}")
              cursor.close()
              conn.close()
          except Exception as e:
              print(f"❌ Connection failed: {e}")
              exit(1)
          PYTHON

          echo "✅ RDS password synced successfully"
