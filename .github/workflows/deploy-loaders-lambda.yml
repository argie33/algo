name: Deploy Lambda Loaders

on:
  push:
    branches:
      - main
    paths:
      - template-loaders-lambda.yml
      - .github/workflows/deploy-loaders-lambda.yml
  workflow_dispatch:

concurrency:
  group: deploy-loaders-lambda
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: stocks-loaders-lambda-stack

jobs:
  deploy:
    name: Deploy Lambda Loaders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-loaders-lambda
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify app-stocks stack exists
        run: |
          STACK=$(aws cloudformation describe-stacks \
            --stack-name "stocks-app-stack" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STACK" = "MISSING" ]; then
            echo "ERROR: stocks-app-stack must be deployed first (provides DB endpoint and secrets)"
            exit 1
          fi
          echo "✓ App stack found (status: $STACK)"

      - name: Check if stack exists
        id: stack
        run: |
          RESULT=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NONE")
          echo "status=$RESULT" >> $GITHUB_OUTPUT

      - name: Create stack
        if: steps.stack.outputs.status == 'NONE'
        run: |
          echo "Creating Lambda loaders stack..."
          aws cloudformation create-stack \
            --stack-name "${{ env.STACK_NAME }}" \
            --template-body file://template-loaders-lambda.yml \
            --parameters \
              ParameterKey=FREDApiKey,ParameterValue="${{ secrets.FRED_API_KEY }}" \
              ParameterKey=AlpacaApiKeyId,ParameterValue="${{ secrets.APCA_API_KEY_ID }}" \
              ParameterKey=AlpacaApiSecretKey,ParameterValue="${{ secrets.APCA_API_SECRET_KEY }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-create-complete \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}"

          echo "✓ Stack created"

      - name: Update stack
        if: steps.stack.outputs.status != 'NONE' && steps.stack.outputs.status != 'CREATE_FAILED'
        run: |
          echo "Updating Lambda loaders stack..."
          UPDATE=$(aws cloudformation update-stack \
            --stack-name "${{ env.STACK_NAME }}" \
            --template-body file://template-loaders-lambda.yml \
            --parameters \
              ParameterKey=FREDApiKey,UsePreviousValue=true \
              ParameterKey=AlpacaApiKeyId,UsePreviousValue=true \
              ParameterKey=AlpacaApiSecretKey,UsePreviousValue=true \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" 2>&1) || true

          if echo "$UPDATE" | grep -iq "No updates are to be performed"; then
            echo "ℹ No updates needed"
          elif echo "$UPDATE" | grep -q "StackId"; then
            aws cloudformation wait stack-update-complete \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}"
            echo "✓ Stack updated"
          else
            echo "⚠ Unexpected response"
            exit 1
          fi

      - name: Verify deployment
        if: success()
        run: |
          echo ""
          echo "=== Lambda Function ==="
          aws lambda list-functions \
            --query "Functions[?FunctionName=='stocks-data-loader'].[FunctionName,Runtime,MemorySize,Timeout]" \
            --output table \
            --region "${{ env.AWS_REGION }}"

          echo ""
          echo "=== EventBridge Rules ==="
          aws events list-rules \
            --name-prefix "stocks-loader" \
            --query "Rules[].[Name,ScheduleExpression,State]" \
            --output table \
            --region "${{ env.AWS_REGION }}"

          echo ""
          echo "=== Stack Exports ==="
          aws cloudformation list-exports \
            --query "Exports[?starts_with(Name, 'StocksApp-Loader')].[Name,Value]" \
            --output table \
            --region "${{ env.AWS_REGION }}"

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✓ Lambda Loaders Deployed"
          echo "=========================================="
          echo ""
          echo "Function: stocks-data-loader"
          echo "Memory:   256 MB"
          echo "Timeout:  5 minutes"
          echo ""
          echo "Scheduled Loaders:"
          echo "  • Market Indices       (5:00 PM ET)"
          echo "  • Economic Data        (6:00 PM ET)"
          echo "  • Sector Ranking       (6:30 PM ET)"
          echo "  • Fear & Greed Index   (7:00 PM ET)"
          echo ""
          echo "Cost:     60% cheaper than ECS Fargate"
          echo "Speed:    20-30x faster cold start"
          echo ""
          echo "Monitor: CloudWatch → Lambda → stocks-data-loader"
          echo "=========================================="
