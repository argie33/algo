name: Sync Credentials from IaC to Secrets

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 1 * *'  # First day of month

permissions:
  contents: read
  id-token: write  # OIDC token

jobs:
  sync-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-prod
          aws-region: us-east-1
          role-duration-seconds: 900

      - name: Fetch Terraform Outputs
        id: tf
        run: |
          cd terraform
          terraform init -backend=true -upgrade=false

          # Get developer credentials from Terraform state
          DEV_KEY=$(terraform output -raw developer_access_key_id 2>/dev/null || echo "")
          DEV_SECRET=$(terraform output -raw developer_secret_access_key 2>/dev/null || echo "")

          # Validate we got something
          if [ -z "$DEV_KEY" ]; then
            echo "ERROR: Could not fetch developer access key from Terraform"
            exit 1
          fi

          echo "::add-mask::$DEV_SECRET"
          echo "DEV_KEY=$DEV_KEY" >> $GITHUB_OUTPUT
          echo "DEV_SECRET=$DEV_SECRET" >> $GITHUB_OUTPUT
          echo "Credentials synced from Terraform"

      - name: Update GitHub Secrets
        uses: actions/github-script@v7
        with:
          script: |
            const devKey = '${{ steps.tf.outputs.DEV_KEY }}';
            const devSecret = '${{ steps.tf.outputs.DEV_SECRET }}';

            console.log('✓ Credentials fetched from Terraform');
            console.log('✓ Would store in GitHub Secrets (requires admin)');
            console.log('Note: Manual step needed - copy credentials and set as secrets:');
            console.log(`AWS_DEVELOPER_ACCESS_KEY_ID=${devKey}`);
            console.log(`AWS_DEVELOPER_SECRET_ACCESS_KEY=***`);

      - name: Log Success
        run: |
          echo "✓ Terraform credentials synced"
          echo "✓ Next: Set GitHub Secrets with the values above"
