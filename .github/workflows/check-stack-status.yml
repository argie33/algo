name: Check stack status (read-only)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Stacks
        run: |
          aws cloudformation list-stacks --region us-east-1 \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE CREATE_FAILED ROLLBACK_COMPLETE DELETE_IN_PROGRESS DELETE_FAILED UPDATE_IN_PROGRESS UPDATE_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_ROLLBACK_IN_PROGRESS \
            --query "StackSummaries[?contains(StackName, 'stocks')].[StackName,StackStatus,LastUpdatedTime]" \
            --output table

      - name: Exports
        run: |
          aws cloudformation list-exports --region us-east-1 \
            --query "Exports[?starts_with(Name, 'StocksCore-') || starts_with(Name, 'StocksApp-')].[Name,Value]" \
            --output table

      - name: RDS
        run: |
          aws rds describe-db-instances --region us-east-1 \
            --db-instance-identifier stocks \
            --query 'DBInstances[0].[DBInstanceStatus,Endpoint.Address]' \
            --output table 2>/dev/null || echo "no stocks RDS"

      - name: Core stack - in-progress resources (find what's blocking CLEANUP)
        run: |
          aws cloudformation describe-stack-resources \
            --stack-name stocks-core --region us-east-1 \
            --query "StackResources[?contains(ResourceStatus, 'IN_PROGRESS')].[LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
            --output table 2>/dev/null || echo "(no in-progress resources)"

      - name: Bastion ASG instances (suspect culprit)
        run: |
          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names stocks-bastion-asg \
            --region us-east-1 \
            --query 'AutoScalingGroups[0].Instances[].[InstanceId,LifecycleState,HealthStatus]' \
            --output table 2>/dev/null || echo "")
          echo "$INSTANCES"
          echo ""
          echo "=== Pending bastion EC2 instances ==="
          aws ec2 describe-instances --region us-east-1 \
            --filters "Name=tag:Name,Values=stocks-bastion" "Name=instance-state-name,Values=pending,running,shutting-down,stopping" \
            --query 'Reservations[].Instances[].[InstanceId,State.Name,LaunchTime]' \
            --output table 2>/dev/null || echo "(none)"
