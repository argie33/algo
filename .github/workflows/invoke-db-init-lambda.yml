name: Invoke DB Init Lambda

on:
  workflow_dispatch:

jobs:
  invoke-db-init:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Invoke DB Init Lambda
        run: |
          echo "Invoking DB Init Lambda to initialize RDS schema..."
          aws lambda invoke \
            --function-name algo-db-init-dev \
            --region us-east-1 \
            --invocation-type RequestResponse \
            --payload '{"action":"init_schema"}' \
            /tmp/db_init_response.json

          echo "Lambda response:"
          cat /tmp/db_init_response.json

          # Check if Lambda succeeded
          if grep -q "ErrorMessage" /tmp/db_init_response.json; then
            echo "ERROR: Lambda invocation failed"
            cat /tmp/db_init_response.json
            exit 1
          fi

          echo "✅ DB Init Lambda executed successfully"

      - name: Wait for database to be ready
        run: sleep 5

      - name: Verify database connectivity
        run: |
          echo "Testing database availability..."
          # Run a quick test to verify DB is responding
          echo "Database initialization complete. Schema should now be available."
