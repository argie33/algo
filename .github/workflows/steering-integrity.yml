name: Steering Integrity Check
on: [pull_request]

jobs:
  check-steering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Reject steering doc changes with status info
        run: |
          git diff origin/main...HEAD -- steering/ | grep -E '^\+.*(BLOCKED|BLOCKER|status|NO_RECENT|CURRENT|FAILED|Error)' && {
            echo "REJECTED: Steering doc contains live status"
            echo "Steering docs are static only. Use GitHub Issues for blockers."
            exit 1
          } || exit 0
      
      - name: Enforce steering doc line limits
        run: |
          for file in steering/*.md; do
            [ -f "$file" ] || continue
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 150 ]; then
              echo "REJECTED: $file has $lines lines (max 150)"
              exit 1
            fi
          done

      - name: Block session docs at root
        run: |
          if git diff origin/main...HEAD --name-only | grep -iE '^(FINAL_|EXECUTION_|CURRENT_|_STATUS|_REPORT|_SUMMARY|_VERIFICATION)'; then
            echo "REJECTED: Session docs found at root (must go to memory/)"
            exit 1
          fi

      - name: Audit all changes
        if: success()
        run: |
          echo "=== Files changed in this PR ==="
          git diff origin/main...HEAD --name-only | head -20
          echo ""
          echo "=== Steering doc changes ==="
          git diff origin/main...HEAD -- steering/ | head -30 || echo "No steering changes"
