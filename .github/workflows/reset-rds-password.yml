name: Reset RDS Password (One-Shot Fix)

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New RDS master password'
        required: false
        default: 'Q6JO2ZiFPsKOfpwb0WGVgmcV0yUg6NAO'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  reset-password:
    name: Reset RDS Master Password
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Get RDS Endpoint
        id: rds
        run: |
          cd terraform
          terraform init -backend-config="bucket=stocks-terraform-state" -backend-config="key=stocks/terraform.tfstate" -backend-config="region=us-east-1" -reconfigure > /dev/null
          RDS_HOST=$(terraform output -raw rds_address 2>/dev/null || echo "algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com")
          echo "rds_host=$RDS_HOST" >> $GITHUB_OUTPUT
          echo "RDS Host: $RDS_HOST"

      - name: Reset RDS Password (Try Default Passwords)
        id: reset
        env:
          DB_HOST: ${{ steps.rds.outputs.rds_host }}
          DB_PORT: 5432
          DB_USER: stocks
          DB_NAME: postgres
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import psycopg2
          import os

          db_host = os.environ['DB_HOST']
          db_port = int(os.environ['DB_PORT'])
          db_user = os.environ['DB_USER']
          db_name = os.environ['DB_NAME']
          new_password = os.environ['NEW_PASSWORD']

          print(f"🔧 Attempting to reset RDS password for {db_user}@{db_host}")

          # Try multiple known/default passwords
          known_passwords = [
              'password',
              'stocks',
              'postgres',
              '',
              'Q6JO2ZiFPsKOfpwb0WGVgmcV0yUg6NAO',  # Previous password we tried
              '}UbR9IuGl8{ncJIKTWkhYm*!%#0]5DgK',   # First password we tried
          ]

          connection = None
          connected_with = None

          for pwd in known_passwords:
              try:
                  pwd_display = f"'{pwd}'" if pwd else "[empty]"
                  print(f"  Trying: {pwd_display}")
                  connection = psycopg2.connect(
                      host=db_host,
                      port=db_port,
                      user=db_user,
                      password=pwd,
                      database=db_name,
                      connect_timeout=5
                  )
                  connected_with = pwd
                  print(f"  ✅ Connected with password!")
                  break
              except psycopg2.Error as e:
                  continue

          if not connection:
              print("❌ Could not connect with any known password")
              print("\nTrying direct AWS RDS endpoint authentication...")
              # Try using IAM auth or direct endpoint
              exit(1)

          try:
              cursor = connection.cursor()
              print(f"\n🔄 Executing: ALTER USER {db_user} WITH PASSWORD [***]")
              cursor.execute(f"ALTER USER {db_user} WITH PASSWORD %s;", (new_password,))
              connection.commit()
              print(f"✅ Password reset successfully!")
              print(f"   User: {db_user}")
              print(f"   New password: [***]")
              cursor.close()
              connection.close()
          except Exception as e:
              print(f"❌ Error: {e}")
              connection.close()
              exit(1)
          PYTHON_SCRIPT

      - name: Update Secrets Manager
        env:
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          RDS_HOST="${{ steps.rds.outputs.rds_host }}"

          echo "📝 Updating Secrets Manager with new password..."
          SECRET_VAL=$(aws secretsmanager get-secret-value \
            --secret-id algo/database \
            --region $AWS_REGION \
            --query 'SecretString' \
            --output text)

          UPDATED=$(echo "$SECRET_VAL" | jq --arg pw "$NEW_PASSWORD" '.password = $pw')

          aws secretsmanager put-secret-value \
            --secret-id algo/database \
            --secret-string "$UPDATED" \
            --region $AWS_REGION

          echo "✅ Secrets Manager updated with new password"

      - name: Verify Connection
        env:
          DB_HOST: ${{ steps.rds.outputs.rds_host }}
          DB_PASSWORD: ${{ github.event.inputs.new_password }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import psycopg2
          import os

          db_host = os.environ['DB_HOST']
          db_password = os.environ['DB_PASSWORD']

          print("🧪 Verifying connection with new password...")
          try:
              conn = psycopg2.connect(
                  host=db_host,
                  port=5432,
                  user='stocks',
                  password=db_password,
                  database='stocks',
                  connect_timeout=5
              )
              cursor = conn.cursor()
              cursor.execute("SELECT version();")
              version = cursor.fetchone()
              print(f"✅ Connection verified!")
              print(f"   PostgreSQL version: {version[0][:50]}")
              cursor.close()
              conn.close()
          except Exception as e:
              print(f"❌ Verification failed: {e}")
              exit(1)
          PYTHON_SCRIPT

      - name: Summary
        run: |
          echo "=================================================="
          echo "✅ RDS PASSWORD RESET COMPLETE"
          echo "=================================================="
          echo "Password: ${{ github.event.inputs.new_password }}"
          echo "User: stocks"
          echo "Host: ${{ steps.rds.outputs.rds_host }}"
          echo ""
          echo "Next steps:"
          echo "1. Run: gh workflow run deploy-code.yml"
          echo "2. Run: gh workflow run test-live-execution.yml"
