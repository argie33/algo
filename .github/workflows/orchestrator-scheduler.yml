name: Orchestrator Scheduler

on:
  schedule:
    # 9:30 AM ET weekdays - Morning pipeline (prices, signals, trades)
    - cron: '30 13 * * MON-FRI'
    # 1:00 PM ET weekdays - Afternoon update
    - cron: '0 17 * * MON-FRI'
    # 3:00 PM ET weekdays - Pre-close update
    - cron: '0 19 * * MON-FRI'
    # 4:05 PM ET weekdays - EOD pipeline (metrics, swing scores, technical data)
    - cron: '5 20 * * MON-FRI'
  workflow_dispatch:

jobs:
  trigger-orchestrator:
    runs-on: ubuntu-latest
    name: Trigger Orchestrator

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invoke Orchestrator Lambda
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          RUN_ID="gh-actions-${TIMESTAMP}-${GITHUB_RUN_ID}"

          echo "Invoking orchestrator Lambda with run_id: $RUN_ID"

          aws lambda invoke \
            --function-name algo-orchestrator-dev \
            --region us-east-1 \
            --invocation-type RequestResponse \
            --payload "{
              \"source\": \"github-actions-scheduler\",
              \"run_identifier\": \"$RUN_ID\",
              \"execution_mode\": \"paper\",
              \"run_date_str\": \"today\"
            }" \
            response.json

          echo "Lambda invocation response:"
          cat response.json

          # Check if invocation was successful
          if grep -q "statusCode.*200" response.json; then
            echo "✓ Orchestrator invoked successfully"
            exit 0
          else
            echo "✗ Orchestrator invocation failed"
            cat response.json
            exit 1
          fi

      - name: Log execution
        if: always()
        run: |
          echo "Orchestrator trigger completed at $(date -u)"
          echo "Check orchestrator execution log in database for results"
