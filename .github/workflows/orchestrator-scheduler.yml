name: Orchestrator Scheduler

on:
  # EventBridge Scheduler (Terraform-managed) handles scheduled orchestrator runs:
  # - 9:30 AM ET weekdays (morning trading)
  # - 1:00 PM ET weekdays (afternoon rebalance)
  # - 3:00 PM ET weekdays (pre-close actions)
  # This workflow remains available only for manual testing via workflow_dispatch
  workflow_dispatch:

jobs:
  trigger-orchestrator:
    runs-on: ubuntu-latest
    name: Trigger Orchestrator
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invoke Orchestrator Lambda
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          RUN_ID="gh-actions-${TIMESTAMP}-${GITHUB_RUN_ID}"

          echo "Invoking orchestrator Lambda with run_id: $RUN_ID"

          aws lambda invoke \
            --function-name algo-orchestrator-dev \
            --region us-east-1 \
            --invocation-type RequestResponse \
            --payload "{
              \"source\": \"eventbridge-scheduler\",
              \"run_identifier\": \"$RUN_ID\",
              \"note\": \"Manual orchestrator trigger from GitHub Actions\"
            }" \
            response.json

          echo "Lambda invocation response:"
          cat response.json

          # Check if invocation was successful
          if grep -q "statusCode.*200" response.json; then
            echo "✓ Orchestrator invoked successfully"
            exit 0
          else
            echo "✗ Orchestrator invocation failed"
            cat response.json
            exit 1
          fi

      - name: Log execution
        if: always()
        run: |
          echo "Orchestrator trigger completed at $(date -u)"
          echo "Check orchestrator execution log in database for results"
