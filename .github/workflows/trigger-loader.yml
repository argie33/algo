name: Trigger Data Loader

# Manually trigger any ECS data loader by name via Lambda.
# Lambda applies correct environment overrides (LOADER_CHUNK_SIZE=100, LOADER_TIMEOUT_SEC=600)

on:
  workflow_dispatch:
    inputs:
      loader_name:
        description: 'Loader name (e.g. company_profile, positioning_metrics, analyst_sentiment)'
        required: true
        type: string
      wait_for_completion:
        description: 'Wait for the task to finish before completing'
        required: false
        default: 'true'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger-loader:
    name: Trigger ${{ inputs.loader_name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: Invoke algo-trigger-loaders Lambda (applies LOADER_CHUNK_SIZE=100, LOADER_TIMEOUT_SEC=600)
        id: lambda
        run: |
          # Write JSON payload to file to avoid encoding issues
          cat > /tmp/payload.json << EOF
          {"loader_name": "${{ inputs.loader_name }}"}
          EOF

          # Invoke Lambda which applies correct environment overrides
          aws lambda invoke \
            --function-name algo-trigger-loaders \
            --region us-east-1 \
            --payload file:///tmp/payload.json \
            /tmp/response.json

          # Extract task ARN from Lambda response
          python3 << 'PYEOF'
          import json, sys
          with open('/tmp/response.json') as f:
              resp = json.load(f)
          # Handle wrapped response
          body = resp.get('body', resp)
          if isinstance(body, str):
              body = json.loads(body)
          tasks = body.get('tasks', [])
          if not tasks:
              print("ERROR: Lambda did not return task ARN")
              print(json.dumps(resp, indent=2))
              sys.exit(1)
          print(f"Lambda launched: {tasks[0]}")
          with open('/tmp/arn.txt', 'w') as f:
              f.write(tasks[0])
          PYEOF

          TASK_ARN=$(cat /tmp/arn.txt)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for completion
        if: inputs.wait_for_completion
        timeout-minutes: 120
        run: |
          TASK_ARN="${{ steps.lambda.outputs.task_arn }}"
          echo "Waiting for completion: $TASK_ARN"

          ELAPSED=0
          MAX_WAIT=7200
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws ecs describe-tasks \
              --cluster algo-cluster \
              --tasks "$TASK_ARN" \
              --region us-east-1 \
              --query "tasks[0].lastStatus" --output text)
            echo "[$ELAPSED s] Status: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster algo-cluster \
            --tasks "$TASK_ARN" \
            --region us-east-1 \
            --query "tasks[0].containers[0].exitCode" --output text)

          echo "Task exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "SUCCESS: ${{ inputs.loader_name }}"
          else
            echo "FAILED: ${{ inputs.loader_name }} (exit code $EXIT_CODE)"
            exit 1
          fi
