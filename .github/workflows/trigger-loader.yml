name: Trigger Data Loader

# Manually trigger any ECS data loader by name.
# Useful when a scheduled loader fails and needs a manual retry.

on:
  workflow_dispatch:
    inputs:
      loader_name:
        description: 'Loader name (e.g. company_profile, positioning_metrics, analyst_sentiment)'
        required: true
        type: string
      wait_for_completion:
        description: 'Wait for the task to finish before completing'
        required: false
        default: 'true'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger-loader:
    name: Trigger ${{ inputs.loader_name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: Invoke Lambda trigger (applies environment overrides)
        id: lambda
        run: |
          # Invoke Lambda with loader name
          aws lambda invoke \
            --function-name algo-trigger-loaders \
            --region us-east-1 \
            --payload "{\"loader_name\": \"${{ inputs.loader_name }}\"}" \
            /tmp/lambda_response.json

          # Parse Lambda response using Python for reliability
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('/tmp/lambda_response.json') as f:
                  response = json.load(f)

              # Handle both direct response and wrapped response
              if isinstance(response, dict) and 'body' in response:
                  body = response['body']
                  if isinstance(body, str):
                      body = json.loads(body)
              else:
                  body = response

              tasks = body.get('tasks', [])
              if not tasks:
                  print("ERROR: No task ARN returned from Lambda")
                  print(f"Response: {json.dumps(response, indent=2)}")
                  sys.exit(1)

              task_arn = tasks[0]
              with open('/tmp/task_arn.txt', 'w') as f:
                  f.write(task_arn)

              print(f"✅ Lambda triggered loader: {task_arn}")
              print("   Environment: LOADER_CHUNK_SIZE=100, LOADER_TIMEOUT_SEC=600")
          except Exception as e:
              print(f"ERROR: Failed to parse Lambda response: {e}")
              print("Response content:")
              with open('/tmp/lambda_response.json') as f:
                  print(f.read())
              sys.exit(1)
          EOF

          TASK_ARN=$(cat /tmp/task_arn.txt)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for completion
        if: inputs.wait_for_completion
        timeout-minutes: 120
        run: |
          echo "Waiting for ${{ inputs.loader_name }} to finish (up to 2h)..."
          TASK_ARN="${{ steps.lambda.outputs.task_arn }}"
          MAX_WAIT=7200
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws ecs describe-tasks \
              --cluster algo-cluster \
              --tasks "$TASK_ARN" \
              --region us-east-1 \
              --query "tasks[0].lastStatus" --output text)
            echo "[$ELAPSED s] Status: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster algo-cluster \
            --tasks "$TASK_ARN" \
            --region us-east-1 \
            --query "tasks[0].containers[0].exitCode" --output text)
          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] && echo "${{ inputs.loader_name }} succeeded!" || { echo "${{ inputs.loader_name }} failed with exit code $EXIT_CODE"; exit 1; }
