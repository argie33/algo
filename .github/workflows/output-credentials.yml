name: Output Test Credentials

on:
  workflow_dispatch:

jobs:
  output-credentials:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Get Terraform Outputs
        run: |
          cd terraform
          echo "=== TERRAFORM OUTPUTS ==="
          terraform init -upgrade -no-color 2>&1 | grep -i "terraform\|backend\|success" || true
          terraform output -json 2>&1 | jq -r '.developer_access_key_id.value // "NOT_FOUND"' > /tmp/dev_key_id.txt
          terraform output -json 2>&1 | jq -r '.developer_secret_access_key.value // "NOT_FOUND"' > /tmp/dev_secret.txt
          echo ""
          echo "Developer Access Key ID: $(cat /tmp/dev_key_id.txt)"
          echo "Developer Secret Key: $(cat /tmp/dev_secret.txt)"
          echo ""
          echo "=== INFRASTRUCTURE DETAILS ==="
          terraform output -json | jq -r 'to_entries[] | select(.key | contains("endpoint") or contains("url") or contains("id")) | "\(.key): \(.value.value)"' || true
