name: Output Test Credentials

on:
  workflow_dispatch:

jobs:
  output-credentials:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get Developer Credentials
        run: |
          cd terraform
          terraform init -no-color \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" 2>&1 | tail -3

          echo ""
          echo "=== Developer AWS Credentials (for local CLI) ==="
          KEY_ID=$(terraform output -raw developer_access_key_id 2>/dev/null || echo "NOT_FOUND")
          SECRET=$(terraform output -raw developer_secret_access_key 2>/dev/null || echo "NOT_FOUND")
          echo "AWS_ACCESS_KEY_ID=$KEY_ID"
          echo "AWS_SECRET_ACCESS_KEY=$SECRET"
          echo "AWS_DEFAULT_REGION=us-east-1"
          echo ""
          echo "=== Key Infrastructure Endpoints ==="
          terraform output -raw api_gateway_endpoint 2>/dev/null && echo "" || true
          terraform output -raw website_url 2>/dev/null && echo "" || true
