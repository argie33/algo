name: Show Infrastructure Endpoints

# SECURITY NOTE: This workflow no longer outputs IAM credentials.
# To get developer AWS credentials, use the AWS console or rotate keys via:
#   aws iam create-access-key --user-name algo-developer
# Store the result in your local ~/.aws/credentials - never print keys in CI logs.

on:
  workflow_dispatch:

jobs:
  show-endpoints:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Show Infrastructure Endpoints
        run: |
          aws s3 cp s3://stocks-terraform-state/stocks/terraform.tfstate /tmp/tfstate.json 2>&1
          echo "=== Key Infrastructure Endpoints ==="
          python3 -c "
import json
state = json.load(open('/tmp/tfstate.json'))
for out_key, out_val in state.get('outputs', {}).items():
    if any(k in out_key for k in ['endpoint', 'url', 'domain']):
        print(out_key + ': ' + str(out_val.get('value','')))
"
