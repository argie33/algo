name: Output Test Credentials

on:
  workflow_dispatch:

jobs:
  output-credentials:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get Developer Credentials
        run: |
          echo "=== Developer AWS Credentials (for local CLI) ==="
          aws s3 cp s3://stocks-terraform-state/stocks/terraform.tfstate /tmp/tfstate.json 2>&1
          python3 -c "
import json
state = json.load(open('/tmp/tfstate.json'))
for r in state.get('resources', []):
    if r.get('type') == 'aws_iam_access_key' and r.get('name') == 'developer':
        for inst in r.get('instances', []):
            a = inst.get('attributes', {})
            print('AWS_ACCESS_KEY_ID=' + a.get('id', ''))
            print('AWS_SECRET_ACCESS_KEY=' + a.get('secret', ''))
            print('AWS_DEFAULT_REGION=us-east-1')
"
          echo ""
          echo "=== Key Infrastructure Endpoints ==="
          python3 -c "
import json
state = json.load(open('/tmp/tfstate.json'))
for out_key, out_val in state.get('outputs', {}).items():
    if any(k in out_key for k in ['endpoint', 'url', 'domain']):
        print(out_key + ': ' + str(out_val.get('value','')))
"
