name: Manual - Invoke Loaders

on:
  workflow_dispatch:
    inputs:
      loader_type:
        description: 'Loader to invoke (all, prices, technicals, earnings, economic, market_health, spy_only, analytics, scores, sentiment)'
        required: false
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  invoke-loaders:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@010d33100f185c1eae0439eac5e5e92e127b84ee  # v4.0.2
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: List Available Task Definitions
        run: |
          echo "=== Available ECS Clusters ==="
          aws ecs list-clusters --region us-east-1

          echo ""
          echo "=== Available Task Definitions ==="
          aws ecs list-task-definitions --region us-east-1 | head -20

          echo ""
          echo "=== Searching for loaders ==="
          aws ecs list-task-definitions --family-prefix "stocks-" --region us-east-1 | head -50 || echo "No loaders found with stocks- prefix"

      - name: Get Network Config
        id: network
        run: |
          # Get algo VPC (where RDS and ECS are)
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo*" --region us-east-1 --query "Vpcs[0].VpcId" --output text)
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT

          # Get private subnet for ECS tasks (where RDS lives)
          SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*private*" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          if [ -z "$SUBNET" ] || [ "$SUBNET" = "None" ]; then
            SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          fi
          echo "subnet=$SUBNET" >> $GITHUB_OUTPUT

          # Get ECS task security group (has RDS access rules)
          SG=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=algo-ecs-tasks-sg" --region us-east-1 --query "SecurityGroups[0].GroupId" --output text)
          echo "security_group=$SG" >> $GITHUB_OUTPUT

          echo "VPC: $VPC_ID"
          echo "Subnet: $SUBNET"
          echo "Security Group: $SG"

      - name: Load SPY Prices Only (targeted - unblocks Phase 1 data freshness)
        if: ${{ inputs.loader_type == 'spy_only' }}
        run: |
          echo "Loading SPY prices only (to unblock Phase 1 freshness check)..."
          # Override LOADER_SYMBOLS and LOADER_INTERVALS to load just SPY daily
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-stock_prices_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"algo-stock_prices_daily","environment":[{"name":"LOADER_SYMBOLS","value":"SPY,QQQ,IWM"},{"name":"LOADER_INTERVALS","value":"1d"},{"name":"LOADER_ASSET_CLASSES","value":"stock"}]}]}' \
            --region us-east-1

          echo "SPY price loader launched with symbol override. Waiting 120 seconds..."
          sleep 120
          echo "SPY load task running in background. Should complete in ~3 minutes total."

      - name: Invoke Stock Prices Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking stock_prices_daily loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-stock_prices_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --region us-east-1

          echo "Task launched. Waiting 90 seconds for execution..."
          sleep 90
          echo "Loader executing in background. Monitor via CloudWatch logs."

      # NOTE: stock_prices_weekly and market_data_batch task definitions are obsolete.
      # All price intervals (daily, weekly, monthly) for stocks+ETFs are handled by
      # algo-stock_prices_daily-loader which uses load_prices.py with LOADER_INTERVALS env var.

      - name: Invoke Market Health Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'market_health' }}
        run: |
          echo "Invoking market_health_daily loader (computes market stage from SPY prices)..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-market_health_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --region us-east-1

          sleep 120
          echo "Market health loader launched. Waiting for completion..."

      - name: Invoke Technical Data Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'technicals' }}
        run: |
          echo "Invoking technical_data_daily loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-technical_data_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --region us-east-1

          sleep 120
          echo "Technical data loader launched."

      # NOTE: signals_daily is obsolete — signals are now managed by the Step Functions
      # EOD pipeline (buy_sell_daily, signal_quality_scores via algo-pipeline module)

      - name: Invoke Algo Metrics Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'metrics' }}
        run: |
          echo "Invoking algo_metrics_daily loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-algo_metrics_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=DISABLED}" \
            --region us-east-1

          sleep 120
          echo "All loaders triggered successfully."

      # Analytics loaders: sector/industry rankings, performance, economic calendar, seasonality, analyst sentiment
      - name: Invoke Analytics Loaders (rankings, performance, calendar)
        if: ${{ inputs.loader_type == 'analytics' }}
        run: |
          LOADERS=(
            "company_profile"
            "analyst_sentiment"
            "analyst_upgrades_downgrades"
            "sector_ranking"
            "sector_performance"
            "industry_ranking"
            "economic_calendar"
            "seasonality"
            "feargreed"
            "naaim_data"
            "sentiment_aggregate"
          )
          SUBNET="${{ steps.network.outputs.subnet }}"
          SG="${{ steps.network.outputs.security_group }}"
          for LOADER in "${LOADERS[@]}"; do
            echo "Invoking $LOADER..."
            aws ecs run-task \
              --cluster algo-cluster \
              --task-definition "algo-${LOADER}-loader" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
              --region us-east-1 || echo "  Warning: $LOADER task failed to launch (may not have task def yet)"
            sleep 5
          done
          echo "Analytics loaders triggered. Allow 10-60 minutes to complete."

      # Scores loaders: metric inputs + composite stock scores (needed for sector ranking quality)
      - name: Invoke Scores Loaders (metrics + stock_scores)
        if: ${{ inputs.loader_type == 'scores' }}
        run: |
          LOADERS=(
            "growth_metrics"
            "quality_metrics"
            "value_metrics"
            "stability_metrics"
            "positioning_metrics"
            "stock_scores"
            "sector_ranking"
            "industry_ranking"
          )
          SUBNET="${{ steps.network.outputs.subnet }}"
          SG="${{ steps.network.outputs.security_group }}"
          for LOADER in "${LOADERS[@]}"; do
            echo "Invoking $LOADER..."
            aws ecs run-task \
              --cluster algo-cluster \
              --task-definition "algo-${LOADER}-loader" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
              --region us-east-1 || echo "  Warning: $LOADER task failed to launch"
            sleep 5
          done
          echo "Scores loaders triggered. Allow 20-90 minutes to complete."

      # Sentiment loaders: all sentiment data sources
      - name: Invoke Sentiment Loaders
        if: ${{ inputs.loader_type == 'sentiment' }}
        run: |
          LOADERS=(
            "feargreed"
            "aaiidata"
            "naaim_data"
            "sentiment_aggregate"
          )
          SUBNET="${{ steps.network.outputs.subnet }}"
          SG="${{ steps.network.outputs.security_group }}"
          for LOADER in "${LOADERS[@]}"; do
            echo "Invoking $LOADER..."
            aws ecs run-task \
              --cluster algo-cluster \
              --task-definition "algo-${LOADER}-loader" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${SUBNET}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
              --region us-east-1 || echo "  Warning: $LOADER task failed to launch"
            sleep 5
          done
          echo "Sentiment loaders triggered."

      - name: Wait for Loaders to Complete
        if: ${{ inputs.loader_type == 'all' }}
        run: |
          echo "=== Waiting for Loaders to Complete ==="
          echo "Monitoring for up to 15 minutes..."

          TIMEOUT=900  # 15 minutes
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RUNNING=$(aws ecs list-tasks --cluster algo-cluster --desired-status RUNNING --region us-east-1 --query 'length(taskArns)' --output text)
            echo "$(date -u +%H:%M:%S): Running tasks: $RUNNING"

            if [ "$RUNNING" -eq 0 ]; then
              echo "All tasks completed!"
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: Verify Loader Completion
        if: ${{ inputs.loader_type == 'all' }}
        run: |
          echo "=== Loader Completion Summary ==="

          # Check the most recent stopped tasks
          STOPPED_TASKS=$(aws ecs list-tasks --cluster algo-cluster --desired-status STOPPED --max-results 20 --region us-east-1 --query 'taskArns' --output text)

          SUCCESS=0
          FAILED=0

          for TASK_ARN in $STOPPED_TASKS; do
            TASK_DESC=$(aws ecs describe-tasks --cluster algo-cluster --tasks $TASK_ARN --region us-east-1 --output json)
            TASK_DEF=$(echo "$TASK_DESC" | jq -r '.tasks[0].taskDefinitionArn')
            FAMILY=$(echo "$TASK_DEF" | grep -o 'algo-[^:]*' | sed 's/algo-//')
            EXIT_CODE=$(echo "$TASK_DESC" | jq -r '.tasks[0].containers[0].exitCode // "null"')

            if [ "$EXIT_CODE" = "0" ] || [ "$EXIT_CODE" = "null" ]; then
              SUCCESS=$((SUCCESS + 1))
              STATUS="OK"
            else
              FAILED=$((FAILED + 1))
              STATUS="FAIL ($EXIT_CODE)"
            fi

            echo "  $FAMILY: $STATUS"
          done

          echo ""
          echo "Summary: $SUCCESS successful, $FAILED failed"

          if [ $FAILED -gt 0 ]; then
            echo "Some loaders failed. Check CloudWatch logs:"
            echo "  aws logs tail /ecs/algo-<loader>-loader --region us-east-1"
            exit 1
          else
            echo "All recent loaders completed!"
            exit 0
          fi
