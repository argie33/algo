name: Manual - Invoke Loaders

on:
  workflow_dispatch:
    inputs:
      loader_type:
        description: 'Loader to invoke (all, prices, technicals, earnings, economic)'
        required: false
        default: 'all'

jobs:
  invoke-loaders:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Invoke Stock Prices Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking stock_prices_daily loader..."
          aws ecs run-task \
            --cluster stocks-cluster \
            --task-definition stocks-stock_prices_daily-loader \
            --launch-type FARGATE \
            --region us-east-1 || true

          echo "Waiting for task logs..."
          sleep 45
          aws logs tail /ecs/stocks-stock_prices_daily-loader --follow --max-items 300 --region us-east-1 || echo "No logs yet"

      - name: Invoke Stock Prices Weekly Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking stock_prices_weekly loader..."
          aws ecs run-task \
            --cluster stocks-cluster \
            --task-definition stocks-stock_prices_weekly-loader \
            --launch-type FARGATE \
            --region us-east-1 || true

          sleep 45
          aws logs tail /ecs/stocks-stock_prices_weekly-loader --follow --max-items 300 --region us-east-1 || echo "No logs yet"

      - name: Invoke Market Data Batch Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking market_data_batch loader..."
          aws ecs run-task \
            --cluster stocks-cluster \
            --task-definition stocks-market_data_batch-loader \
            --launch-type FARGATE \
            --region us-east-1 || true

          sleep 45
          aws logs tail /ecs/stocks-market_data_batch-loader --follow --max-items 300 --region us-east-1 || echo "No logs yet"
