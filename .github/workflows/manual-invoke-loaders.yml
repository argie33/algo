name: Manual - Invoke Loaders

on:
  workflow_dispatch:
    inputs:
      loader_type:
        description: 'Loader to invoke (all, prices, technicals, earnings, economic)'
        required: false
        default: 'all'

jobs:
  invoke-loaders:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: List Available Task Definitions
        run: |
          echo "=== Available ECS Clusters ==="
          aws ecs list-clusters --region us-east-1

          echo ""
          echo "=== Available Task Definitions ==="
          aws ecs list-task-definitions --region us-east-1 | head -20

          echo ""
          echo "=== Searching for loaders ==="
          aws ecs list-task-definitions --family-prefix "stocks-" --region us-east-1 | head -50 || echo "No loaders found with stocks- prefix"

      - name: Get Network Config
        id: network
        run: |
          # Get default VPC
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --region us-east-1 --query "Vpcs[0].VpcId" --output text || echo "")
          if [ "$VPC_ID" = "None" ] || [ -z "$VPC_ID" ]; then
            VPC_ID=$(aws ec2 describe-vpcs --region us-east-1 --query "Vpcs[0].VpcId" --output text)
          fi
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT

          # Get first subnet
          SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          echo "subnet=$SUBNET" >> $GITHUB_OUTPUT

          # Get or create security group
          SG=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=default" --region us-east-1 --query "SecurityGroups[0].GroupId" --output text || echo "")
          echo "security_group=$SG" >> $GITHUB_OUTPUT

      - name: Invoke Stock Prices Daily Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking stock_prices_daily loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-stock_prices_daily-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=ENABLED}" \
            --region us-east-1

          echo "Waiting for task logs..."
          sleep 90
          aws logs tail /ecs/algo-stock_prices_daily-loader --follow --since 2m --region us-east-1 | head -200 || echo "No logs yet"

      - name: Invoke Stock Prices Weekly Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking stock_prices_weekly loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-stock_prices_weekly-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=ENABLED}" \
            --region us-east-1

          sleep 90
          aws logs tail /ecs/algo-stock_prices_weekly-loader --follow --since 2m --region us-east-1 | head -200 || echo "No logs yet"

      - name: Invoke Market Data Batch Loader
        if: ${{ inputs.loader_type == 'all' || inputs.loader_type == 'prices' }}
        run: |
          echo "Invoking market_data_batch loader..."
          aws ecs run-task \
            --cluster algo-cluster \
            --task-definition algo-market_data_batch-loader \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=ENABLED}" \
            --region us-east-1

          sleep 90
          aws logs tail /ecs/algo-market_data_batch-loader --follow --since 2m --region us-east-1 | head -200 || echo "No logs yet"
