name: Run Data Loader

# Manually trigger any data loader via the trigger-loaders Lambda.
# Usage:
#   gh workflow run run-loader.yml -f loader_name=dxy_index
#   gh workflow run run-loader.yml -f loader_name=load_quality_metrics

on:
  workflow_dispatch:
    inputs:
      loader_name:
        description: 'Loader to run (e.g., dxy_index, load_quality_metrics, stock_prices_daily)'
        required: true
        type: string
      task_count:
        description: 'Number of parallel tasks (default: 1)'
        required: false
        default: '1'
        type: string
      backfill_days:
        description: 'Force refetch last N days/years instead of using watermark (recovery/validation). Leave blank for normal incremental run.'
        required: false
        default: ''
        type: string

jobs:
  trigger-loader:
    name: Trigger Loader
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: Trigger Loader via Lambda
        run: |
          echo "Triggering loader: ${{ inputs.loader_name }}"

          python3 << 'PYTHON_EOF'
          import boto3
          import json

          lambda_client = boto3.client('lambda', region_name='us-east-1')

          payload = {
              'loader_name': '${{ inputs.loader_name }}',
              'task_count': int('${{ inputs.task_count }}')
          }
          backfill_days_raw = '${{ inputs.backfill_days }}'
          if backfill_days_raw:
              payload['backfill_days'] = int(backfill_days_raw)

          print(f"Invoking trigger-loaders Lambda with: {payload}")

          response = lambda_client.invoke(
              FunctionName='algo-trigger-loaders',
              InvocationType='RequestResponse',
              Payload=json.dumps(payload)
          )

          # Parse response
          response_body = json.loads(response['Payload'].read())

          if response['StatusCode'] >= 400:
              print(f"ERROR: Lambda returned status {response['StatusCode']}")
              print(f"Response: {json.dumps(response_body, indent=2)}")
              exit(1)

          if 'error' in response_body:
              print(f"ERROR: {response_body.get('error', 'Unknown error')}")
              exit(1)

          # Success
          print(f"✓ Loader triggered successfully!")
          if 'tasks' in response_body:
              for task_arn in response_body['tasks']:
                  task_id = task_arn.split('/')[-1]
                  print(f"  Task: {task_id}")

          print(f"\nMessage: {response_body.get('message', 'OK')}")
          if 'timestamp' in response_body:
              print(f"Timestamp: {response_body['timestamp']}")
          PYTHON_EOF

      - name: Monitor loader logs
        if: always()
        run: |
          echo ""
          echo "Loader triggered! Monitor progress:"
          echo ""
          echo "1. Via CloudWatch: https://console.aws.amazon.com/cloudwatch/home?region=us-east-1#logStream:"
          echo "   - Log group: /ecs/algo-${{ inputs.loader_name }}-loader"
          echo ""
          echo "2. Via AWS CLI:"
          echo "   aws logs tail /ecs/algo-${{ inputs.loader_name }}-loader --follow --region us-east-1"
          echo ""
          echo "3. View ECS tasks:"
          echo "   aws ecs list-tasks --cluster algo-cluster --region us-east-1"
