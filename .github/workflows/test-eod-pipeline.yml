name: Test EOD Step Functions Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-pipeline:
    name: Test EOD Pipeline Execution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find EOD Pipeline State Machine
        id: find-sm
        run: |
          SM_ARN=$(aws stepfunctions list-state-machines --region $AWS_REGION \
            --query "stateMachines[?contains(name, 'eod-pipeline')].stateMachineArn" \
            --output text | head -1)

          if [ -z "$SM_ARN" ]; then
            echo "❌ ERROR: Could not find eod-pipeline state machine"
            exit 1
          fi

          echo "state_machine_arn=${SM_ARN}" >> $GITHUB_OUTPUT
          echo "✓ Found: $SM_ARN"

      - name: Start Pipeline Execution
        id: execute
        run: |
          EXEC=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ steps.find-sm.outputs.state_machine_arn }}" \
            --input '{"test": true}' \
            --query 'executionArn' \
            --output text)

          echo "execution_arn=${EXEC}" >> $GITHUB_OUTPUT
          echo "✓ Started execution: $EXEC"

      - name: Poll Pipeline Status (smoke test — max 5 min)
        id: poll
        run: |
          EXEC_ARN="${{ steps.execute.outputs.execution_arn }}"
          # The EOD pipeline takes 2-3 hours to complete (5000+ stocks, 9 loaders).
          # This smoke test verifies the pipeline STARTS and PROGRESSES past the
          # first loader (StockSymbols). Later-stage failures are caught by the
          # daily CloudWatch alarm (algo-eod-pipeline-failed-dev).
          MAX_WAIT=300  # 5 minutes — enough to verify StockSymbols completes
          ELAPSED=0

          echo "Polling for up to ${MAX_WAIT}s (full pipeline takes 2-3h — smoke test only)..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXEC_ARN" \
              --region $AWS_REGION \
              --query 'status' \
              --output text)

            case "$STATUS" in
              SUCCEEDED)
                echo "✓✓✓ PIPELINE SUCCEEDED ✓✓✓"
                echo "pipeline_outcome=succeeded" >> $GITHUB_OUTPUT
                exit 0
                ;;
              FAILED)
                echo "❌ PIPELINE FAILED immediately"
                CAUSE=$(aws stepfunctions describe-execution \
                  --execution-arn "$EXEC_ARN" \
                  --region $AWS_REGION \
                  --query 'cause' \
                  --output text 2>/dev/null || echo "unknown")
                echo "Cause: $CAUSE"
                echo "pipeline_outcome=failed" >> $GITHUB_OUTPUT
                exit 1
                ;;
              TIMED_OUT)
                echo "⏱ PIPELINE TIMED_OUT"
                echo "pipeline_outcome=timed_out" >> $GITHUB_OUTPUT
                exit 1
                ;;
              ABORTED)
                echo "❌ PIPELINE ABORTED"
                echo "pipeline_outcome=aborted" >> $GITHUB_OUTPUT
                exit 1
                ;;
              *)
                echo "  Status: $STATUS (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
                ;;
            esac
          done

          # Poll period over — check execution history for progress
          echo "pipeline_outcome=running" >> $GITHUB_OUTPUT

      - name: Verify Pipeline Progress (if still running after 5 min)
        if: steps.poll.outputs.pipeline_outcome == 'running'
        run: |
          EXEC_ARN="${{ steps.execute.outputs.execution_arn }}"

          # Get execution history to check how far the pipeline has progressed
          EVENTS=$(aws stepfunctions get-execution-history \
            --execution-arn "$EXEC_ARN" \
            --region $AWS_REGION \
            --output json 2>/dev/null)

          # Extract state names from entered events
          STATES=$(echo "$EVENTS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          entered = [
              e.get('stateEnteredEventDetails', {}).get('name', '')
              for e in d.get('events', [])
              if e.get('type') == 'TaskStateEntered'
          ]
          print(','.join(s for s in entered if s))
          ")

          echo "States entered so far: $STATES"
          EXEC_CONSOLE="https://us-east-1.console.aws.amazon.com/states/home?region=us-east-1#/executions/details/$EXEC_ARN"
          echo "Track progress: $EXEC_CONSOLE"

          # Require at least StockSymbols to have started (proves ECS tasks launch correctly)
          if echo "$STATES" | grep -q "StockSymbols"; then
            echo ""
            echo "✓ Pipeline is running and progressing past StockSymbols."
            echo "  Full pipeline takes 2-3h. Monitor via CloudWatch alarm:"
            echo "  algo-eod-pipeline-failed-dev triggers on execution failure."
            echo "  Execution: $EXEC_ARN"
            exit 0
          else
            echo ""
            echo "❌ Pipeline started but did not reach StockSymbols within 5 minutes."
            echo "  This indicates an ECS launch failure, IAM permissions issue, or cluster capacity problem."
            echo "  States seen: $STATES"
            exit 1
          fi

      - name: Get Pipeline Execution Details
        if: always()
        run: |
          EXEC_ARN="${{ steps.execute.outputs.execution_arn }}"
          echo "=== Final Execution Status ==="
          aws stepfunctions describe-execution \
            --execution-arn "$EXEC_ARN" \
            --region $AWS_REGION \
            --query '{Status: status, StartTime: startDate, StopTime: stopDate}' \
            --output json
