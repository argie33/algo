name: Deploy Frontend Only

# Lightweight workflow for frontend deployment without full infrastructure setup
# Use when infrastructure is already deployed and you just need to update the frontend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: webapp/frontend
        run: npm ci --prefer-offline

      - name: Get Terraform outputs
        id: terraform
        run: |
          # Get outputs from AWS Terraform state
          # Since infrastructure is already deployed, we can query it
          WEBSITE_URL=$(aws cloudfront list-distributions --query "DistributionList.Items[0].DomainName" --output text 2>/dev/null || echo "")
          API_GW=$(aws apigatewayv2 get-apis --query "Items[0].ApiEndpoint" --output text 2>/dev/null || echo "")
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --query "UserPools[0].Id" --output text 2>/dev/null || echo "")
          CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$POOL_ID" --query "UserPoolClients[0].ClientId" --output text 2>/dev/null || echo "")
          COGNITO_DOMAIN="https://algo-auth.auth.us-east-1.amazoncognito.com"

          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          echo "api_gateway_endpoint=$API_GW" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "cognito_domain_url=$COGNITO_DOMAIN" >> $GITHUB_OUTPUT

          echo "CloudFront: ${WEBSITE_URL:-(empty)}"
          echo "API Gateway: ${API_GW:-(empty)}"
          echo "Cognito Pool: ${POOL_ID:-(empty)}"

      - name: Build Frontend
        working-directory: webapp/frontend
        env:
          VITE_API_URL: ${{ steps.terraform.outputs.website_url || steps.terraform.outputs.api_gateway_endpoint }}
          VITE_ENVIRONMENT: production
          VITE_COGNITO_USER_POOL_ID: ${{ steps.terraform.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.terraform.outputs.cognito_user_pool_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.terraform.outputs.cognito_domain_url }}
        run: npm run build:prod

      - name: Deploy to S3
        working-directory: webapp/frontend
        run: |
          BUCKET=$(aws s3api list-buckets --query "Buckets[?contains(Name, 'frontend')].Name" --output text | head -1)

          if [ -z "$BUCKET" ]; then
            echo "ERROR: Frontend bucket not found"
            exit 1
          fi

          echo "Deploying to: $BUCKET"

          # Sync all files
          aws s3 sync dist/ "s3://${BUCKET}/" --delete

          echo "✅ Frontend deployed to S3: $BUCKET"

      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[0].Id" --output text 2>/dev/null || echo "")

          if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ]; then
            echo "Invalidating CloudFront: $CF_ID"
            aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" 2>&1 | grep -i "invalidation\|error" || echo "Invalidation created"
          fi
