name: Apply Terraform (IaC Credentials)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Export New Credentials
        run: |
          echo "=== New Developer Credentials Created ==="
          CREDS=$(aws secretsmanager get-secret-value --secret-id algo/developer-credentials --query 'SecretString' --output text)
          echo "$CREDS" | jq '.'

          ACCESS_KEY=$(echo "$CREDS" | jq -r '.access_key_id')
          SECRET_KEY=$(echo "$CREDS" | jq -r '.secret_access_key')

          echo "## Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Access Key Created:**" >> $GITHUB_STEP_SUMMARY
          echo "\`$ACCESS_KEY\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download credentials from this workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Update local ~/.aws/credentials file" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify access: \`aws sts get-caller-identity\`" >> $GITHUB_STEP_SUMMARY
