name: Initialize RDS Password (Clean)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  init:
    name: Generate & Set RDS Password
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Random Password
        id: gen_pw
        run: |
          # Generate 32-char random password (alphanumeric + dash/underscore, no special chars that break psycopg2)
          PW=$(python3 -c "import secrets, string; chars=string.ascii_letters + string.digits; print(''.join(secrets.choice(chars) for _ in range(32)))")
          echo "password=$PW" >> $GITHUB_OUTPUT
          echo "✅ Generated password (length: ${#PW})"

      - name: Set RDS Password
        env:
          RDS_PW: ${{ steps.gen_pw.outputs.password }}
        run: |
          echo "Setting RDS master password..."
          aws rds modify-db-instance \
            --db-instance-identifier algo-db \
            --master-user-password "$RDS_PW" \
            --apply-immediately \
            --region $AWS_REGION

          echo "⏳ Waiting 60s for RDS to apply..."
          sleep 60
          echo "✅ RDS password set"

      - name: Update Secrets Manager
        env:
          RDS_PW: ${{ steps.gen_pw.outputs.password }}
        run: |
          echo "Updating Secrets Manager..."

          # Get current secret
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo-db-credentials-dev \
            --query 'SecretString' \
            --output text \
            --region $AWS_REGION)

          # Update password field
          UPDATED=$(echo "$SECRET" | jq --arg pw "$RDS_PW" '.password = $pw')

          # Put back to Secrets Manager
          aws secretsmanager put-secret-value \
            --secret-id algo-db-credentials-dev \
            --secret-string "$UPDATED" \
            --region $AWS_REGION

          echo "✅ Secrets Manager updated"

      - name: Output Password for GitHub Secret
        env:
          RDS_PW: ${{ steps.gen_pw.outputs.password }}
        run: |
          echo ""
          echo "=========================================="
          echo "✅ PASSWORD INITIALIZATION COMPLETE"
          echo "=========================================="
          echo ""
          echo "Generated Password:"
          echo "$RDS_PW"
          echo ""
          echo "Next: Set GitHub Secret 'RDS_PASSWORD' to:"
          echo "$RDS_PW"
          echo ""
          echo "Or use gh CLI:"
          echo "  gh secret set RDS_PASSWORD -b '$RDS_PW'"
          echo ""
