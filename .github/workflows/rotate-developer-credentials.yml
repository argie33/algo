name: Rotate Developer AWS Credentials

on:
  schedule:
    - cron: '0 2 3-9 2 1'  # Q1 - Feb
    - cron: '0 2 3-9 5 1'  # Q2 - May
    - cron: '0 2 3-9 8 1'  # Q3 - Aug
    - cron: '0 2 3-9 11 1' # Q4 - Nov
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0

permissions:
  id-token: write
  contents: write

jobs:
  rotate:
    name: Rotate Developer Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -input=false \
            -reconfigure

      - name: Update rotation date
        working-directory: terraform
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "developer_key_rotation_date = \"$TODAY\"" >> terraform.tfvars

      - name: Terraform Plan
        working-directory: terraform
        id: plan
        run: |
          terraform plan \
            -var="developer_key_rotation_date=$(date +%Y-%m-%d)" \
            -out=tfplan \
            2>&1 | tee tfplan.log

      - name: Verify key rotation in plan
        working-directory: terraform
        run: |
          if grep -q "aws_iam_access_key.developer will be replaced" tfplan.log; then
            echo "✓ New IAM key will be created"
          else
            echo "✗ No key rotation detected"
            cat tfplan.log
            exit 1
          fi

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Verify new credentials in Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region us-east-1 \
            --query SecretString \
            --output text)

          if [ -z "$SECRET" ]; then
            echo "✗ Failed to retrieve credentials from Secrets Manager"
            exit 1
          fi

          echo "✓ New credentials stored in Secrets Manager"

      - name: Summary
        run: |
          echo "## Developer Credentials Rotated" >> $GITHUB_STEP_SUMMARY
          echo "✓ New IAM access key created" >> $GITHUB_STEP_SUMMARY
          echo "✓ Credentials updated in Secrets Manager" >> $GITHUB_STEP_SUMMARY
          echo "✓ Users can refresh with: scripts/refresh-aws-credentials.ps1" >> $GITHUB_STEP_SUMMARY
