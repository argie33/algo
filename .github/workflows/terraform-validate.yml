# ============================================================
# GitHub Actions Workflow - Terraform Validation
# ============================================================

name: Terraform Validate

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform -chdir=terraform init -backend=false && terraform -chdir=terraform validate

  lint:
    name: Lint with TFLint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v3

      - name: Init TFLint
        run: cd terraform && tflint --init

      - name: Run TFLint
        run: cd terraform && tflint --recursive --format compact

  security:
    name: Security Scan with Checkov
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          quiet: false
          soft_fail: false
          skip_check: CKV_AWS_1,CKV_AWS_43
