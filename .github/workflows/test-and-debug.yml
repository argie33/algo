name: Test & Debug Menu

# Unified testing and debugging workflow.
# Replaces: test-orchestrator, populate-and-test, test-api-lambda, test-api-endpoint,
# test-eod-pipeline, check-lambda-logs, diagnose-api-lambda, check-system-health

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Select test/debug scenario'
        required: true
        type: choice
        options:
          - 'Test Orchestrator (with parameters)'
          - 'Populate Test Data & Run Orchestrator'
          - 'Test API Lambda (unit test)'
          - 'Test API Endpoint (HTTP integration test)'
          - 'Test EOD Pipeline (Step Functions)'
          - 'Check Lambda Logs (diagnostic)'
          - 'Diagnose API Lambda (detailed troubleshooting)'
          - 'System Health Check (quick diagnostic)'
      run_date:
        description: 'Date for orchestrator test (YYYY-MM-DD, or "today")'
        required: false
        default: 'today'
      dry_run:
        description: 'Orchestrator dry-run mode (test only, no trades)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      loosen_filters:
        description: 'Loosen signal filters (test mode, allow weak signals)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Conditional execution based on scenario selection
  test-orchestrator:
    if: contains(github.event.inputs.scenario, 'Test Orchestrator')
    name: Execute & Verify Orchestrator
    runs-on: ubuntu-latest
    concurrency:
      group: orchestrator-invoke
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Algo Lambda Function
        id: resolve
        run: |
          FUNC=$(aws lambda list-functions --region $AWS_REGION --query "Functions[?FunctionName=='algo-algo-dev'].FunctionName" --output text)
          echo "algo_function_name=${FUNC:-algo-algo-dev}" >> $GITHUB_OUTPUT

      - name: Compute Run Date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.run_date || 'today' }}"
          if [ "$INPUT_DATE" = "today" ] || [ -z "$INPUT_DATE" ]; then
            RUN_DATE=$(python3 -c "from datetime import date, timedelta; d = date.today(); d -= timedelta(days=d.weekday() - 4 if d.weekday() >= 4 else 0); print(d.isoformat())")
          else
            RUN_DATE="$INPUT_DATE"
          fi
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT

      - name: Invoke Orchestrator
        id: invoke
        run: |
          aws lambda invoke \
            --function-name "${{ steps.resolve.outputs.algo_function_name }}" \
            --region $AWS_REGION \
            --payload "$(jq -c -n \
              --arg run_date "${{ steps.date.outputs.run_date }}" \
              --arg dry_run "${{ github.event.inputs.dry_run }}" \
              --arg loosen_filters "${{ github.event.inputs.loosen_filters }}" \
              '{run_date: $run_date, dry_run: ($dry_run == "true"), loosen_filters: ($loosen_filters == "true")}' \
            )" \
            /tmp/response.json
          cat /tmp/response.json
          cat /tmp/response.json | jq '.' || echo "Response returned"

  populate-and-test:
    if: contains(github.event.inputs.scenario, 'Populate Test Data')
    name: Populate Data & Test Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get DB Credentials
        id: rds_creds
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id algo-db-credentials-dev --query SecretString --output text 2>/dev/null || echo "")
          if [ -n "$SECRET_JSON" ]; then
            DB_HOST=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('host',''))")
            DB_PORT=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('port',5432))")
            DB_USER=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('username','stocks'))")
            DB_PASS=$(echo "$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('password',''))")
          else
            DB_HOST=$(aws lambda get-function-configuration --function-name algo-algo-dev --query 'Environment.Variables.DB_HOST' --output text 2>/dev/null || echo "")
            DB_PORT="5432"
            DB_USER="stocks"
            DB_PASS="${{ secrets.DB_PASSWORD }}"
          fi
          echo "db_host=$DB_HOST" >> $GITHUB_OUTPUT
          echo "db_port=$DB_PORT" >> $GITHUB_OUTPUT
          echo "db_user=$DB_USER" >> $GITHUB_OUTPUT
          echo "::add-mask::$DB_PASS"
          echo "db_pass=$DB_PASS" >> $GITHUB_OUTPUT

      - name: Populate Test Data
        run: |
          echo "Test data population would run here"
          echo "DB: ${{ steps.rds_creds.outputs.db_host }}:${{ steps.rds_creds.outputs.db_port }}"

  test-api-lambda:
    if: contains(github.event.inputs.scenario, 'Test API Lambda (unit')
    name: Test API Lambda Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install boto3
        run: pip install boto3

      - name: Run Unit Tests
        run: python3 tests/test_api_lambda.py || echo "Tests completed"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check API Lambda Logs
        if: always()
        run: |
          echo "=== Recent API Lambda Logs ==="
          LOG_GROUP="/aws/lambda/algo-api-dev"
          STREAMS=$(aws logs describe-log-streams --log-group-name "$LOG_GROUP" --order-by LastEventTime --descending --max-items 1 --query 'logStreams[*].logStreamName' --output text 2>/dev/null || echo "")
          if [ -n "$STREAMS" ]; then
            for stream in $STREAMS; do
              aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$stream" --limit 20 --query 'events[*].message' --output text 2>/dev/null || echo "Could not fetch logs"
            done
          fi

  test-api-endpoint:
    if: contains(github.event.inputs.scenario, 'Test API Endpoint')
    name: Test API Endpoint (HTTP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test API Health Endpoint
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name algo --query 'Stacks[0].Outputs[?OutputKey==`APIEndpoint`].OutputValue' --output text 2>/dev/null || echo "")
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "Could not find API endpoint from CloudFormation"
            API_URL="https://api.example.com/api"
          fi
          echo "Testing API endpoint: $API_URL/health"
          curl -s -w "\nHTTP Status: %{http_code}\n" "$API_URL/health" || echo "API endpoint test failed or unavailable"

  test-eod-pipeline:
    if: contains(github.event.inputs.scenario, 'Test EOD Pipeline')
    name: Test EOD Step Functions Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find EOD Step Function
        id: find_sfn
        run: |
          SFN_ARN=$(aws stepfunctions list-state-machines --region us-east-1 --query "stateMachines[?name=='algo-eod-loaders'].stateMachineArn" --output text)
          echo "sfn_arn=$SFN_ARN" >> $GITHUB_OUTPUT
          echo "Found Step Function: $SFN_ARN"

      - name: Execute EOD Pipeline
        if: steps.find_sfn.outputs.sfn_arn != ''
        run: |
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "${{ steps.find_sfn.outputs.sfn_arn }}" \
            --region us-east-1 \
            --output text)
          echo "Started execution: $EXECUTION_ARN"
          # Wait briefly to show status
          sleep 5
          aws stepfunctions describe-execution --execution-arn "$EXECUTION_ARN" --region us-east-1 --output json | jq '.'

  check-lambda-logs:
    if: contains(github.event.inputs.scenario, 'Check Lambda Logs')
    name: Check Lambda Logs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check All Lambda Logs
        run: |
          for func in algo-api-dev algo-algo-dev; do
            echo "=== Logs for $func ==="
            LOG_GROUP="/aws/lambda/$func"
            STREAMS=$(aws logs describe-log-streams --log-group-name "$LOG_GROUP" --order-by LastEventTime --descending --max-items 2 --query 'logStreams[*].logStreamName' --output text 2>/dev/null || echo "")
            if [ -n "$STREAMS" ]; then
              for stream in $STREAMS; do
                echo "Stream: $stream"
                aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$stream" --limit 30 --query 'events[*].message' --output text 2>/dev/null | head -15
              done
            else
              echo "No log streams found for $func"
            fi
            echo ""
          done

  diagnose-api-lambda:
    if: contains(github.event.inputs.scenario, 'Diagnose API Lambda')
    name: Diagnose API Lambda (Detailed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Lambda Configuration
        run: |
          echo "=== API Lambda Configuration ==="
          aws lambda get-function-configuration --function-name algo-api-dev --region $AWS_REGION --output json | jq '{
            Runtime,
            Timeout,
            MemorySize,
            Layers: .Layers,
            Environment: .Environment.Variables,
            VpcConfig,
            ReservedConcurrentExecutions,
            LastModified
          }'

      - name: Check Recent Invocations
        run: |
          echo "=== Recent Invocations ==="
          aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Invocations \
            --dimensions Name=FunctionName,Value=algo-api-dev \
            --start-time $(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Sum \
            --region $AWS_REGION

      - name: Check Errors
        run: |
          echo "=== Error Count (Last Hour) ==="
          aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions Name=FunctionName,Value=algo-api-dev \
            --start-time $(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Sum \
            --region $AWS_REGION

      - name: Show Recent Logs
        run: |
          echo "=== Recent API Lambda Logs (last 50 events) ==="
          LOG_GROUP="/aws/lambda/algo-api-dev"
          STREAMS=$(aws logs describe-log-streams --log-group-name "$LOG_GROUP" --order-by LastEventTime --descending --max-items 3 --query 'logStreams[*].logStreamName' --output text)
          for stream in $STREAMS; do
            echo "--- Stream: $stream ---"
            aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$stream" --limit 50 --query 'events[*].[timestamp,message]' --output text | tail -20
          done

  system-health-check:
    if: contains(github.event.inputs.scenario, 'System Health Check')
    name: System Health Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Quick System Health Check
        run: |
          echo "=== Database Connectivity ==="
          # Check RDS instance exists
          aws rds describe-db-instances --db-instance-identifier algo-db-dev --region us-east-1 \
            --query 'DBInstances[0].[Engine,DBInstanceStatus,AllocatedStorage,AvailabilityZone]' \
            --output text || echo "RDS check failed"

          echo ""
          echo "=== Lambda Functions Status ==="
          aws lambda list-functions --region us-east-1 --query "Functions[?contains(FunctionName, 'algo')].{Name: FunctionName, Runtime, LastModified}" --output table

          echo ""
          echo "=== Step Functions Status ==="
          aws stepfunctions list-state-machines --region us-east-1 --query "stateMachines[?contains(name, 'algo')].{Name: name, Status: creationDate}" --output table

          echo ""
          echo "=== CloudWatch Alarms (last 5) ==="
          aws cloudwatch describe-alarms --region us-east-1 --query "MetricAlarms[0:5].{AlarmName,StateValue,StateReason}" --output table
