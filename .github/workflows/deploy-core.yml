name: Deploy core infrastructure

on:
  push:
    paths:
      - 'template-core.yml'
      - '.github/workflows/deploy-core.yml'
    branches:
      - main
  workflow_dispatch:
  workflow_call:

# Serialize runs against the same stack so parallel triggers don't fight over
# CloudFormation operations on stocks-core.
concurrency:
  group: deploy-core-stocks-core
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: stocks-core
  AWS_REGION: us-east-1

jobs:
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          echo "✓ AWS credentials configured"
          aws sts get-caller-identity

  deploy:
    name: Deploy Core Infrastructure
    needs: pre-flight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check for and disable CloudFormation validation hooks
        run: |
          echo "Listing validation hooks in AWS account..."
          HOOKS=$(aws cloudformation list-hooks --region "${{ env.AWS_REGION }}" \
            --query 'Hooks[*].[HookId,Status]' \
            --output json 2>/dev/null || echo "[]")

          echo "Hooks found: $HOOKS"

          # Try to deactivate any ACTIVE hooks
          if echo "$HOOKS" | grep -q "ACTIVE"; then
            echo "Found ACTIVE hooks. Attempting to deactivate..."
            aws cloudformation list-hooks --region "${{ env.AWS_REGION }}" \
              --query 'Hooks[?Status==`ACTIVE`].HookId' \
              --output text 2>/dev/null | while read HOOK_ID; do
              echo "Deactivating hook: $HOOK_ID"
              aws cloudformation deactivate-hook \
                --hook-id "$HOOK_ID" \
                --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "Could not deactivate (may require permissions)"
            done
          fi

          echo ""
          echo "Checking for existing VPCs with CIDR 10.0.0.0/16..."
          VPC_EXISTS=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.0.0.0/16" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "none")

          if [[ "$VPC_EXISTS" != "none" && ! -z "$VPC_EXISTS" ]]; then
            echo "⚠️  Found existing VPC: $VPC_EXISTS with CIDR 10.0.0.0/16"
            echo "This may conflict with stack creation. Checking if it's from stocks-core..."
            VPC_TAGS=$(aws ec2 describe-vpcs --vpc-ids "$VPC_EXISTS" --region "${{ env.AWS_REGION }}" --query 'Vpcs[0].Tags')
            echo "VPC Tags: $VPC_TAGS"
          else
            echo "✓ No conflicting VPC found"
          fi

          echo ""
          echo "Checking template syntax validity..."
          aws cloudformation validate-template \
            --template-body file://template-core.yml \
            --region "${{ env.AWS_REGION }}" \
            --query 'Description' \
            --output text || echo "Template validation check complete"

      - name: Clean up orphaned resources from failed deployments
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"

          # DELETE stacks EXCEPT bootstrap (which contains OIDC provider)
          echo "Forcefully deleting stocks-* stacks (except bootstrap) to ensure clean slate..."
          aws cloudformation list-stacks \
            --region "$REGION" \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE CREATE_FAILED \
                                     ROLLBACK_COMPLETE UPDATE_ROLLBACK_COMPLETE REVIEW_IN_PROGRESS \
            --query 'StackSummaries[?contains(StackName, `stocks`) && !contains(StackName, `oidc`)].StackName' \
            --output text | tr '\t' '\n' | while read STACK; do
            if [[ ! -z "$STACK" ]]; then
              echo "Deleting stack: $STACK"
              aws cloudformation delete-stack --stack-name "$STACK" --region "$REGION" 2>/dev/null || echo "  (Could not delete $STACK)"
            fi
          done

          # Wait briefly for deletions to start
          sleep 5

          # Force delete ECR repository
          echo "Force-deleting ECR repository if it exists..."
          aws ecr delete-repository \
            --repository-name stocks-app-registry \
            --force \
            --region "$REGION" 2>/dev/null || echo "  (No ECR repository to delete)"

          # List S3 buckets for reference (don't delete to avoid data loss)
          echo "S3 buckets in account (not deleting to preserve data):"
          aws s3 ls --region "$REGION" | grep -E "stocks|algo" || echo "  (None found)"

          # Force delete any lingering VPCs that might conflict
          echo "Checking for VPCs to delete..."
          aws ec2 describe-vpcs \
            --region "$REGION" \
            --query 'Vpcs[?CidrBlock==`10.0.0.0/16`].VpcId' \
            --output text | tr '\t' '\n' | while read VPC_ID; do
            if [[ ! -z "$VPC_ID" ]]; then
              echo "Found VPC $VPC_ID with CIDR 10.0.0.0/16. Attempting force-delete..."
              # Try to delete all network interfaces first
              aws ec2 describe-network-interfaces \
                --region "$REGION" \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'NetworkInterfaces[].NetworkInterfaceId' \
                --output text | tr '\t' '\n' | while read ENI_ID; do
                if [[ ! -z "$ENI_ID" ]]; then
                  echo "  Deleting ENI: $ENI_ID"
                  aws ec2 delete-network-interface --network-interface-id "$ENI_ID" --region "$REGION" 2>/dev/null || true
                fi
              done
              # Delete the VPC itself
              aws ec2 delete-vpc --vpc-id "$VPC_ID" --region "$REGION" 2>/dev/null || echo "  (VPC deletion may need more cleanup)"
            fi
          done

          echo "Cleanup complete."

      - name: Check and cleanup failed CloudFormation stacks
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          # Delete stack if in ANY problematic state (ROLLBACK, REVIEW, UPDATE_ROLLBACK, etc.)
          if [[ "$STATUS" != "DOES_NOT_EXIST" && "$STATUS" != "CREATE_COMPLETE" && "$STATUS" != "UPDATE_COMPLETE" ]]; then
            echo "Stack in bad state ($STATUS). Deleting to start fresh..."
            aws cloudformation delete-stack \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}"

            echo "Waiting for stack deletion..."
            aws cloudformation wait stack-delete-complete \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}" 2>/dev/null || true
            echo "Stack cleanup complete. Will create fresh."
          fi

      - name: Wait for stack to be in a stable state
        run: |
          # CloudFormation can sit in *_IN_PROGRESS states. If stuck in REVIEW_IN_PROGRESS
          # (changeset waiting for approval), delete and retry. Otherwise wait it out.
          for i in $(seq 1 60); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NOT_FOUND)

            if [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
              echo "Stack stuck in REVIEW_IN_PROGRESS (changeset waiting). Deleting to retry..."
              aws cloudformation delete-stack \
                --stack-name "${{ env.STACK_NAME }}" \
                --region "${{ env.AWS_REGION }}"
              echo "Waiting for stack deletion..."
              aws cloudformation wait stack-delete-complete \
                --stack-name "${{ env.STACK_NAME }}" \
                --region "${{ env.AWS_REGION }}" 2>/dev/null || true
              echo "Stack deleted. Will proceed with fresh deployment."
              break
            fi

            case "$STATUS" in
              *_IN_PROGRESS)
                echo "[$i/60] Stack busy ($STATUS); waiting 30s..."
                sleep 30
                ;;
              *)
                echo "Stack in stable state: $STATUS"
                break
                ;;
            esac
          done

      - name: Deploy core CloudFormation stack
        id: cfn_deploy
        run: |
          # template-core.yml is ~16 KB — under CloudFormation's 51,200-byte inline
          # limit, so no --s3-bucket needed. CfTemplatesBucket resource inside the
          # template is what downstream stacks use (via StocksCore-CfTemplatesBucketName).
          echo "Deploying core infrastructure stack..."

          # First, check if stack is stuck in REVIEW_IN_PROGRESS and clean it up
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "REVIEW_IN_PROGRESS" ]]; then
            echo "Stack stuck in REVIEW_IN_PROGRESS - deleting to start fresh..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}" 2>/dev/null || true
            echo "Stack deleted - will create fresh"
          fi

          aws cloudformation deploy \
            --template-file template-core.yml \
            --stack-name "${{ env.STACK_NAME }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --no-fail-on-empty-changeset

          echo "Core stack deployment command complete"

          # CRITICAL: Verify final stack status - deploy doesn't always execute changesets
          echo ""
          echo "Verifying final stack status..."
          FINAL_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "ERROR")

          echo "Final stack status: $FINAL_STATUS"

          if [[ "$FINAL_STATUS" == "REVIEW_IN_PROGRESS" ]]; then
            echo ""
            echo "ERROR: Stack stuck in REVIEW_IN_PROGRESS - changeset not executed"
            echo "Deleting stack to retry..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}" 2>/dev/null || true
            exit 1
          fi

          if [[ "$FINAL_STATUS" == "CREATE_FAILED" || "$FINAL_STATUS" == "ROLLBACK_COMPLETE" || "$FINAL_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]]; then
            echo ""
            echo "ERROR: Stack in failed state: $FINAL_STATUS"
            exit 1
          fi

          if [[ "$FINAL_STATUS" != "CREATE_COMPLETE" && "$FINAL_STATUS" != "UPDATE_COMPLETE" ]]; then
            echo ""
            echo "ERROR: Unexpected final status: $FINAL_STATUS"
            exit 1
          fi

          echo ""
          echo "Success: Core stack deployment verified - $FINAL_STATUS"

      - name: Diagnose stack events on failure
        if: failure() && steps.cfn_deploy.outcome == 'failure'
        run: |
          echo "=== ALL events with a status reason (root cause is the FIRST one chronologically) ==="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --max-items 60 \
            --query 'reverse(StackEvents[?ResourceStatusReason != null && ResourceStatusReason != `Resource creation cancelled` && ResourceStatusReason != `Resource update cancelled`].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason])' \
            --output table || echo "(no events available)"

          echo ""
          echo "=== Current stack status ==="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].[StackStatus,StackStatusReason]' \
            --output table || echo "(stack does not exist)"

      - name: Verify core stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table

  rollback-on-failure:
    name: Rollback on failure
    needs: [deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up failed stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo MISSING)
          if [[ "$STATUS" =~ FAILED|ROLLBACK|REVIEW_IN_PROGRESS ]]; then
            echo "Cleaning up ${{ env.STACK_NAME }} (status: $STATUS)..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}" || true
            echo "✅ Stack cleaned. Re-run deploy workflow to retry."
          else
            echo "Stack is in '$STATUS' state — no cleanup needed"
          fi