name: Deploy core infrastructure

on:
  push:
    paths:
      - 'template-core.yml'
      - '.github/workflows/deploy-core.yml'
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-core:
    name: Deploy Core Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-core
          aws-region: us-east-1

      - name: Check and cleanup failed CloudFormation stacks
        run: |
          STACK_NAME="stocks-core-stack"

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region us-east-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          if [[ "$STATUS" == *"ROLLBACK"* ]]; then
            echo "Deleting failed stack: $STACK_NAME"
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region us-east-1

            echo "Waiting for stack deletion..."
            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region us-east-1 2>/dev/null || true
            echo "Stack cleanup complete"
          fi

      - name: Deploy core CloudFormation stack
        id: cfn_deploy
        run: |
          # template-core.yml is ~16 KB — well under CloudFormation's 51,200-byte
          # inline limit, so no --s3-bucket is needed. The CfTemplatesBucket resource
          # *inside* template-core.yml is what other stacks use for their uploads
          # (via !ImportValue StocksCore-CfTemplatesBucketName). Pre-creating a
          # bucket from this workflow caused a name collision when CloudFormation
          # tried to take ownership of an externally-created bucket.
          echo "Deploying core infrastructure stack..."

          aws cloudformation deploy \
            --template-file template-core.yml \
            --stack-name stocks-core-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1 \
            --no-fail-on-empty-changeset

          echo "Core stack deployment complete"

      - name: Diagnose stack events on failure
        if: failure() && steps.cfn_deploy.outcome == 'failure'
        run: |
          echo "=== Last 25 stack events for stocks-core-stack ==="
          aws cloudformation describe-stack-events \
            --stack-name stocks-core-stack \
            --region us-east-1 \
            --max-items 25 \
            --query 'StackEvents[?contains(ResourceStatus, `FAIL`) || contains(ResourceStatus, `ROLLBACK`)].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]' \
            --output table || echo "(no events available)"

          echo ""
          echo "=== Current stack status ==="
          aws cloudformation describe-stacks \
            --stack-name stocks-core-stack \
            --region us-east-1 \
            --query 'Stacks[0].[StackStatus,StackStatusReason]' \
            --output table || echo "(stack does not exist)"

      - name: Verify core stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name stocks-core-stack \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table