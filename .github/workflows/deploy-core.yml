name: Deploy core infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-core:
    name: Deploy Core Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-core
          aws-region: us-east-1

      - name: Check and cleanup failed CloudFormation stacks
        run: |
          STACK_NAME="stocks-core-stack"

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region us-east-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          if [[ "$STATUS" == *"ROLLBACK"* ]]; then
            echo "Deleting failed stack: $STACK_NAME"
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region us-east-1

            echo "Waiting for stack deletion..."
            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region us-east-1 2>/dev/null || true
            echo "Stack cleanup complete"
          fi

      - name: Create S3 bucket for CloudFormation templates if needed
        run: |
          BUCKET_NAME="stocks-cf-templates"
          if aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "✅ Bucket exists: $BUCKET_NAME"
          else
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME" --region us-east-1
            echo "✅ Bucket created"
          fi
          echo "TEMPLATE_BUCKET=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Deploy core CloudFormation stack
        run: |
          echo "Deploying core infrastructure stack..."

          aws cloudformation deploy \
            --template-file template-core.yml \
            --stack-name stocks-core-stack \
            --s3-bucket ${{ env.TEMPLATE_BUCKET }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1 \
            --no-fail-on-empty-changeset

          echo "✅ Core stack deployment complete"

      - name: Verify core stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name stocks-core-stack \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table