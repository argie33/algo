name: Deploy core infrastructure

on:
  push:
    paths:
      - 'template-core.yml'
      - '.github/workflows/deploy-core.yml'
    branches:
      - main
  workflow_dispatch:
  workflow_call:

# Serialize runs against the same stack so parallel triggers don't fight over
# CloudFormation operations on stocks-core.
concurrency:
  group: deploy-core-stocks-core
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: stocks-core
  AWS_REGION: us-east-1

jobs:
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-pre-flight-core
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          echo "✓ AWS credentials configured"
          aws sts get-caller-identity

  deploy:
    name: Deploy Core Infrastructure
    needs: pre-flight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-core
          aws-region: ${{ env.AWS_REGION }}

      - name: Check for CloudFormation validation hooks
        run: |
          echo "Checking for validation hooks in AWS account..."
          aws cloudformation list-hooks --region "${{ env.AWS_REGION }}" 2>&1 || echo "No hooks API available"

          echo ""
          echo "Checking template syntax validity..."
          aws cloudformation validate-template \
            --template-body file://template-core.yml \
            --region "${{ env.AWS_REGION }}" \
            --query 'Description' \
            --output text

      - name: Clean up orphaned resources from failed deployments
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"

          # Clean up ECR repository if it exists
          echo "Checking for orphaned ECR repository..."
          if aws ecr describe-repositories \
            --region "$REGION" \
            --query "repositories[?repositoryName=='stocks-app-registry']" \
            --output json 2>/dev/null | grep -q "stocks-app-registry"; then
            echo "Found orphaned ECR repository. Deleting..."
            aws ecr delete-repository \
              --repository-name stocks-app-registry \
              --force \
              --region "$REGION" || echo "Could not delete ECR (may be in use)"
          fi

          # Check for orphaned S3 buckets
          echo "Checking for orphaned S3 buckets..."
          for BUCKET in "stocks-algo-app-code-$ACCOUNT_ID" "stocks-cf-templates-$ACCOUNT_ID" "algo-artifacts-$ACCOUNT_ID"; do
            if aws s3 ls "s3://$BUCKET" --region "$REGION" 2>/dev/null; then
              echo "Found bucket: $BUCKET"
              # Note: We don't delete buckets as they may have DeletionPolicy: Retain
              # and contain important data. Just report their existence.
            fi
          done

      - name: Check and cleanup failed CloudFormation stacks
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          # Delete stack if in ANY problematic state (ROLLBACK, REVIEW, UPDATE_ROLLBACK, etc.)
          if [[ "$STATUS" != "DOES_NOT_EXIST" && "$STATUS" != "CREATE_COMPLETE" && "$STATUS" != "UPDATE_COMPLETE" ]]; then
            echo "Stack in bad state ($STATUS). Deleting to start fresh..."
            aws cloudformation delete-stack \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}"

            echo "Waiting for stack deletion..."
            aws cloudformation wait stack-delete-complete \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}" 2>/dev/null || true
            echo "Stack cleanup complete. Will create fresh."
          fi

      - name: Wait for stack to be in a stable state
        run: |
          # CloudFormation can sit in *_IN_PROGRESS states. If stuck in REVIEW_IN_PROGRESS
          # (changeset waiting for approval), delete and retry. Otherwise wait it out.
          for i in $(seq 1 60); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "${{ env.STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NOT_FOUND)

            if [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
              echo "Stack stuck in REVIEW_IN_PROGRESS (changeset waiting). Deleting to retry..."
              aws cloudformation delete-stack \
                --stack-name "${{ env.STACK_NAME }}" \
                --region "${{ env.AWS_REGION }}"
              echo "Waiting for stack deletion..."
              aws cloudformation wait stack-delete-complete \
                --stack-name "${{ env.STACK_NAME }}" \
                --region "${{ env.AWS_REGION }}" 2>/dev/null || true
              echo "Stack deleted. Will proceed with fresh deployment."
              break
            fi

            case "$STATUS" in
              *_IN_PROGRESS)
                echo "[$i/60] Stack busy ($STATUS); waiting 30s..."
                sleep 30
                ;;
              *)
                echo "Stack in stable state: $STATUS"
                break
                ;;
            esac
          done

      - name: Deploy core CloudFormation stack
        id: cfn_deploy
        run: |
          # template-core.yml is ~16 KB — under CloudFormation's 51,200-byte inline
          # limit, so no --s3-bucket needed. CfTemplatesBucket resource inside the
          # template is what downstream stacks use (via StocksCore-CfTemplatesBucketName).
          echo "Deploying core infrastructure stack..."

          aws cloudformation deploy \
            --template-file template-core.yml \
            --stack-name "${{ env.STACK_NAME }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --no-fail-on-empty-changeset

          echo "Core stack deployment command complete"

          # CRITICAL: Verify final stack status - deploy doesn't always execute changesets
          echo ""
          echo "Verifying final stack status..."
          FINAL_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "ERROR")

          echo "Final stack status: $FINAL_STATUS"

          if [[ "$FINAL_STATUS" == "REVIEW_IN_PROGRESS" ]]; then
            echo ""
            echo "ERROR: Stack stuck in REVIEW_IN_PROGRESS - changeset not executed"
            echo "This must be fixed before proceeding"
            exit 1
          fi

          if [[ "$FINAL_STATUS" == "CREATE_FAILED" || "$FINAL_STATUS" == "ROLLBACK_COMPLETE" || "$FINAL_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]]; then
            echo ""
            echo "ERROR: Stack in failed state: $FINAL_STATUS"
            exit 1
          fi

          if [[ "$FINAL_STATUS" != "CREATE_COMPLETE" && "$FINAL_STATUS" != "UPDATE_COMPLETE" ]]; then
            echo ""
            echo "ERROR: Unexpected final status: $FINAL_STATUS"
            exit 1
          fi

          echo ""
          echo "Success: Core stack deployment verified - $FINAL_STATUS"

      - name: Diagnose stack events on failure
        if: failure() && steps.cfn_deploy.outcome == 'failure'
        run: |
          echo "=== ALL events with a status reason (root cause is the FIRST one chronologically) ==="
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --max-items 60 \
            --query 'reverse(StackEvents[?ResourceStatusReason != null && ResourceStatusReason != `Resource creation cancelled` && ResourceStatusReason != `Resource update cancelled`].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason])' \
            --output table || echo "(no events available)"

          echo ""
          echo "=== Current stack status ==="
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].[StackStatus,StackStatusReason]' \
            --output table || echo "(stack does not exist)"

      - name: Verify core stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table

  rollback-on-failure:
    name: Rollback on failure
    needs: [deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-rollback-core
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up failed stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo MISSING)
          if [[ "$STATUS" =~ FAILED|ROLLBACK ]]; then
            echo "Cleaning up ${{ env.STACK_NAME }} (status: $STATUS)..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}" --region "${{ env.AWS_REGION }}" || true
            echo "✅ Stack cleaned. Re-run deploy workflow to retry."
          else
            echo "Stack is in '$STATUS' state — no cleanup needed"
          fi