name: Manual Data Reload - Trigger All Loaders

on:
  workflow_dispatch:
    inputs:
      loaders:
        description: 'Which loaders to run (all/price/signals/stocks)'
        required: false
        default: 'all'
      priority:
        description: 'Run in priority order (price first, then signals, then others)'
        required: false
        default: 'true'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
  ECS_CLUSTER: stocks-cluster

jobs:
  reload-data:
    name: Reload All Data
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Manual Reload - Price Data (PRIORITY 1)
        if: ${{ inputs.loaders == 'all' || inputs.loaders == 'price' }}
        run: |
          echo "Starting price data reload (CRITICAL PRIORITY)..."

          # Get latest task definition
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix 'technicalsdaily-loader' \
            --sort DESC \
            --max-results 1 \
            --query 'taskDefinitionArns[0]' \
            --output text)

          echo "Running task: $TASK_DEF"

          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0142dc004c9fc3e0c],assignPublicIp=ENABLED,securityGroups=[sg-0519c564d78cca3de]}" \
            --overrides "containerOverrides=[{name='technicalsdaily-loader',environment=[{name='LOG_LEVEL',value='INFO'}]}]"

          echo "Task launched. Waiting 30s for initialization..."
          sleep 30

      - name: Manual Reload - Signals Data (PRIORITY 2)
        if: ${{ inputs.loaders == 'all' || inputs.loaders == 'signals' }}
        run: |
          echo "Starting signals data reload..."

          # Find buy/sell loader
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix 'buysell' \
            --sort DESC \
            --max-results 1 \
            --query 'taskDefinitionArns[0]' \
            --output text)

          if [ ! -z "$TASK_DEF" ]; then
            echo "Running task: $TASK_DEF"
            aws ecs run-task \
              --cluster ${{ env.ECS_CLUSTER }} \
              --task-definition $TASK_DEF \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-0142dc004c9fc3e0c],assignPublicIp=ENABLED,securityGroups=[sg-0519c564d78cca3de]}"
          else
            echo "No buy/sell loader found"
          fi

      - name: Monitor Loader Status
        if: always()
        run: |
          echo "Checking ECS task status..."

          # Get recent tasks
          TASKS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --max-results 10 \
            --query 'taskArns' \
            --output text)

          if [ ! -z "$TASKS" ]; then
            echo "Active tasks:"
            aws ecs describe-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --tasks $TASKS \
              --query 'tasks[*].[taskDefinitionArn, lastStatus, createdAt]' \
              --output table
          else
            echo "No active tasks"
          fi

      - name: Status Report
        if: always()
        run: |
          echo "Data reload initiated!"
          echo ""
          echo "Priority loaders started:"
          echo "  1. Price data (technical_daily) - STARTED"
          echo "  2. Signals data (buy/sell daily) - STARTED"
          echo ""
          echo "Monitor progress in AWS CloudWatch:"
          echo "  https://console.aws.amazon.com/ecs/v2/clusters/${{ env.ECS_CLUSTER }}/tasks"
          echo ""
          echo "Check logs:"
          echo "  aws logs tail /ecs/technicalsdaily-loader --follow"
          echo "  aws logs tail /ecs/buysell-loader --follow"
