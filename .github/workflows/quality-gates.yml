name: Quality Gates — Type Checking, Coverage, Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'

jobs:
  mypy-strict:
    name: Type Checking — mypy (strict mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q mypy

      - name: Type check core modules (strict)
        run: |
          echo "🔍 Checking algo/ (core logic)"
          mypy algo/ --ignore-missing-imports --show-error-codes --pretty

          echo "🔍 Checking loaders/"
          mypy loaders/ --ignore-missing-imports --show-error-codes --pretty

          echo "🔍 Checking lambda/"
          mypy lambda/ --ignore-missing-imports --show-error-codes --pretty

          echo "🔍 Checking tools/ (terminal/utility tools)"
          mypy tools/ --ignore-missing-imports --show-error-codes --pretty
        continue-on-error: false

      - name: Type check tests and utils (non-strict)
        run: |
          echo "🔍 Checking tests/ (non-strict)"
          mypy tests/ --ignore-missing-imports --show-error-codes --pretty || true

          echo "🔍 Checking utils/"
          mypy utils/ --ignore-missing-imports --show-error-codes --pretty || true

  coverage:
    name: Coverage — Test Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: algo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest pytest-cov coverage[toml]

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/algo_test
        run: |
          pytest tests/ \
            --cov=algo \
            --cov=loaders \
            --cov=lambda \
            --cov-report=term-missing:skip-covered \
            --cov-report=html \
            --cov-report=xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: Comment PR with coverage report
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50

  code-quality:
    name: Code Quality — Format & Imports
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: pip install -q black isort flake8

      - name: Check formatting with Black
        run: |
          echo "🎨 Checking code formatting..."
          black --check algo/ loaders/ lambda/ tests/ --line-length=120
        continue-on-error: true

      - name: Check imports with isort
        run: |
          echo "📦 Checking import ordering..."
          isort --check-only algo/ loaders/ lambda/ tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          echo "🔍 Linting code..."
          flake8 algo/ loaders/ lambda/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --count \
            --statistics
        continue-on-error: true

  test-suite:
    name: Test Suite — Full Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: algo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest pytest-xdist pytest-timeout

      - name: Run full test suite
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/algo_test
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --timeout=30 \
            -n auto

      - name: Report test summary
        if: always()
        run: |
          echo "✅ Test suite completed"

  summary:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs: [mypy-strict, coverage, code-quality, test-suite]
    if: always()
    steps:
      - name: Check quality gates status
        run: |
          if [ "${{ needs.mypy-strict.result }}" != "success" ]; then
            echo "❌ Type checking failed"
            exit 1
          fi
          if [ "${{ needs.test-suite.result }}" != "success" ]; then
            echo "❌ Test suite failed"
            exit 1
          fi
          echo "✅ All quality gates passed!"
