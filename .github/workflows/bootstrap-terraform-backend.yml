name: Bootstrap Terraform Backend

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      AWS_ACCOUNT_ID:
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    name: Create S3 State Bucket & DynamoDB Lock Table
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Bootstrap Script
        run: |
          chmod +x .github/workflows/bootstrap.sh
          .github/workflows/bootstrap.sh "${{ env.AWS_REGION }}" "${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Verify Backend Resources
        run: |
          echo "✅ Bootstrap Complete!"
          echo ""
          echo "S3 Bucket:"
          aws s3 ls s3://stocks-terraform-state/ --summarize || echo "  (checking...)"
          echo ""
          echo "DynamoDB Table:"
          aws dynamodb describe-table --table-name stocks-terraform-locks --query 'Table.TableStatus' || echo "  (checking...)"
