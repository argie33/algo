name: Kill Hung Loader Task

on:
  workflow_dispatch:
    inputs:
      task_name_filter:
        description: 'Task name filter (e.g., technical_data_daily, all for any hung task)'
        required: false
        default: 'all'
      max_age_hours:
        description: 'Kill tasks older than N hours'
        required: false
        default: '24'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  kill-hung-loader:
    name: Kill Hung ECS Loader Task
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Kill Hung Tasks
        run: |
          set -e
          CLUSTER="algo-cluster"
          FILTER="${{ github.event.inputs.task_name_filter }}"
          MAX_AGE_HOURS="${{ github.event.inputs.max_age_hours }}"
          REGION="${{ env.AWS_REGION }}"

          echo "======================================"
          echo "HUNG ECS TASK KILLER"
          echo "======================================"
          echo "Cluster: $CLUSTER"
          echo "Filter: $FILTER"
          echo "Max Age: ${MAX_AGE_HOURS}h"
          echo ""

          # List all running tasks
          echo "[1/4] Listing running tasks..."
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --desired-status RUNNING \
            --region "$REGION" \
            --query 'taskArns[]' \
            --output text)

          if [ -z "$TASK_ARNS" ]; then
            echo "✓ No running tasks found"
            exit 0
          fi

          TASK_COUNT=$(echo $TASK_ARNS | wc -w)
          echo "Found $TASK_COUNT running task(s)"
          echo ""

          # Get task details
          echo "[2/4] Fetching task details..."
          aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks $TASK_ARNS \
            --region "$REGION" \
            --query 'tasks[*].[taskArn,createdAt,taskDefinitionArn]' \
            --output text > /tmp/tasks.txt

          echo "Task list:"
          cat /tmp/tasks.txt | sed 's/^/  /'
          echo ""

          # Kill hung tasks
          echo "[3/4] Processing tasks..."
          KILLED_COUNT=0
          SKIPPED_COUNT=0
          NOW=$(date +%s)

          while IFS=$'\t' read -r TASK_ARN CREATED_AT TASK_DEF_ARN; do
            [ -z "$TASK_ARN" ] && continue

            # Extract task ID and name
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            TASK_NAME=$(echo "$TASK_DEF_ARN" | awk -F':' '{print $NF}' | cut -d'/' -f1)

            # Parse created time
            CREATED_EPOCH=$(date -d "${CREATED_AT}" +%s 2>/dev/null || echo "0")
            if [ "$CREATED_EPOCH" = "0" ]; then
              echo "  [SKIP] $TASK_ID - cannot parse timestamp"
              continue
            fi

            AGE_SECONDS=$((NOW - CREATED_EPOCH))
            AGE_HOURS=$((AGE_SECONDS / 3600))

            # Check filter and age
            MATCHES=false
            if [[ "$FILTER" == "all" ]] || [[ "$TASK_NAME" =~ $FILTER ]]; then
              MATCHES=true
            fi

            if [ "$MATCHES" = "true" ] && [ $AGE_HOURS -gt $MAX_AGE_HOURS ]; then
              echo "  [KILL] $TASK_ID ($TASK_NAME, age=${AGE_HOURS}h)"
              if aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" \
                --reason "Hung task exceeds ${MAX_AGE_HOURS}h" --region "$REGION" > /dev/null 2>&1; then
                echo "    ✓ Stopped"
                KILLED_COUNT=$((KILLED_COUNT + 1))
              else
                echo "    ✗ Failed"
              fi
            else
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              if [ "$MATCHES" = "true" ]; then
                echo "  [SKIP] $TASK_ID ($TASK_NAME, age=${AGE_HOURS}h)"
              fi
            fi
          done < /tmp/tasks.txt

          echo ""
          echo "[4/4] Summary"
          echo "======================================"
          echo "Killed:  $KILLED_COUNT"
          echo "Skipped: $SKIPPED_COUNT"
          echo "======================================"

          if [ $KILLED_COUNT -gt 0 ]; then
            echo "✓ Terminated $KILLED_COUNT hung task(s)"
          fi
