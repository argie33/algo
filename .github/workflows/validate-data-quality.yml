name: Validate Data Quality

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10,22 * * *'  # 10 AM & 10 PM UTC (5 AM & 5 PM ET) — after loader windows
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  ################################################################################
  # Validate Data via Lambda (RDS is private — invoke Lambda which has VPC access)
  ################################################################################
  validate-data-quality:
    name: Validate RDS Data Quality
    runs-on: ubuntu-latest
    # Non-blocking: data quality checks should warn, not block deployments
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Data Freshness Lambda
        id: freshness
        run: |
          echo "🔍 Invoking data freshness monitor Lambda..."

          # Lambda name derived from project/environment in terraform.tfvars
          LAMBDA_NAME="algo-data-freshness-monitor-dev"

          # Invoke the Lambda (it runs inside VPC with RDS access)
          aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /tmp/lambda_response.json 2>/dev/null \
            && echo "invoked=true" >> $GITHUB_OUTPUT \
            || echo "invoked=false" >> $GITHUB_OUTPUT

          if [ "$(cat /tmp/lambda_response.json 2>/dev/null | jq -r '.statusCode' 2>/dev/null)" = "200" ]; then
            echo "✅ Data freshness Lambda invoked successfully"
            cat /tmp/lambda_response.json | jq -r '.body' 2>/dev/null | jq '.' 2>/dev/null || true
          else
            echo "⚠️  Lambda invocation failed or Lambda not yet deployed"
            cat /tmp/lambda_response.json 2>/dev/null || true
          fi

      - name: Check Data Quality Metrics via CloudWatch
        run: |
          echo "🔍 Checking CloudWatch data quality metrics..."

          # Query the most recent data freshness metrics
          for TABLE in stock_symbols price_daily buy_sell_daily stock_scores economic_data; do
            METRIC_VALUE=$(aws cloudwatch get-metric-statistics \
              --namespace AlgoDataFreshness \
              --metric-name "DataLoader_${TABLE}_RowCount" \
              --start-time "$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-6H +%Y-%m-%dT%H:%M:%SZ)" \
              --end-time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --period 21600 \
              --statistics Maximum \
              --region ${{ env.AWS_REGION }} \
              --query 'Datapoints[0].Maximum' \
              --output text 2>/dev/null || echo "N/A")

            if [ "$METRIC_VALUE" = "None" ] || [ "$METRIC_VALUE" = "N/A" ]; then
              echo "⚠️  $TABLE: no recent metrics (Lambda may not have run yet)"
            elif [ "$METRIC_VALUE" = "0" ]; then
              echo "⚠️  $TABLE: EMPTY (0 rows)"
            else
              echo "✅ $TABLE: ${METRIC_VALUE} rows"
            fi
          done

      - name: Report Data Quality Summary
        run: |
          echo "========================================"
          echo "📊 DATA QUALITY REPORT"
          echo "========================================"
          echo ""
          echo "Data freshness Lambda: Check output above"
          echo "CloudWatch metrics: Check output above"
          echo ""
          echo "Note: RDS is private — data quality checked via Lambda invocation"
          echo "      Lambda runs inside VPC with direct RDS access"
          echo ""
          echo "Next: Check loader execution in EventBridge"
