name: Emergency RDS Stock Scores Sync

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev, prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  sync-rds:
    name: Sync Fresh Stock Scores to RDS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/algo-svc-github-actions-dev', secrets.AWS_ACCOUNT_ID) }}
          aws-region: us-east-1

      - name: Install dependencies
        run: |
          pip install psycopg2-binary boto3

      - name: Run emergency RDS sync
        env:
          DB_HOST: localhost
          DB_NAME: stocks
          DB_USER: stocks
          DB_PASSWORD: stocks
          RDS_HOST: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          RDS_DB: stocks
        run: |
          python3 << 'PYTHON_EOF'
          import psycopg2
          import json
          import sys
          from datetime import datetime

          print("=" * 70)
          print("EMERGENCY RDS STOCK SCORES SYNC")
          print("=" * 70)

          try:
              # Connect to RDS
              print("\nConnecting to RDS...")
              rds_conn = psycopg2.connect(
                  host="${{ env.RDS_HOST }}",
                  database="${{ env.RDS_NAME }}",
                  user="${{ env.RDS_USER }}",
                  password="${{ env.RDS_PASSWORD }}",
                  port=5432,
                  connect_timeout=10
              )
              rds_cur = rds_conn.cursor()

              print("✓ Connected to RDS")

              # Get fresh stock_scores data
              print("\nFetching fresh stock_scores from local...")
              local_conn = psycopg2.connect(
                  host="${{ env.DB_HOST }}",
                  database="${{ env.DB_NAME }}",
                  user="${{ env.DB_USER }}",
                  password="${{ env.DB_PASSWORD }}",
                  port=5432,
                  connect_timeout=10
              )
              local_cur = local_conn.cursor()

              local_cur.execute("""
                  SELECT symbol, composite_score, momentum_score, quality_score,
                         value_score, growth_score, positioning_score, stability_score,
                         rs_percentile, data_completeness, updated_at
                  FROM stock_scores
                  WHERE updated_at >= NOW() - INTERVAL '1 day'
                  ORDER BY composite_score DESC
              """)

              rows = local_cur.fetchall()
              print(f"✓ Fetched {len(rows)} fresh records from local")

              if len(rows) == 0:
                  print("\n✗ No fresh data found in local database")
                  sys.exit(1)

              # Update RDS with fresh data
              print(f"\nUpdating RDS with {len(rows)} records...")

              updated = 0
              for row in rows:
                  symbol, comp, mom, qual, val, growth, pos, stab, rs, complete, updated_at = row

                  try:
                      rds_cur.execute("""
                          UPDATE stock_scores
                          SET composite_score = %s,
                              momentum_score = %s,
                              quality_score = %s,
                              value_score = %s,
                              growth_score = %s,
                              positioning_score = %s,
                              stability_score = %s,
                              rs_percentile = %s,
                              data_completeness = %s,
                              updated_at = %s
                          WHERE symbol = %s
                      """, (comp, mom, qual, val, growth, pos, stab, rs, complete, updated_at, symbol))
                      updated += 1
                  except Exception as e:
                      print(f"  Warning: Failed to update {symbol}: {e}")

              rds_conn.commit()
              print(f"✓ Updated {updated}/{len(rows)} records on RDS")

              # Verify update
              print("\nVerifying RDS update...")
              rds_cur.execute("""
                  SELECT COUNT(*) as cnt, MAX(updated_at) as max_date
                  FROM stock_scores
                  WHERE growth_score IS NOT NULL
              """)
              result = rds_cur.fetchone()
              print(f"✓ RDS now has {result[0]} records with growth_score")
              print(f"  Max date: {result[1]}")

              if result[0] > 3000:  # Should have ~3,957 records with growth_score
                  print("\n✅ SUCCESS! RDS synchronized with fresh data")
                  print("API should return fresh growth_scores within 60 seconds")
              else:
                  print("\n⚠️ WARNING: Fewer records than expected")

              rds_cur.close()
              rds_conn.close()
              local_cur.close()
              local_conn.close()

          except psycopg2.OperationalError as e:
              print(f"\n✗ Database connection failed: {e}")
              print("\nTroubleshooting:")
              print("1. Verify RDS_MASTER_USER and RDS_MASTER_PASSWORD secrets are set")
              print("2. Check RDS security group allows inbound on port 5432")
              print("3. Verify RDS endpoint is correct")
              sys.exit(1)
          except Exception as e:
              print(f"\n✗ Error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)

          PYTHON_EOF

      - name: Verify API endpoint
        run: |
          echo "Waiting for Lambda to pick up fresh data (60s)..."
          sleep 60

          echo "Testing API endpoint..."
          RESPONSE=$(curl -s "https://2iqq1qhltj.execute-api.us-east-1.amazonaws.com/api/algo/scores?limit=1")
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          items = data.get('data', {}).get('top', [])
          if items:
              gs = items[0].get('growth_score')
              print(f'First score growth_score: {gs}')
              if gs is not None:
                  print('✅ SUCCESS - Growth scores now displaying!')
              else:
                  print('⚠️ Still NULL - Lambda may need restart')
          "
