name: Reset Cognito Test User Password

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New permanent password (min 12 chars, upper+lower+number+symbol)'
        required: true
        type: string
      user_email:
        description: 'Email of user to reset (default: edgebrookecapital@gmail.com)'
        required: false
        default: 'edgebrookecapital@gmail.com'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reset-password:
    name: Reset Cognito User Password
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Get Cognito User Pool ID
        id: pool
        run: |
          # Try to get pool ID from environment or direct lookup
          echo "Looking up Cognito pool 'algo-pool-dev'..."

          # Direct list - use simple JQ filtering
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --output json 2>/dev/null | jq -r '.UserPools[] | select(.Name=="algo-pool-dev") | .Id' | head -1)

          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "null" ]; then
            echo "Direct lookup failed, checking S3 frontend config..."

            # Try to find pool ID from frontend config
            BUCKET=$(aws s3api list-buckets --output json 2>/dev/null | jq -r '.Buckets[] | select(.Name | startswith("algo-frontend")) | .Name' | head -1)

            if [ -n "$BUCKET" ] && [ "$BUCKET" != "null" ]; then
              echo "Found bucket: $BUCKET, extracting pool ID..."
              POOL_ID=$(aws s3 cp "s3://${BUCKET}/config.js" - 2>/dev/null | grep -oP '"USER_POOL_ID":\s*"\K[^"]+' || echo "")
            fi
          fi

          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "null" ]; then
            echo "ERROR: Could not determine Cognito User Pool ID"
            echo "This may indicate: missing AWS permissions, pool doesn't exist, or IAM credentials expired"
            exit 1
          fi

          echo "pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "Using pool: $POOL_ID"

      - name: Find user by email
        id: user
        env:
          EMAIL: ${{ inputs.user_email }}
        run: |
          POOL_ID="${{ steps.pool.outputs.pool_id }}"
          USERNAME=$(aws cognito-idp list-users \
            --user-pool-id "$POOL_ID" \
            --filter "email = \"$EMAIL\"" \
            --query 'Users[0].Username' --output text 2>/dev/null || echo "")
          if [ -z "$USERNAME" ] || [ "$USERNAME" = "None" ]; then
            USERNAME=$(aws cognito-idp list-users \
              --user-pool-id "$POOL_ID" \
              --query "Users[?Attributes[?Name=='email' && Value=='${EMAIL}']].Username | [0]" \
              --output text 2>/dev/null || echo "")
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "Found user: $USERNAME"

      - name: Set permanent password
        env:
          NEW_PASSWORD: ${{ inputs.new_password }}
          USER_EMAIL: ${{ inputs.user_email }}
        run: |
          POOL_ID="${{ steps.pool.outputs.pool_id }}"
          USERNAME="${{ steps.user.outputs.username }}"
          if [ -z "$USERNAME" ] || [ "$USERNAME" = "None" ]; then
            echo "ERROR: User '${USER_EMAIL}' not found in pool $POOL_ID"
            exit 1
          fi
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" \
            --username "$USERNAME" \
            --password "$NEW_PASSWORD" \
            --permanent
          echo "OK: Password set permanently for ${USER_EMAIL}"

      - name: Verify user status
        run: |
          POOL_ID="${{ steps.pool.outputs.pool_id }}"
          USERNAME="${{ steps.user.outputs.username }}"
          STATUS=$(aws cognito-idp admin-get-user \
            --user-pool-id "$POOL_ID" \
            --username "$USERNAME" \
            --query 'UserStatus' --output text)
          echo "User status: $STATUS"
          if [ "$STATUS" = "CONFIRMED" ]; then
            echo "OK: User is CONFIRMED and ready to log in"
          else
            echo "WARN: User status is $STATUS — may need additional confirmation"
          fi
