name: Fix RDS Password Directly

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New RDS master password'
        required: false
        default: 'StocksDB2025!'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  fix-rds:
    name: Fix RDS Master Password
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Modify RDS Master Password
        run: |
          echo "🔧 Modifying RDS master password..."

          aws rds modify-db-instance \
            --db-instance-identifier algo-db \
            --master-user-password "${{ github.event.inputs.new_password }}" \
            --apply-immediately \
            --region $AWS_REGION

          echo "✅ RDS password modification requested"
          sleep 30
          echo "⏳ Waiting for modification to apply..."

      - name: Update Secrets Manager
        run: |
          echo "📝 Updating Secrets Manager..."

          SECRET_VAL=$(aws secretsmanager get-secret-value \
            --secret-id algo/database \
            --region $AWS_REGION \
            --query 'SecretString' \
            --output text)

          UPDATED=$(echo "$SECRET_VAL" | jq --arg pw "${{ github.event.inputs.new_password }}" '.password = $pw')

          aws secretsmanager put-secret-value \
            --secret-id algo/database \
            --secret-string "$UPDATED" \
            --region $AWS_REGION

          echo "✅ Secrets Manager updated"

      - name: Verify Connection
        run: |
          pip install psycopg2-binary -q

          python3 << 'PYTHON_SCRIPT'
          import psycopg2

          print("🧪 Verifying connection with new password...")
          try:
              conn = psycopg2.connect(
                  host="algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com",
                  port=5432,
                  user="stocks",
                  password="${{ github.event.inputs.new_password }}",
                  database="stocks",
                  connect_timeout=10
              )
              cursor = conn.cursor()
              cursor.execute("SELECT version();")
              version = cursor.fetchone()
              print(f"✅ Connection verified!")
              print(f"   PostgreSQL version: {version[0][:50]}")
              cursor.close()
              conn.close()
          except Exception as e:
              print(f"❌ Verification failed: {e}")
              exit(1)
          PYTHON_SCRIPT
