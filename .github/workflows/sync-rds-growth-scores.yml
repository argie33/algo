name: Sync RDS Growth Scores

on:
  workflow_dispatch:

jobs:
  sync-rds:
    name: Sync Fresh Growth Scores to RDS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary boto3

      - name: Sync Fresh Growth Scores to RDS
        env:
          DB_HOST_LOCAL: localhost
          DB_USER_LOCAL: stocks
          DB_PASSWORD_LOCAL: stocks
          RDS_ENDPOINT: algo-db.cojggi2mkthi.us-east-1.rds.amazonaws.com
          RDS_USER: algo_admin
          RDS_PASSWORD: ${{ secrets.RDS_MASTER_PASSWORD }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import psycopg2
          import os

          print("="*70)
          print("SYNCING GROWTH SCORES TO RDS")
          print("="*70 + "\n")

          # Connect to LOCAL and get fresh data
          print("1. Fetching fresh growth_scores from local database...")
          try:
              local_conn = psycopg2.connect(
                  host=os.getenv("DB_HOST_LOCAL"),
                  user=os.getenv("DB_USER_LOCAL"),
                  password=os.getenv("DB_PASSWORD_LOCAL"),
                  database="stocks",
                  port=5432,
                  connect_timeout=5
              )

              local_cur = local_conn.cursor()
              local_cur.execute("""
                  SELECT symbol, composite_score, momentum_score, quality_score,
                         value_score, growth_score, positioning_score, stability_score,
                         rs_percentile, data_completeness, updated_at
                  FROM stock_scores
                  WHERE updated_at >= NOW() - INTERVAL '1 day'
                  AND growth_score IS NOT NULL
                  ORDER BY composite_score DESC
              """)

              fresh_data = local_cur.fetchall()
              local_conn.close()

              print(f"   Found {len(fresh_data)} fresh growth_scores\n")

          except Exception as e:
              print(f"ERROR connecting to local: {e}")
              exit(1)

          # Connect to RDS and update
          print("2. Connecting to RDS...")
          try:
              rds_conn = psycopg2.connect(
                  host=os.getenv("RDS_ENDPOINT"),
                  user=os.getenv("RDS_USER"),
                  password=os.getenv("RDS_PASSWORD"),
                  database="stocks",
                  port=5432,
                  connect_timeout=10
              )

              rds_cur = rds_conn.cursor()
              print("   Connected to RDS!\n")

              # Update all records
              print(f"3. Syncing {len(fresh_data)} records to RDS...")
              updated = 0

              for row in fresh_data:
                  symbol, comp, mom, qual, val, growth, pos, stab, rs, complete, updated_at = row
                  try:
                      rds_cur.execute("""
                          UPDATE stock_scores
                          SET composite_score=%s, momentum_score=%s, quality_score=%s,
                              value_score=%s, growth_score=%s, positioning_score=%s,
                              stability_score=%s, rs_percentile=%s, data_completeness=%s, updated_at=%s
                          WHERE symbol=%s
                      """, (comp, mom, qual, val, growth, pos, stab, rs, complete, updated_at, symbol))
                      updated += 1
                  except Exception as e:
                      print(f"   Warning: {symbol} - {e}")

              rds_conn.commit()
              print(f"   ✅ Updated {updated} records on RDS\n")

              # Verify
              print("4. Verifying update...")
              rds_cur.execute("""
                  SELECT COUNT(*) as cnt, MAX(updated_at) as latest
                  FROM stock_scores
                  WHERE growth_score IS NOT NULL
              """)

              result = rds_cur.fetchone()
              print(f"   RDS now has {result[0]} records with growth_score")
              print(f"   Latest date: {result[1]}\n")

              rds_conn.close()

              print("="*70)
              print("✅ SUCCESS! GROWTH SCORES SYNCED TO RDS")
              print("="*70)

          except Exception as e:
              print(f"ERROR: {e}")
              exit(1)

          PYTHON_SCRIPT

      - name: Verify Lambda can access fresh data
        run: |
          sleep 10
          echo "Growth scores should now be displaying in dashboard..."
          echo "Dashboard auto-refresh will detect fresh RDS data within 5 minutes"
