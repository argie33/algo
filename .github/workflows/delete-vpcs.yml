name: Delete Orphaned VPCs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delete:
    name: Delete VPCs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete orphaned VPCs
        run: bash delete-old-vpcs.sh

      - name: Verify VPC count
        run: |
          VPC_COUNT=$(aws ec2 describe-vpcs --region us-east-1 --query 'length(Vpcs)' --output text)
          echo "Final VPC count: $VPC_COUNT/5"
          if [ "$VPC_COUNT" -ge 5 ]; then
            echo "❌ Still at VPC limit"
            exit 1
          fi
          echo "✅ Ready for deployment"
