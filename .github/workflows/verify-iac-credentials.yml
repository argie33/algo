name: Verify IaC Credentials

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: List Access Keys for algo-developer
        run: |
          echo "=== Current Access Keys ==="
          aws iam list-access-keys --user-name algo-developer --output table

      - name: Fetch Credentials from Secrets Manager
        run: |
          echo "=== Credentials in Secrets Manager ==="
          aws secretsmanager get-secret-value --secret-id algo/developer-credentials --query 'SecretString' --output text | jq '.'

      - name: Test Each Key
        run: |
          echo "=== Testing Credentials ==="
          CREDS=$(aws secretsmanager get-secret-value --secret-id algo/developer-credentials --query 'SecretString' --output text)
          ACCESS_KEY=$(echo "$CREDS" | jq -r '.access_key_id')
          SECRET_KEY=$(echo "$CREDS" | jq -r '.secret_access_key')

          echo "Testing access key: $ACCESS_KEY"
          AWS_ACCESS_KEY_ID="$ACCESS_KEY" AWS_SECRET_ACCESS_KEY="$SECRET_KEY" aws sts get-caller-identity 2>&1 || echo "Key is invalid or deleted"
