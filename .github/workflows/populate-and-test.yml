name: Populate Test Data & Run Orchestrator

on:
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test date (YYYY-MM-DD, or "today" for most recent trading day)'
        required: false
        default: 'today'
      coverage:
        description: 'Price data coverage percent (1-100, unused placeholder)'
        required: false
        default: '100'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  populate_and_test:
    name: Populate Data & Test Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@010d33100f185c1eae0439eac5e5e92e127b84ee  # v4.0.2
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve test date
        id: date
        run: |
          INPUT="${{ github.event.inputs.test_date || 'today' }}"
          if [ "$INPUT" = "today" ] || [ -z "$INPUT" ]; then
            TEST_DATE=$(python3 -c "
          from datetime import date, timedelta
          d = date.today()
          while d.weekday() >= 5:
              d -= timedelta(days=1)
          print(d.isoformat())
          ")
          else
            TEST_DATE="$INPUT"
          fi
          echo "test_date=$TEST_DATE" >> $GITHUB_OUTPUT
          echo "Using test date: $TEST_DATE"

      - name: Get DB credentials from Secrets Manager
        id: rds_creds
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id algo-db-credentials-dev \
            --query SecretString --output text 2>/dev/null || echo "")

          if [ -n "$SECRET_JSON" ]; then
            DB_HOST=$(echo "$SECRET_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('host',''))")
            DB_PASS=$(echo "$SECRET_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('password',''))")
            DB_PORT=$(echo "$SECRET_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('port',5432))")
            DB_USER=$(echo "$SECRET_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('username','stocks'))")
          else
            DB_HOST=$(aws lambda get-function-configuration \
              --function-name algo-algo-dev \
              --query 'Environment.Variables.DB_HOST' \
              --output text 2>/dev/null || echo "")
            DB_PASS="${{ secrets.DB_PASSWORD }}"
            DB_PORT="5432"
            DB_USER="stocks"
          fi

          echo "::add-mask::$DB_PASS"
          echo "db_host=$DB_HOST" >> $GITHUB_OUTPUT
          echo "db_pass=$DB_PASS" >> $GITHUB_OUTPUT
          echo "db_port=$DB_PORT" >> $GITHUB_OUTPUT
          echo "db_user=$DB_USER" >> $GITHUB_OUTPUT
          echo "Using DB: $DB_HOST:$DB_PORT"

      - name: Set up Python
        uses: actions/setup-python@0b93645e9adb9ea7654cd5b3b5e474d3837c4398  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -q psycopg2-binary

      - name: Populate Test Data
        run: |
          python3 scripts/populate_test_data.py \
            --date "${{ steps.date.outputs.test_date }}" \
            --host "${{ steps.rds_creds.outputs.db_host }}" \
            --port "${{ steps.rds_creds.outputs.db_port }}" \
            --dbname "algo" \
            --user "${{ steps.rds_creds.outputs.db_user }}" \
            --password "${{ steps.rds_creds.outputs.db_pass }}"

      - name: Resolve Orchestrator Lambda
        id: resolve
        run: |
          FUNC=$(aws lambda list-functions --region $AWS_REGION \
            --query "Functions[?FunctionName=='algo-algo-dev'].FunctionName" \
            --output text 2>/dev/null || echo "")
          [ -z "$FUNC" ] && FUNC="algo-algo-dev"
          echo "algo_function_name=${FUNC}" >> $GITHUB_OUTPUT
          echo "Using Lambda: ${FUNC}"

      - name: Run Orchestrator Test
        id: orchestrator
        run: |
          FUNC="${{ steps.resolve.outputs.algo_function_name }}"
          TEST_DATE="${{ steps.date.outputs.test_date }}"

          echo "Invoking $FUNC with date=$TEST_DATE (dry_run=true)..."

          PAYLOAD="{\"source\":\"test-populate-and-run\",\"test\":false,\"date\":\"$TEST_DATE\",\"dry_run\":true}"
          ENCODED=$(echo -n "$PAYLOAD" | base64 -w0)

          timeout 600 aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type RequestResponse \
            --payload "$ENCODED" \
            --region $AWS_REGION \
            --cli-read-timeout 580 \
            --cli-connect-timeout 30 \
            /tmp/response.json 2>&1 || echo "Lambda invocation returned non-zero"

          echo "=== LAMBDA RESPONSE ==="
          cat /tmp/response.json | python3 -c "
          import sys, json
          try:
              raw = sys.stdin.read()
              data = json.loads(raw)
              body_raw = data.get('body','{}')
              body = json.loads(body_raw) if isinstance(body_raw,str) else body_raw
              print(f'Status: {data.get(\"statusCode\")} | {body.get(\"status\",\"?\")}')
              phases = body.get('phases',{})
              if phases:
                  for ph, info in sorted(phases.items(), key=lambda x: str(x[0])):
                      status = info.get('status','?')
                      icon = 'OK' if status in ('success','ok') else ('HALT' if status in ('halt','halted') else 'FAIL')
                      print(f'  {icon} Phase {ph} [{status}]: {info.get(\"summary\",\"\")[:100]}')
              if body.get('skipped'):
                  print(f'Skipped: {body.get(\"reason\",\"\")}')
          except Exception as e:
              print(f'Parse error: {e}')
          "

      - name: Verify Orchestrator Result
        run: |
          if [ ! -f /tmp/response.json ]; then
            echo "ERROR: No response file"
            exit 1
          fi

          python3 - <<'EOF'
          import sys, json
          with open('/tmp/response.json') as f:
              raw = f.read()
          try:
              data = json.loads(raw)
              body_raw = data.get('body', '{}')
              body = json.loads(body_raw) if isinstance(body_raw, str) else body_raw
          except Exception as e:
              print(f"Failed to parse: {e}")
              sys.exit(1)

          if body.get('skipped'):
              print(f"Skipped: {body.get('reason', 'market closed')}")
              sys.exit(0)

          phases = body.get('phases', {})
          if not phases:
              print("FAIL: phases={} — exited before any phases ran")
              sys.exit(1)

          failed = [ph for ph, i in phases.items() if i.get('status') in ('fail', 'error')]
          halted = [ph for ph, i in phases.items() if i.get('status') in ('halt', 'halted')]

          if failed:
              print(f"FAIL: Phase errors {failed}")
              for ph in failed:
                  print(f"  Phase {ph}: {phases[ph].get('summary','')}")
              sys.exit(1)

          if halted:
              print(f"HALT (expected): phases {halted}")
              sys.exit(0)

          print(f"OK: Completed {len(phases)} phases")
          sys.exit(0)
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Populate & Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Date**: ${{ steps.date.outputs.test_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $([ -f /tmp/response.json ] && echo 'Response received' || echo 'No response')" >> $GITHUB_STEP_SUMMARY
