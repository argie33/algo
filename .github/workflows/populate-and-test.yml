name: Populate Test Data & Run Orchestrator

on:
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test date (YYYY-MM-DD)'
        required: false
        default: '2026-04-15'
      coverage:
        description: 'Price data coverage percent (1-100)'
        required: false
        default: '95'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  populate_and_test:
    name: Populate Data & Test Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get RDS Credentials from Secrets Manager
        id: rds_creds
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id algo-dev-rds-password --query SecretString --output text)
          echo "::add-mask::$SECRET"
          echo "db_password=$SECRET" >> $GITHUB_OUTPUT

      - name: Get RDS Endpoint from Terraform State
        id: rds_endpoint
        run: |
          # Get RDS endpoint from terraform state
          cd terraform
          ENDPOINT=$(terraform output -raw rds_address)
          PORT=$(terraform output -raw rds_port)
          echo "db_host=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "db_port=$PORT" >> $GITHUB_OUTPUT
          echo "Using RDS: $ENDPOINT:$PORT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install psycopg2-binary

      - name: Populate Test Data
        run: |
          python3 scripts/populate_test_data.py \
            --date "${{ github.event.inputs.test_date }}" \
            --coverage "${{ github.event.inputs.coverage }}" \
            --host "${{ steps.rds_endpoint.outputs.db_host }}" \
            --port "${{ steps.rds_endpoint.outputs.db_port }}" \
            --dbname "algo" \
            --user "stocks" \
            --password "${{ steps.rds_creds.outputs.db_password }}"

      - name: Resolve Orchestrator Lambda
        id: resolve
        run: |
          FUNC=$(aws lambda list-functions --region $AWS_REGION --query "Functions[?FunctionName=='algo-algo-dev'].FunctionName" --output text)
          if [ -z "$FUNC" ]; then
            FUNC="algo-algo-dev"
          fi
          echo "algo_function_name=${FUNC}" >> $GITHUB_OUTPUT
          echo "Using Lambda: ${FUNC}"

      - name: Wait for RDS to Settle
        run: sleep 5

      - name: Run Orchestrator Test
        id: orchestrator
        run: |
          FUNC="${{ steps.resolve.outputs.algo_function_name }}"
          TEST_DATE="${{ github.event.inputs.test_date }}"

          echo "Invoking $FUNC with date=$TEST_DATE..."

          PAYLOAD="{\"source\":\"test-populate-and-run\",\"test\":\"true\",\"date\":\"$TEST_DATE\"}"
          ENCODED=$(echo -n "$PAYLOAD" | base64 -w0)

          timeout 180 aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type RequestResponse \
            --payload "$ENCODED" \
            --region $AWS_REGION \
            /tmp/response.json || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️ Lambda invocation timed out after 3 minutes"
              else
                echo "❌ Lambda invocation failed with exit code: $EXIT_CODE"
              fi
              exit 1
            }

          echo "Orchestrator response:"
          cat /tmp/response.json | python3 -m json.tool || cat /tmp/response.json

          echo "response_file=/tmp/response.json" >> $GITHUB_OUTPUT

      - name: Extract and Report Results
        if: always()
        run: |
          if [ -f /tmp/response.json ]; then
            echo "=== ORCHESTRATOR TEST RESULT ==="
            python3 << 'EOF'
          import json
          import sys

          with open('/tmp/response.json', 'r') as f:
              response = json.load(f)

          # Extract response structure
          if isinstance(response, dict):
              status_code = response.get('statusCode', 'unknown')
              body = response.get('body')

              print(f"Status Code: {status_code}")

              if isinstance(body, str):
                  try:
                      body_json = json.loads(body)
                      print(f"Response Status: {body_json.get('status', 'unknown')}")

                      # Print phases info if available
                      if 'phases' in body_json:
                          print(f"\nPhases Executed: {len(body_json['phases'])}")
                          for i, phase in enumerate(body_json['phases'], 1):
                              status = phase.get('status', 'unknown')
                              print(f"  Phase {i}: {status}")
                              if phase.get('halt_reason'):
                                  print(f"    Halt: {phase['halt_reason']}")
                  except json.JSONDecodeError:
                      print(f"Body (raw): {body}")
              else:
                  print(f"Body: {body}")
          EOF
          else
            echo "No response file found"
          fi

      - name: Retrieve CloudWatch Logs
        if: always()
        run: |
          FUNC="${{ steps.resolve.outputs.algo_function_name }}"
          LOG_GROUP="/aws/lambda/$FUNC"

          echo "Retrieving logs from: $LOG_GROUP"

          LATEST=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$LATEST" ] && [ "$LATEST" != "None" ]; then
            echo "=== ORCHESTRATOR EXECUTION LOG ==="
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text | tail -150
          else
            echo "No logs found"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Date**: ${{ github.event.inputs.test_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Data Coverage**: ${{ github.event.inputs.coverage }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $([ -f /tmp/response.json ] && echo 'Response received' || echo 'No response')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Phase 1 execution in logs above" >> $GITHUB_STEP_SUMMARY
          echo "2. If Phase 1 PASSES (≥70% coverage), orchestrator continues to Phase 2" >> $GITHUB_STEP_SUMMARY
          echo "3. If Phase 1 FAILS, increase coverage or use different test date" >> $GITHUB_STEP_SUMMARY
