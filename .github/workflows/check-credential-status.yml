name: Check Credential Rotation Status

# Reusable workflow that CI/CD jobs can call to verify credential rotation status.
# Use this to prevent deployments if credentials are invalid or need updating.

on:
  workflow_call:
    inputs:
      fail_on_grace_period:
        description: 'Fail workflow if in grace period (enforce credential update)'
        required: false
        default: false
        type: boolean
      region:
        description: 'AWS region'
        required: false
        default: 'us-east-1'
        type: string

env:
  AWS_REGION: ${{ inputs.region || 'us-east-1' }}

permissions:
  id-token: write
  contents: read

jobs:
  check-credentials:
    name: Verify Credential Rotation Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f677139edd7e1a88de8eca0c779ba8c1bcb14f1f  # v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Install dependencies
        run: |
          pip install boto3 --quiet

      - name: Check credential rotation status
        id: check
        run: |
          python scripts/credential-rotation-check.py --region ${{ env.AWS_REGION }}
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "status=ok" >> $GITHUB_OUTPUT
          elif [ $exit_code -eq 1 ]; then
            echo "status=action_needed" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

          exit $exit_code

      - name: Fail if grace period is active (strict mode)
        if: inputs.fail_on_grace_period && steps.check.outputs.status == 'action_needed'
        run: |
          echo "❌ Deployment blocked: Credential update required"
          echo "Run 'scripts/refresh-aws-credentials.ps1' to update your credentials"
          exit 1

      - name: Warn if grace period is active (soft mode)
        if: steps.check.outputs.status == 'action_needed' && !inputs.fail_on_grace_period
        run: |
          echo "⚠️  WARNING: Credential update recommended"
          echo "Run 'scripts/refresh-aws-credentials.ps1' to update your credentials"

      - name: Report status
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Credential Rotation Status Check

          - **Status:** ${{ steps.check.outputs.status }}
          - **Region:** ${{ env.AWS_REGION }}

          ### Action Required
          If credentials are out of date:
          - Run: `scripts/refresh-aws-credentials.ps1`
          - Verify: `aws sts get-caller-identity --profile algo-developer`

          ### Troubleshooting
          If check fails:
          - Ensure AWS credentials are configured (OIDC token)
          - Check Secrets Manager access (`algo/developer-credentials` secret)
          - Run manually: `python scripts/credential-rotation-check.py`
          EOF
