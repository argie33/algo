name: Apply BRIN Indexes to Production RDS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  apply-indexes:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Get RDS endpoint from CloudFormation
        id: rds
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name stocks-data \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`DBEndpoint`].OutputValue' \
            --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Retrieve DB credentials from Secrets Manager
        id: db-secrets
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id stocks-db-secrets-stocks-data-us-east-1-001 \
            --region us-east-1 \
            --query SecretString \
            --output text)

          USERNAME=$(echo "$SECRET" | jq -r '.username')
          PASSWORD=$(echo "$SECRET" | jq -r '.password')
          DBNAME=$(echo "$SECRET" | jq -r '.dbname')

          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "dbname=$DBNAME" >> $GITHUB_OUTPUT
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Apply BRIN indexes
        run: python3 migrate_indexes.py
        env:
          DB_HOST: ${{ steps.rds.outputs.endpoint }}
          DB_PORT: 5432
          DB_USER: ${{ steps.db-secrets.outputs.username }}
          DB_PASSWORD: ${{ steps.db-secrets.outputs.password }}
          DB_NAME: ${{ steps.db-secrets.outputs.dbname }}

      - name: Verify index creation
        run: python3 migrate_indexes.py --check
        env:
          DB_HOST: ${{ steps.rds.outputs.endpoint }}
          DB_PORT: 5432
          DB_USER: ${{ steps.db-secrets.outputs.username }}
          DB_PASSWORD: ${{ steps.db-secrets.outputs.password }}
          DB_NAME: ${{ steps.db-secrets.outputs.dbname }}
