name: Test Data Loaders

on:
  workflow_dispatch:
  schedule:
    - cron: '45 8 ? * MON-FRI *'  # 15 min before stock symbols run (3:30 AM ET)

env:
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  test-loaders:
    name: Test Stock Prices Loader
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Check ECS Cluster
        run: |
          echo "📋 Checking ECS infrastructure..."

          # List ECS clusters
          CLUSTERS=$(aws ecs list-clusters --region $AWS_REGION --query 'clusterArns[*]' --output text)
          if [ -z "$CLUSTERS" ]; then
            echo "❌ NO ECS CLUSTERS FOUND"
            exit 1
          fi

          echo "✅ ECS Clusters found:"
          echo "$CLUSTERS"

          # Get first cluster ARN
          CLUSTER_ARN=$(echo $CLUSTERS | awk '{print $1}')
          CLUSTER_NAME=$(echo $CLUSTER_ARN | rev | cut -d':' -f1 | rev)

          echo ""
          echo "📌 Using cluster: $CLUSTER_NAME"

          # Check for loader task definitions
          echo ""
          echo "📋 Checking for loader task definitions..."
          TASK_DEFS=$(aws ecs list-task-definitions --family-prefix "algo-" --region $AWS_REGION --query 'taskDefinitionArns[*]' --output text | grep -i loader)

          if [ -z "$TASK_DEFS" ]; then
            echo "❌ NO LOADER TASK DEFINITIONS FOUND"
            exit 1
          fi

          echo "✅ Found task definitions:"
          echo "$TASK_DEFS" | head -10

          # Count them
          COUNT=$(echo "$TASK_DEFS" | wc -w)
          echo ""
          echo "Total loaders: $COUNT"

      - name: Check VPC/Subnets for ECS Tasks
        run: |
          echo "📋 Checking VPC and subnet configuration..."

          # Get VPC and subnets
          VPCS=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo-vpc-*" --region $AWS_REGION --query 'Vpcs[*].VpcId' --output text)
          if [ -z "$VPCS" ]; then
            echo "⚠️ No tagged algo-vpc found, checking for any VPCs..."
            VPCS=$(aws ec2 describe-vpcs --region $AWS_REGION --query 'Vpcs[0].VpcId' --output text)
          fi

          echo "VPCs: $VPCS"

          # Get private subnets
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPCS" --region $AWS_REGION --query 'Subnets[?Tags[?Key==`Type` && Value==`Private`]].SubnetId' --output text)
          echo "Private subnets: $SUBNETS"

          if [ -z "$SUBNETS" ]; then
            echo "⚠️ No private subnets found"
          fi

      - name: Check IAM Roles
        run: |
          echo "📋 Checking IAM roles..."

          # Check ECS task execution role
          ROLE=$(aws iam get-role --role-name "algo-svc-ecs-task-execution-dev" --region $AWS_REGION 2>/dev/null)
          if [ $? -eq 0 ]; then
            echo "✅ ECS task execution role exists"
          else
            echo "❌ ECS task execution role NOT FOUND"
          fi

          # Check task role
          ROLE=$(aws iam get-role --role-name "algo-svc-ecs-task-role-dev" --region $AWS_REGION 2>/dev/null)
          if [ $? -eq 0 ]; then
            echo "✅ ECS task role exists"
          else
            echo "❌ ECS task role NOT FOUND"
          fi

      - name: Check EventBridge Rules
        run: |
          echo "📋 Checking EventBridge schedules..."

          RULES=$(aws events list-rules --region $AWS_REGION --name-prefix "algo-" --query 'Rules[*].{Name: Name, State: State}' --output table)

          echo "$RULES"

          # Count enabled rules
          ENABLED=$(aws events list-rules --region $AWS_REGION --name-prefix "algo-" --query 'Rules[?State==`ENABLED`]' --output text | wc -l)
          echo ""
          echo "Enabled EventBridge rules: $ENABLED"

      - name: Check RDS Database Connectivity
        run: |
          echo "📋 Checking RDS database..."

          # Try to describe the database
          DB=$(aws rds describe-db-clusters --region $AWS_REGION --query 'DBClusters[0].{DBClusterIdentifier: DBClusterIdentifier, Status: Status}' --output table 2>/dev/null)

          if [ $? -eq 0 ]; then
            echo "✅ RDS cluster found:"
            echo "$DB"
          else
            echo "❌ Could not access RDS"
          fi

      - name: Get Recent Loader Execution Logs
        run: |
          echo "📋 Checking CloudWatch logs for recent loader executions..."

          # Check logs from last 24 hours
          END_TIME=$(date +%s)000
          START_TIME=$((END_TIME - 86400000))

          LOG_GROUPS=$(aws logs describe-log-groups --region $AWS_REGION --query 'logGroups[?contains(logGroupName, `loader`)].logGroupName' --output text)

          if [ -z "$LOG_GROUPS" ]; then
            echo "⚠️ No loader log groups found"
          else
            echo "✅ Found log groups:"
            echo "$LOG_GROUPS"

            # Get latest events from first loader log group
            for LG in $LOG_GROUPS; do
              echo ""
              echo "📌 Latest events from: $LG"
              aws logs filter-log-events \
                --log-group-name "$LG" \
                --start-time $START_TIME \
                --end-time $END_TIME \
                --region $AWS_REGION \
                --query 'events[].message' \
                --output text \
                | tail -20 || echo "No events found"

              # Check for errors
              ERRORS=$(aws logs filter-log-events \
                --log-group-name "$LG" \
                --start-time $START_TIME \
                --filter-pattern "ERROR" \
                --region $AWS_REGION \
                --query 'events[].message' \
                --output text)

              if [ -n "$ERRORS" ]; then
                echo "⚠️ ERRORS found:"
                echo "$ERRORS"
              fi
              break  # Just check first one
            done
          fi

      - name: Summary
        run: |
          echo ""
          echo "========================================"
          echo "LOADER DIAGNOSTIC SUMMARY"
          echo "========================================"
          echo ""
          echo "Check items:"
          echo "1. ✓ ECS cluster exists and has loaders"
          echo "2. Check if task definitions were deployed"
          echo "3. Check if EventBridge rules are enabled"
          echo "4. Check IAM roles exist"
          echo "5. Check RDS is accessible"
          echo "6. Review CloudWatch logs for errors"
          echo ""
          echo "NEXT STEPS:"
          echo "- If any checks failed, investigate the error"
          echo "- Ensure all loaders are deployed as ECS task definitions"
          echo "- Verify EventBridge rules are ENABLED"
          echo "- Check that IAM roles have proper permissions"
