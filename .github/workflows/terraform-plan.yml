# ============================================================
# GitHub Actions Workflow - Terraform Plan
# ============================================================

name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_ref_path: ${{ github.ref }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -input=false -out=tfplan.bin 2>&1 | tee plan.txt
          
          SUMMARY=$(tail -20 plan.txt | grep -E "^(Plan:|No changes|Error)" || echo "Plan complete")
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan.txt', 'utf8');
            
            const comment = `#### Terraform Plan ${{ job.status }}
            
            \`\`\`
            ${planOutput.substring(0, 65000)}
            \`\`\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
