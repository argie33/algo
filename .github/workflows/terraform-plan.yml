name: Terraform Plan (PR Review)

# Show infrastructure changes in PR before review
# Trigger: pull_request to main

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  terraform-plan:
    name: Plan Infrastructure Changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Initialize Terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_STATE_BUCKET || 'stocks-terraform-state' }}
          TF_BACKEND_KEY: ${{ secrets.TF_STATE_KEY || 'stocks/terraform.tfstate' }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            --upgrade

      - name: Validate Terraform
        run: terraform validate

      - name: Terraform Format Check
        run: |
          if terraform fmt -check -recursive .; then
            echo "✓ Terraform files are properly formatted"
          else
            echo "✗ Terraform files need formatting. Run: terraform fmt -recursive ."
            exit 1
          fi

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_alpaca_api_key_id: ${{ secrets.ALPACA_API_KEY_ID }}
          TF_VAR_alpaca_api_secret_key: ${{ secrets.ALPACA_API_SECRET_KEY }}
          TF_VAR_notification_email: ${{ secrets.ALERT_EMAIL_ADDRESS }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_fred_api_key: ${{ secrets.FRED_API_KEY }}
          TF_VAR_alert_smtp_password: ${{ secrets.ALERT_SMTP_PASSWORD }}
        run: |
          terraform plan -var-file=terraform.tfvars -out=tfplan -no-color > plan.txt 2>&1 || true
          cat plan.txt
          echo "plan_exit=$?" >> $GITHUB_OUTPUT

      - name: Post Plan to PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan.txt', 'utf8');

            // Truncate if too long for comment
            const maxLength = 65536;
            const displayPlan = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n\n... (output truncated)'
              : planOutput;

            const body = `## Terraform Plan

**Review the infrastructure changes below before merging.**
To apply these changes, merge this PR and run the Deploy workflow manually.

\`\`\`
${displayPlan}
\`\`\`

### Next Steps
1. Review the plan above for any unexpected changes
2. Merge this PR when approved
3. Run the **Deploy All Infrastructure** workflow manually to apply changes
            `;

            // Find existing plan comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('## Terraform Plan')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
