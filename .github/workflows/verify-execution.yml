name: Verify Execution

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Get RDS credentials from Secrets Manager
        id: rds-creds
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id algo/rds/password --query SecretString --output text)
          RDS_PASSWORD=$(echo "$SECRET" | jq -r '.password // .' 2>/dev/null || echo "$SECRET")
          RDS_HOST=$(aws rds describe-db-instances --db-instance-identifier algo-postgres-rds --query 'DBInstances[0].Endpoint.Address' --output text)
          RDS_PORT=$(aws rds describe-db-instances --db-instance-identifier algo-postgres-rds --query 'DBInstances[0].Endpoint.Port' --output text)

          echo "host=$RDS_HOST" >> $GITHUB_OUTPUT
          echo "port=$RDS_PORT" >> $GITHUB_OUTPUT
          echo "password=$RDS_PASSWORD" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary alpaca-trade-api

      - name: Verify execution
        env:
          RDS_HOST: ${{ steps.rds-creds.outputs.host }}
          RDS_PORT: ${{ steps.rds-creds.outputs.port }}
          RDS_USER: admin
          RDS_PASSWORD: ${{ steps.rds-creds.outputs.password }}
          RDS_DATABASE: algo
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python3 scripts/verify_execution.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: verification-*.log
