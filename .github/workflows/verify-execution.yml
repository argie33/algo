name: Verify Execution

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Get RDS credentials from Secrets Manager
        id: rds-creds
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          SECRET=$(aws secretsmanager get-secret-value --secret-id algo-db-credentials-dev --query SecretString --output text)
          export SECRET

          # Extract JSON fields using Python
          python3 << 'PYEOF'
          import json, sys, os
          secret = os.environ.get('SECRET', '')
          if not secret:
              print("ERROR: No SECRET provided")
              sys.exit(1)
          try:
              data = json.loads(secret)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"host={data.get('host', '')}\n")
                  f.write(f"port={data.get('port', '5432')}\n")
                  f.write(f"password={data.get('password', '')}\n")
                  f.write(f"user={data.get('username', 'admin')}\n")
          except Exception as e:
              print(f"Failed to parse secret: {e}")
              sys.exit(1)
          PYEOF

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary alpaca-trade-api

      - name: Verify execution
        env:
          RDS_HOST: ${{ steps.rds-creds.outputs.host }}
          RDS_PORT: ${{ steps.rds-creds.outputs.port }}
          RDS_USER: admin
          RDS_PASSWORD: ${{ steps.rds-creds.outputs.password }}
          RDS_DATABASE: algo
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python3 scripts/verify_execution.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: verification-*.log
