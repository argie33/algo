name: Rotate AWS Credentials (Simple)

# Direct IAM key rotation using AWS CLI - bypasses terraform complexity
# This is a fallback when terraform rotation is stuck

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    name: Create New IAM Key and Update Secret
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Create new IAM access key
        id: newkey
        run: |
          # Get old key ID
          OLD_KEY=$(aws iam list-access-keys --user-name algo-developer --query 'AccessKeyMetadata[0].AccessKeyId' --output text)
          echo "old_key=$OLD_KEY" >> $GITHUB_OUTPUT

          # Create new key
          NEW_KEY=$(aws iam create-access-key --user-name algo-developer --output json)
          NEW_ACCESS_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.AccessKeyId')
          NEW_SECRET_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.SecretAccessKey')

          echo "new_access_key=$NEW_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "new_secret_key=$NEW_SECRET_KEY" >> $GITHUB_OUTPUT

          echo "Created new key: $NEW_ACCESS_KEY"

      - name: Update Secrets Manager
        run: |
          SECRET_JSON=$(cat <<EOF
          {
            "access_key_id": "${{ steps.newkey.outputs.new_access_key }}",
            "secret_access_key": "${{ steps.newkey.outputs.new_secret_key }}"
          }
          EOF
          )

          aws secretsmanager update-secret \
            --secret-id algo/developer-credentials \
            --secret-string "$SECRET_JSON" \
            --region ${{ env.AWS_REGION }}

          echo "Updated Secrets Manager"

      - name: Delete old key
        run: |
          OLD_KEY="${{ steps.newkey.outputs.old_key }}"
          if [ -n "$OLD_KEY" ] && [ "$OLD_KEY" != "null" ]; then
            aws iam delete-access-key --user-name algo-developer --access-key-id "$OLD_KEY"
            echo "Deleted old key: $OLD_KEY"
          fi

      - name: Verify new key works
        run: |
          export AWS_ACCESS_KEY_ID="${{ steps.newkey.outputs.new_access_key }}"
          export AWS_SECRET_ACCESS_KEY="${{ steps.newkey.outputs.new_secret_key }}"

          IDENTITY=$(aws sts get-caller-identity)
          echo "New credentials verified working:"
          echo "$IDENTITY"

      - name: Summary
        run: |
          echo "## AWS Credentials Rotated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ New IAM access key created: ${{ steps.newkey.outputs.new_access_key }}" >> $GITHUB_STEP_SUMMARY
          echo "✓ Secrets Manager updated" >> $GITHUB_STEP_SUMMARY
          echo "✓ Old key deleted" >> $GITHUB_STEP_SUMMARY
          echo "✓ New credentials verified working" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step for users:** Run \`scripts/refresh-aws-credentials.ps1\` to download the new credentials" >> $GITHUB_STEP_SUMMARY
