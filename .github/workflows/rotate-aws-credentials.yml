name: Rotate AWS Credentials

on:
  schedule:
    # Run monthly on the 1st at 2 AM UTC (automatic rotation)
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      delete_old_key:
        description: 'Delete old key after rotation (after verification)'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  rotate-credentials:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (assume role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          role-session-name: github-actions-key-rotation
          aws-region: us-east-1

      - name: Create new AWS access key
        id: create_key
        run: |
          # Get current AWS user (algo-developer)
          CURRENT_USER=$(aws iam get-user --query 'User.UserName' --output text)
          echo "user=${CURRENT_USER}" >> $GITHUB_OUTPUT

          # Create new access key
          NEW_KEY=$(aws iam create-access-key --user-name ${CURRENT_USER} --output json)
          NEW_KEY_ID=$(echo $NEW_KEY | jq -r '.AccessKey.AccessKeyId')
          NEW_SECRET=$(echo $NEW_KEY | jq -r '.AccessKey.SecretAccessKey')

          # Store in step output (masked)
          echo "key_id=${NEW_KEY_ID}" >> $GITHUB_OUTPUT
          echo "::add-mask::${NEW_SECRET}"
          echo "secret=${NEW_SECRET}" >> $GITHUB_OUTPUT
          echo "created_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

          echo "✅ Created new access key: ${NEW_KEY_ID}"

      - name: Test new credentials
        run: |
          # Configure temporary AWS credentials with new key
          export AWS_ACCESS_KEY_ID=${{ steps.create_key.outputs.key_id }}
          export AWS_SECRET_ACCESS_KEY=${{ steps.create_key.outputs.secret }}

          # Test by getting account info
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "✅ New credentials work! Account ID: ${ACCOUNT_ID}"

          # Test S3 access (minimal operation)
          aws s3 ls --region us-east-1 | head -5
          echo "✅ S3 access verified"

      - name: Update GitHub secrets with new credentials
        run: |
          # Install gh CLI if not available
          which gh || sudo apt-get update && sudo apt-get install -y gh

          # Update secrets (requires GITHUB_TOKEN which is auto-provided)
          echo "${{ steps.create_key.outputs.key_id }}" | gh secret set AWS_ACCESS_KEY_ID --repo ${{ github.repository }}
          echo "${{ steps.create_key.outputs.secret }}" | gh secret set AWS_SECRET_ACCESS_KEY --repo ${{ github.repository }}

          echo "✅ GitHub secrets updated with new credentials"
          echo "Date updated: ${{ steps.create_key.outputs.created_date }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List all access keys
        id: list_keys
        run: |
          CURRENT_USER=${{ steps.create_key.outputs.user }}

          # Get all access keys
          KEYS=$(aws iam list-access-keys --user-name ${CURRENT_USER} --output json)
          echo "$KEYS" | jq '.AccessKeyMetadata[] | {AccessKeyId, CreateDate, Status}'

          # Count active keys
          ACTIVE_COUNT=$(echo "$KEYS" | jq '[.AccessKeyMetadata[] | select(.Status=="Active")] | length')
          echo "active_count=${ACTIVE_COUNT}" >> $GITHUB_OUTPUT

          # Get oldest key ID for potential deletion
          OLDEST_KEY=$(echo "$KEYS" | jq -r '.AccessKeyMetadata | sort_by(.CreateDate) | .[0].AccessKeyId')
          echo "oldest_key=${OLDEST_KEY}" >> $GITHUB_OUTPUT

      - name: Mark old key for deactivation (if more than 2 keys)
        if: steps.list_keys.outputs.active_count > 2
        run: |
          CURRENT_USER=${{ steps.create_key.outputs.user }}
          OLD_KEY=${{ steps.list_keys.outputs.oldest_key }}

          # Deactivate oldest key
          aws iam update-access-key --user-name ${CURRENT_USER} --access-key-id ${OLD_KEY} --status Inactive
          echo "⚠️  Deactivated old key: ${OLD_KEY}"
          echo "Please verify new key works for 24 hours before deletion"

      - name: Delete old key (if workflow_dispatch with delete_old_key=true)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.delete_old_key == 'true'
        run: |
          CURRENT_USER=${{ steps.create_key.outputs.user }}
          OLD_KEY=${{ steps.list_keys.outputs.oldest_key }}

          # Final safety check - make sure it's not the new key
          if [ "$OLD_KEY" != "${{ steps.create_key.outputs.key_id }}" ]; then
            aws iam delete-access-key --user-name ${CURRENT_USER} --access-key-id ${OLD_KEY}
            echo "✅ Deleted old key: ${OLD_KEY}"
          else
            echo "❌ Safety check failed: about to delete new key! Aborting."
            exit 1
          fi

      - name: Notify completion
        run: |
          cat << EOF
          ✅ AWS Credentials Rotation Complete

          Summary:
          - New key created: ${{ steps.create_key.outputs.key_id }}
          - Credentials tested: ✓
          - GitHub secrets updated: ✓
          - Total active keys: ${{ steps.list_keys.outputs.active_count }}
          - Old key status: Inactive (deactivated)

          Next steps:
          1. Verify new key works in GitHub Actions
          2. Run a test workflow to confirm connectivity
          3. After 24-48 hour verification, run this workflow with delete_old_key=true
          4. This will delete the old key permanently

          Credentials rotation date: ${{ steps.create_key.outputs.created_date }}
          EOF

      - name: Report to run summary
        if: always()
        run: |
          echo "### AWS Credentials Rotation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| New Key Created | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Key ID | ${{ steps.create_key.outputs.key_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Credentials Tested | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Secrets Updated | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Old Key Deactivated | ✅ |" >> $GITHUB_STEP_SUMMARY
