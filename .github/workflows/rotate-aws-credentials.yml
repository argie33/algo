name: Rotate AWS Credentials

on:
  schedule:
    # Run monthly on the 1st at 2 AM UTC (automatic rotation)
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      delete_old_key:
        description: 'Delete old key after 48h verification'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  rotate-credentials:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (assume role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          role-session-name: github-actions-key-rotation-${{ github.run_id }}
          aws-region: us-east-1

      # ============================================================
      # Phase 1: Verify IAM Permissions (Fail-fast)
      # ============================================================
      - name: Verify IAM permissions
        id: verify_perms
        run: |
          set -e
          echo "Verifying IAM permissions for algo-developer user..."

          # Test 1: Can we get the user?
          if ! aws iam get-user --user-name algo-developer &>/dev/null; then
            echo "❌ ERROR: Cannot access algo-developer user. Check IAM permissions."
            exit 1
          fi
          echo "✅ GetUser permission verified"

          # Test 2: Can we list access keys?
          if ! aws iam list-access-keys --user-name algo-developer &>/dev/null; then
            echo "❌ ERROR: Cannot list access keys. Check IAM permissions."
            exit 1
          fi
          echo "✅ ListAccessKeys permission verified"

          # Test 3: Try creating a dummy key (will fail if no permission)
          # We'll rollback this immediately
          DUMMY_KEY=$(aws iam create-access-key --user-name algo-developer --query 'AccessKey.AccessKeyId' --output text 2>&1)
          if [[ $DUMMY_KEY == "An error occurred"* ]]; then
            echo "❌ ERROR: Cannot create access keys. Check IAM permissions."
            exit 1
          fi

          # Clean up dummy key
          aws iam delete-access-key --user-name algo-developer --access-key-id "$DUMMY_KEY" || true
          echo "✅ CreateAccessKey/DeleteAccessKey permissions verified"

      # ============================================================
      # Phase 2: Create and Test New Key
      # ============================================================
      - name: Create new AWS access key
        id: create_key
        run: |
          set -e

          echo "Creating new access key for algo-developer..."
          NEW_KEY=$(aws iam create-access-key \
            --user-name algo-developer \
            --output json)

          NEW_KEY_ID=$(echo "$NEW_KEY" | jq -r '.AccessKey.AccessKeyId')
          NEW_SECRET=$(echo "$NEW_KEY" | jq -r '.AccessKey.SecretAccessKey')
          CREATION_DATE=$(echo "$NEW_KEY" | jq -r '.AccessKey.CreateDate')

          # Output values (secret is automatically masked by GitHub Actions)
          echo "key_id=${NEW_KEY_ID}" >> $GITHUB_OUTPUT
          echo "secret=${NEW_SECRET}" >> $GITHUB_OUTPUT
          echo "created_date=${CREATION_DATE}" >> $GITHUB_OUTPUT

          # Mask the secret from logs
          echo "::add-mask::${NEW_SECRET}"

          echo "✅ Created new access key: ${NEW_KEY_ID}"

      - name: Test new credentials - IAM access
        run: |
          set -e

          # Use the new credentials temporarily
          export AWS_ACCESS_KEY_ID=${{ steps.create_key.outputs.key_id }}
          export AWS_SECRET_ACCESS_KEY=${{ steps.create_key.outputs.secret }}
          unset AWS_ROLE_ARN AWS_WEB_IDENTITY_TOKEN_FILE

          echo "Testing new credentials (IAM GetCallerIdentity)..."
          ACCOUNT=$(aws sts get-caller-identity --query 'Account' --output text)
          PRINCIPAL=$(aws sts get-caller-identity --query 'Arn' --output text)

          if [[ ! $ACCOUNT =~ ^[0-9]{12}$ ]]; then
            echo "❌ ERROR: Invalid account returned from STS call"
            exit 1
          fi

          echo "✅ Credentials work! Account: ${ACCOUNT}"
          echo "✅ Principal: ${PRINCIPAL}"

      - name: Test new credentials - S3 access (read)
        run: |
          set -e

          export AWS_ACCESS_KEY_ID=${{ steps.create_key.outputs.key_id }}
          export AWS_SECRET_ACCESS_KEY=${{ steps.create_key.outputs.secret }}
          unset AWS_ROLE_ARN AWS_WEB_IDENTITY_TOKEN_FILE

          echo "Testing new credentials (S3 ListBucket)..."
          BUCKET_COUNT=$(aws s3 ls --region us-east-1 | wc -l)

          if [[ ! $BUCKET_COUNT =~ ^[0-9]+$ ]]; then
            echo "❌ ERROR: S3 access test failed"
            exit 1
          fi

          echo "✅ S3 read access verified (${BUCKET_COUNT} buckets accessible)"

      # ============================================================
      # Phase 3: Identify and Deactivate Old Key (Safety-first)
      # ============================================================
      - name: List all access keys and identify old key
        id: analyze_keys
        run: |
          set -e

          echo "Analyzing access keys..."
          KEYS_JSON=$(aws iam list-access-keys --user-name algo-developer --output json)

          # Validate JSON
          if ! echo "$KEYS_JSON" | jq empty 2>/dev/null; then
            echo "❌ ERROR: Failed to parse access keys JSON"
            exit 1
          fi

          # Count active keys
          ACTIVE_COUNT=$(echo "$KEYS_JSON" | jq '[.AccessKeyMetadata[] | select(.Status=="Active")] | length')
          echo "active_count=${ACTIVE_COUNT}" >> $GITHUB_OUTPUT

          echo "📊 Found ${ACTIVE_COUNT} active keys"

          # Find oldest key (that's NOT the one we just created)
          OLD_KEY=$(echo "$KEYS_JSON" | jq -r '.AccessKeyMetadata[] | select(.AccessKeyId != "${{ steps.create_key.outputs.key_id }}") | .AccessKeyId' | head -1)

          if [[ -z "$OLD_KEY" ]]; then
            echo "⚠️  No previous key found (first rotation?)"
            echo "old_key=" >> $GITHUB_OUTPUT
          else
            echo "old_key=${OLD_KEY}" >> $GITHUB_OUTPUT
            OLD_CREATE_DATE=$(echo "$KEYS_JSON" | jq -r ".AccessKeyMetadata[] | select(.AccessKeyId==\"${OLD_KEY}\") | .CreateDate")
            echo "old_key_date=${OLD_CREATE_DATE}" >> $GITHUB_OUTPUT
            echo "📋 Old key: ${OLD_KEY} (created: ${OLD_CREATE_DATE})"
          fi

      - name: Deactivate old key (safety-first approach)
        if: steps.analyze_keys.outputs.old_key != ''
        run: |
          set -e

          OLD_KEY=${{ steps.analyze_keys.outputs.old_key }}
          NEW_KEY=${{ steps.create_key.outputs.key_id }}

          # Final safety check: never deactivate the new key
          if [[ "$OLD_KEY" == "$NEW_KEY" ]]; then
            echo "❌ SAFETY FAIL: About to deactivate new key! Aborting immediately."
            exit 1
          fi

          # Verify old key is actually in the account
          KEY_EXISTS=$(aws iam list-access-keys --user-name algo-developer --query "AccessKeyMetadata[?AccessKeyId=='${OLD_KEY}'].AccessKeyId" --output text)
          if [[ -z "$KEY_EXISTS" ]]; then
            echo "❌ ERROR: Old key ${OLD_KEY} not found in account. Aborting."
            exit 1
          fi

          echo "Deactivating old key: ${OLD_KEY}"
          aws iam update-access-key \
            --user-name algo-developer \
            --access-key-id "$OLD_KEY" \
            --status Inactive

          echo "✅ Deactivated: ${OLD_KEY}"
          echo "⏰ Old key will be permanently deleted in 48 hours (manual step required)"

      # ============================================================
      # Phase 4: Update GitHub Secrets
      # ============================================================
      - name: Update GitHub secrets via API
        id: update_secrets
        run: |
          set -e

          NEW_KEY_ID=${{ steps.create_key.outputs.key_id }}
          NEW_SECRET=${{ steps.create_key.outputs.secret }}
          REPO="${{ github.repository }}"

          echo "Updating GitHub secrets for repo: ${REPO}"

          # Use GitHub REST API to update secrets (more reliable than gh CLI)
          # Get repo ID first
          REPO_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}" | jq -r '.id')

          if [[ -z "$REPO_ID" ]] || [[ "$REPO_ID" == "null" ]]; then
            echo "❌ ERROR: Could not get repository ID"
            exit 1
          fi

          echo "Repository ID: ${REPO_ID}"

          # Get public key for encrypting secrets
          PUBLIC_KEY_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/actions/secrets/public-key")

          PUBLIC_KEY=$(echo "$PUBLIC_KEY_RESPONSE" | jq -r '.key')
          KEY_ID=$(echo "$PUBLIC_KEY_RESPONSE" | jq -r '.key_id')

          if [[ -z "$PUBLIC_KEY" ]] || [[ "$PUBLIC_KEY" == "null" ]]; then
            echo "❌ ERROR: Could not get public key for encryption"
            exit 1
          fi

          # Install required Python packages for encryption
          python3 -m pip install -q pynacl

          # Encrypt and update AWS_ACCESS_KEY_ID
          ENCRYPTED_KEY_ID=$(python3 << 'ENCRYPT_PYTHON'
          import base64
          import os
          import nacl.public
          import nacl.utils

          public_key = os.environ['PUBLIC_KEY']
          new_value = os.environ['NEW_KEY_ID']

          # Decode the public key
          pk = nacl.public.PublicKey(public_key.encode(), encoder=nacl.encoding.Base64Encoder)

          # Encrypt the value
          encrypted = nacl.utils.random(nacl.public.Box.NONCE_SIZE) + pk.encrypt(new_value.encode()).ciphertext

          # Encode to base64
          print(base64.b64encode(encrypted).decode())
          ENCRYPT_PYTHON
          )

          if [[ -z "$ENCRYPTED_KEY_ID" ]]; then
            echo "❌ ERROR: Failed to encrypt access key ID"
            exit 1
          fi

          # Update secret via API
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/actions/secrets/AWS_ACCESS_KEY_ID" \
            -H "Content-Type: application/json" \
            -d "{\"key_id\":\"${KEY_ID}\",\"encrypted_value\":\"${ENCRYPTED_KEY_ID}\"}" \
            | jq -r '.message // "Updated"'

          # Encrypt and update AWS_SECRET_ACCESS_KEY
          ENCRYPTED_SECRET=$(python3 << 'ENCRYPT_PYTHON'
          import base64
          import os
          import nacl.public
          import nacl.utils

          public_key = os.environ['PUBLIC_KEY']
          new_value = os.environ['NEW_SECRET']

          # Decode the public key
          pk = nacl.public.PublicKey(public_key.encode(), encoder=nacl.encoding.Base64Encoder)

          # Encrypt the value
          encrypted = nacl.utils.random(nacl.public.Box.NONCE_SIZE) + pk.encrypt(new_value.encode()).ciphertext

          # Encode to base64
          print(base64.b64encode(encrypted).decode())
          ENCRYPT_PYTHON
          )

          if [[ -z "$ENCRYPTED_SECRET" ]]; then
            echo "❌ ERROR: Failed to encrypt access key secret"
            exit 1
          fi

          # Update secret via API
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/actions/secrets/AWS_SECRET_ACCESS_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"key_id\":\"${KEY_ID}\",\"encrypted_value\":\"${ENCRYPTED_SECRET}\"}" \
            | jq -r '.message // "Updated"'

          echo "✅ GitHub secrets updated"
        env:
          PUBLIC_KEY: ${{ secrets.GITHUB_ACTIONS_PUBLIC_KEY }}

      - name: Verify secrets were updated
        run: |
          set -e

          REPO="${{ github.repository }}"
          echo "Verifying secrets update..."

          # List secrets (we can see names but not values - this proves they exist)
          SECRETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/actions/secrets" | jq -r '.secrets[].name')

          if echo "$SECRETS" | grep -q "AWS_ACCESS_KEY_ID"; then
            echo "✅ AWS_ACCESS_KEY_ID confirmed in repository secrets"
          else
            echo "❌ ERROR: AWS_ACCESS_KEY_ID not found in secrets"
            exit 1
          fi

          if echo "$SECRETS" | grep -q "AWS_SECRET_ACCESS_KEY"; then
            echo "✅ AWS_SECRET_ACCESS_KEY confirmed in repository secrets"
          else
            echo "❌ ERROR: AWS_SECRET_ACCESS_KEY not found in secrets"
            exit 1
          fi

      # ============================================================
      # Phase 5: Cleanup (optional manual deletion)
      # ============================================================
      - name: Delete old key (manual confirmation required)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.delete_old_key == 'true'
        run: |
          set -e

          OLD_KEY="${{ steps.analyze_keys.outputs.old_key }}"
          NEW_KEY="${{ steps.create_key.outputs.key_id }}"

          if [[ -z "$OLD_KEY" ]]; then
            echo "⚠️  No old key to delete (first rotation?)"
            exit 0
          fi

          # Triple-check safety
          if [[ "$OLD_KEY" == "$NEW_KEY" ]]; then
            echo "❌ SAFETY FAIL: Refusing to delete new key"
            exit 1
          fi

          # Verify key is inactive before deletion
          KEY_STATUS=$(aws iam list-access-keys --user-name algo-developer --query "AccessKeyMetadata[?AccessKeyId=='${OLD_KEY}'].Status" --output text)

          if [[ "$KEY_STATUS" != "Inactive" ]]; then
            echo "❌ ERROR: Key is not inactive (status: ${KEY_STATUS}). Cannot delete active key."
            exit 1
          fi

          # Delete
          echo "Deleting inactive key: ${OLD_KEY}"
          aws iam delete-access-key --user-name algo-developer --access-key-id "$OLD_KEY"
          echo "✅ Deleted: ${OLD_KEY}"

      # ============================================================
      # Phase 6: Reporting and Summary
      # ============================================================
      - name: Generate rotation report
        if: always()
        run: |
          cat > /tmp/rotation_report.txt << 'EOF'
          ================================================
          AWS CREDENTIALS ROTATION REPORT
          ================================================

          New Key ID: ${{ steps.create_key.outputs.key_id }}
          Created: ${{ steps.create_key.outputs.created_date }}
          Total Active Keys: ${{ steps.analyze_keys.outputs.active_count }}

          Old Key: ${{ steps.analyze_keys.outputs.old_key }}
          Old Key Date: ${{ steps.analyze_keys.outputs.old_key_date }}
          Old Key Status: DEACTIVATED (awaiting deletion)

          GitHub Secrets: UPDATED ✅

          Next Steps:
          1. Verify new key works in CI/CD pipelines
          2. Monitor for auth failures (old key still works for 48h)
          3. After verification, delete old key:
             gh workflow run rotate-aws-credentials.yml \
               --repo ${{ github.repository }} \
               -F delete_old_key=true

          ================================================
          EOF

          cat /tmp/rotation_report.txt

      - name: Create GitHub issue if rotation failed
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ AWS Credentials Rotation Failed',
              body: `## Rotation Failure\n\nRun: ${context.runId}\n\nCheck the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.\n\n**Action required:** Manually verify AWS access keys and update GitHub secrets if needed.`,
              labels: ['security', 'aws', 'automated']
            })

      - name: Report to run summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## AWS Credentials Rotation

          | Item | Status |
          |------|--------|
          | IAM Permissions | ✅ Verified |
          | New Key Created | ✅ |
          | New Key ID | ${{ steps.create_key.outputs.key_id }} |
          | New Key Tested | ✅ STS + S3 |
          | GitHub Secrets | ✅ Updated |
          | Old Key Deactivated | ✅ |
          | Old Key to Delete | ${{ steps.analyze_keys.outputs.old_key }} |

          **Timeline:**
          - Created: ${{ steps.create_key.outputs.created_date }}
          - Deactivated: Now
          - Auto-delete: 48 hours (manual)

          **Next:** Run workflow with `delete_old_key=true` after verification
          EOF
