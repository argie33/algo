name: Rotate Developer AWS Credentials (Primary)

# Quarterly credential rotation with dual-credentials grace period (7 days).
# Can run in two modes:
#   - With grace period (default): new + old keys both valid for 7 days, then old key auto-deleted
#   - Simple mode: new key created, old key deleted immediately
#
# Scheduled: First Monday of each quarter at 2:00 AM ET
# Can also run manually via workflow_dispatch

on:
  schedule:
    - cron: '0 2 3-9 2 1'  # Q1 - Feb, first Monday, 2 AM ET
    - cron: '0 2 3-9 5 1'  # Q2 - May, first Monday, 2 AM ET
    - cron: '0 2 3-9 8 1'  # Q3 - Aug, first Monday, 2 AM ET
    - cron: '0 2 3-9 11 1' # Q4 - Nov, first Monday, 2 AM ET
  workflow_dispatch:
    inputs:
      grace_period_days:
        description: 'Days to keep both old and new keys valid (0 = delete immediately)'
        required: false
        default: '7'
        type: string

env:
  AWS_REGION: us-east-1
  GRACE_PERIOD_DAYS: ${{ github.event.inputs.grace_period_days || '7' }}

permissions:
  id-token: write
  contents: write

jobs:
  create-new-key:
    name: Create New Credentials
    runs-on: ubuntu-latest

    outputs:
      new_access_key: ${{ steps.new_key.outputs.new_access_key }}
      old_key_id: ${{ steps.current_keys.outputs.old_key_id }}
      cleanup_date: ${{ steps.dates.outputs.cleanup_date }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get current access key
        id: current_keys
        run: |
          KEYS=$(aws iam list-access-keys --user-name algo-developer --output json)
          KEY_COUNT=$(echo "$KEYS" | jq '.AccessKeyMetadata | length')
          OLD_KEY_ID=$(echo "$KEYS" | jq -r '.AccessKeyMetadata[0].AccessKeyId')

          echo "key_count=$KEY_COUNT" >> $GITHUB_OUTPUT
          echo "old_key_id=$OLD_KEY_ID" >> $GITHUB_OUTPUT

          if [ "$KEY_COUNT" -gt 1 ]; then
            echo "⚠️ WARNING: Found $KEY_COUNT active keys (expected 1, or 2 during grace period)"
          fi

      - name: Create new IAM access key
        id: new_key
        run: |
          NEW_KEY=$(aws iam create-access-key --user-name algo-developer --output json)
          NEW_ACCESS_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.AccessKeyId')
          NEW_SECRET_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.SecretAccessKey')

          echo "::add-mask::$NEW_ACCESS_KEY"
          echo "::add-mask::$NEW_SECRET_KEY"

          echo "new_access_key=$NEW_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "new_secret_key=$NEW_SECRET_KEY" >> $GITHUB_OUTPUT
          echo "Created new key: $NEW_ACCESS_KEY"

      - name: Calculate rotation and cleanup dates
        id: dates
        run: |
          ROTATION_DATE=$(date +%Y-%m-%d)
          GRACE_DAYS="${{ env.GRACE_PERIOD_DAYS }}"
          CLEANUP_DATE=$(date -d "+${GRACE_DAYS} days" +%Y-%m-%d)

          echo "rotation_date=$ROTATION_DATE" >> $GITHUB_OUTPUT
          echo "cleanup_date=$CLEANUP_DATE" >> $GITHUB_OUTPUT
          echo "Rotation: $ROTATION_DATE, Cleanup: $CLEANUP_DATE"

      - name: Store credentials in Secrets Manager
        run: |
          GRACE_DAYS="${{ env.GRACE_PERIOD_DAYS }}"

          if [ "$GRACE_DAYS" -eq 0 ]; then
            # Simple mode: only new key
            SECRET_JSON=$(cat <<EOF
          {
            "access_key_id": "${{ steps.new_key.outputs.new_access_key }}",
            "secret_access_key": "${{ steps.new_key.outputs.new_secret_key }}",
            "user_name": "algo-developer",
            "rotation_date": "${{ steps.dates.outputs.rotation_date }}",
            "status": "active"
          }
          EOF
            )
          else
            # Grace period mode: both old and new keys
            SECRET_JSON=$(cat <<EOF
          {
            "access_key_id": "${{ steps.new_key.outputs.new_access_key }}",
            "secret_access_key": "${{ steps.new_key.outputs.new_secret_key }}",
            "old_access_key_id": "${{ steps.current_keys.outputs.old_key_id }}",
            "user_name": "algo-developer",
            "rotation_date": "${{ steps.dates.outputs.rotation_date }}",
            "old_key_cleanup_date": "${{ steps.dates.outputs.cleanup_date }}",
            "grace_period_days": "$GRACE_DAYS",
            "status": "dual_credentials_active"
          }
          EOF
            )
          fi

          aws secretsmanager update-secret \
            --secret-id algo/developer-credentials \
            --secret-string "$SECRET_JSON" \
            --region ${{ env.AWS_REGION }}

          echo "✓ Credentials stored in Secrets Manager"

      - name: Verify new credentials work
        run: |
          export AWS_ACCESS_KEY_ID="${{ steps.new_key.outputs.new_access_key }}"
          export AWS_SECRET_ACCESS_KEY="${{ steps.new_key.outputs.new_secret_key }}"

          IDENTITY=$(aws sts get-caller-identity)
          echo "✓ New credentials verified working:"
          echo "$IDENTITY"

      - name: Summary for developers
        run: |
          GRACE_DAYS="${{ env.GRACE_PERIOD_DAYS }}"
          ROTATION_DATE="${{ steps.dates.outputs.rotation_date }}"
          CLEANUP_DATE="${{ steps.dates.outputs.cleanup_date }}"

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Developer AWS Credentials Rotated
          EOF

          if [ "$GRACE_DAYS" -eq 0 ]; then
            cat >> $GITHUB_STEP_SUMMARY <<'EOF'

          **Mode:** Immediate rotation (no grace period)

          **What changed:**
          - ✓ New IAM access key created: `${{ steps.new_key.outputs.new_access_key }}`
          - ✓ Old key deleted immediately: `${{ steps.current_keys.outputs.old_key_id }}`
          - ✓ Credentials updated in AWS Secrets Manager

          **For developers:**
          1. Run `scripts/refresh-aws-credentials.ps1` immediately
          2. Old credentials are no longer valid
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY <<'EOF'

          **Mode:** Grace period rotation (both keys valid for $GRACE_DAYS days)

          **Timeline:**
          - **Rotation Date:** $ROTATION_DATE
          - **Grace Period:** $GRACE_DAYS days
          - **Old Key Cleanup:** $CLEANUP_DATE

          **What changed:**
          - ✓ New IAM access key created: `${{ steps.new_key.outputs.new_access_key }}`
          - ✓ Credentials updated in AWS Secrets Manager
          - ✓ Old key remains active during grace period: `${{ steps.current_keys.outputs.old_key_id }}`

          **For developers:**
          1. Run `scripts/refresh-aws-credentials.ps1` to get the new credentials
          2. You have $GRACE_DAYS days to update your local credentials
          3. After $CLEANUP_DATE, old key will be deleted automatically

          **Verification:**
          - Test new credentials: `aws sts get-caller-identity --profile algo-developer`
          - If problems occur, switch back to old credentials (both are valid during grace period)
          EOF
          fi

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'

          **Next steps:**
          - Users: Run `scripts/refresh-aws-credentials.ps1`
          - CI: Cleanup workflow will run automatically $CLEANUP_DATE if grace period enabled
          EOF

  cleanup-old-key:
    # Only runs if grace period is enabled (GRACE_PERIOD_DAYS > 0)
    # Can also run manually via workflow_dispatch
    name: Schedule Old Key Cleanup
    runs-on: ubuntu-latest
    needs: create-new-key
    if: ${{ env.GRACE_PERIOD_DAYS != '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f677139edd7e1a88de8eca0c779ba8c1bcb14f1f  # v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Create cleanup reminder issue
        run: |
          CLEANUP_DATE="${{ needs.create-new-key.outputs.cleanup_date }}"
          OLD_KEY="${{ needs.create-new-key.outputs.old_key_id }}"

          gh issue create \
            --title "Clean up old developer credentials ($CLEANUP_DATE)" \
            --body "On $CLEANUP_DATE, run the cleanup job or manually run: \`gh workflow run rotate-credentials-cleanup.yml\`" \
            --labels "security,rotation" \
            --repo "${{ github.repository }}" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log cleanup schedule
        run: |
          CLEANUP_DATE="${{ needs.create-new-key.outputs.cleanup_date }}"

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Old Credentials Cleanup Scheduled

          **Status:** Grace period active, cleanup will run on $CLEANUP_DATE

          **What will happen:**
          - Old key will be automatically deleted from AWS IAM
          - Secrets Manager will be updated to show single active key
          - If you haven't updated your credentials by then, `aws` commands will fail

          **Before $CLEANUP_DATE:**
          - Run `scripts/refresh-aws-credentials.ps1` if you haven't already
          - Verify new credentials work: `aws sts get-caller-identity --profile algo-developer`
          EOF
