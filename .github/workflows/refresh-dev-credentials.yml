name: Refresh Developer AWS Credentials

# Reads IaC-managed developer credentials from Secrets Manager and writes them
# as a downloadable artifact. Run this when local ~/.aws/credentials expire.
#
# Usage:
#   gh workflow run refresh-dev-credentials.yml
#   gh run download --name dev-credentials --dir /tmp/aws-creds
#   # or just run: scripts/refresh-aws-credentials.ps1

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  refresh:
    name: Export Developer Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Fetch developer credentials from Secrets Manager
        id: creds
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region ${{ env.AWS_REGION }} \
            --query SecretString \
            --output text)

          ACCESS_KEY=$(echo "$SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['access_key_id'])")
          SECRET_KEY=$(echo "$SECRET" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['secret_access_key'])")

          mkdir -p /tmp/aws-creds
          cat > /tmp/aws-creds/credentials << EOF
          [algo-developer]
          aws_access_key_id = ${ACCESS_KEY}
          aws_secret_access_key = ${SECRET_KEY}
          region = ${{ env.AWS_REGION }}
          EOF

          echo "access_key_id=${ACCESS_KEY}" >> $GITHUB_OUTPUT

      - name: Upload credentials artifact
        uses: actions/upload-artifact@v4  # v4.5.0
        with:
          name: dev-credentials
          path: /tmp/aws-creds/credentials
          retention-days: 1

      - name: Summary
        run: |
          echo "## Developer Credentials Refreshed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Run \`scripts/refresh-aws-credentials.ps1\` or download the artifact:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "gh run download --name dev-credentials --dir \$HOME/.aws-tmp" >> $GITHUB_STEP_SUMMARY
          echo "# Then merge into ~/.aws/credentials" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
