name: Loaders + Orchestrator (Full Pipeline)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  full-pipeline:
    name: Launch Loaders, Wait for Data, Execute Orchestrator
    runs-on: ubuntu-latest
    concurrency:
      group: loaders-pipeline
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Network Config
        id: network
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo*" --region us-east-1 --query "Vpcs[0].VpcId" --output text)
          SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*private*" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          if [ -z "$SUBNET" ] || [ "$SUBNET" = "None" ]; then
            SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          fi
          SG=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=algo-ecs-tasks-sg" --region us-east-1 --query "SecurityGroups[0].GroupId" --output text)
          echo "subnet=$SUBNET" >> $GITHUB_OUTPUT
          echo "security_group=$SG" >> $GITHUB_OUTPUT

      - name: Pre-flight Check - Detect Running Loaders
        run: |
          echo "=== Checking for Already-Running Loaders ==="
          RUNNING_COUNT=0
          for loader in stock_prices_daily stock_prices_weekly market_data_batch technical_data_daily signals_daily algo_metrics_daily econ_data; do
            COUNT=$(aws ecs list-tasks --cluster algo-cluster --desired-status RUNNING --region us-east-1 --query "length(taskArns[?contains(taskArn, 'algo-${loader}')])" --output text 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "⚠️  WARNING: $COUNT instance(s) of algo-${loader}-loader already running"
              RUNNING_COUNT=$((RUNNING_COUNT + COUNT))
            fi
          done
          if [ "$RUNNING_COUNT" -gt 0 ]; then
            echo "❌ ERROR: $RUNNING_COUNT loader task(s) already running. Aborting to prevent duplicates and wasted costs."
            echo "Action: Wait for existing loaders to complete or manually stop them in ECS."
            exit 1
          fi
          echo "✅ No loaders currently running. Safe to proceed."

      - name: Launch All Loaders
        run: |
          echo "=== Launching All 7 Loaders in Parallel ==="

          # Create temp file to store task ARNs
          > /tmp/loader_tasks.txt

          for loader in stock_prices_daily stock_prices_weekly market_data_batch technical_data_daily signals_daily algo_metrics_daily econ_data; do
            echo "Launching algo-${loader}-loader..."
            TASK_ARN=$(aws ecs run-task \
              --cluster algo-cluster \
              --task-definition algo-${loader}-loader \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=ENABLED}" \
              --region us-east-1 \
              --query 'tasks[0].taskArn' \
              --output text)
            echo "$TASK_ARN" >> /tmp/loader_tasks.txt
            echo "  Task ARN: $TASK_ARN"
          done

          echo ""
          echo "All 7 loaders launched. Task ARNs saved."

      - name: Wait for Loaders to Complete (up to 240 minutes)
        run: |
          ELAPSED=0
          MAX_WAIT=14400  # 240 minutes - stock prices need 180+ min for 5000+ symbols (including DB inserts)
          POLL_INTERVAL=30

          # Read all task ARNs from file
          mapfile -t TASKS < /tmp/loader_tasks.txt

          echo "Waiting for ${#TASKS[@]} loaders to complete..."
          echo ""

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALL_STOPPED=true
            ANY_FAILED=false

            # Check status of each task
            for TASK_ARN in "${TASKS[@]}"; do
              STATUS=$(aws ecs describe-tasks \
                --cluster algo-cluster \
                --tasks "$TASK_ARN" \
                --region us-east-1 \
                --query 'tasks[0].lastStatus' \
                --output text 2>/dev/null || echo "UNKNOWN")

              if [ "$STATUS" != "STOPPED" ]; then
                ALL_STOPPED=false
              fi

              # Check exit code if stopped
              if [ "$STATUS" = "STOPPED" ]; then
                EXIT_CODE=$(aws ecs describe-tasks \
                  --cluster algo-cluster \
                  --tasks "$TASK_ARN" \
                  --region us-east-1 \
                  --query 'tasks[0].containers[0].exitCode' \
                  --output text 2>/dev/null || echo "")

                if [ "$EXIT_CODE" != "0" ] && [ -n "$EXIT_CODE" ]; then
                  echo "❌ Task failed: $TASK_ARN (exit code: $EXIT_CODE)"
                  ANY_FAILED=true
                fi
              fi
            done

            if [ "$ALL_STOPPED" = true ]; then
              if [ "$ANY_FAILED" = true ]; then
                echo ""
                echo "❌ One or more loaders failed. Exiting."
                exit 1
              fi
              echo "✅ All loaders completed successfully"
              break
            fi

            echo "[$ELAPSED/$MAX_WAIT] Waiting for loaders... (${#TASKS[@]} tasks)"
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Loaders did not complete within 240 minutes"
            exit 1
          fi

      - name: Invoke Orchestrator Lambda
        run: |
          echo "=== Invoking Orchestrator (Synchronous) ==="

          FUNC="algo-algo-dev"
          PAYLOAD_JSON='{"source":"loaders-pipeline","timeout":120}'
          PAYLOAD=$(echo -n "$PAYLOAD_JSON" | base64 -w 0)

          timeout 180 aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type RequestResponse \
            --payload "$PAYLOAD" \
            --region $AWS_REGION \
            /tmp/response.json || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️ Lambda timed out (may still be executing)"
              fi
              exit 0
            }

          echo "Orchestrator invoked at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -f /tmp/response.json ]; then
            echo "Lambda Response:"
            cat /tmp/response.json | head -50
          fi

      - name: Wait for Phase 7 (up to 5 minutes)
        run: |
          LOG_GROUP="/aws/lambda/algo-algo-dev"
          ELAPSED=0

          while [ $ELAPSED -lt 300 ]; do
            LATEST=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --limit 1 \
              --region $AWS_REGION \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || echo "")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "⏳ Waiting for logs... ($ELAPSED/300s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
              continue
            fi

            LOGS=$(aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text 2>/dev/null || echo "")

            if echo "$LOGS" | grep -q "Phase 7\|Phase 6.*executed"; then
              echo "✅ Orchestrator Phase 7 found - pipeline COMPLETE!"
              echo ""
              echo "=== ORCHESTRATOR LOGS ==="
              echo "$LOGS" | tail -100
              exit 0
            fi

            if echo "$LOGS" | grep -qE "FATAL|password authentication failed"; then
              echo "❌ FATAL ERROR found"
              echo "$LOGS"
              exit 1
            fi

            echo "⏳ Checking for Phase 7... ($ELAPSED/300s)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "⚠️ Phase 7 not found within timeout"
          echo ""
          echo "=== LOGS RETRIEVED ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST" \
            --region $AWS_REGION \
            --query 'events[*].message' \
            --output text | tail -100

          exit 1
