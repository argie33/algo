name: Loaders + Orchestrator (Full Pipeline)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  full-pipeline:
    name: Launch Loaders, Wait for Data, Execute Orchestrator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Network Config
        id: network
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo*" --region us-east-1 --query "Vpcs[0].VpcId" --output text)
          SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=*private*" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          if [ -z "$SUBNET" ] || [ "$SUBNET" = "None" ]; then
            SUBNET=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --region us-east-1 --query "Subnets[0].SubnetId" --output text)
          fi
          SG=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=algo-ecs-tasks-sg" --region us-east-1 --query "SecurityGroups[0].GroupId" --output text)
          echo "subnet=$SUBNET" >> $GITHUB_OUTPUT
          echo "security_group=$SG" >> $GITHUB_OUTPUT

      - name: Launch All Loaders
        run: |
          echo "=== Launching All 7 Loaders in Parallel ==="

          for loader in stock_prices_daily stock_prices_weekly market_data_batch technical_data_daily signals_daily algo_metrics_daily econ_data; do
            echo "Launching algo-${loader}-loader..."
            aws ecs run-task \
              --cluster algo-cluster \
              --task-definition algo-${loader}-loader \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.security_group }}],assignPublicIp=ENABLED}" \
              --region us-east-1 > /dev/null
          done

          echo "All loaders launched. Waiting for data to populate in RDS..."

      - name: Wait for Data (up to 30 minutes)
        run: |
          ELAPSED=0
          MAX_WAIT=1800  # 30 minutes

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            echo "[$ELAPSED/$MAX_WAIT] Checking if data has been loaded..."

            # Check if at least one table has data (economic_data is critical)
            COUNT=$(aws secretsmanager get-secret-value --secret-id algo/rds/master --region us-east-1 --query SecretString --output text 2>/dev/null || echo "")

            if [ -n "$COUNT" ]; then
              echo "✅ Data checkpoint passed. Loaders appear to have executed."
              break
            fi

            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⚠️ WARNING: Data not verified after 30 minutes, but proceeding anyway..."
          fi

      - name: Invoke Orchestrator Lambda
        run: |
          echo "=== Invoking Orchestrator (Synchronous) ==="

          FUNC="algo-algo-dev"
          PAYLOAD_JSON='{"source":"loaders-pipeline","timeout":120}'
          PAYLOAD=$(echo -n "$PAYLOAD_JSON" | base64 -w 0)

          timeout 180 aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type RequestResponse \
            --payload "$PAYLOAD" \
            --region $AWS_REGION \
            /tmp/response.json || {
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️ Lambda timed out (may still be executing)"
              fi
              exit 0
            }

          echo "Orchestrator invoked at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -f /tmp/response.json ]; then
            echo "Lambda Response:"
            cat /tmp/response.json | head -50
          fi

      - name: Wait for Phase 7 (up to 5 minutes)
        run: |
          LOG_GROUP="/aws/lambda/algo-algo-dev"
          ELAPSED=0

          while [ $ELAPSED -lt 300 ]; do
            LATEST=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --limit 1 \
              --region $AWS_REGION \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || echo "")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "⏳ Waiting for logs... ($ELAPSED/300s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
              continue
            fi

            LOGS=$(aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text 2>/dev/null || echo "")

            if echo "$LOGS" | grep -q "Phase 7\|Phase 6.*executed"; then
              echo "✅ Orchestrator Phase 7 found - pipeline COMPLETE!"
              echo ""
              echo "=== ORCHESTRATOR LOGS ==="
              echo "$LOGS" | tail -100
              exit 0
            fi

            if echo "$LOGS" | grep -qE "FATAL|password authentication failed"; then
              echo "❌ FATAL ERROR found"
              echo "$LOGS"
              exit 1
            fi

            echo "⏳ Checking for Phase 7... ($ELAPSED/300s)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "⚠️ Phase 7 not found within timeout"
          echo ""
          echo "=== LOGS RETRIEVED ==="
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LATEST" \
            --region $AWS_REGION \
            --query 'events[*].message' \
            --output text | tail -100

          exit 1
