name: ECR Image Cleanup

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC (keep images fresh but not waste storage)
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      keep_images:
        description: 'Number of images to keep per repository'
        required: false
        default: '10'
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_ROLE_SESSION: github-actions-ecr-cleanup

jobs:
  cleanup-ecr:
    name: Clean up ECR repositories
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION }}

      - name: Get ECR repository name
        id: ecr
        run: |
          # Get the ECR repository URI from CloudFormation exports
          REPO_URI=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-ContainerRepositoryUri'].Value" \
            --output text)
          
          if [ -z "$REPO_URI" ] || [ "$REPO_URI" = "None" ]; then
            echo "❌ Could not find ECR repository URI"
            exit 1
          fi
          
          # Extract repository name from URI
          REPO_NAME=$(echo "$REPO_URI" | cut -d'/' -f2)
          
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "REPO_URI=$REPO_URI" >> $GITHUB_OUTPUT
          echo "🎯 Found ECR repository: $REPO_NAME"

      - name: List current images
        id: list
        run: |
          KEEP_COUNT="${{ github.event.inputs.keep_images || '10' }}"
          REPO_NAME="${{ steps.ecr.outputs.REPO_NAME }}"
          
          echo "📋 Listing images in repository: $REPO_NAME"
          
          # Get all image digests sorted by push date (newest first)
          aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query 'sort_by(imageDetails, &imagePushedAt)[*].[imagePushedAt,imageDigest,imageTags[0]]' \
            --output table
          
          # Count total images
          TOTAL_IMAGES=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query 'length(imageDetails)' \
            --output text)
          
          echo "TOTAL_IMAGES=$TOTAL_IMAGES" >> $GITHUB_OUTPUT
          echo "KEEP_COUNT=$KEEP_COUNT" >> $GITHUB_OUTPUT
          echo "📊 Total images: $TOTAL_IMAGES, keeping newest: $KEEP_COUNT"

      - name: Clean up old images
        run: |
          REPO_NAME="${{ steps.ecr.outputs.REPO_NAME }}"
          TOTAL_IMAGES="${{ steps.list.outputs.TOTAL_IMAGES }}"
          KEEP_COUNT="${{ steps.list.outputs.KEEP_COUNT }}"
          
          if [ "$TOTAL_IMAGES" -le "$KEEP_COUNT" ]; then
            echo "✅ No cleanup needed - only $TOTAL_IMAGES images (keeping $KEEP_COUNT)"
            exit 0
          fi
          
          DELETE_COUNT=$((TOTAL_IMAGES - KEEP_COUNT))
          echo "🗑️ Deleting $DELETE_COUNT old images..."
          
          # Get image digests of oldest images to delete
          aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query "sort_by(imageDetails, &imagePushedAt)[0:$DELETE_COUNT].imageDigest" \
            --output text | tr '\t' '\n' > /tmp/digests_to_delete.txt
          
          # Delete images in batches of 10 (AWS API limit)
          while IFS= read -r digest; do
            if [ -n "$digest" ]; then
              echo "🗑️ Deleting image: $digest"
              aws ecr batch-delete-image \
                --repository-name "$REPO_NAME" \
                --image-ids imageDigest="$digest" \
                --output text
            fi
          done < /tmp/digests_to_delete.txt
          
          echo "✅ ECR cleanup completed - deleted $DELETE_COUNT images"

      - name: Final repository status
        run: |
          REPO_NAME="${{ steps.ecr.outputs.REPO_NAME }}"
          
          echo "📊 Final repository status:"
          
          # Get current image count and total size
          CURRENT_IMAGES=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query 'length(imageDetails)' \
            --output text)
          
          TOTAL_SIZE=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query 'sum(imageDetails[].imageSizeInBytes)' \
            --output text)
          
          # Convert bytes to MB
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          
          echo "📦 Current images: $CURRENT_IMAGES"
          echo "💾 Total size: ${TOTAL_SIZE_MB} MB"
          
          # Show latest images
          echo "🔍 Latest images:"
          aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --query 'reverse(sort_by(imageDetails, &imagePushedAt))[0:5].[imagePushedAt,imageTags[0]]' \
            --output table

      - name: Cleanup summary
        run: |
          echo "🏆 ECR Cleanup Summary:"
          echo "   Repository: ${{ steps.ecr.outputs.REPO_NAME }}"
          echo "   Images kept: ${{ steps.list.outputs.KEEP_COUNT }}"
          echo "   Cleanup schedule: Weekly (Sundays 2 AM UTC)"
          echo "   Manual trigger: Available via GitHub Actions UI"
          echo ""
          echo "💡 This job helps:"
          echo "   - Reduce ECR storage costs"
          echo "   - Keep repositories organized"
          echo "   - Maintain recent images for rollbacks"
