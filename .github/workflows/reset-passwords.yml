name: Reset Passwords to Simple
on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1
      - name: Reset all user passwords
        run: |
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region us-east-1 --query "UserPools[?Name=='algo-pool-dev'].Id" --output text)
          if [ -z "$POOL_ID" ]; then
            echo "ERROR: Could not find Cognito user pool 'algo-pool-dev'"
            exit 1
          fi

          PASSWORD="Test1234!@##"

          # Get all users
          USERS=$(aws cognito-idp list-users --user-pool-id "$POOL_ID" --region us-east-1 --output json | jq -r '.Users[].Username')

          echo "=== Resetting passwords ==="
          for user in $USERS; do
            echo "Setting password for: $user"
            aws cognito-idp admin-set-user-password \
              --user-pool-id "$POOL_ID" \
              --username "$user" \
              --password "$PASSWORD" \
              --permanent \
              --region us-east-1
            echo "  ✓ Password set"
          done

          echo ""
          echo "✅ All users now use password: $PASSWORD"
