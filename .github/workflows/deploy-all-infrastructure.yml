name: Deploy All Infrastructure (Master Orchestrator)

on:
  workflow_dispatch:
    inputs:
      skip_bootstrap:
        description: 'Skip OIDC bootstrap (only needed once)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: 1. Bootstrap OIDC Provider
    if: ${{ github.event.inputs.skip_bootstrap != 'true' }}
    uses: ./.github/workflows/bootstrap-oidc.yml
    secrets: inherit

  core:
    name: 2. Deploy Core Infrastructure
    needs: bootstrap
    if: always()  # Run even if bootstrap skipped
    uses: ./.github/workflows/deploy-core.yml
    secrets: inherit

  data-infrastructure:
    name: 3. Deploy Data Infrastructure
    needs: core
    uses: ./.github/workflows/deploy-data-infrastructure.yml
    secrets: inherit

  webapp:
    name: 4. Deploy Webapp
    needs: data-infrastructure
    uses: ./.github/workflows/deploy-webapp.yml
    secrets: inherit

  loaders:
    name: 5. Deploy Loaders
    needs: data-infrastructure
    uses: ./.github/workflows/deploy-loaders.yml
    secrets: inherit

  algo:
    name: 6. Deploy Algo Orchestrator
    needs: data-infrastructure
    uses: ./.github/workflows/deploy-algo.yml
    secrets: inherit

  summary:
    name: Deployment Summary
    needs: [webapp, loaders, algo]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Complete
        run: |
          echo "=========================================="
          echo "All infrastructure deployed successfully!"
          echo "=========================================="
          echo ""
          echo "Stack deployment order (completed):"
          echo "1. ✅ stocks-oidc (OIDC provider)"
          echo "2. ✅ stocks-core (VPC, ECR, S3, bastion)"
          echo "3. ✅ stocks-data (RDS, ECS cluster, secrets)"
          echo "4. ✅ stocks-webapp-dev (Lambda API, frontend)"
          echo "5. ✅ stocks-loaders (62 ECS data loaders)"
          echo "6. ✅ stocks-algo-dev (algo orchestrator Lambda)"
          echo ""
          echo "Next steps:"
          echo "- Verify data loaders are running in CloudWatch"
          echo "- Check algo Lambda is scheduled in EventBridge"
          echo "- Test webapp frontend at CloudFront URL"
          echo "- Review stack outputs for API endpoints and URLs"
