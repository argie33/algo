name: Deploy All Infrastructure (Terraform)

# Master deploy: runs terraform apply, then builds all application code in parallel.
# IMPORTANT: Terraform apply is MANUAL ONLY (workflow_dispatch) to require review.
# Use companion workflow: terraform-plan.yml (runs on PR, shows plan in comment)
# Workflow: Plan on PR → Review → Merge → Manually trigger this deploy to apply
# NOTE: This is the ONLY deployment workflow. All infrastructure uses Terraform (IaC).

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: 'Skip terraform apply (infra already up to date)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      skip_image:
        description: 'Skip Docker image build/push'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      skip_code:
        description: 'Skip Lambda + frontend deploy'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read

# Concurrency disabled to allow pending runs to execute
# Note: Multiple Terraform runs may cause state conflicts, but necessary to unblock queued deployments

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  #
  # STEP 0 -- Bootstrap Terraform Backend (S3 + DynamoDB)
  #
  bootstrap-backend:
    name: "0. Bootstrap Terraform Backend / Create S3 State Bucket & DynamoDB Lock Table"
    runs-on: ubuntu-latest
    # Note: Inherits permissions from workflow-level definition (id-token: write, contents: read)
    # Explicit job-level permissions override workflow-level - only include if different
    outputs:
      github_actions_role_arn: ${{ steps.bootstrap.outputs.role_arn }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Run Bootstrap Script
        id: bootstrap
        run: |
          # Export role ARN for downstream jobs
          ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}"
          echo "role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT

          python3 << 'EOF'
          import boto3
          import sys
          import os

          s3 = boto3.client('s3', region_name='us-east-1')
          dynamodb = boto3.client('dynamodb', region_name='us-east-1')

          # Read backend config from environment or use defaults
          backend_bucket = os.environ.get('BACKEND_BUCKET', 'stocks-terraform-state')
          backend_key = os.environ.get('BACKEND_KEY', 'stocks/terraform.tfstate')

          # Create Terraform state bucket
          try:
            s3.head_bucket(Bucket=backend_bucket)
            print(f"[OK] S3 bucket exists: {backend_bucket}")
          except s3.exceptions.NoSuchBucket:
            try:
              s3.create_bucket(Bucket=backend_bucket)
              s3.put_bucket_versioning(
                Bucket=backend_bucket,
                VersioningConfiguration={'Status': 'Enabled'}
              )
              s3.put_bucket_encryption(
                Bucket=backend_bucket,
                ServerSideEncryptionConfiguration={
                  'Rules': [{
                    'ApplyServerSideEncryptionByDefault': {'SSEAlgorithm': 'AES256'}
                  }]
                }
              )
              print(f"[OK] Created S3 bucket: {backend_bucket}")
            except Exception as e:
              print(f"[ERROR] Could not create bucket: {e}")
          except Exception as e:
            print(f"[ERROR] S3 bucket check failed: {type(e).__name__}: {e}")

          # Create DynamoDB lock table
          try:
            dynamodb.describe_table(TableName='terraform-locks')
            print("[OK] DynamoDB table exists: terraform-locks")
          except dynamodb.exceptions.ResourceNotFoundException:
            try:
              dynamodb.create_table(
                TableName='terraform-locks',
                KeySchema=[{'AttributeName': 'LockID', 'KeyType': 'HASH'}],
                AttributeDefinitions=[{'AttributeName': 'LockID', 'AttributeType': 'S'}],
                BillingMode='PAY_PER_REQUEST'
              )
              print("[OK] Created DynamoDB table: terraform-locks")
            except Exception as e:
              print(f"[ERROR] Could not create table: {e}")
          except Exception as e:
            print(f"[ERROR] DynamoDB table check failed: {type(e).__name__}: {e}")
          EOF

      - name: Verify Backend Resources
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_STATE_BUCKET || 'stocks-terraform-state' }}
        run: |
          aws s3api head-bucket --bucket "$TF_BACKEND_BUCKET" && echo "[OK] S3 bucket verified: $TF_BACKEND_BUCKET"
          aws dynamodb describe-table --table-name terraform-locks --region $AWS_REGION && echo "[OK] DynamoDB table verified"

  #
  # STEP 1 -- Infrastructure (Terraform)
  #
  terraform:
    name: "1. Terraform Apply"
    runs-on: ubuntu-latest
    needs: bootstrap-backend
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_repository_url: ${{ steps.outputs.outputs.ecr_repository_url }}
      api_lambda_name: ${{ steps.outputs.outputs.api_lambda_name }}
      algo_lambda_name: ${{ steps.outputs.outputs.algo_lambda_name }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      cloudfront_distribution_id: ${{ steps.outputs.outputs.cloudfront_distribution_id }}
      api_gateway_endpoint: ${{ steps.outputs.outputs.api_gateway_endpoint }}
      website_url: ${{ steps.outputs.outputs.website_url }}
      cognito_user_pool_id: ${{ steps.outputs.outputs.cognito_user_pool_id }}
      cognito_user_pool_client_id: ${{ steps.outputs.outputs.cognito_user_pool_client_id }}
      cognito_domain_url: ${{ steps.outputs.outputs.cognito_domain_url }}
    env:
      TF_VAR_alpaca_api_key_id: ${{ secrets.ALPACA_API_KEY_ID }}
      TF_VAR_alpaca_api_secret_key: ${{ secrets.ALPACA_API_SECRET_KEY }}
      TF_VAR_notification_email: ${{ secrets.ALERT_EMAIL_ADDRESS }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_fred_api_key: ${{ secrets.FRED_API_KEY }}
      TF_VAR_alert_smtp_password: ${{ secrets.ALERT_SMTP_PASSWORD }}

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore deleted secrets from scheduled deletion
        run: |
          echo "[INFO] Checking for secrets scheduled for deletion..."
          for SECRET in "algo/fred" "algo/alpaca"; do
            STATUS=$(aws secretsmanager describe-secret --secret-id "$SECRET" --region us-east-1 2>/dev/null || echo "NOT_FOUND")

            if echo "$STATUS" | grep -q "DeletedDate"; then
              echo "[WARN] $SECRET is scheduled for deletion, attempting restore..."
              aws secretsmanager restore-secret --secret-id "$SECRET" --region us-east-1 2>/dev/null && echo "[OK] Restored $SECRET" || echo "[INFO] Could not restore (may already exist)"
            elif echo "$STATUS" | grep -q "NOT_FOUND"; then
              echo "[INFO] $SECRET not found (will be created fresh)"
            else
              echo "[OK] $SECRET is active"
            fi
          done

      - name: Validate Alpaca credentials configured
        run: |
          if [ -z "${{ secrets.ALPACA_API_KEY_ID }}" ] || [ -z "${{ secrets.ALPACA_API_SECRET_KEY }}" ]; then
            echo "[ERROR] GitHub Secrets missing: ALPACA_API_KEY_ID or ALPACA_API_SECRET_KEY not configured"
            echo "[ERROR] Without these secrets, Terraform will create AWS Secrets Manager with empty values"
            echo "[ERROR] Set GitHub Secrets before running this workflow"
            exit 1
          else
            echo "[OK] Alpaca credentials found in GitHub Secrets"
          fi

      - name: Discover CloudFront domain for CORS configuration
        run: |
          # Query existing CloudFront distribution to get the current domain
          CLOUDFRONT_DOMAIN=$(aws cloudfront list-distributions \
            --query 'DistributionList.Items[0].DomainName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$CLOUDFRONT_DOMAIN" ] && [ "$CLOUDFRONT_DOMAIN" != "None" ]; then
            # Pass the CloudFront domain to Terraform for CORS, auth redirects, and Cognito callbacks
            HTTPS_DOMAIN="https://${CLOUDFRONT_DOMAIN}"
            # Include localhost for local development testing
            CORS_ORIGINS="[\"${HTTPS_DOMAIN}\", \"http://localhost:5173\", \"http://localhost:3000\"]"
            echo "TF_VAR_api_cors_allowed_origins=${CORS_ORIGINS}" >> $GITHUB_ENV
            echo "TF_VAR_frontend_origin=${HTTPS_DOMAIN}" >> $GITHUB_ENV
            echo "TF_VAR_cloudfront_domain=${CLOUDFRONT_DOMAIN}" >> $GITHUB_ENV
            echo "[OK] Using CloudFront domain: ${CLOUDFRONT_DOMAIN}"
          else
            # If no CloudFront exists yet, use local development origins only
            # (Terraform will create the distribution, but we can't know its domain in advance)
            CORS_ORIGINS="[\"http://localhost:5173\", \"http://localhost:3000\"]"
            echo "TF_VAR_api_cors_allowed_origins=${CORS_ORIGINS}" >> $GITHUB_ENV
            echo "TF_VAR_frontend_origin=http://localhost:3000" >> $GITHUB_ENV
            echo "[WARN] No existing CloudFront found - will create new distribution"
          fi

      - name: Delete Orphaned RDS Parameter Group
        run: |
          # Check if DB instance exists and is using this parameter group
          # DB identifier is ${project_name}-db = algo-db (from terraform)
          DB_ID=$(aws rds describe-db-instances --region us-east-1 --query "DBInstances[?DBInstanceIdentifier=='algo-db'].DBInstanceIdentifier" --output text 2>/dev/null || echo "")
          if [ -n "$DB_ID" ]; then
            CURRENT_PG=$(aws rds describe-db-instances --db-instance-identifier algo-db --region us-east-1 --query "DBInstances[0].DBParameterGroups[0].DBParameterGroupName" --output text 2>/dev/null || echo "")
            if [ "$CURRENT_PG" == "algo-pg14-params" ]; then
              echo "DB is using algo-pg14-params, changing to default.postgres14..."
              aws rds modify-db-instance \
                --db-instance-identifier algo-db \
                --db-parameter-group-name default.postgres14 \
                --region us-east-1 \
                --apply-immediately || echo "Modify failed, continuing..."
              sleep 5
            fi
          fi
          # Now delete the parameter group
          aws rds delete-db-parameter-group \
            --db-parameter-group-name algo-pg14-params \
            --region us-east-1 || echo "Parameter group deletion failed or already deleted"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Clean S3 State Before Terraform
        run: |
          echo "Terraform will use data source for orphaned parameter group - no manual state cleanup needed"

      - name: Setup Terraform State Backend
        working-directory: terraform
        env:
          AWS_REGION: us-east-1
          TF_BACKEND_BUCKET: ${{ secrets.TF_STATE_BUCKET || 'stocks-terraform-state' }}
          TF_BACKEND_KEY: ${{ secrets.TF_STATE_KEY || 'stocks/terraform.tfstate' }}
        run: |
          # Initialize terraform with dynamic backend config (from secrets or defaults)
          terraform init -reconfigure \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            --upgrade
          echo "[OK] Terraform backend initialized: bucket=$TF_BACKEND_BUCKET key=$TF_BACKEND_KEY"

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Build psycopg2 Lambda layer
        run: |
          # Build psycopg2-binary layer so the db-migration Lambda can connect to PostgreSQL.
          # Must run before Terraform so the zip is available for filebase64sha256().
          # CRITICAL: Use --platform manylinux2014_x86_64 to ensure the compiled .so is compatible
          # with Lambda runtime. Without it, pip builds for the local system (e.g., glibc mismatch)
          # and psycopg2 import fails in Lambda with "ModuleNotFoundError: No module named 'psycopg2'".
          # Confirmed blocker 2026-07-07: migrations failed every run due to missing _psycopg.so.
          LAYER_DIR=/tmp/psycopg2-layer
          mkdir -p $LAYER_DIR/python
          python3.12 -m pip install psycopg2-binary \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade \
            -t $LAYER_DIR/python \
            --no-cache-dir --quiet
          cd $LAYER_DIR && zip -r $GITHUB_WORKSPACE/terraform/modules/database/python-psycopg2-layer.zip . -q
          echo "psycopg2 layer: $(du -sh $GITHUB_WORKSPACE/terraform/modules/database/python-psycopg2-layer.zip | cut -f1)"
          unzip -l $GITHUB_WORKSPACE/terraform/modules/database/python-psycopg2-layer.zip | grep "_psycopg" && echo "OK: _psycopg .so found" || echo "[CRITICAL] _psycopg .so NOT found - migrations will fail!"

      - name: Build numpy/scipy Lambda layer
        run: |
          # Build shared-deps layer (numpy + scipy ONLY — minimal to stay under AWS 67 MB limit).
          # AWS hard limit for direct layer upload: 70167211 bytes (~67 MB).
          # Layer must be under this limit or Terraform's fileexists() check skips it.
          set -e
          BUILD_DIR=/tmp/shared-deps-build
          mkdir -p $BUILD_DIR/python
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade \
            --target $BUILD_DIR/python \
            -r $GITHUB_WORKSPACE/terraform/lambda-layer-requirements.txt \
            2>&1 | tail -20
          # Strip debug symbols to reduce size
          find $BUILD_DIR/python -name "*.so" -exec strip --strip-debug {} \; 2>/dev/null || true
          OUTPUT_ZIP=$GITHUB_WORKSPACE/terraform/lambda/shared-deps-layer.zip
          mkdir -p $(dirname $OUTPUT_ZIP)
          cd $BUILD_DIR && zip -r $OUTPUT_ZIP python/ -q
          SIZE=$(du -sh $OUTPUT_ZIP | cut -f1)
          ZIP_BYTES=$(stat -c%s $OUTPUT_ZIP)
          echo "shared-deps layer: $SIZE ($ZIP_BYTES bytes)"
          # AWS limit: 70167211 bytes BASE64-ENCODED, so raw zip must be < ~52 MB.
          # Threshold: 50 MB raw (52428800 bytes) for safe headroom.
          if [ $ZIP_BYTES -gt 52428800 ]; then
            echo "[WARN] Layer $SIZE exceeds 50 MB raw threshold (base64 overhead would hit 70 MB API limit) — deleting zip so Terraform skips it (Phase 7 fails-open)"
            rm -f $OUTPUT_ZIP
          else
            echo "[OK] Layer $SIZE is within 50 MB limit — will be deployed via Terraform"
          fi

      - name: Build db-init Lambda
        run: |
          # Build db-init Lambda ZIP before Terraform tries to deploy it.
          # Lambda initializes PostgreSQL schema on first deployment.
          SOURCE_LAMBDA=$GITHUB_WORKSPACE/lambda/db-init
          PKG_DIR=/tmp/db-init-pkg

          mkdir -p $PKG_DIR

          # Copy db-init Lambda function and schema
          cp $SOURCE_LAMBDA/lambda_function.py $PKG_DIR/
          cp $SOURCE_LAMBDA/schema.sql $PKG_DIR/

          # Copy requirements if they exist
          if [ -f "$SOURCE_LAMBDA/requirements.txt" ]; then
            python3.12 -m pip install -r $SOURCE_LAMBDA/requirements.txt \
              -t $PKG_DIR/ \
              --no-cache-dir --quiet
          fi

          # Create ZIP for deployment
          rm -f $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip
          mkdir -p $GITHUB_WORKSPACE/terraform/lambda_artifacts
          cd $PKG_DIR
          zip -r $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip . -q -x "*.pyc" "__pycache__/*"

          echo "[OK] db-init Lambda ZIP: $(du -sh $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip | cut -f1)"
          unzip -l $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip | head -10

      - name: Build API Lambda (REST API)
        run: |
          # Build API Lambda ZIP before Terraform tries to deploy it.
          # Terraform uses this pre-built ZIP instead of archive_file data source.
          SOURCE_LAMBDA=$GITHUB_WORKSPACE/lambda/api
          PKG_DIR=/tmp/api-lambda-pkg

          mkdir -p $PKG_DIR

          # Copy all API code (routes, utils, handlers)
          cp -r $SOURCE_LAMBDA/* $PKG_DIR/

          # Copy project config and utils directories (required for credential_manager and database_context)
          echo "[DEBUG] Copying config from $GITHUB_WORKSPACE/config"
          if [ -d "$GITHUB_WORKSPACE/config" ]; then
            cp -r $GITHUB_WORKSPACE/config $PKG_DIR/
            echo "[OK] Config copied"
          else
            echo "[WARN] Config directory not found"
          fi

          echo "[DEBUG] Copying utils from $GITHUB_WORKSPACE/utils"
          if [ -d "$GITHUB_WORKSPACE/utils" ]; then
            ls $GITHUB_WORKSPACE/utils | head -10
            cp -r $GITHUB_WORKSPACE/utils $PKG_DIR/
            echo "[OK] Utils copied"
            ls $PKG_DIR/utils | head -10
          else
            echo "[ERROR] Utils directory not found!"
            exit 1
          fi

          # Copy algo package (algo/infrastructure etc. imported by routes/algo.py and routes/admin.py)
          echo "[DEBUG] Copying algo from $GITHUB_WORKSPACE/algo"
          if [ -d "$GITHUB_WORKSPACE/algo" ]; then
            cp -r $GITHUB_WORKSPACE/algo $PKG_DIR/algo
            echo "[OK] algo/ copied ($(find $PKG_DIR/algo -name '*.py' | wc -l) .py files)"
          else
            echo "[ERROR] algo/ directory not found!"
            exit 1
          fi

          # Install dependencies into package directory
          if [ -f "$SOURCE_LAMBDA/requirements.txt" ]; then
            python3.12 -m pip install -r $SOURCE_LAMBDA/requirements.txt \
              -t $PKG_DIR/ \
              --no-cache-dir --quiet
          fi

          # Create ZIP for deployment (name must match var.api_lambda_code_file default in Terraform)
          rm -f $GITHUB_WORKSPACE/terraform/lambda_api.zip
          cd $PKG_DIR
          zip -r $GITHUB_WORKSPACE/terraform/lambda_api.zip . -q -x "*.pyc" "__pycache__/*" "*.dist-info/*" "tests/*"

          echo "[OK] API Lambda ZIP: $(du -sh $GITHUB_WORKSPACE/terraform/lambda_api.zip | cut -f1)"
          echo "[OK] Lambda package ready for deployment"

      - name: Build Data Freshness Monitor Lambda
        run: |
          # Build data-freshness-monitor Lambda ZIP before Terraform tries to deploy it.
          # Terraform runs in terraform/ directory and looks for ZIP at:
          # modules/monitoring/../../lambda/data-freshness-monitor/lambda_function.zip
          # = terraform/lambda/data-freshness-monitor/lambda_function.zip
          SOURCE_LAMBDA=$GITHUB_WORKSPACE/lambda/data-freshness-monitor
          TERRAFORM_LAMBDA=$GITHUB_WORKSPACE/terraform/lambda/data-freshness-monitor
          PKG_DIR=/tmp/data-freshness-pkg

          mkdir -p $PKG_DIR $TERRAFORM_LAMBDA

          # Copy Lambda function code
          cp $SOURCE_LAMBDA/lambda_function.py $PKG_DIR/

          # Install dependencies
          python3.12 -m pip install -r $SOURCE_LAMBDA/requirements.txt \
            -t $PKG_DIR/ \
            --no-cache-dir --quiet

          # Create ZIP in the location where Terraform expects it
          rm -f $TERRAFORM_LAMBDA/lambda_function.zip
          cd $PKG_DIR
          zip -r $TERRAFORM_LAMBDA/lambda_function.zip . -q -x "*.pyc" "__pycache__/*" "*.dist-info/*"

          echo "[OK] data-freshness-monitor Lambda ZIP: $(du -sh $TERRAFORM_LAMBDA/lambda_function.zip | cut -f1)"
          unzip -l $TERRAFORM_LAMBDA/lambda_function.zip | head -20

      - name: Build Algo Orchestrator Lambda
        run: |
          # Build orchestrator Lambda ZIP with all required modules (algo, config, utils)
          # Must run before Terraform so the ZIP is available for filebase64sha256()
          PKG_DIR=/tmp/algo-lambda-pkg
          mkdir -p $PKG_DIR

          # Copy Lambda handler
          cp $GITHUB_WORKSPACE/lambda/algo_orchestrator/lambda_function.py $PKG_DIR/

          # Copy all required modules
          cp -r $GITHUB_WORKSPACE/algo $PKG_DIR/
          cp -r $GITHUB_WORKSPACE/config $PKG_DIR/
          cp -r $GITHUB_WORKSPACE/utils $PKG_DIR/
          # loaders/ is required by algo/orchestrator/phase1_failsafe_retry.py (imports
          # loaders.load_stock_scores) and Phase 9's circuit breaker metrics step. Missing
          # here caused "No module named 'loaders'" failures on every orchestrator run.
          # Confirmed live via CloudWatch logs 2026-07-07.
          cp -r $GITHUB_WORKSPACE/loaders $PKG_DIR/

          # Remove pycache and build artifacts
          find $PKG_DIR -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find $PKG_DIR -type f -name "*.pyc" -delete

          # Install dependencies
          python3.12 -m pip install -r $GITHUB_WORKSPACE/lambda/algo_orchestrator/requirements.txt \
            -t $PKG_DIR/ \
            --no-cache-dir --quiet

          # Create ZIP in terraform directory (where Terraform expects it)
          rm -f $GITHUB_WORKSPACE/terraform/lambda_algo.zip
          cd $PKG_DIR
          zip -r $GITHUB_WORKSPACE/terraform/lambda_algo.zip . -q -x "*.pyc" "__pycache__/*" "*/tests/*" "*/test/*"
          cd $GITHUB_WORKSPACE

          echo "[OK] Algo Orchestrator Lambda ZIP: $(du -sh $GITHUB_WORKSPACE/terraform/lambda_algo.zip | cut -f1)"
          unzip -l $GITHUB_WORKSPACE/terraform/lambda_algo.zip | head -20

      - name: Build Loader Failure Handler Lambda
        run: |
          # Build loader failure handler Lambda ZIP for Step Functions error handling
          # Must run before Terraform so the ZIP is available for filebase64sha256()
          SOURCE_LAMBDA=$GITHUB_WORKSPACE/lambda/monitoring
          TERRAFORM_LAMBDA=$GITHUB_WORKSPACE/terraform/lambda
          PKG_DIR=/tmp/loader-failure-handler-pkg

          mkdir -p $PKG_DIR $TERRAFORM_LAMBDA

          # Copy Lambda function code (loader_failure_handler.py is in lambda/monitoring/)
          cp $SOURCE_LAMBDA/loader_failure_handler.py $PKG_DIR/lambda_function.py

          # Create ZIP in the location where Terraform expects it
          rm -f $TERRAFORM_LAMBDA/loader_failure_handler.zip
          cd $PKG_DIR
          zip -r $TERRAFORM_LAMBDA/loader_failure_handler.zip . -q -x "*.pyc" "__pycache__/*"

          echo "[OK] loader_failure_handler Lambda ZIP: $(du -sh $TERRAFORM_LAMBDA/loader_failure_handler.zip | cut -f1)"
          unzip -l $TERRAFORM_LAMBDA/loader_failure_handler.zip | head -10

      - name: Build Circuit Breaker Lambda
        run: |
          # Build circuit breaker Lambda ZIP for intraday halt protection (F-02)
          # Must run before Terraform so filebase64sha256() can find the file
          # Requires config/ module for credential management
          SOURCE=$GITHUB_WORKSPACE/lambda/circuit-breaker
          TERRAFORM_LAMBDA=$GITHUB_WORKSPACE/terraform/lambda
          PKG_DIR=/tmp/circuit-breaker-pkg

          mkdir -p $PKG_DIR $TERRAFORM_LAMBDA

          if [ -f "$SOURCE/index.py" ]; then
            # Copy circuit breaker Lambda function
            cp $SOURCE/index.py $PKG_DIR/lambda_function.py

            # Copy required modules
            cp -r $GITHUB_WORKSPACE/config $PKG_DIR/
            cp -r $GITHUB_WORKSPACE/utils $PKG_DIR/

            # Remove pycache
            find $PKG_DIR -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            find $PKG_DIR -type f -name "*.pyc" -delete

            # Create ZIP
            rm -f $TERRAFORM_LAMBDA/circuit_breaker.zip
            cd $PKG_DIR
            zip -r $TERRAFORM_LAMBDA/circuit_breaker.zip . -q -x "*.pyc" "__pycache__/*"

            echo "[OK] circuit-breaker Lambda ZIP: $(du -sh $TERRAFORM_LAMBDA/circuit_breaker.zip | cut -f1)"
            unzip -l $TERRAFORM_LAMBDA/circuit_breaker.zip | head -15
          else
            echo "[WARN] lambda/circuit-breaker/index.py not found — skipping"
          fi

      - name: Build AAII Sentiment Loader Lambda
        run: |
          # Build AAII Loader Lambda ZIP for initial data population
          # Must run before Terraform so the Lambda function resource can be created
          SOURCE=$GITHUB_WORKSPACE/scripts/aaii_loader_function.py
          TERRAFORM_LAMBDA=$GITHUB_WORKSPACE/terraform/lambda
          TERRAFORM_MODULES=$GITHUB_WORKSPACE/terraform/modules/database
          PKG_DIR=/tmp/aaii-loader-pkg

          mkdir -p $PKG_DIR $TERRAFORM_LAMBDA $TERRAFORM_MODULES

          if [ -f "$SOURCE" ]; then
            # Copy AAII Loader Lambda function
            cp $SOURCE $PKG_DIR/lambda_function.py

            # Create ZIP in both locations (Terraform references it in modules/database/)
            rm -f $TERRAFORM_MODULES/aaii_loader.zip
            cd $PKG_DIR
            zip -r $TERRAFORM_MODULES/aaii_loader.zip . -q -x "*.pyc" "__pycache__/*"

            echo "[OK] AAII Loader Lambda ZIP: $(du -sh $TERRAFORM_MODULES/aaii_loader.zip | cut -f1)"
            unzip -l $TERRAFORM_MODULES/aaii_loader.zip | head -10
          else
            echo "[WARN] scripts/aaii_loader_function.py not found — creating stub ZIP"
            echo 'def lambda_handler(e,c): return {"statusCode": 501}' > /tmp/stub_lambda.py
            mkdir -p "$TERRAFORM_MODULES"
            cd /tmp && cp stub_lambda.py lambda_function.py
            zip "$TERRAFORM_MODULES/aaii_loader.zip" lambda_function.py -q
            echo "[OK] AAII stub ZIP created: $(du -sh $TERRAFORM_MODULES/aaii_loader.zip | cut -f1)"
          fi

      - name: Build Trigger Loaders Lambda
        run: |
          SOURCE=$GITHUB_WORKSPACE/lambda/trigger-loaders/lambda_function.py
          TERRAFORM_MODULES=$GITHUB_WORKSPACE/terraform/modules/orchestration
          PKG_DIR=/tmp/trigger-loaders-pkg

          mkdir -p $PKG_DIR $TERRAFORM_MODULES

          if [ -f "$SOURCE" ]; then
            cp $SOURCE $PKG_DIR/lambda_function.py
            cp $GITHUB_WORKSPACE/lambda/base_handler.py $PKG_DIR/ 2>/dev/null || true
            cp -r $GITHUB_WORKSPACE/utils/. $PKG_DIR/utils/ 2>/dev/null || true
            cp -r $GITHUB_WORKSPACE/config/ $PKG_DIR/config/ 2>/dev/null || true
            find $PKG_DIR -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            rm -f $TERRAFORM_MODULES/trigger-loaders.zip
            cd $PKG_DIR
            zip -r $TERRAFORM_MODULES/trigger-loaders.zip . -q -x "*.pyc" "__pycache__/*"
            echo "[OK] trigger-loaders Lambda ZIP: $(du -sh $TERRAFORM_MODULES/trigger-loaders.zip | cut -f1)"
          else
            echo "[WARN] trigger-loaders source not found — creating stub"
            echo 'def lambda_handler(e,c): return {"statusCode": 501}' > /tmp/trigger_stub.py
            mkdir -p "$TERRAFORM_MODULES"
            cd /tmp && cp trigger_stub.py lambda_function.py
            zip "$TERRAFORM_MODULES/trigger-loaders.zip" lambda_function.py -q
            echo "[OK] trigger-loaders stub ZIP created"
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Import Existing AWS Resources (state sync)
        run: |
          # Dynamic import of resources that exist in AWS but not in Terraform state.
          # Queries AWS to find actual resource names/IDs instead of hardcoding.

          # Extract project name and bucket name from Terraform config
          PROJECT_NAME=$(grep '^project_name' terraform.tfvars | cut -d'"' -f2)
          STATE_BUCKET=$(grep 'terraform_state_bucket_name' terraform/bootstrap.tf | grep -oP '"[^"]*"' | head -1 | tr -d '"')

          echo "Project: $PROJECT_NAME"
          echo "State Bucket: $STATE_BUCKET"

          import_if_missing() {
            local resource=$1
            local id=$2
            if terraform state list | grep -qF "$resource"; then
              echo " SKIP: $resource already in state"
            else
              echo "-> IMPORT: $resource as $id"
              terraform import -var-file=terraform.tfvars "$resource" "$id" 2>&1 | grep -E "Import|Error" || true
            fi
          }

          # Import Cognito test user if it exists in AWS but not in state
          PRIMARY_USER=$(grep "^cognito_test_user_email" terraform.tfvars | cut -d'"' -f2)
          if [ -n "$PRIMARY_USER" ]; then
            POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --region us-east-1 --query "UserPools[?Name=='${PROJECT_NAME}-pool-dev'].Id" --output text 2>/dev/null || echo "")
            if [ -n "$POOL_ID" ] && [ "$POOL_ID" != "None" ]; then
              USER_EXISTS=$(aws cognito-idp admin-get-user --user-pool-id "$POOL_ID" --username "$PRIMARY_USER" --region us-east-1 2>/dev/null && echo "true" || echo "false")
              if [ "$USER_EXISTS" = "true" ]; then
                echo "-> Cognito user exists in AWS but not in state. Importing..."
                import_if_missing "module.cognito.aws_cognito_user.test_user[0]" "${POOL_ID}/${PRIMARY_USER}" || echo "[WARN] Could not import Cognito user — it may already be in state or the import format may differ"
              fi
            fi
          fi

          # Import S3 backend bucket dynamically
          import_if_missing module.bootstrap.aws_s3_bucket.terraform_state "$STATE_BUCKET"

          # Import Terraform-managed VPC (ManagedBy=Terraform tag distinguishes it from orphaned VPCs)
          echo ""
          echo "Querying AWS for Terraform-managed VPC..."
          TF_VPC=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-vpc" "Name=tag:ManagedBy,Values=Terraform" \
            --query 'Vpcs[0].VpcId' --output text --region $AWS_REGION 2>/dev/null || echo "")
          if [ -n "$TF_VPC" ] && [ "$TF_VPC" != "None" ]; then
            echo "Found Terraform VPC: $TF_VPC"
            import_if_missing "module.vpc.aws_vpc.main" "$TF_VPC"

            # Import ECS tasks, API Lambda, Algo Lambda, and RDS security groups
            for SG_SUFFIX in ecs-tasks-sg api-lambda-sg algo-lambda-sg rds-sg; do
              SG_ID=$(aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$TF_VPC" "Name=group-name,Values=${PROJECT_NAME}-${SG_SUFFIX}" \
                --query 'SecurityGroups[0].GroupId' --output text --region $AWS_REGION 2>/dev/null || echo "")
              if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
                TF_RESOURCE="module.vpc.aws_security_group.$(echo $SG_SUFFIX | sed 's/-sg//' | tr '-' '_')"
                import_if_missing "$TF_RESOURCE" "$SG_ID"
              fi
            done
          else
            echo "[WARN]  Terraform VPC not found (will be created)"
          fi

          # Import API Gateway $default route (AWS auto-creates it; Terraform CREATE causes 409 conflict)
          # Use variable to hold literal '$default' -- avoid shell expansion of $default as a variable
          DEFAULT_ROUTE_KEY='$default'
          echo ""
          echo "Querying AWS for API Gateway ${DEFAULT_ROUTE_KEY} route..."
          ENVIRONMENT=$(grep '^environment' terraform.tfvars | cut -d'"' -f2)
          echo "  Project: ${PROJECT_NAME}, Environment: ${ENVIRONMENT}"
          API_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${PROJECT_NAME}-api-${ENVIRONMENT}'].ApiId | [0]" \
            --output text --region $AWS_REGION 2>/dev/null || echo "")
          echo "  API Gateway ID: ${API_ID:-(not found)}"
          if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
            DEFAULT_ROUTE_ID=$(aws apigatewayv2 get-routes \
              --api-id "$API_ID" \
              --query "Items[?RouteKey=='${DEFAULT_ROUTE_KEY}'].RouteId | [0]" \
              --output text --region $AWS_REGION 2>/dev/null || echo "")
            echo "  ${DEFAULT_ROUTE_KEY} route ID: ${DEFAULT_ROUTE_ID:-(not found)}"
            if [ -n "$DEFAULT_ROUTE_ID" ] && [ "$DEFAULT_ROUTE_ID" != "None" ]; then
              import_if_missing "module.services.aws_apigatewayv2_route.api_default" "${API_ID}/${DEFAULT_ROUTE_ID}"
            else
              echo "  No existing ${DEFAULT_ROUTE_KEY} route found -- Terraform will create it"
            fi
          else
            echo "[WARN]  API Gateway not found yet -- will be created by Terraform"
          fi

          # Import db-init Lambda function if it exists in AWS
          echo ""
          echo "Querying AWS for db-init Lambda function..."
          DB_INIT_FUNCTION=$(aws lambda get-function \
            --function-name "${PROJECT_NAME}-db-init-${ENVIRONMENT}" \
            --query 'Configuration.FunctionArn' --output text --region $AWS_REGION 2>/dev/null || echo "")
          if [ -n "$DB_INIT_FUNCTION" ] && [ "$DB_INIT_FUNCTION" != "None" ]; then
            echo "Found db-init Lambda: $DB_INIT_FUNCTION"
            import_if_missing "module.database.aws_lambda_function.db_init" "${PROJECT_NAME}-db-init-${ENVIRONMENT}"
          else
            echo "db-init Lambda not found -- Terraform will create it"
          fi

          # Import loader_failure_handler Lambda and its permissions if they already exist in AWS
          # Note: loader_failure_handler is defined in module.services (not module.pipeline)
          echo ""
          echo "Querying AWS for loader_failure_handler Lambda function..."
          LFH_FUNCTION=$(aws lambda get-function \
            --function-name "${PROJECT_NAME}-loader-failure-handler-${ENVIRONMENT}" \
            --query 'Configuration.FunctionArn' --output text --region $AWS_REGION 2>/dev/null || echo "")
          if [ -n "$LFH_FUNCTION" ] && [ "$LFH_FUNCTION" != "None" ]; then
            echo "Found loader_failure_handler Lambda: $LFH_FUNCTION"
            import_if_missing "module.services.aws_lambda_function.loader_failure_handler" "${PROJECT_NAME}-loader-failure-handler-${ENVIRONMENT}"
            # Import the Step Functions invoke permission if it exists
            LFH_PERM=$(aws lambda get-policy \
              --function-name "${PROJECT_NAME}-loader-failure-handler-${ENVIRONMENT}" \
              --region $AWS_REGION 2>/dev/null | python3 -c "import json,sys; p=json.load(sys.stdin); stmts=[s for s in json.loads(p['Policy'])['Statement'] if s['Sid']=='AllowStepFunctionsInvoke']; print('exists' if stmts else '')" 2>/dev/null || echo "")
            if [ "$LFH_PERM" = "exists" ]; then
              echo "Found AllowStepFunctionsInvoke permission — importing"
              import_if_missing "module.services.aws_lambda_permission.loader_failure_handler_step_functions" "${PROJECT_NAME}-loader-failure-handler-${ENVIRONMENT}/AllowStepFunctionsInvoke"
            fi
          else
            echo "loader_failure_handler Lambda not found -- Terraform will create it"
          fi

          # Import Secrets Manager secrets if they exist
          # Note: Terraform fails to create secrets that already exist, so we must import them first
          # Terraform requires the full ARN (not just the secret name) for aws_secretsmanager_secret import
          echo ""
          echo "Importing existing Secrets Manager secrets..."

          # Import secret if it exists in AWS but not in Terraform state
          import_secret_if_missing() {
            local tf_resource=$1
            local aws_secret_id=$2
            if terraform state list | grep -qF "$tf_resource"; then
              echo " SKIP: $tf_resource already in state"
            elif aws secretsmanager describe-secret --secret-id "$aws_secret_id" --region us-east-1 >/dev/null 2>&1; then
              echo "-> IMPORT: $tf_resource (from AWS secret: $aws_secret_id)"
              SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$aws_secret_id" --region us-east-1 --query 'ARN' --output text 2>/dev/null || echo "")
              if [ -n "$SECRET_ARN" ]; then
                terraform import -var-file=terraform.tfvars "$tf_resource" "$SECRET_ARN" 2>&1 | grep -E "Import|Error|Successfully" || echo "Import attempt completed (check state)"
              else
                echo "   [WARN] Could not get ARN for $aws_secret_id"
              fi
            else
              echo " SKIP: Secret $aws_secret_id does not exist in AWS yet"
            fi
          }

          # Try to import secrets
          import_secret_if_missing "module.database.aws_secretsmanager_secret.alpaca_api_keys" "algo/alpaca"
          import_secret_if_missing "module.database.aws_secretsmanager_secret.fred_api_key" "algo/fred"
          import_secret_if_missing "module.database.aws_secretsmanager_secret.rds_credentials" "${PROJECT_NAME}-db-credentials-${ENVIRONMENT}"

          # Note: Cognito admin group is managed by a post-Terraform workflow step
          # (not by Terraform resources) to avoid IAM propagation race conditions.
          # See "Setup Cognito Admin Group" step below.

      - name: Remove Orphaned Resources From State
        working-directory: terraform
        run: |
          # Remove orphaned state entries that conflict with current configuration
          # loader_failure_handler was defined in both module.pipeline and module.services
          # module.pipeline now delegates to var.loader_failure_handler_arn (module.services owns it)
          echo "Cleaning up orphaned state entries..."
          terraform state rm "module.pipeline.aws_lambda_function.loader_failure_handler" 2>/dev/null || echo "  (not in state)"
          terraform state rm "module.pipeline.aws_iam_role.loader_failure_handler" 2>/dev/null || echo "  (not in state)"

          # CRITICAL: Remove CloudFront resources from state when cloudfront_enabled=false
          # Issue: Resources exist in state with count=1, but terraform.tfvars has cloudfront_enabled=false
          # When terraform plan evaluates count=var.cloudfront_enabled ? 1 : 0, it becomes count=0
          # This causes plan to show resource destruction. Remove from state to prevent this.
          echo ""
          echo "Removing CloudFront resources from state (cloudfront_enabled=false in terraform.tfvars)..."
          terraform state rm "module.services.aws_cloudfront_response_headers_policy.api_cors[0]" 2>/dev/null || echo "  (not in state)"
          terraform state rm "module.services.aws_cloudfront_response_headers_policy.s3_cors[0]" 2>/dev/null || echo "  (not in state)"
          terraform state rm "module.services.aws_cloudfront_origin_access_control.frontend[0]" 2>/dev/null || echo "  (not in state)"
          terraform state rm "module.services.aws_cloudfront_distribution.frontend[0]" 2>/dev/null || echo "  (not in state)"
          terraform state rm "module.services.aws_s3_bucket_policy.frontend_cloudfront[0]" 2>/dev/null || echo "  (not in state)"
          echo "[OK] CloudFront resources removed from state"

          echo ""
          echo "State cleanup completed"
          terraform state rm "module.pipeline.aws_iam_role_policy_attachment.loader_failure_handler_logs" 2>/dev/null || true
          terraform state rm "module.pipeline.aws_iam_role_policy.loader_failure_handler_cloudwatch" 2>/dev/null || true
          echo "[OK] Orphaned pipeline loader_failure_handler state entries removed"

          # aws_lambda_alias.api_live and aws_lambda_function_event_invoke_config were added for
          # provisioned concurrency then removed after causing a Terraform cycle with psycopg2 layer.
          # Remove from state so plan doesn't try to destroy them (which would recreate the cycle).
          terraform state rm "module.services.aws_lambda_alias.api_live[0]" 2>/dev/null || true
          terraform state rm "module.services.aws_lambda_alias.api_live" 2>/dev/null || true
          terraform state rm "module.services.aws_lambda_function_event_invoke_config.api_async" 2>/dev/null || true
          echo "[OK] Orphaned Lambda alias and event invoke config state entries removed"

      - name: Remove Orphaned S3 Config Bucket From State
        working-directory: terraform
        run: |
          # AWS Config S3 bucket is no longer managed (aws_config_enabled=false).
          # Terraform cannot delete it if it contains versioned objects, so remove from state instead.
          terraform state rm "module.security_monitoring.aws_s3_bucket.config_bucket[0]" 2>/dev/null || true
          terraform state rm "module.security_monitoring.aws_s3_bucket_versioning.config_bucket[0]" 2>/dev/null || true
          terraform state rm "module.security_monitoring.aws_s3_bucket_public_access_block.config_bucket[0]" 2>/dev/null || true
          terraform state rm "module.security_monitoring.aws_s3_bucket_policy.config_bucket[0]" 2>/dev/null || true
          echo "[OK] Orphaned config bucket state entries removed (if they existed)"

      - name: Terraform Plan
        id: tf_plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan \
            -detailed-exitcode || EXIT=$?
          # exit 0 = no changes, 2 = changes, other = error
          if [ "${EXIT:-0}" -eq 1 ]; then exit 1; fi
          if [ "${EXIT:-0}" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Apply
        if: |
          steps.tf_plan.outputs.has_changes == 'true' &&
          github.event.inputs.skip_terraform != 'true'
        run: terraform apply -auto-approve tfplan

      - name: Skip Terraform Apply (User Input)
        if: github.event.inputs.skip_terraform == 'true'
        run: echo "[OK] Terraform apply skipped (skip_terraform=true) — using existing infrastructure"

      - name: Skip Terraform Apply (No Changes)
        if: steps.tf_plan.outputs.has_changes == 'false'
        run: echo "[OK] No infrastructure changes detected — skipping terraform apply"

      # NOTE: RDS credentials are fully managed by IaC (Terraform).
      # random_password.rds_master generates once, stored in state, then synced to Secrets Manager.
      # GitHub Actions uses OIDC to read from Secrets Manager (no GitHub Secrets needed for passwords).

      # NOTE: Database initialization is now handled by deploy-code.yml
      # (deploy-db-init-lambda job) which invokes algo-db-init-dev after
      # the Lambda code is deployed. This avoids timing issues where the Lambda
      # function doesn't exist yet during Terraform apply.

      - name: Delete orphaned API Gateways
        run: |
          # Clean up API Gateways that are NOT the current active one.
          # Terraform manages the active API Gateway (derived from project + environment).
          # This removes any leftover gateways from old experiments or failed deployments.

          PROJECT=$(grep '^project_name' terraform.tfvars | cut -d'"' -f2)
          ENV=$(grep '^environment' terraform.tfvars | cut -d'"' -f2)
          ACTIVE_NAME="${PROJECT}-api-${ENV}"

          # Find active API Gateway ID
          ACTIVE_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${ACTIVE_NAME}'].ApiId" \
            --output text --region $AWS_REGION 2>/dev/null || echo "")

          echo "Active API Gateway: ${ACTIVE_NAME} (ID: ${ACTIVE_ID:-not-found})"

          # Find and delete all OTHER API Gateways (orphaned from old experiments)
          aws apigatewayv2 get-apis \
            --query "Items[?Name != '${ACTIVE_NAME}'].ApiId" \
            --output text --region $AWS_REGION 2>/dev/null | tr '\t' '\n' | while read -r id; do
            if [ -n "$id" ] && [ "$id" != "$ACTIVE_ID" ]; then
              echo "Deleting orphaned API Gateway: $id"
              aws apigatewayv2 delete-api --api-id "$id" --region $AWS_REGION 2>/dev/null \
                && echo "[OK] Deleted: $id" \
                || echo "[WARN]  Failed to delete: $id"
            fi
          done || echo "No orphaned API Gateways found"

      - name: Collect Outputs
        id: outputs
        run: |
          set -e
          TF_OUT=$(terraform output -json 2>&1)
          TF_EXIT=$?

          if [ $TF_EXIT -ne 0 ]; then
            echo "ERROR: terraform output failed with exit code $TF_EXIT"
            echo "$TF_OUT"
            exit 1
          fi

          ECR=$(echo "$TF_OUT" | jq -r '.ecr_repository_url.value // "" ' 2>/dev/null || echo "")
          API=$(echo "$TF_OUT" | jq -r '.api_lambda_function_name.value // "stocks-api-dev"' 2>/dev/null || echo "stocks-api-dev")
          ALGO=$(echo "$TF_OUT" | jq -r '.algo_lambda_function_name.value // "stocks-algo-dev"' 2>/dev/null || echo "stocks-algo-dev")
          BUCKET=$(echo "$TF_OUT" | jq -r '.frontend_bucket_name.value // ""' 2>/dev/null || echo "")
          CF=$(echo "$TF_OUT" | jq -r '.cloudfront_distribution_id.value // ""' 2>/dev/null || echo "")
          API_GW=$(echo "$TF_OUT" | jq -r '.api_gateway_endpoint.value // ""' 2>/dev/null || echo "")
          WEBSITE_URL=$(echo "$TF_OUT" | jq -r '.website_url.value // empty' 2>/dev/null || echo "")
          POOL_ID=$(echo "$TF_OUT" | jq -r '.cognito_user_pool_id.value // ""' 2>/dev/null || echo "")
          CLIENT_ID=$(echo "$TF_OUT" | jq -r '.cognito_user_pool_client_id.value // ""' 2>/dev/null || echo "")
          COGNITO_DOMAIN=$(echo "$TF_OUT" | jq -r '.cognito_domain_url.value // ""' 2>/dev/null || echo "")

          echo "ecr_repository_url=${ECR}" >> $GITHUB_OUTPUT
          echo "api_lambda_name=${API}" >> $GITHUB_OUTPUT
          echo "algo_lambda_name=${ALGO}" >> $GITHUB_OUTPUT
          echo "frontend_bucket=${BUCKET}" >> $GITHUB_OUTPUT
          echo "cloudfront_id=${CF}" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=${CF}" >> $GITHUB_OUTPUT
          echo "api_gateway_endpoint=${API_GW}" >> $GITHUB_OUTPUT
          echo "website_url=${WEBSITE_URL}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=${POOL_ID}" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=${CLIENT_ID}" >> $GITHUB_OUTPUT
          echo "cognito_domain_url=${COGNITO_DOMAIN}" >> $GITHUB_OUTPUT

          # Diagnostic: Log what was exported for debugging config.js generation
          echo "=== Terraform Outputs Summary ==="
          echo "website_url: ${WEBSITE_URL:-(empty)}"
          echo "cognito_user_pool_id: ${POOL_ID:-(empty)}"
          echo "cognito_user_pool_client_id: ${CLIENT_ID:-(empty)}"
          echo "cognito_domain_url: ${COGNITO_DOMAIN:-(empty)}"
          echo "cloudfront_id: ${CF:-(empty)}"

          # Diagnostic: Check if critical AWS resources exist (helps debug missing infrastructure)
          echo ""
          echo "=== AWS Resource Diagnostics ==="
          COGNITO_EXISTS=$(aws cognito-idp list-user-pools --max-results 60 --region us-east-1 2>/dev/null | jq '.UserPools | length' || echo "0")
          CF_EXISTS=$(aws cloudfront list-distributions --region us-east-1 2>/dev/null | jq '.DistributionList.Items | length' || echo "0")
          echo "Cognito user pools found: $COGNITO_EXISTS"
          echo "CloudFront distributions found: $CF_EXISTS"

          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "None" ]; then
            if [ "$COGNITO_EXISTS" -eq 0 ]; then
              echo "[ERROR] terraform output cognito_user_pool_id is empty AND no Cognito pools exist in AWS"
              echo "[ERROR] This suggests the Cognito module was never deployed or resources were deleted"
            else
              echo "[ERROR] terraform output cognito_user_pool_id is empty BUT Cognito pools exist in AWS"
              echo "[ERROR] This suggests terraform state is out of sync with AWS"
            fi
          fi

          if [ -z "$WEBSITE_URL" ] || [ "$WEBSITE_URL" = "None" ]; then
            if [ "$CF_EXISTS" -eq 0 ]; then
              echo "[ERROR] terraform output website_url is empty AND no CloudFront distributions exist in AWS"
              echo "[ERROR] This suggests the Services module (CloudFront) was never deployed"
            else
              echo "[ERROR] terraform output website_url is empty BUT CloudFront distributions exist in AWS"
              echo "[ERROR] This suggests terraform state is out of sync with AWS"
            fi
          fi

      - name: Save Terraform Outputs to Git
        if: steps.tf_plan.outputs.has_changes == 'true'
        run: |
          # Save Terraform outputs to git for version control and freshness tracking
          # Prevents stale outputs and ensures all past versions are traceable
          TF_OUT=$(terraform output -json 2>&1)

          # Create output file with timestamp
          cat > ../.terraform-outputs.json <<EOF
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "git_commit": "$(git rev-parse HEAD)",
            "outputs": $TF_OUT
          }
          EOF

          # Commit to git (safe for concurrent deploys because we only commit after apply succeeds)
          cd ..

          # Configure git identity for commit (GitHub Actions doesn't set this by default)
          git config user.email "github-actions[bot]@users.noreply.github.com" || true
          git config user.name "github-actions[bot]" || true

          if git status --short .terraform-outputs.json | grep -q ".terraform-outputs.json"; then
            git add .terraform-outputs.json
            git commit -m "INFRA: Update Terraform outputs from successful apply - $(git rev-parse --short HEAD)" || true
            git push origin HEAD:${{ github.ref }} --quiet || echo "[WARN] Could not push outputs commit (may be due to concurrent push)"
            echo "[OK] Terraform outputs committed to git"
          else
            echo "[OK] No changes to Terraform outputs"
          fi

      - name: Setup Cognito Admin Group
        run: |
          POOL_ID="${{ steps.outputs.outputs.cognito_user_pool_id }}"
          # working-directory is terraform/ so no prefix needed
          PRIMARY_USER=$(grep 'cognito_test_user_email' terraform.tfvars | cut -d'"' -f2)

          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "null" ] || [ "$POOL_ID" = "None" ]; then
            echo "[SKIP] No Cognito user pool ID found — skipping admin group setup"
            exit 0
          fi
          if [ -z "$PRIMARY_USER" ]; then
            echo "[SKIP] No primary user email found — skipping admin group setup"
            exit 0
          fi

          echo "Setting up admin group and primary user in pool: $POOL_ID for user: $PRIMARY_USER"

          # Create admin group (idempotent — fails silently if exists)
          aws cognito-idp create-group \
            --user-pool-id "$POOL_ID" \
            --group-name admin \
            --description "Full access to admin-gated algo dashboard and trading endpoints" \
            --region $AWS_REGION 2>/dev/null \
            && echo "[OK] Admin group created" \
            || echo "[OK] Admin group already exists"

          # Check for existing Cognito password in Secrets Manager (avoid overwriting on every deploy)
          EXISTING_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/dashboard-config \
            --region $AWS_REGION \
            --query SecretString --output text 2>/dev/null || echo "{}")
          EXISTING_PASS=$(echo "$EXISTING_SECRET" | jq -r '.cognito_password // ""' 2>/dev/null || echo "")
          EXISTING_USER=$(echo "$EXISTING_SECRET" | jq -r '.cognito_username // ""' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PASS" ] && [ "$EXISTING_USER" = "$PRIMARY_USER" ]; then
            COGNITO_PASS="$EXISTING_PASS"
            echo "[OK] Using existing Cognito password from Secrets Manager"
          else
            # Generate a random password that satisfies Cognito policy (12+ chars, upper, lower, number, symbol)
            RAND=$(openssl rand -base64 16 | tr -dc 'A-Za-z0-9' | head -c14)
            COGNITO_PASS="${RAND}A1!"
            echo "[INFO] Generated new Cognito password (existing: '${EXISTING_USER}')"
          fi

          # Create user if not exists (idempotent — suppress-message skips verification email)
          USER_EXISTS=$(aws cognito-idp admin-get-user \
            --user-pool-id "$POOL_ID" \
            --username "$PRIMARY_USER" \
            --region $AWS_REGION 2>/dev/null && echo "true" || echo "false")

          if [ "$USER_EXISTS" != "true" ]; then
            echo "[INFO] Creating Cognito user $PRIMARY_USER"
            TEMP_PASS="Temp$(openssl rand -base64 6 | tr -dc 'A-Za-z0-9' | head -c8)A1!"
            aws cognito-idp admin-create-user \
              --user-pool-id "$POOL_ID" \
              --username "$PRIMARY_USER" \
              --user-attributes Name=email,Value="$PRIMARY_USER" Name=email_verified,Value=true \
              --temporary-password "$TEMP_PASS" \
              --message-action SUPPRESS \
              --region $AWS_REGION \
              && echo "[OK] Cognito user $PRIMARY_USER created" \
              || echo "[WARN] Could not create user (may already exist)"
          else
            echo "[OK] User $PRIMARY_USER already exists in Cognito"
          fi

          # Set permanent password (idempotent — overwrites temp/existing password)
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" \
            --username "$PRIMARY_USER" \
            --password "$COGNITO_PASS" \
            --permanent \
            --region $AWS_REGION \
            && echo "[OK] Permanent password set for $PRIMARY_USER" \
            || echo "[WARN] Could not set permanent password"

          # Store credentials in algo/dashboard-config Secrets Manager secret
          UPDATED_SECRET=$(echo "$EXISTING_SECRET" | jq \
            --arg user "$PRIMARY_USER" \
            --arg pass "$COGNITO_PASS" \
            '. + {cognito_username: $user, cognito_password: $pass}')
          aws secretsmanager update-secret \
            --secret-id algo/dashboard-config \
            --secret-string "$UPDATED_SECRET" \
            --region $AWS_REGION \
            && echo "[OK] Cognito credentials stored in Secrets Manager (algo/dashboard-config)" \
            || echo "[WARN] Could not update Secrets Manager with Cognito credentials"

          # Add primary user to admin group (idempotent — no-op if already member)
          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$POOL_ID" \
            --username "$PRIMARY_USER" \
            --group-name admin \
            --region $AWS_REGION 2>/dev/null \
            && echo "[OK] User $PRIMARY_USER added to admin group" \
            || echo "[WARN] Could not add user to admin group"

      - name: Update API Gateway CORS with CloudFront Domain
        run: |
          # CRITICAL FIX: After Terraform creates CloudFront, update API Gateway CORS to include the new domain.
          # Without this, the frontend (served via CloudFront) cannot call the API due to CORS errors.
          # This step ensures CORS origins include the CloudFront domain that Terraform just created.

          WEBSITE_URL="${{ steps.outputs.outputs.website_url }}"

          if [ -z "$WEBSITE_URL" ] || [ "$WEBSITE_URL" = "None" ] || [ "$WEBSITE_URL" = "null" ]; then
            echo "[SKIP] Website URL (CloudFront domain) not available"
            exit 0
          fi

          # Extract CloudFront domain (remove https:// prefix if present)
          CF_DOMAIN=$(echo "$WEBSITE_URL" | sed 's|^https://||')
          CF_ORIGIN="https://${CF_DOMAIN}"

          echo "Updating API Gateway CORS with CloudFront domain: $CF_DOMAIN"

          # Get API Gateway name from terraform config (already in terraform dir via defaults)
          PROJECT=$(grep '^project_name' terraform.tfvars | cut -d'"' -f2)
          ENV=$(grep '^environment' terraform.tfvars | cut -d'"' -f2)
          API_NAME="${PROJECT}-api-${ENV}"

          # Get API Gateway ID
          API_GW_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${API_NAME}'].ApiId" \
            --output text --region $AWS_REGION 2>/dev/null || echo "")

          if [ -z "$API_GW_ID" ]; then
            echo "[SKIP] Could not find API Gateway ID for $API_NAME"
            exit 0
          fi

          echo "Found API Gateway: $API_GW_ID"

          # Update CORS to include CloudFront + localhost for dev
          aws apigatewayv2 update-api \
            --api-id "$API_GW_ID" \
            --cors-configuration "AllowOrigins=$CF_ORIGIN,http://localhost:5173,http://localhost:3000,AllowMethods=GET,HEAD,OPTIONS,PUT,POST,PATCH,DELETE,AllowHeaders=Content-Type,Authorization,X-Requested-With,Accept,ExposeHeaders=Content-Length,Content-Type,MaxAge=3600,AllowCredentials=true" \
            --region $AWS_REGION 2>/dev/null \
            && echo "[OK] Updated API Gateway CORS with CloudFront: $CF_DOMAIN" \
            || echo "[WARN] Failed to update API Gateway CORS"

      - name: Save Dashboard Credentials to Secrets Manager
        run: |
          # Store Terraform outputs in Secrets Manager so dashboard can fetch them without AWS CLI access
          # Dashboard script (tools/dashboard/dashboard.py) reads: algo/dashboard-config
          # Keys: api_url, cognito_user_pool_id, cognito_user_pool_client_id

          API_URL="${{ steps.outputs.outputs.api_gateway_endpoint }}"
          POOL_ID="${{ steps.outputs.outputs.cognito_user_pool_id }}"
          CLIENT_ID="${{ steps.outputs.outputs.cognito_user_pool_client_id }}"

          # Fail the deploy if any required output is missing
          # (Don't silently skip — dashboard won't work without the secret)
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "[ERROR] API_GATEWAY_ENDPOINT output is empty"
            echo "Terraform outputs at deploy time:"
            echo "  api_gateway_endpoint: $API_URL"
            echo "  cognito_user_pool_id: $POOL_ID"
            echo "  cognito_user_pool_client_id: $CLIENT_ID"
            exit 1
          fi
          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "None" ]; then
            echo "[ERROR] COGNITO_USER_POOL_ID output is empty"
            exit 1
          fi
          if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "None" ]; then
            echo "[ERROR] COGNITO_USER_POOL_CLIENT_ID output is empty"
            exit 1
          fi

          # Read existing secret and merge infra keys — preserves cognito_username/cognito_password
          # set by the earlier "Setup Cognito Admin Group" step
          EXISTING=$(aws secretsmanager get-secret-value \
            --secret-id algo/dashboard-config \
            --query SecretString --output text \
            --region $AWS_REGION 2>/dev/null || echo '{}')
          SECRET_JSON=$(echo "$EXISTING" | jq \
            --arg url "$API_URL" \
            --arg pool "$POOL_ID" \
            --arg client "$CLIENT_ID" \
            '. + {api_url: $url, cognito_user_pool_id: $pool, cognito_user_pool_client_id: $client}')

          # Create or update the secret — fail if this doesn't work
          if aws secretsmanager describe-secret --secret-id algo/dashboard-config --region $AWS_REGION 2>/dev/null; then
            aws secretsmanager put-secret-value \
              --secret-id algo/dashboard-config \
              --secret-string "$SECRET_JSON" \
              --region $AWS_REGION || exit 1
          else
            aws secretsmanager create-secret \
              --name algo/dashboard-config \
              --secret-string "$SECRET_JSON" \
              --region $AWS_REGION || exit 1
          fi

          echo "[OK] Dashboard credentials saved to algo/dashboard-config in Secrets Manager"

      - name: "C-7 FIX: Validate Cognito Client ID Configuration"
        shell: pwsh
        run: |
          $POOL_ID="${{ steps.outputs.outputs.cognito_user_pool_id }}"
          $CLIENT_ID="${{ steps.outputs.outputs.cognito_user_pool_client_id }}"
          $ENVIRONMENT="${{ matrix.environment }}"

          if (-not $ENVIRONMENT) {
            $ENVIRONMENT = (Get-Content -Path terraform.tfvars | Select-String "^environment" | ForEach-Object { $_ -replace '^environment\s*=\s*"([^"]+)".*$', '$1' })
          }

          Write-Host "=== C-7 FIX: Pre-Deploy Cognito Validation ===" -ForegroundColor Cyan
          Write-Host "Environment: $ENVIRONMENT"
          Write-Host "User Pool ID: $POOL_ID"
          Write-Host "Client ID: $CLIENT_ID"
          Write-Host ""

          if (-not $POOL_ID -or $POOL_ID -eq "null" -or $POOL_ID -eq "None") {
            Write-Error "CRITICAL: COGNITO_USER_POOL_ID not found in Terraform outputs"
            exit 1
          }

          if (-not $CLIENT_ID -or $CLIENT_ID -eq "null" -or $CLIENT_ID -eq "None") {
            Write-Error "CRITICAL: COGNITO_USER_POOL_CLIENT_ID not found in Terraform outputs"
            exit 1
          }

          Write-Host "[OK] Cognito IDs validated — pool and client IDs are present." -ForegroundColor Green

      - name: Summary
        run: |
          echo "### Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          terraform output -json 2>/dev/null | \
            jq -r 'to_entries[] | select(.value.sensitive != true) | "- **\(.key)**: \(.value.value)"' \
            >> $GITHUB_STEP_SUMMARY || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Authentication**: Using GitHub Actions OIDC (secure, no long-lived secrets)" >> $GITHUB_STEP_SUMMARY

  #
  # STEP 2a -- db-init Lambda (database schema initialization)
  #
  deploy-db-init:
    name: "2a. Deploy db-init Lambda"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Build db-init Lambda
        run: |
          set -e
          SOURCE_LAMBDA=$GITHUB_WORKSPACE/lambda/db-init
          PKG_DIR=/tmp/db-init-pkg

          mkdir -p $PKG_DIR
          cp $SOURCE_LAMBDA/lambda_function.py $PKG_DIR/
          cp $SOURCE_LAMBDA/schema.sql $PKG_DIR/

          if [ -f "$SOURCE_LAMBDA/requirements.txt" ]; then
            python3.12 -m pip install -r $SOURCE_LAMBDA/requirements.txt \
              -t $PKG_DIR/ \
              --no-cache-dir --quiet
          fi

          rm -f $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip
          mkdir -p $GITHUB_WORKSPACE/terraform/lambda_artifacts
          cd $PKG_DIR
          zip -r $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip . -q -x "*.pyc" "__pycache__/*"

          echo "[OK] db-init Lambda ZIP: $(du -sh $GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip | cut -f1)"

      - name: Deploy db-init Lambda
        id: deploy_db_init
        run: |
          PROJECT=$(grep '^project_name' terraform/terraform.tfvars | cut -d'"' -f2)
          ENVIRONMENT=$(grep '^environment' terraform/terraform.tfvars | cut -d'"' -f2)
          FUNC="${PROJECT}-db-init-${ENVIRONMENT}"
          ZIP_FILE="$GITHUB_WORKSPACE/terraform/lambda_artifacts/db-init.zip"

          echo "Deploying db-init Lambda: $FUNC"

          # Check if Lambda exists
          if aws lambda get-function --function-name "$FUNC" --region $AWS_REGION >/dev/null 2>&1; then
            echo "Updating existing Lambda..."
            aws lambda update-function-code \
              --function-name "$FUNC" \
              --zip-file fileb://$ZIP_FILE \
              --region $AWS_REGION
            aws lambda wait function-updated --function-name "$FUNC" --region $AWS_REGION
            echo "[OK] db-init Lambda updated: $FUNC"
            echo "function_exists=true" >> $GITHUB_OUTPUT
          else
            echo "[WARN] db-init Lambda not found: $FUNC"
            echo "[WARN] Lambda must be created via Terraform or manually."
            echo "[WARN] db-init.tf in terraform/modules/database has all resources disabled."
            echo "[WARN] To enable db-init Lambda management, uncomment resources in db-init.tf and create IAM role."
            echo "function_exists=false" >> $GITHUB_OUTPUT
          fi
          echo "function_name=${FUNC}" >> $GITHUB_OUTPUT

      - name: Invoke db-init Lambda to Create Tables
        if: steps.deploy_db_init.outputs.function_exists == 'true'
        run: |
          FUNC="${{ steps.deploy_db_init.outputs.function_name }}"
          echo "Invoking db-init Lambda: $FUNC"

          # Invoke synchronously to wait for completion
          RESPONSE=$(aws lambda invoke \
            --function-name "$FUNC" \
            --region $AWS_REGION \
            --log-type Tail \
            /tmp/db-init-response.json 2>&1)

          echo "Response: $RESPONSE"

          # Check response
          if [ -f /tmp/db-init-response.json ]; then
            echo "db-init response:"
            cat /tmp/db-init-response.json
          fi

          # Wait a moment for async DB operations
          sleep 5
          echo "[OK] db-init Lambda invoked successfully"

  #
  # STEP 2b -- Docker image for ECS loaders
  #
  build-image:
    name: "2b. Build & Push Loader Image"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_image != 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR URL
        id: ecr
        run: |
          # Use TF output if available, otherwise discover
          ECR_URL="${{ needs.terraform.outputs.ecr_repository_url }}"
          # Handle cases where output might be empty or "None"
          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "ECR URL not available from Terraform, discovering via AWS CLI..."
            ECR_URL=$(aws ecr describe-repositories --region $AWS_REGION --output json 2>/dev/null | jq -r '.repositories[] | select(.repositoryName | startswith("algo")) | .repositoryUri' | head -1)
            if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
              echo "No ECR repository found, skipping image build"
              ECR_URL=""
            fi
          fi
          echo "ecr_url=${ECR_URL}" >> $GITHUB_OUTPUT
          echo "ECR_URL resolved to: ${ECR_URL:-(empty)}"

      - name: Set image tag
        id: meta
        run: |
          SHA="${GITHUB_SHA::8}"
          echo "image_tag=dev-${SHA}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        if: steps.ecr.outputs.ecr_url != ''
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_url }}"

      - name: Build & Push
        if: steps.ecr.outputs.ecr_url != ''
        run: |
          ECR="${{ steps.ecr.outputs.ecr_url }}"
          SHA="${{ steps.meta.outputs.sha }}"
          docker build -t "${ECR}:dev-${SHA}" -t "${ECR}:dev-latest" .
          docker push "${ECR}:dev-${SHA}"
          docker push "${ECR}:dev-latest"
          echo "[OK] Pushed: ${ECR}:dev-${SHA}"

      - name: Skip image build
        if: steps.ecr.outputs.ecr_url == ''
        run: echo "[WARN]  Skipping Docker image build -- ECR URL not resolved"

  #
  # STEP 2c -- Algo Lambda
  #
  deploy-algo:
    name: "2c. Deploy Algo Lambda"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Build Algo Lambda
        run: |
          set -e
          PKG_DIR=/tmp/algo-lambda-pkg
          mkdir -p $PKG_DIR

          # Copy Lambda handler
          cp lambda/algo_orchestrator/lambda_function.py $PKG_DIR/

          # Copy all required modules
          cp -r algo $PKG_DIR/
          cp -r config $PKG_DIR/
          cp -r utils $PKG_DIR/
          cp -r monitoring $PKG_DIR/
          # loaders/ required by algo/orchestrator/phase1_failsafe_retry.py and Phase 9's
          # circuit breaker metrics step -- see matching comment on the other packaging
          # block earlier in this file for full context.
          cp -r loaders $PKG_DIR/

          # Remove pycache
          find $PKG_DIR -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find $PKG_DIR -type f -name "*.pyc" -delete

          # Install dependencies
          python3.12 -m pip install -r lambda/algo_orchestrator/requirements.txt \
            -t $PKG_DIR/ \
            --no-cache-dir --quiet

          # Create ZIP
          rm -f terraform/lambda_algo.zip
          cd $PKG_DIR
          zip -r ${{ github.workspace }}/terraform/lambda_algo.zip . -x "*.pyc" "__pycache__/*" "*/tests/*" "*/test/*"
          cd ${{ github.workspace }}

          if [ ! -f terraform/lambda_algo.zip ]; then
            echo "ERROR: Failed to create lambda_algo.zip!"
            exit 1
          fi
          echo "[OK] Algo Lambda ZIP: $(du -sh terraform/lambda_algo.zip | cut -f1)"

      - name: Deploy Algo Lambda
        run: |
          FUNC="${{ needs.terraform.outputs.algo_lambda_name }}"
          [ -z "$FUNC" ] && FUNC="algo-algo-dev"

          if [ ! -f terraform/lambda_algo.zip ]; then
            echo "ERROR: lambda_algo.zip not found!"
            exit 1
          fi

          echo "Deploying algo Lambda: $FUNC"
          aws lambda update-function-code \
            --function-name "$FUNC" \
            --zip-file fileb://terraform/lambda_algo.zip \
            --region $AWS_REGION

          aws lambda wait function-updated --function-name "$FUNC" --region $AWS_REGION
          echo "[OK] Algo Lambda updated: $FUNC"

  #
  # STEP 2d -- API Lambda
  #
  deploy-api:
    name: "2d. Deploy API Lambda"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Package API Lambda
        run: |
          set -e
          mkdir -p api-pkg
          cp -r lambda/api/. api-pkg/
          # Copy shared utils into existing api-pkg/utils/ using /. to merge contents (not nest)
          cp -r utils/. api-pkg/utils/
          # Copy config (credential_manager used by lambda_handler)
          cp -r config/ api-pkg/config/
          # Copy algo package (algo/infrastructure etc. imported by routes/algo.py and routes/admin.py)
          cp -r algo/ api-pkg/algo/
          # Copy shared_contracts (response_validator etc. imported by routes/health.py and others).
          # NOTE: must use trailing /. like the `utils` copy above -- lambda/api/shared_contracts/
          # already exists, so without /. this nests as api-pkg/shared_contracts/shared_contracts/
          # instead of overwriting, silently deploying a stale contract copy. See same fix in
          # deploy-api-lambda.yml for full context.
          cp -r shared_contracts/. api-pkg/shared_contracts/
          pip install -r lambda/api/requirements.txt \
            -t api-pkg/ --platform manylinux2014_x86_64 --only-binary=:all: --quiet
          cd api-pkg && zip -r ../api_lambda.zip . -x "*.pyc" -x "__pycache__/*" && cd ..
          if [ ! -f api_lambda.zip ]; then
            echo "ERROR: Failed to create api_lambda.zip!"
            exit 1
          fi
          echo "[OK] API Lambda ZIP: $(du -sh api_lambda.zip | cut -f1)"

      - name: Deploy
        run: |
          FUNC="${{ needs.terraform.outputs.api_lambda_name }}"
          [ -z "$FUNC" ] && FUNC="algo-api-dev"
          aws lambda update-function-code \
            --function-name "$FUNC" \
            --zip-file fileb://api_lambda.zip \
            --region $AWS_REGION
          aws lambda wait function-updated --function-name "$FUNC" --region $AWS_REGION
          echo "[OK] API Lambda: $FUNC"

  #
  # STEP 2e -- Frontend
  #
  deploy-frontend:
    name: "2e. Build & Deploy Frontend"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Build
        working-directory: webapp/frontend
        run: |
          npm install

          # API URL: Use CloudFront domain so browser makes same-origin requests.
          # CloudFront routes /api/* to the API Gateway server-side — no CORS headers needed.
          # Fall back to API Gateway URL when CloudFront is disabled — this is the normal
          # case for dev since CloudFront was disabled there as a cost optimization.
          WEBSITE_URL="${{ needs.terraform.outputs.website_url }}"
          API_GATEWAY_URL="${{ needs.terraform.outputs.api_gateway_endpoint }}"

          # Safety net: the "terraform" job's output can come back empty even when the API
          # Gateway itself exists (e.g. transient `terraform output` hiccup, state drift from
          # a concurrent apply). Don't fail the whole frontend deploy over it — look the live
          # resource up directly, same pattern already used above for CloudFront domain discovery.
          if { [ -z "$API_GATEWAY_URL" ] || [ "$API_GATEWAY_URL" = "null" ] || [ "$API_GATEWAY_URL" = "None" ]; } && \
             { [ -z "$WEBSITE_URL" ] || [ "$WEBSITE_URL" = "null" ] || [ "$WEBSITE_URL" = "None" ]; }; then
            echo "[WARN] terraform job output for api_gateway_endpoint is empty — querying AWS directly as a fallback"
            API_GATEWAY_URL=$(aws apigatewayv2 get-apis \
              --query "Items[?Name=='algo-api-dev'].ApiEndpoint | [0]" \
              --output text 2>/dev/null || echo "")
            [ "$API_GATEWAY_URL" = "None" ] && API_GATEWAY_URL=""
          fi

          if [ -n "$WEBSITE_URL" ] && [ "$WEBSITE_URL" != "null" ] && [ "$WEBSITE_URL" != "None" ]; then
            FINAL_API_URL="$WEBSITE_URL"
            echo "[OK] Using CloudFront domain as API_URL (same-origin, no CORS needed): $FINAL_API_URL"
          elif [ -n "$API_GATEWAY_URL" ] && [ "$API_GATEWAY_URL" != "null" ] && [ "$API_GATEWAY_URL" != "None" ]; then
            FINAL_API_URL="$API_GATEWAY_URL"
            echo "[WARN] CloudFront not available — using API Gateway URL directly (CORS required): $FINAL_API_URL"
          else
            echo "[ERROR] Neither website_url nor api_gateway_endpoint available (checked both terraform output and live AWS lookup) — cannot determine API URL"
            exit 1
          fi

          # Cognito Configuration (from Terraform outputs, or empty for dev mode)
          # For development/testing: deploy with empty Cognito to enable dev authentication
          # This allows dashboard access without requiring Cognito login credentials
          POOL_ID=""
          CLIENT_ID=""
          COGNITO_DOMAIN=""

          echo "[INFO] Building frontend with empty Cognito config (dev mode authentication enabled)"

          # Build using build-prod.js with explicit arguments (cross-platform)
          # This ensures all variables are passed correctly to setup-prod.js
          node scripts/build-prod.js "$FINAL_API_URL" "production" "$POOL_ID" "$CLIENT_ID" "$COGNITO_DOMAIN"

          if [ $? -ne 0 ]; then
            echo "[ERROR] Production build failed"
            exit 1
          fi

          # Validate final config.js
          if [ ! -f "dist/config.js" ]; then
            echo "[ERROR] config.js not found in dist/"
            exit 1
          fi

          CONFIG_CONTENT=$(cat dist/config.js)
          echo "[OK] Final config.js:"
          echo "$CONFIG_CONTENT"

      - name: Add Cache Busting to config.js
        run: |
          # Add cache-busting timestamp to config.js script tag in index.html
          # (config.js was already generated by npm build → setup-prod.js)
          BUILD_TS=$(date +%s)
          if [ -f "webapp/frontend/dist/index.html" ]; then
            sed -i "s|src=\"/config\.js\"|src=\"/config.js?v=${BUILD_TS}\"|g" webapp/frontend/dist/index.html
            echo "[OK] Added cache-busting to config.js: v=${BUILD_TS}"
          fi

      - name: Sync to S3
        run: |
          BUCKET="${{ needs.terraform.outputs.frontend_bucket }}"
          if [ -z "$BUCKET" ]; then
            BUCKET=$(aws s3api list-buckets --output json 2>/dev/null | jq -r '.Buckets[] | select(.Name | startswith("algo-frontend")) | .Name' | head -1 || echo "")
          fi
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "ERROR: could not resolve frontend S3 bucket"
            exit 1
          fi
          # First pass: delete all old files from S3 bucket
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" --delete
          # Second pass: sync with proper Content-Type and cache headers (no delete flag)
          # JavaScript files with immutable cache headers
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript; charset=utf-8" \
            --exclude "*" --include "*.js" --exclude "config.js"
          # CSS files with immutable cache headers
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css; charset=utf-8" \
            --exclude "*" --include "*.css"
          # Other assets (fonts, images, etc) with immutable cache headers
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "*.js" --exclude "*.css" --exclude "config.js"
          # HTML files with no-cache headers
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" --include "*.html"
          # config.js with no-cache headers
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --content-type "application/javascript; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" --include "config.js"
          # WASM files with correct content-type (for any crypto/performance modules)
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --content-type "application/wasm" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "*.wasm"
          echo "[OK] Frontend synced to s3://${BUCKET}/"

      - name: Invalidate CloudFront Cache
        run: |
          DIST_ID="${{ needs.terraform.outputs.cloudfront_distribution_id }}"
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ] || [ "$DIST_ID" = "null" ]; then
            echo "[INFO] CloudFront is disabled (cost optimization) — skipping cache invalidation"
            echo "[INFO] Frontend assets synced to S3, but invalidation not needed"
            exit 0
          fi

          echo "Creating CloudFront cache invalidation for distribution: $DIST_ID"
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          if [ -z "$INVALIDATION_ID" ] || [ "$INVALIDATION_ID" = "None" ]; then
            echo "ERROR: Failed to create CloudFront invalidation"
            exit 1
          fi

          echo "[OK] CloudFront cache invalidation created (ID: $INVALIDATION_ID)"

  #
  # Run Database Migrations (after Terraform & db-init, parallel with other deploys)
  #
  run-migrations:
    name: "2f. Run Database Migrations via Lambda"
    needs: [terraform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_wrapper: false

      - name: Init Terraform (to read outputs)
        working-directory: terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.TF_STATE_BUCKET || 'stocks-terraform-state' }}
          TF_BACKEND_KEY: ${{ secrets.TF_STATE_KEY || 'stocks/terraform.tfstate' }}
        run: |
          # This job runs on its own fresh runner/checkout (a separate job from
          # "1. Terraform Apply"), so it has no local .terraform state without this.
          # Without it, every `terraform output` call below silently returned empty
          # (redirected to /dev/null) -- confirmed live 2026-07-07: VPC_ID and
          # PRIVATE_SUBNETS were always blank, so the migration Lambda got created/updated
          # with no VPC config at all and could never reach the VPC-internal RDS instance
          # ("Connection timed out"), while RDS_SG happened to still resolve because that
          # one variable falls back to a direct aws ec2 describe-security-groups call
          # instead of a terraform output.
          terraform init -reconfigure \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: Invoke db-init Lambda (initialize database schema)
        continue-on-error: true
        run: |
          PROJECT=$(grep '^project_name' terraform/terraform.tfvars | cut -d'"' -f2)
          ENVIRONMENT=$(grep '^environment' terraform/terraform.tfvars | cut -d'"' -f2)
          LAMBDA_NAME="${PROJECT}-db-init-${ENVIRONMENT}"

          echo "Attempting to invoke db-init Lambda: $LAMBDA_NAME"
          aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --region $AWS_REGION \
            --log-type Tail \
            --output json \
            /tmp/db_init_response.json 2>&1 && \
            echo "[OK] db-init Lambda invoked" || \
            echo "[WARN] db-init Lambda unavailable - proceeding with migrations"

      - name: Verify Terraform State Availability
        working-directory: terraform
        run: |
          echo "=== Terraform State Diagnostics ==="
          if terraform state list 2>/dev/null | grep -q "aws_vpc"; then
            echo "[OK] Terraform state is available and contains VPC resources"
            terraform output -json 2>/dev/null | jq 'keys' || echo "[WARN] Could not list terraform outputs"
          else
            echo "[WARN] Terraform state unavailable or empty — AWS CLI fallbacks will be used"
          fi

      - name: Build and Invoke db-migration Lambda
        run: |
          set -e
          echo "=== Building Database Migration Lambda ==="
          PROJECT=$(grep '^project_name' terraform/terraform.tfvars | cut -d'"' -f2)
          ENVIRONMENT=$(grep '^environment' terraform/terraform.tfvars | cut -d'"' -f2)
          LAMBDA_NAME="${PROJECT}-db-migration-${ENVIRONMENT}"

          # Build migration Lambda package
          PKG_DIR=/tmp/db-migration-pkg
          mkdir -p $PKG_DIR

          # Copy db-migration Lambda function
          cp lambda/db-migration/lambda_function.py $PKG_DIR/

          # Copy config and utils for credential_manager
          cp -r config/ $PKG_DIR/
          cp -r utils/ $PKG_DIR/

          # Copy migrations directory (includes migration SQL files)
          mkdir -p $PKG_DIR/migrations
          cp -r migrations/versions/ $PKG_DIR/migrations/
          cp migrations/run.py $PKG_DIR/migrations/
          cp migrations/__init__.py $PKG_DIR/migrations/ 2>/dev/null || true

          # Install dependencies
          python3.12 -m pip install -r lambda/db-migration/requirements.txt \
            -t $PKG_DIR/ \
            --no-cache-dir --quiet

          # Create Lambda ZIP
          rm -f migration_lambda.zip
          cd $PKG_DIR
          zip -r $GITHUB_WORKSPACE/migration_lambda.zip . -q -x "*.pyc" "__pycache__/*" ".mypy_cache/*"
          cd $GITHUB_WORKSPACE

          echo "[OK] Migration Lambda ZIP: $(du -sh migration_lambda.zip | cut -f1)"

          # Try update first, fall back to create. `aws lambda get-function` as a pre-check
          # is racy against this same job's own prior runs -- confirmed live 2026-07-07: it
          # reported the function didn't exist right after a previous run had created it,
          # so this took the "create" branch, hit "ResourceConflictException: Function
          # already exist", swallowed it as a warning, and never updated the code that
          # actually needed the fix. Attempting update-function-code directly and only
          # creating on a genuine "not found" avoids that race entirely.
          VPC_ID=$(cd terraform && terraform output -raw vpc_id 2>/dev/null || echo "")
          if [ -z "$VPC_ID" ]; then
            # Fallback: Query AWS directly if terraform output fails
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo-vpc" "Name=tag:ManagedBy,Values=Terraform" --query 'Vpcs[0].VpcId' --output text --region $AWS_REGION 2>/dev/null || echo "")
          fi

          PRIVATE_SUBNETS=$(cd terraform && terraform output -json private_subnet_ids 2>/dev/null | jq -r '.[]' 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          if [ -z "$PRIVATE_SUBNETS" ]; then
            # Fallback: Query AWS directly if terraform output fails
            PRIVATE_SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Type,Values=Private" --query 'Subnets[*].SubnetId' --output text --region $AWS_REGION 2>/dev/null | tr ' ' ',' | sed 's/,$//')
          fi

          RDS_SG=$(cd terraform && terraform output -raw rds_security_group_id 2>/dev/null || aws ec2 describe-security-groups --filters "Name=tag:Name,Values=algo-rds-sg" --query 'SecurityGroups[0].GroupId' --output text --region $AWS_REGION 2>/dev/null || echo "")
          DB_SECRET_ARN=$(aws secretsmanager list-secrets --region $AWS_REGION --query "SecretList[?Name=='algo-db-credentials-dev'].ARN" --output text 2>/dev/null || echo "")
          # requirements.txt lists psycopg2-binary, but this Lambda's own package (built by
          # pip install -t $PKG_DIR without --platform manylinux2014_x86_64) doesn't reliably
          # end up with it -- confirmed live 2026-07-07: "ModuleNotFoundError: No module named
          # 'psycopg2'" at runtime. Every other Lambda in this project (API, orchestrator) gets
          # psycopg2 from the shared Terraform-built layer instead of pip-installing it into
          # the function package; attach that same layer here rather than debugging pip.
          PSYCOPG2_LAYER_ARN=$(aws lambda list-layer-versions --layer-name algo-psycopg2-layer-dev --region $AWS_REGION --query 'LayerVersions[0].LayerVersionArn' --output text 2>/dev/null || echo "")

          UPDATE_OUTPUT=$(aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://migration_lambda.zip \
            --region $AWS_REGION 2>&1)
          UPDATE_EXIT=$?

          if [ $UPDATE_EXIT -eq 0 ]; then
            echo "[INFO] Updated existing Lambda: $LAMBDA_NAME"
            aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region $AWS_REGION

            if [ -z "$VPC_ID" ] || [ -z "$PRIVATE_SUBNETS" ] || [ -z "$RDS_SG" ] || [ "$RDS_SG" = "None" ]; then
              echo "[ERROR] Cannot update db-migration Lambda - VPC config incomplete:"
              echo "  VPC_ID: '${VPC_ID:-EMPTY}'"
              echo "  PRIVATE_SUBNETS: '${PRIVATE_SUBNETS:-EMPTY}'"
              echo "  RDS_SG: '${RDS_SG:-EMPTY}'"
              exit 1
            fi

            CONFIG_ARGS=""
            if [ ! -z "$PSYCOPG2_LAYER_ARN" ]; then
              CONFIG_ARGS="--layers $PSYCOPG2_LAYER_ARN"
            else
              echo "[WARN] Could not resolve psycopg2 layer ARN; migrations will fail on import"
            fi
            CONFIG_ARGS="$CONFIG_ARGS --vpc-config SubnetIds=$PRIVATE_SUBNETS,SecurityGroupIds=$RDS_SG"
            echo "[INFO] Updating Lambda config (layer + VPC + environment + timeout)"
            # 91 migrations in migrations/versions/ have never successfully applied before
            # (every earlier bug in this pipeline blocked them); the first real run needs
            # more than the original 300s. Confirmed live 2026-07-07: exactly 300000ms,
            # Status: timeout, after getting past every prior bug in this chain.
            aws lambda update-function-configuration \
              --function-name "$LAMBDA_NAME" \
              --timeout 900 \
              $CONFIG_ARGS \
              --environment "Variables={DB_NAME=algo,DB_SECRET_ARN=${DB_SECRET_ARN}}" \
              --region $AWS_REGION || echo "[WARN] Could not update Lambda config"
            aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region $AWS_REGION
          elif echo "$UPDATE_OUTPUT" | grep -q "ResourceNotFoundException"; then
            echo "[INFO] Creating new Lambda: $LAMBDA_NAME"
            # algo-svc-lambda-execution-dev does not exist / has no lambda.amazonaws.com trust
            # relationship ("The role defined for the function cannot be assumed by Lambda",
            # confirmed live 2026-07-07). Use algo-lambda-algo-dev instead -- it's the orchestrator's
            # actual Terraform-managed role (terraform/modules/iam/main.tf aws_iam_role.lambda_algo),
            # already has a working lambda.amazonaws.com trust policy, VPC access, and Secrets Manager
            # read on algo-db-credentials-dev.
            ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-lambda-algo-dev"
            LAYER_ARGS=""
            if [ ! -z "$PSYCOPG2_LAYER_ARN" ]; then
              LAYER_ARGS="--layers $PSYCOPG2_LAYER_ARN"
            else
              echo "[WARN] Could not resolve psycopg2 layer ARN; migrations will fail on import"
            fi

            if [ -z "$VPC_ID" ] || [ -z "$PRIVATE_SUBNETS" ] || [ -z "$RDS_SG" ] || [ "$RDS_SG" = "None" ]; then
              echo "[ERROR] VPC config incomplete:"
              echo "  VPC_ID: '${VPC_ID:-EMPTY}'"
              echo "  PRIVATE_SUBNETS: '${PRIVATE_SUBNETS:-EMPTY}'"
              echo "  RDS_SG: '${RDS_SG:-EMPTY}'"
              echo "[ERROR] Cannot create db-migration Lambda without VPC access to RDS"
              exit 1
            fi

            echo "[INFO] Creating Lambda with VPC access: Subnets=$PRIVATE_SUBNETS, SG=$RDS_SG"
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime python3.12 \
              --role "$ROLE_ARN" \
              --handler lambda_function.lambda_handler \
              --zip-file fileb://migration_lambda.zip \
              --timeout 900 \
              --memory-size 512 \
              $LAYER_ARGS \
              --vpc-config SubnetIds="$PRIVATE_SUBNETS",SecurityGroupIds="$RDS_SG" \
              --region $AWS_REGION \
              --environment "Variables={DB_NAME=algo,DB_SECRET_ARN=${DB_SECRET_ARN}}"
            # function-active only waits for State=Active, which can flip before the layer
            # and VPC config finish provisioning (LastUpdateStatus stays InProgress longer,
            # especially with VPC ENIs). Confirmed live 2026-07-07: invoking right after
            # function-active alone still hit "ModuleNotFoundError: No module named
            # 'psycopg2'" despite the layer being attached in the create-function call.
            aws lambda wait function-active --function-name "$LAMBDA_NAME" --region $AWS_REGION
            aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region $AWS_REGION
          else
            echo "[ERROR] update-function-code failed for a reason other than missing function: $UPDATE_OUTPUT"
            exit 1
          fi

          echo "[OK] Migration Lambda ready: $LAMBDA_NAME"

      - name: Invoke db-migration Lambda
        # NOT continue-on-error: this step already does its own explicit status-code check
        # and `exit 1` on failure (below) -- continue-on-error was swallowing that signal,
        # so a real, actionable failure (e.g. exit 255 from a hung/timed-out invoke) was
        # reported as an overall green "success" run. Confirmed live 2026-07-07: runs
        # 28859141648 and 28860273646 both show this step failing (one after a 46-minute
        # hang) while the workflow as a whole reported success. 91 migrations in
        # migrations/versions/ have never actually applied as a result. Let it fail loudly.
        run: |
          set -e
          PROJECT=$(grep '^project_name' terraform/terraform.tfvars | cut -d'"' -f2)
          ENVIRONMENT=$(grep '^environment' terraform/terraform.tfvars | cut -d'"' -f2)
          LAMBDA_NAME="${PROJECT}-db-migration-${ENVIRONMENT}"

          # A freshly created Lambda reports State=Pending for a few seconds; invoking it
          # immediately fails with ResourceConflictException. Confirmed live 2026-07-07:
          # this step ran ~0.7s after create-function returned and failed every time.
          echo "Waiting for $LAMBDA_NAME to become Active..."
          aws lambda wait function-active --function-name "$LAMBDA_NAME" --region $AWS_REGION

          echo "=== Invoking Migration Lambda: $LAMBDA_NAME ==="

          # Invoke Lambda and capture response. --cli-read-timeout must exceed the Lambda's
          # own 900s function timeout, or the CLI gives up and reports a client-side error
          # while the Lambda keeps running server-side regardless. Confirmed live
          # 2026-07-07: the CLI errored out (exit 255) after ~3 minutes while the Lambda's
          # own CloudWatch logs showed it was still running toward its (then 300s) timeout.
          RESPONSE=$(aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --region $AWS_REGION \
            --cli-read-timeout 920 \
            --log-type Tail \
            --output json \
            /tmp/migration_response.json 2>&1)

          INVOKE_EXIT=$?
          if [ $INVOKE_EXIT -ne 0 ]; then
            echo "[ERROR] Lambda invocation failed: $RESPONSE"
            exit 1
          fi

          # Check response status. Uses single-line `python3 -c` (not a heredoc) --
          # heredocs embedded in a YAML `run: |` block are fragile: the closing delimiter
          # must sit at literal column 0 with plain `<<`, but YAML block-scalar indentation
          # stripping doesn't reliably land it there. Confirmed live 2026-07-07: the
          # heredoc version failed with "here-document ... delimited by end-of-file".
          STATUS_CODE=$(python3 -c "import json; d = json.load(open('/tmp/migration_response.json')); print(d.get('statusCode', 500))" 2>/dev/null || echo 500)

          # Log output if available
          if grep -q "LogResult" /tmp/migration_response.json 2>/dev/null; then
            echo "Lambda Logs:"
            python3 -c "import json, base64; d = json.load(open('/tmp/migration_response.json')); print(base64.b64decode(d['LogResult']).decode('utf-8')) if 'LogResult' in d else None"
          fi

          echo "Response:"
          cat /tmp/migration_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/migration_response.json

          if [ "$STATUS_CODE" = "200" ]; then
            echo "[OK] Migrations completed successfully"
            exit 0
          else
            echo "[ERROR] Migration Lambda returned status code: $STATUS_CODE"
            exit 1
          fi

  #
  # Populate Database with Initial Data
  #
  run-initial-loaders:
    name: Populate Database - Run Initial Loaders
    needs: [terraform, run-migrations]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run AAII Sentiment Loader (Lambda)
        continue-on-error: true
        run: |
          PROJECT=$(grep '^project_name' terraform/terraform.tfvars | cut -d'"' -f2)
          ENVIRONMENT=$(grep '^environment' terraform/terraform.tfvars | cut -d'"' -f2)
          LAMBDA_NAME="${PROJECT}-aaii-loader-${ENVIRONMENT}"

          echo "Invoking AAII Sentiment Loader Lambda: $LAMBDA_NAME"

          # Invoke Lambda and capture response
          RESPONSE=$(aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --region $AWS_REGION \
            --output json \
            /tmp/aaii_response.json 2>&1)

          if [ $? -eq 0 ]; then
            # Lambda invocation succeeded, extract body from response
            BODY=$(python3 << 'PYTHON'
          import json
          try:
            with open('/tmp/aaii_response.json', 'r') as f:
              response = json.load(f)
              if 'body' in response:
                body = response['body']
                # body might be a JSON string or plain string
                try:
                  parsed = json.loads(body)
                  print(parsed if isinstance(parsed, str) else body)
                except:
                  print(body)
              else:
                print(json.dumps(response))
          except Exception as e:
            print(f"Error reading response: {e}")
          PYTHON
            )
            echo "$BODY"
          else
            echo "[WARN] AAII Sentiment Loader Lambda invocation failed: $RESPONSE"
            echo "The loader will run post-deployment via EventBridge scheduled tasks."
          fi

  #
  # Final Summary
  #
  summary:
    name: Deployment Summary
    needs: [terraform, build-image, deploy-algo, deploy-api, deploy-frontend, run-migrations, run-initial-loaders]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print Summary
        run: |
          echo "## Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ needs.terraform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ${{ needs.build-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Algo Lambda | ${{ needs.deploy-algo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Lambda | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.run-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Initial Loaders | ${{ needs.run-initial-loaders.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CloudFront Frontend URL" >> $GITHUB_STEP_SUMMARY
          echo "**AWS Site:** https://\${{ needs.terraform.outputs.cloudfront_id }}.cloudfront.net" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Data Status" >> $GITHUB_STEP_SUMMARY
          echo "**AAII Sentiment & Initial Data:** Loaded automatically during deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Additional Loaders:** Scheduled via EventBridge (4A, 9:30A, 5:30P ET daily)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. **Local AWS Access:** Run \`./scripts/refresh-aws-credentials.ps1\` to fetch developer credentials from Secrets Manager" >> $GITHUB_STEP_SUMMARY
          echo "2. **Verify Frontend:** Visit CloudFront URL above and check data loads" >> $GITHUB_STEP_SUMMARY
          echo "3. **Check Dashboard:** AAII Sentiment and other data should now be populated in AWS RDS" >> $GITHUB_STEP_SUMMARY
