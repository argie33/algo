name: Deploy All Infrastructure (Terraform)

# Master deploy: runs terraform apply, then builds all application code in parallel.
# Trigger: push to main (full stack), or manual dispatch for selective deploys.
# NOTE: This is the ONLY deployment workflow. All infrastructure uses Terraform (IaC).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: 'Skip terraform apply (infra already up to date)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      skip_image:
        description: 'Skip Docker image build/push'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      skip_code:
        description: 'Skip Lambda + frontend deploy'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ──────────────────────────────────────────────────────────────
  # STEP 1 — Infrastructure (Terraform)
  # ──────────────────────────────────────────────────────────────
  terraform:
    name: "1. Terraform Apply"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_repository_url: ${{ steps.outputs.outputs.ecr_repository_url }}
      api_lambda_name: ${{ steps.outputs.outputs.api_lambda_name }}
      algo_lambda_name: ${{ steps.outputs.outputs.algo_lambda_name }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      api_gateway_endpoint: ${{ steps.outputs.outputs.api_gateway_endpoint }}
    env:
      TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
      TF_VAR_alpaca_api_key_id: ${{ secrets.ALPACA_API_KEY_ID }}
      TF_VAR_alpaca_api_secret_key: ${{ secrets.ALPACA_API_SECRET_KEY }}
      TF_VAR_notification_email: ${{ secrets.ALERT_EMAIL_ADDRESS }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_fred_api_key: ${{ secrets.FRED_API_KEY }}
      TF_VAR_execution_mode: ${{ secrets.EXECUTION_MODE }}
      TF_VAR_orchestrator_dry_run: ${{ secrets.ORCHESTRATOR_DRY_RUN }}
      TF_VAR_orchestrator_log_level: ${{ secrets.ORCHESTRATOR_LOG_LEVEL }}
      TF_VAR_data_patrol_enabled: ${{ secrets.DATA_PATROL_ENABLED }}
      TF_VAR_data_patrol_timeout_ms: ${{ secrets.DATA_PATROL_TIMEOUT_MS }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Import RDS Security Group Rules (state sync)
        run: |
          # Import existing RDS SG rules that exist in AWS but not in Terraform state.
          # Idempotent: terraform import exits 0 if already imported, errors only if AWS resource missing.
          import_if_missing() {
            local resource=$1
            local id=$2
            if terraform state list | grep -qF "$resource"; then
              echo "SKIP: $resource already in state"
            else
              echo "IMPORT: $resource"
              terraform import -var-file=terraform.tfvars "$resource" "$id" || true
            fi
          }

          import_if_missing \
            module.vpc.aws_security_group_rule.rds_from_ecs_tasks \
            sg-0efd52dc5e807f2e0_ingress_tcp_5432_5432_sg-0ddae70a1a80b54bd

          import_if_missing \
            module.vpc.aws_security_group_rule.rds_from_api_lambda \
            sg-0efd52dc5e807f2e0_ingress_tcp_5432_5432_sg-05fd64fd31b834259

          import_if_missing \
            module.vpc.aws_security_group_rule.rds_from_algo_lambda \
            sg-0efd52dc5e807f2e0_ingress_tcp_5432_5432_sg-083c14c5d85cab92e

          import_if_missing \
            module.vpc.aws_security_group_rule.rds_self_postgres \
            sg-0efd52dc5e807f2e0_ingress_tcp_5432_5432_sg-0efd52dc5e807f2e0

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan \
            -detailed-exitcode || EXIT=$?
          # exit 0 = no changes, 2 = changes, other = error
          if [ "${EXIT:-0}" -eq 1 ]; then exit 1; fi

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Collect Outputs
        id: outputs
        run: |
          set -e
          TF_OUT=$(terraform output -json 2>/dev/null || echo "{}")

          echo "DEBUG: Terraform output JSON:"
          echo "$TF_OUT" | head -50

          ECR=$(echo "$TF_OUT" | jq -r '.ecr_repository_url.value // "" ' 2>/dev/null || echo "")
          API=$(echo "$TF_OUT" | jq -r '.api_lambda_function_name.value // "stocks-api-dev"' 2>/dev/null || echo "stocks-api-dev")
          ALGO=$(echo "$TF_OUT" | jq -r '.algo_lambda_function_name.value // "stocks-algo-dev"' 2>/dev/null || echo "stocks-algo-dev")
          BUCKET=$(echo "$TF_OUT" | jq -r '.frontend_bucket_name.value // ""' 2>/dev/null || echo "")
          CF=$(echo "$TF_OUT" | jq -r '.cloudfront_distribution_id.value // ""' 2>/dev/null || echo "")
          API_GW=$(echo "$TF_OUT" | jq -r '.api_gateway_endpoint.value // ""' 2>/dev/null || echo "")

          echo "DEBUG: Extracted values:"
          echo "  ECR=${ECR:-(empty)}"
          echo "  API=${API:-(empty)}"
          echo "  ALGO=${ALGO:-(empty)}"
          echo "  BUCKET=${BUCKET:-(empty)}"
          echo "  CF=${CF:-(empty)}"
          echo "  API_GW=${API_GW:-(empty)}"

          echo "ecr_repository_url=${ECR}" >> $GITHUB_OUTPUT
          echo "api_lambda_name=${API}" >> $GITHUB_OUTPUT
          echo "algo_lambda_name=${ALGO}" >> $GITHUB_OUTPUT
          echo "frontend_bucket=${BUCKET}" >> $GITHUB_OUTPUT
          echo "cloudfront_id=${CF}" >> $GITHUB_OUTPUT
          echo "api_gateway_endpoint=${API_GW}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          terraform output -json 2>/dev/null | \
            jq -r 'to_entries[] | select(.value.sensitive != true) | "- **\(.key)**: \(.value.value)"' \
            >> $GITHUB_STEP_SUMMARY || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Authentication**: Using GitHub Actions OIDC (secure, no long-lived secrets)" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # STEP 2a — Docker image for ECS loaders
  # ──────────────────────────────────────────────────────────────
  build-image:
    name: "2a. Build & Push Loader Image"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_image != 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR URL
        id: ecr
        run: |
          # Use TF output if available, otherwise discover
          ECR_URL="${{ needs.terraform.outputs.ecr_repository_url }}"
          # Handle cases where output might be empty or "None"
          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "ECR URL not available from Terraform, discovering via AWS CLI..."
            ECR_URL=$(aws ecr describe-repositories --region $AWS_REGION \
              --query 'repositories[?starts_with(repositoryName, `algo`)].repositoryUri | [0]' \
              --output text 2>/dev/null)
            if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
              echo "No ECR repository found, skipping image build"
              ECR_URL=""
            fi
          fi
          echo "ecr_url=${ECR_URL}" >> $GITHUB_OUTPUT
          echo "ECR_URL resolved to: ${ECR_URL:-(empty)}"

      - name: Set image tag
        id: meta
        run: |
          SHA="${GITHUB_SHA::8}"
          echo "image_tag=dev-${SHA}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Login to ECR
        if: steps.ecr.outputs.ecr_url != ''
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_url }}"

      - name: Build & Push
        if: steps.ecr.outputs.ecr_url != ''
        run: |
          ECR="${{ steps.ecr.outputs.ecr_url }}"
          SHA="${{ steps.meta.outputs.sha }}"
          docker build -t "${ECR}:dev-${SHA}" -t "${ECR}:dev-latest" .
          docker push "${ECR}:dev-${SHA}"
          docker push "${ECR}:dev-latest"
          echo "✅ Pushed: ${ECR}:dev-${SHA}"

      - name: Skip image build
        if: steps.ecr.outputs.ecr_url == ''
        run: echo "⚠️  Skipping Docker image build — ECR URL not resolved"

  # ──────────────────────────────────────────────────────────────
  # STEP 2b — Algo Lambda
  # ──────────────────────────────────────────────────────────────
  deploy-algo:
    name: "2b. Deploy Algo Lambda"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package
        run: |
          mkdir -p lambda-pkg
          cp -r lambda/algo_orchestrator lambda-pkg/
          cp lambda/algo_orchestrator/lambda_function.py lambda-pkg/
          cp algo_*.py lambda-pkg/ 2>/dev/null || true
          for f in algo_orchestrator.py credential_manager.py credential_validator.py db_helper.py signal_utils.py data_source_router.py \
                   optimal_loader.py bloom_dedup.py trade_status.py \
                   loader_safety.py; do
            [ -f "$f" ] && cp "$f" lambda-pkg/ || true
          done
          pip install -r lambda/algo_orchestrator/requirements.txt \
            -t lambda-pkg/ --only-binary=:all: --quiet
          cd lambda-pkg
          zip -r ../algo_lambda.zip . -x "*.pyc" -x "__pycache__/*" \
            -x "*/tests/*" -x "*/test/*" -x "*/.git/*" -x "*.dist-info/tests/*"
          echo "Lambda package size: $(du -sh ../algo_lambda.zip | cut -f1)"

      - name: Deploy
        run: |
          FUNC="${{ needs.terraform.outputs.algo_lambda_name }}"
          [ -z "$FUNC" ] && FUNC="stocks-algo-dev"
          aws lambda update-function-code \
            --function-name "$FUNC" \
            --zip-file fileb://algo_lambda.zip \
            --region $AWS_REGION
          aws lambda wait function-updated --function-name "$FUNC" --region $AWS_REGION
          echo "✅ Algo Lambda: $FUNC"

  # ──────────────────────────────────────────────────────────────
  # STEP 2c — API Lambda
  # ──────────────────────────────────────────────────────────────
  deploy-api:
    name: "2c. Deploy API Lambda"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Package
        working-directory: webapp/lambda
        run: |
          npm ci --omit=dev
          zip -r ../../api_lambda.zip . \
            -x "*.git*" -x "node_modules/.cache/*" \
            -x "tests/*" -x "coverage/*" \
            -x "**/*.test.js" -x ".env*" -x "scripts/*"

      - name: Deploy
        run: |
          FUNC="${{ needs.terraform.outputs.api_lambda_name }}"
          [ -z "$FUNC" ] && FUNC="stocks-api-dev"
          aws lambda update-function-code \
            --function-name "$FUNC" \
            --zip-file fileb://api_lambda.zip \
            --region $AWS_REGION
          aws lambda wait function-updated --function-name "$FUNC" --region $AWS_REGION
          echo "✅ API Lambda: $FUNC"

  # ──────────────────────────────────────────────────────────────
  # STEP 2d — Frontend
  # ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "2d. Build & Deploy Frontend"
    needs: terraform
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      github.event.inputs.skip_code != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Build
        working-directory: webapp/frontend
        env:
          VITE_API_URL: ${{ needs.terraform.outputs.api_gateway_endpoint }}
        run: |
          npm install
          npm run build

      - name: Sync to S3
        run: |
          BUCKET="${{ needs.terraform.outputs.frontend_bucket }}"
          if [ -z "$BUCKET" ]; then
            BUCKET=$(aws s3api list-buckets \
              --query 'Buckets[?starts_with(Name, `algo-frontend`)].Name | [0]' \
              --output text 2>/dev/null || echo "")
          fi
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "ERROR: could not resolve frontend S3 bucket"
            exit 1
          fi
          # Hashed assets: long cache
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          # HTML: no cache
          aws s3 sync webapp/frontend/dist/ "s3://${BUCKET}/" \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "✅ Frontend synced to s3://${BUCKET}/"

      - name: Invalidate CloudFront
        run: |
          CF_ID="${{ needs.terraform.outputs.cloudfront_id }}"
          if [ -n "$CF_ID" ] && [ "$CF_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_ID" --paths "/*" \
              --query 'Invalidation.Id' --output text
            echo "✅ CloudFront invalidation created"
          fi

  # ──────────────────────────────────────────────────────────────
  # Final Summary
  # ──────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    needs: [terraform, build-image, deploy-algo, deploy-api, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print Summary
        run: |
          echo "## Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ needs.terraform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ${{ needs.build-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Algo Lambda | ${{ needs.deploy-algo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Lambda | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
