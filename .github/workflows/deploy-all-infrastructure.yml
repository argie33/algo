name: Deploy All Infrastructure (Terraform + Lambda + Frontend + Migrations)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options: [ dev, staging, prod ]

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.5.0"

jobs:
  terraform:
    name: Deploy Infrastructure (Terraform)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform backend S3 bucket if needed
        run: |
          BUCKET="stocks-terraform-state"
          if ! aws s3 ls "s3://$BUCKET" 2>/dev/null; then
            echo "Creating S3 backend bucket..."
            aws s3api create-bucket --bucket "$BUCKET" --region "${{ env.AWS_REGION }}"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          fi

      - name: Create stub ZIP files for optional Lambda resources
        run: |
          python3 -c "
          import zipfile, os
          stubs = [
            'terraform/modules/database/aaii_loader.zip',
            'terraform/modules/orchestration/trigger-loaders.zip',
          ]
          for path in stubs:
            os.makedirs(os.path.dirname(path), exist_ok=True)
            if not os.path.exists(path):
              with zipfile.ZipFile(path, 'w') as z:
                z.writestr('stub.py', '# stub placeholder')
              print(f'Created stub: {path}')
            else:
              print(f'Exists: {path}')
          "

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=stocks-terraform-state" \
            -backend-config="key=stocks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan (ECS task defs + Step Functions pipeline)
        working-directory: terraform
        run: |
          terraform plan \
            -target=module.loaders \
            -target=module.pipeline \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Fetch Terraform Outputs
        working-directory: terraform
        run: |
          terraform output -json > outputs.json
          echo "=== Terraform Outputs ===" && cat outputs.json

      - name: Extract Dashboard Configuration
        id: dashboard_config
        working-directory: terraform
        run: |
          API_URL=$(terraform output -raw api_url 2>/dev/null || echo "")
          POOL_ID=$(terraform output -raw cognito_user_pool_id 2>/dev/null || echo "")
          CLIENT_ID=$(terraform output -raw cognito_user_pool_client_id 2>/dev/null || echo "")

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$CLIENT_ID" >> $GITHUB_OUTPUT

          echo "Dashboard Config:"
          echo "  API URL: $API_URL"
          echo "  Cognito Pool: ${POOL_ID:0:20}..."
          echo "  Cognito Client: ${CLIENT_ID:0:20}..."

      - name: Store Dashboard Config in Secrets Manager
        if: steps.dashboard_config.outputs.api_url
        run: |
          aws secretsmanager create-secret \
            --name algo/dashboard-config \
            --secret-string '{
              "api_url": "${{ steps.dashboard_config.outputs.api_url }}",
              "cognito_user_pool_id": "${{ steps.dashboard_config.outputs.cognito_user_pool_id }}",
              "cognito_user_pool_client_id": "${{ steps.dashboard_config.outputs.cognito_user_pool_client_id }}"
            }' \
            --region ${{ env.AWS_REGION }} \
            --overwrite-existing-secret 2>/dev/null || true

      - name: Save Terraform Outputs for Next Steps
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/outputs.json
          retention-days: 7

  migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: terraform
    continue-on-error: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs

      - name: Extract RDS Credentials from Secrets Manager
        id: rds_creds
        run: |
          SECRET_NAME=$(jq -r '.rds_credentials_secret_name.value' outputs.json)
          SECRET=$(aws secretsmanager get-secret-value --secret-id "$SECRET_NAME" --query SecretString --output text)

          echo "::add-mask::$(echo $SECRET | jq -r '.password')"

          echo "DB_HOST=$(echo $SECRET | jq -r '.host')" >> $GITHUB_ENV
          echo "DB_PORT=$(echo $SECRET | jq -r '.port')" >> $GITHUB_ENV
          echo "DB_USER=$(echo $SECRET | jq -r '.username')" >> $GITHUB_ENV
          echo "DB_PASSWORD=$(echo $SECRET | jq -r '.password')" >> $GITHUB_ENV
          echo "DB_NAME=$(jq -r '.rds_database_name.value' outputs.json)" >> $GITHUB_ENV

      - name: Apply Database Schema
        run: |
          apt-get update && apt-get install -y postgresql-client
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} \
            -p ${{ env.DB_PORT }} \
            -U ${{ env.DB_USER }} \
            -d ${{ env.DB_NAME }} \
            -f lambda/db-init/schema.sql

  deployment_summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ terraform, migrations ]
    if: always()

    steps:
      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs

      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Complete ✓"
          echo ""
          echo "### Infrastructure Created"
          echo "| Resource | Value |"
          echo "|----------|-------|"
          echo "| API Gateway URL | \`$(jq -r '.api_url.value' outputs.json)\` |"
          echo "| Cognito User Pool | \`$(jq -r '.cognito_user_pool_id.value' outputs.json)\` |"
          echo "| Frontend URL | \`$(jq -r '.website_url.value' outputs.json)\` |"
          echo ""
          echo "### Dashboard Access"
          echo "The dashboard will automatically fetch these credentials from Terraform outputs."
          echo ""
          echo "\`\`\`bash"
          echo "python -m dashboard.dashboard"
          echo "\`\`\`"
          echo ""
          echo "### For Local Development"
          echo "Set environment variables:"
          echo ""
          echo "\`\`\`powershell"
          echo "\$env:DASHBOARD_API_URL = '$(jq -r '.api_url.value' outputs.json)'"
          echo "\$env:COGNITO_USER_POOL_ID = '$(jq -r '.cognito_user_pool_id.value' outputs.json)'"
          echo "\$env:COGNITO_CLIENT_ID = '$(jq -r '.cognito_user_pool_client_id.value' outputs.json)'"
          echo "\`\`\`"
