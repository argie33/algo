name: Test Live Execution - Loaders & Orchestrator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * MON-FRI'  # 9 AM UTC (4 AM ET) - test at same time as price loaders

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test-loaders-and-orchestrator:
    name: Test Loaders & Orchestrator Live Execution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary boto3 requests -q

      - name: Test Loaders - Load Fresh Data
        id: loaders
        run: |
          echo "🔄 Testing data loaders..."
          echo "Attempting to load price data via ECS..."

          # Get ECS cluster and task definitions
          CLUSTER=$(aws ecs list-clusters --region $AWS_REGION --query 'clusterArns[0]' --output text 2>/dev/null || echo "")

          if [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ]; then
            echo "⚠️ ECS cluster not found - loaders may not be running"
            echo "loader_status=no_cluster" >> $GITHUB_OUTPUT
          else
            echo "✓ ECS Cluster found: $CLUSTER"

            # List available task definitions for loaders
            TASK_DEFS=$(aws ecs list-task-definitions --family-prefix "algo" --region $AWS_REGION --query 'taskDefinitionArns[*].[family,revision]' --output text 2>/dev/null | head -5)
            echo "Available loader task definitions:"
            echo "$TASK_DEFS"

            echo "loader_status=cluster_ready" >> $GITHUB_OUTPUT
          fi

      - name: Test Orchestrator - Live Execution
        id: orchestrator
        run: |
          echo "🚀 Testing orchestrator in LIVE mode..."

          FUNC="algo-algo-dev"
          PAYLOAD='{"source":"test-live-execution","test":"verify-all-phases"}'
          ENCODED=$(echo -n "$PAYLOAD" | base64 -w0)

          echo "Invoking $FUNC asynchronously..."
          RESPONSE=$(aws lambda invoke \
            --function-name "$FUNC" \
            --invocation-type Event \
            --payload "$ENCODED" \
            --region $AWS_REGION \
            /tmp/invoke-response.json 2>&1 || echo "Invocation initiated (may timeout on HTTP response)")

          echo "Orchestrator invoked at $(date -u)"
          echo "orchestrator_status=invoked" >> $GITHUB_OUTPUT

      - name: Wait for Execution & Check Logs
        id: logs
        run: |
          echo "⏳ Waiting for orchestrator to execute (up to 10 minutes)..."

          FUNC="algo-algo-dev"
          LOG_GROUP="/aws/lambda/$FUNC"
          START_TIME=$(date -u +%s)
          TIMEOUT=$((START_TIME + 600))

          PHASE_7_FOUND=0
          FINAL_REPORT_FOUND=0
          ERRORS_FOUND=0

          while [ $(date -u +%s) -lt $TIMEOUT ]; do
            # Get latest log stream for the Lambda function
            LATEST_STREAM=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --max-items 1 \
              --region $AWS_REGION \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || echo "")

            if [ -n "$LATEST_STREAM" ] && [ "$LATEST_STREAM" != "None" ]; then
              # Get recent log events
              LOGS=$(aws logs get-log-events \
                --log-group-name "$LOG_GROUP" \
                --log-stream-name "$LATEST_STREAM" \
                --region $AWS_REGION \
                --query 'events[*].message' \
                --output text 2>/dev/null || echo "")

              if echo "$LOGS" | grep -q "Phase 7:"; then
                PHASE_7_FOUND=1
                echo "✅ Phase 7 detected!"
              fi

              if echo "$LOGS" | grep -q "FINAL REPORT"; then
                FINAL_REPORT_FOUND=1
                echo "✅ Final report detected!"
              fi

              if echo "$LOGS" | grep -qE "ERROR|CRITICAL|Traceback"; then
                ERRORS_FOUND=1
                echo "⚠️ Errors detected in logs"
              fi

              if [ $PHASE_7_FOUND -eq 1 ] && [ $FINAL_REPORT_FOUND -eq 1 ]; then
                echo "✅ Orchestrator execution complete!"
                break
              fi
            else
              echo "Waiting for logs to become available..."
            fi

            sleep 10
          done

          echo "phase_7=$PHASE_7_FOUND" >> $GITHUB_OUTPUT
          echo "final_report=$FINAL_REPORT_FOUND" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS_FOUND" >> $GITHUB_OUTPUT

      - name: Display Full Execution Logs
        run: |
          FUNC="algo-algo-dev"
          LOG_GROUP="/aws/lambda/$FUNC"
          echo "=== ORCHESTRATOR EXECUTION LOGS ==="

          LATEST_STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --max-items 1 \
            --region $AWS_REGION \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$LATEST_STREAM" ] && [ "$LATEST_STREAM" != "None" ]; then
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$LATEST_STREAM" \
              --region $AWS_REGION \
              --query 'events[*].message' \
              --output text | tail -200
          else
            echo "No log streams found yet - execution may not have started"
          fi

      - name: Verify Results
        run: |
          echo "=== TEST RESULTS ==="
          echo "Loaders: ${{ steps.loaders.outputs.loader_status }}"
          echo "Orchestrator Invoked: ${{ steps.orchestrator.outputs.orchestrator_status }}"
          echo "Phase 7 Found: ${{ steps.logs.outputs.phase_7 }}"
          echo "Final Report Found: ${{ steps.logs.outputs.final_report }}"
          echo "Errors Found: ${{ steps.logs.outputs.errors }}"

          PHASE_7="${{ steps.logs.outputs.phase_7 }}"
          FINAL_REPORT="${{ steps.logs.outputs.final_report }}"
          ERRORS="${{ steps.logs.outputs.errors }}"

          if [ "$PHASE_7" = "1" ] && [ "$FINAL_REPORT" = "1" ] && [ "$ERRORS" = "0" ]; then
            echo ""
            echo "✅ SUCCESS: Orchestrator executed all 7 phases in LIVE mode!"
            exit 0
          else
            echo ""
            echo "❌ ISSUE: Check logs above for details"
            if [ "$ERRORS" = "1" ]; then
              echo "   - Errors detected in execution"
            fi
            if [ "$PHASE_7" = "0" ]; then
              echo "   - Phase 7 not found (execution may still be running)"
            fi
            if [ "$FINAL_REPORT" = "0" ]; then
              echo "   - Final report not found"
            fi
            exit 1
          fi
