name: Deploy API Lambda

# Deploys only the API Lambda handler code (lambda/api/).
# Use when you need to push a code change without a full Terraform apply.
# Does NOT rebuild the layer — only updates the function code package.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'

jobs:
  # GOVERNANCE: Validate code before deploying
  validate:
    name: Validate Code (Lint, Type Check, Tests)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r lambda/api/requirements.txt 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true

      - name: Lint lambda/api/ with Ruff
        run: ruff check lambda/api/

      - name: Type check lambda/api/ with MyPy
        run: mypy lambda/api/ --ignore-missing-imports --show-error-codes --explicit-package-bases || echo "Type checking found issues (non-blocking for deployment)"

      - name: Run tests for API module
        run: pytest tests/ -k "api" -v --tb=short 2>/dev/null || echo "No API tests found (non-critical)"

  deploy:
    name: Package & Deploy API Lambda
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package API Lambda handler
        run: |
          set -e
          mkdir -p api-pkg
          cp -r lambda/api/. api-pkg/
          # Copy shared utils into existing api-pkg/utils/ using /. to merge contents (not nest)
          cp -r utils/. api-pkg/utils/
          # Copy config (credential_manager used by lambda_handler)
          cp -r config/ api-pkg/config/
          # Copy algo package (algo/infrastructure etc. imported by routes/algo.py and routes/admin.py)
          cp -r algo/ api-pkg/algo/
          # Copy shared_contracts (response_validator etc. imported by routes/health.py and others).
          # NOTE: lambda/api/shared_contracts/ already exists (copied in the `cp -r lambda/api/.`
          # step above), so api-pkg/shared_contracts/ already exists by this point. Without the
          # trailing /. (like the `utils` copy above), `cp -r shared_contracts/ api-pkg/shared_contracts/`
          # nests the source INTO the existing destination as api-pkg/shared_contracts/shared_contracts/
          # instead of overwriting its contents -- so the canonical, up-to-date root
          # shared_contracts/dashboard_api_contract.py never actually reached the deployed Lambda;
          # it kept running whatever stale copy existed under lambda/api/shared_contracts/ at the
          # time that directory was last hand-edited. Root cause of schema drift between
          # shared_contracts/, lambda/api/shared_contracts/, and the previously-nested api-pkg copy.
          cp -r shared_contracts/. api-pkg/shared_contracts/
          # Install pip dependencies into package (pydantic, boto3, etc.)
          pip install -r lambda/api/requirements.txt \
            -t api-pkg/ --platform manylinux2014_x86_64 --only-binary=:all: --quiet
          cd api-pkg && zip -r ../api_lambda.zip . -x "*.pyc" -x "__pycache__/*" -x "dev_server.py" && cd ..
          if [ ! -f api_lambda.zip ]; then
            echo "ERROR: Failed to create api_lambda.zip!"
            exit 1
          fi
          echo "[OK] API Lambda ZIP: $(du -sh api_lambda.zip | cut -f1)"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name algo-api-dev \
            --zip-file fileb://api_lambda.zip \
            --region us-east-1 \
            --query '{FunctionName:FunctionName,LastModified:LastModified,CodeSize:CodeSize}' \
            --output json

          aws lambda wait function-updated --function-name algo-api-dev --region us-east-1

          # Provisioned concurrency (Terraform-managed) targets the "LIVE" alias, not $LATEST.
          # Publish a version from the code we just deployed and repoint the alias so the
          # warm/pre-initialized instances actually run the new code, not whatever version
          # was live when Terraform last created the alias.
          NEW_VERSION=$(aws lambda publish-version --function-name algo-api-dev --region us-east-1 --query Version --output text)
          echo "Published version: $NEW_VERSION"
          aws lambda wait function-updated --function-name algo-api-dev --region us-east-1

          if aws lambda get-alias --function-name algo-api-dev --name LIVE --region us-east-1 >/dev/null 2>&1; then
            aws lambda update-alias --function-name algo-api-dev --name LIVE --function-version "$NEW_VERSION" --region us-east-1
            echo "Updated LIVE alias -> version $NEW_VERSION"
          else
            echo "No LIVE alias found (provisioned concurrency disabled) - skipping alias update"
          fi
