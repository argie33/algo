name: Rotate Developer Credentials with Dual-Credentials Period

# Scheduled quarterly rotation with dual-credentials period (7 days).
# During the grace period, both old and new keys are valid.
# After 7 days, old key is automatically deleted.

on:
  schedule:
    - cron: '0 2 3-9 2 1'  # Q1 - Feb, first Monday, 2 AM ET
    - cron: '0 2 3-9 5 1'  # Q2 - May, first Monday, 2 AM ET
    - cron: '0 2 3-9 8 1'  # Q3 - Aug, first Monday, 2 AM ET
    - cron: '0 2 3-9 11 1' # Q4 - Nov, first Monday, 2 AM ET
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  GRACE_PERIOD_DAYS: 7

permissions:
  id-token: write
  contents: write

jobs:
  rotate-and-create-grace-period:
    name: Create New Credentials and Start Grace Period
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get current access keys
        id: current_keys
        run: |
          # Get all active access keys for algo-developer user
          KEYS=$(aws iam list-access-keys --user-name algo-developer --output json)

          # Extract key IDs (there should be 1, but we're defensive for dual-credentials case)
          KEY_COUNT=$(echo "$KEYS" | jq '.AccessKeyMetadata | length')
          echo "key_count=$KEY_COUNT" >> $GITHUB_OUTPUT

          # Store first key (oldest active key to be rotated)
          OLD_KEY_ID=$(echo "$KEYS" | jq -r '.AccessKeyMetadata[0].AccessKeyId')
          echo "old_key_id=$OLD_KEY_ID" >> $GITHUB_OUTPUT

          if [ "$KEY_COUNT" -gt 1 ]; then
            echo "⚠️  WARNING: Found $KEY_COUNT active keys (expected 1 or 2)"
          fi

      - name: Create new IAM access key
        id: new_key
        run: |
          # Create new key for dual-credentials period
          NEW_KEY=$(aws iam create-access-key --user-name algo-developer --output json)
          NEW_ACCESS_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.AccessKeyId')
          NEW_SECRET_KEY=$(echo "$NEW_KEY" | jq -r '.AccessKey.SecretAccessKey')

          # Mask credentials in logs
          echo "::add-mask::$NEW_ACCESS_KEY"
          echo "::add-mask::$NEW_SECRET_KEY"

          echo "new_access_key=$NEW_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "new_secret_key=$NEW_SECRET_KEY" >> $GITHUB_OUTPUT
          echo "Created new key: $NEW_ACCESS_KEY"

      - name: Store both keys in Secrets Manager (dual-credentials period)
        id: store_keys
        run: |
          # Store BOTH old and new credentials in Secrets Manager during grace period
          # This allows users to upgrade at their own pace
          ROTATION_DATE=$(date +%Y-%m-%d)
          CLEANUP_DATE=$(date -d "+${GRACE_PERIOD_DAYS} days" +%Y-%m-%d)

          SECRET_JSON=$(cat <<'EOF'
          {
            "access_key_id": "${{ steps.new_key.outputs.new_access_key }}",
            "secret_access_key": "${{ steps.new_key.outputs.new_secret_key }}",
            "old_access_key_id": "${{ steps.current_keys.outputs.old_key_id }}",
            "rotation_date": "'"$ROTATION_DATE"'",
            "old_key_cleanup_date": "'"$CLEANUP_DATE"'",
            "grace_period_days": "'"$GRACE_PERIOD_DAYS"'",
            "status": "dual_credentials_active"
          }
          EOF
          )

          aws secretsmanager update-secret \
            --secret-id algo/developer-credentials \
            --secret-string "$SECRET_JSON" \
            --region ${{ env.AWS_REGION }}

          echo "Stored dual-credentials in Secrets Manager"
          echo "cleanup_date=$CLEANUP_DATE" >> $GITHUB_OUTPUT

      - name: Schedule old key cleanup
        run: |
          CLEANUP_DATE=$(date -d "+${GRACE_PERIOD_DAYS} days" +%Y-%m-%d)
          CLEANUP_TIME="02:00:00"

          # Create a GitHub issue to track old key cleanup (reminder to run cleanup workflow)
          gh issue create \
            --title "Clean up old developer credentials ($(date -d "+${GRACE_PERIOD_DAYS} days" +%m-%d))" \
            --body "On $CLEANUP_DATE at $CLEANUP_TIME ET, run \`.github/workflows/cleanup-old-credentials.yml\` to delete old key: ${{ steps.current_keys.outputs.old_key_id }}" \
            --labels "security,rotation" \
            --repo "$GITHUB_REPOSITORY" || true

      - name: Notify developers
        run: |
          ROTATION_DATE=$(date +%Y-%m-%d)
          CLEANUP_DATE=$(date -d "+${GRACE_PERIOD_DAYS} days" +%Y-%m-%d)

          # Post summary with instructions
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Developer Credentials Rotation Started

          **Status:** Dual-credentials period active (both old and new keys are valid)

          **Timeline:**
          - **Rotation Date:** $ROTATION_DATE
          - **Grace Period:** $GRACE_PERIOD_DAYS days
          - **Old Key Cleanup:** $CLEANUP_DATE (after grace period)

          **What changed:**
          - ✓ New IAM access key created: `${{ steps.new_key.outputs.new_access_key }}`
          - ✓ Credentials updated in AWS Secrets Manager
          - ✓ Old key remains active during grace period

          **For developers:**
          1. Run `scripts/refresh-aws-credentials.ps1` to get the new credentials
          2. You have $GRACE_PERIOD_DAYS days to update your local credentials
          3. After $CLEANUP_DATE, old key will be deleted

          **Verification:**
          - Check that your new credentials work: `aws sts get-caller-identity --profile algo-developer`
          - If problems occur, switch back to old credentials (both are valid during grace period)

          **Next step:** On $CLEANUP_DATE, old key will be deleted automatically
          EOF

      - name: Update Terraform state
        run: |
          git config user.name "GitHub Actions"
          git config user.email "noreply@github.com"

          # Update rotation date in Terraform (triggers CI/CD to verify)
          ROTATION_DATE=$(date +%Y-%m-%d)
          sed -i "s/developer_key_rotation_date = .*/developer_key_rotation_date = \"$ROTATION_DATE\"/" terraform.tfvars

          git add terraform.tfvars
          git commit -m "chore: Mark developer credentials rotated on $ROTATION_DATE" || echo "No changes to commit"
          git push || echo "Failed to push, may have no new commits"

  schedule-old-key-cleanup:
    # Schedule the cleanup workflow to run after the grace period
    name: Schedule Old Key Cleanup
    runs-on: ubuntu-latest
    needs: rotate-and-create-grace-period
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f677139edd7e1a88de8eca0c779ba8c1bcb14f1f  # v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Get cleanup date from secrets
        id: cleanup
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo/developer-credentials \
            --region us-east-1 \
            --query SecretString \
            --output text)

          CLEANUP_DATE=$(echo "$SECRET" | python3 -c "import json, sys; print(json.load(sys.stdin).get('old_key_cleanup_date', ''))")
          OLD_KEY=$(echo "$SECRET" | python3 -c "import json, sys; print(json.load(sys.stdin).get('old_access_key_id', ''))")

          echo "cleanup_date=$CLEANUP_DATE" >> $GITHUB_OUTPUT
          echo "old_key=$OLD_KEY" >> $GITHUB_OUTPUT

      - name: Create cleanup reminder
        run: |
          echo "Old key cleanup scheduled for: ${{ steps.cleanup.outputs.cleanup_date }}"
          echo "Old key ID to delete: ${{ steps.cleanup.outputs.old_key }}"
