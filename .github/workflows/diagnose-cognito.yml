name: Diagnose Cognito
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1
      - name: List all users
        run: |
          echo "=== All Users in Pool ==="
          aws cognito-idp list-users --user-pool-id us-east-1_XJpLb9SKX --region us-east-1 --output json | jq -r '.Users[] | "\(.Username) | Status: \(.UserStatus) | Email: \([.Attributes[] | select(.Name=="email") | .Value] | join(","))"'

          echo ""
          echo "=== App Client Config ==="
          aws cognito-idp describe-user-pool-client \
            --user-pool-id us-east-1_XJpLb9SKX \
            --client-id 6smb0vrcidd9kvhju2kn2a3qrl \
            --region us-east-1 | jq '{ClientName: .UserPoolClient.ClientName, ExplicitAuthFlows: .UserPoolClient.ExplicitAuthFlows, PreventUserExistenceErrors: .UserPoolClient.PreventUserExistenceErrors}'
