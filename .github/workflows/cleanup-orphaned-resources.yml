name: Cleanup orphaned resources

# One-shot recovery workflow. Use this when CloudFormation gets stuck in
# UPDATE_ROLLBACK_COMPLETE because resources exist outside the stack.
#
# What it does:
# 1. Force-delete the ECR repo `stocks-app-registry` (orphaned, blocks core stack)
# 2. Optionally delete the entire core stack and dependents for a clean redeploy
#
# Trigger manually via the Actions tab.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to clean up'
        required: true
        default: 'orphaned-ecr'
        type: choice
        options:
          - orphaned-ecr
          - all-stacks
          - bastion-only
          - create-ecr-repo

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Show pre-cleanup state
        run: |
          echo "=== ECR repos with 'stocks' in name ==="
          aws ecr describe-repositories \
            --query "repositories[?contains(repositoryName, 'stocks')].[repositoryName,createdAt,repositoryUri]" \
            --output table 2>/dev/null || echo "(none / no permission)"

          echo ""
          echo "=== CloudFormation stacks ==="
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE CREATE_FAILED ROLLBACK_COMPLETE \
            --query "StackSummaries[?contains(StackName, 'stocks')].[StackName,StackStatus,LastUpdatedTime]" \
            --output table

      - name: Recreate ECR repo stocks-app-registry (matches StocksCore-ContainerRepositoryUri)
        if: ${{ inputs.action == 'create-ecr-repo' }}
        run: |
          REPO=stocks-app-registry
          if aws ecr describe-repositories --repository-names $REPO --region us-east-1 2>/dev/null; then
            echo "Repo $REPO already exists - nothing to do"
          else
            echo "Creating $REPO..."
            aws ecr create-repository \
              --repository-name $REPO \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE \
              --region us-east-1
            echo "Adding lifecycle policy..."
            aws ecr put-lifecycle-policy \
              --repository-name $REPO --region us-east-1 \
              --lifecycle-policy-text '{"rules":[{"rulePriority":1,"selection":{"tagStatus":"any","countType":"sinceImagePushed","countUnit":"days","countNumber":30},"action":{"type":"expire"}}]}'
            echo "Done"
          fi

      - name: Scale bastion ASG to 0 + terminate instances (free CFN from waiting)
        if: ${{ inputs.action == 'bastion-only' || inputs.action == 'all-stacks' }}
        run: |
          ASG=stocks-bastion-asg
          if aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names $ASG --region us-east-1 --query 'AutoScalingGroups[0].AutoScalingGroupName' --output text 2>/dev/null | grep -q $ASG; then
            echo "Setting $ASG MinSize=0, DesiredCapacity=0..."
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name $ASG \
              --min-size 0 --desired-capacity 0 --region us-east-1

            INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names $ASG --region us-east-1 \
              --query 'AutoScalingGroups[0].Instances[].InstanceId' --output text)
            for id in $INSTANCES; do
              echo "Terminating bastion instance $id (decrement-capacity)..."
              aws autoscaling terminate-instance-in-auto-scaling-group \
                --instance-id $id --should-decrement-desired-capacity \
                --region us-east-1 || true
            done
            echo "Bastion scaled down."
          else
            echo "ASG $ASG does not exist - nothing to do"
          fi

      - name: Delete orphaned ECR repo (force, including images)
        if: ${{ inputs.action == 'orphaned-ecr' || inputs.action == 'all-stacks' }}
        run: |
          REPO=stocks-app-registry
          if aws ecr describe-repositories --repository-names $REPO 2>/dev/null; then
            echo "Repo $REPO exists. Listing image count..."
            COUNT=$(aws ecr list-images --repository-name $REPO --query 'length(imageIds)' --output text)
            echo "Image count: $COUNT"

            echo "Force-deleting (deletes all images too)..."
            aws ecr delete-repository --repository-name $REPO --force
            echo "Deleted"
          else
            echo "Repo $REPO does not exist - nothing to clean"
          fi

      - name: Full nuke - delete all stacks in dependency order
        if: ${{ inputs.action == 'all-stacks' }}
        run: |
          # RDS instance has DeletionPolicy: Retain in template-app-stocks.yml,
          # so the database is preserved even when the stack is deleted.
          # Bucket data and Cognito users are also retained where appropriate.

          delete_stack() {
            local name=$1
            local status
            status=$(aws cloudformation describe-stacks --stack-name "$name" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NOT_FOUND)
            if [[ "$status" == "NOT_FOUND" ]]; then
              echo "  $name: already gone"
              return 0
            fi
            echo "  $name: status=$status, deleting..."
            aws cloudformation delete-stack --stack-name "$name"
            aws cloudformation wait stack-delete-complete --stack-name "$name" 2>/dev/null || \
              echo "  $name: wait failed (may need manual review)"
          }

          # Delete in reverse dependency order
          echo "1. Deleting webapp stack..."
          delete_stack stocks-webapp-dev

          echo "2. Deleting algo orchestrator stack..."
          delete_stack stocks-algo-dev

          echo "3. Deleting loaders stack..."
          delete_stack stocks-loaders

          echo "4. Deleting data infrastructure stack (RDS Retained)..."
          delete_stack stocks-data

          echo "5. Deleting core stack..."
          delete_stack stocks-core

          echo ""
          echo "All stacks deleted. RDS instance is retained (DeletionPolicy: Retain)."
          echo "Run deploy-core.yml, deploy-data-infrastructure.yml, deploy-loaders.yml, deploy-webapp.yml,"
          echo "and deploy-algo.yml workflows in that order to rebuild."

      - name: Show post-cleanup state
        if: always()
        run: |
          echo "=== ECR repos remaining ==="
          aws ecr describe-repositories \
            --query "repositories[?contains(repositoryName, 'stocks')].[repositoryName,createdAt]" \
            --output table 2>/dev/null || echo "(none)"

          echo ""
          echo "=== CloudFormation stacks remaining ==="
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE CREATE_FAILED ROLLBACK_COMPLETE DELETE_IN_PROGRESS \
            --query "StackSummaries[?contains(StackName, 'stocks')].[StackName,StackStatus]" \
            --output table
