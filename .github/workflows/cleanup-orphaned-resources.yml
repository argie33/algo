name: Cleanup Orphaned AWS Resources

# Cleanup of resources not tracked by Terraform:
# - 3 orphaned API Gateways (no Lambda integration or dead function)
# - 2 orphaned CloudFront distributions (wrong bucket or duplicate)
# - 2 orphaned VPCs (Terraform state resets created duplicates of algo-vpc)
# Run manually when needed.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list resources, do not delete)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  cleanup:
    name: Delete Orphaned Resources
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete orphaned API Gateways
        run: |
          echo "=== Deleting orphaned API Gateways ==="
          # 0rtigbknv7 = stocks-api-dev, no integration
          # kx4kprv8ph = stocks-api-dev, points to deleted Lambda
          # op4dn7xw6j = algo-api-dev, no integration
          # KEEP: 2iqq1qhltj = algo-api-dev, active Lambda integration
          for id in 0rtigbknv7 kx4kprv8ph op4dn7xw6j; do
            echo "Deleting API $id..."
            aws apigatewayv2 delete-api --api-id "$id" --region "$AWS_REGION" \
              && echo "Deleted $id" \
              || echo "Failed or already gone: $id"
          done

      - name: Disable orphaned CloudFront distributions
        run: |
          echo "=== Disabling orphaned CloudFront distributions ==="
          # E3NC0ID0ZU3VFB = stocks-frontend bucket (bucket doesn't exist)
          # E27ULN4TX590K2 = duplicate algo-frontend, Access Denied
          # KEEP: ECRSHO2MC57BZ = active algo-frontend with OAC
          for dist_id in E3NC0ID0ZU3VFB E27ULN4TX590K2; do
            echo "Disabling CloudFront $dist_id..."
            ETAG=$(aws cloudfront get-distribution-config --id "$dist_id" --query 'ETag' --output text 2>/dev/null || true)
            if [ -z "$ETAG" ] || [ "$ETAG" = "None" ]; then
              echo "  $dist_id not found or already deleted"
              continue
            fi
            aws cloudfront get-distribution-config --id "$dist_id" \
              | jq '.DistributionConfig | .Enabled = false' \
              > /tmp/dist_config.json
            aws cloudfront update-distribution \
              --id "$dist_id" \
              --distribution-config file:///tmp/dist_config.json \
              --if-match "$ETAG" \
              --query 'Distribution.Status' --output text \
              && echo "Disabled $dist_id" \
              || echo "Failed to disable $dist_id"
          done

      - name: Wait for CloudFront disables to propagate
        run: |
          echo "Waiting up to 10 min for CloudFront distributions to finish deploying..."
          for dist_id in E3NC0ID0ZU3VFB E27ULN4TX590K2; do
            for i in $(seq 1 20); do
              STATUS=$(aws cloudfront get-distribution --id "$dist_id" \
                --query 'Distribution.Status' --output text 2>/dev/null || echo "NotFound")
              echo "  $dist_id: $STATUS"
              if [ "$STATUS" = "Deployed" ] || [ "$STATUS" = "NotFound" ]; then
                break
              fi
              sleep 30
            done
          done

      - name: Delete disabled CloudFront distributions
        run: |
          echo "=== Deleting disabled CloudFront distributions ==="
          for dist_id in E3NC0ID0ZU3VFB E27ULN4TX590K2; do
            ETAG=$(aws cloudfront get-distribution --id "$dist_id" \
              --query 'ETag' --output text 2>/dev/null || true)
            if [ -z "$ETAG" ] || [ "$ETAG" = "None" ]; then
              echo "  $dist_id not found"
              continue
            fi
            ENABLED=$(aws cloudfront get-distribution --id "$dist_id" \
              --query 'Distribution.DistributionConfig.Enabled' --output text 2>/dev/null || echo "true")
            if [ "$ENABLED" = "True" ]; then
              echo "  $dist_id still enabled, cannot delete"
              continue
            fi
            aws cloudfront delete-distribution --id "$dist_id" --if-match "$ETAG" \
              && echo "Deleted $dist_id" \
              || echo "Failed to delete $dist_id"
          done

      - name: Delete orphaned VPCs
        run: |
          # Authoritative VPC: the one containing RDS (algo-db-subnet-group)
          KEEP_VPC=$(aws rds describe-db-subnet-groups \
            --db-subnet-group-name algo-db-subnet-group \
            --query 'DBSubnetGroups[0].VpcId' --output text 2>/dev/null || echo "")
          echo "Keeping VPC (has RDS): $KEEP_VPC"

          ALL_VPCS=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=algo-vpc" \
            --query 'Vpcs[*].VpcId' --output text 2>/dev/null || echo "")

          for VPC_ID in $ALL_VPCS; do
            if [ "$VPC_ID" = "$KEEP_VPC" ]; then
              echo "KEEP $VPC_ID (active RDS VPC)"
              continue
            fi
            echo "ORPHAN $VPC_ID — will delete all resources inside"

            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "  [DRY RUN] Would delete subnets, route tables, IGWs, SGs, VPC for $VPC_ID"
              aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'Subnets[*].SubnetId' --output text 2>/dev/null
              continue
            fi

            # Delete subnets
            for SN in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'Subnets[*].SubnetId' --output text 2>/dev/null); do
              aws ec2 delete-subnet --subnet-id "$SN" 2>/dev/null && echo "  Deleted subnet $SN"
            done

            # Detach and delete internet gateways
            for IGW in $(aws ec2 describe-internet-gateways \
                --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
                --query 'InternetGateways[*].InternetGatewayId' --output text 2>/dev/null); do
              aws ec2 detach-internet-gateway --internet-gateway-id "$IGW" --vpc-id "$VPC_ID" 2>/dev/null
              aws ec2 delete-internet-gateway --internet-gateway-id "$IGW" 2>/dev/null && echo "  Deleted IGW $IGW"
            done

            # Delete non-main route tables
            for RT in $(aws ec2 describe-route-tables \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'RouteTables[?Associations[?Main==`false`] || !Associations].RouteTableId' \
                --output text 2>/dev/null); do
              aws ec2 delete-route-table --route-table-id "$RT" 2>/dev/null && echo "  Deleted route table $RT"
            done

            # Delete non-default security groups
            for SG in $(aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
                --output text 2>/dev/null); do
              aws ec2 delete-security-group --group-id "$SG" 2>/dev/null && echo "  Deleted SG $SG"
            done

            # Delete VPC itself
            aws ec2 delete-vpc --vpc-id "$VPC_ID" 2>/dev/null \
              && echo "  ✓ Deleted VPC $VPC_ID" \
              || echo "  ❌ Failed to delete VPC $VPC_ID (may still have dependencies)"
          done

      - name: Summary
        if: always()
        run: |
          echo "## Cleanup Complete (dry_run=${{ inputs.dry_run }})" >> "$GITHUB_STEP_SUMMARY"
          echo "### Remaining VPCs tagged algo-vpc" >> "$GITHUB_STEP_SUMMARY"
          aws ec2 describe-vpcs --filters "Name=tag:Name,Values=algo-vpc" \
            --query 'Vpcs[*].{VpcId:VpcId,State:State}' --output table >> "$GITHUB_STEP_SUMMARY" || true
          echo "### Remaining API Gateways" >> "$GITHUB_STEP_SUMMARY"
          aws apigatewayv2 get-apis --region "$AWS_REGION" \
            --query "Items[*].[ApiId,Name]" --output table >> "$GITHUB_STEP_SUMMARY" || true
          echo "### Remaining CloudFront Distributions" >> "$GITHUB_STEP_SUMMARY"
          aws cloudfront list-distributions \
            --query "DistributionList.Items[*].[Id,DomainName,Enabled]" \
            --output table >> "$GITHUB_STEP_SUMMARY" || true
