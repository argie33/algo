name: Bootstrap OIDC Provider & Deploy Role

on:
  workflow_dispatch:
  workflow_call:


permissions:
  # no OIDC here
  contents: read

jobs:
  create_oidc_and_role:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for the CFN template)
        uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy bootstrap CloudFormation
        run: |
          set -x  # Debug output

          echo "=== AWS Setup ==="
          aws --version
          echo "Region: us-east-1"
          echo "Account:"
          aws sts get-caller-identity

          echo ""
          echo "=== Template Validation ==="
          if ! aws cloudformation validate-template \
            --template-body file://template-bootstrap.yml \
            --region us-east-1; then
            echo "ERROR: Template validation failed"
            exit 1
          fi

          echo ""
          echo "=== CloudFormation Deploy ==="
          if ! aws cloudformation deploy \
            --stack-name stocks-oidc \
            --template-file template-bootstrap.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region us-east-1; then
            echo "ERROR: CloudFormation deploy failed"
            echo "Checking stack status..."
            aws cloudformation describe-stacks \
              --stack-name stocks-oidc \
              --region us-east-1 2>&1 || echo "Stack may not exist"
            exit 1
          fi

          echo "✅ Bootstrap deployment complete"
