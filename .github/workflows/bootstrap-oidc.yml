name: Bootstrap OIDC

on:
  workflow_dispatch:
  workflow_call:

env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    name: Create OIDC Provider
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create OIDC Provider if not exists
        run: |
          echo "Checking for GitHub OIDC Provider..."
          aws iam create-open-id-connect-provider \
            --url https://token.actions.githubusercontent.com \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 1b511abead59c6ce207077c0bf4113469e1f0b03 \
            2>/dev/null || echo "✓ OIDC provider already exists"

      - name: Get OIDC Provider ARN
        id: oidc
        run: |
          ARN=$(aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[0].OpenIDConnectProviderArn' --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Verify OIDC Setup
        run: |
          echo "✓ OIDC Provider setup complete"
          echo ""
          echo "OIDC Provider ARN:"
          aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[0].OpenIDConnectProviderArn' --output text
          echo ""
          echo "⚠️  GitHub Actions IAM role will be created by Terraform IAM module"
          echo "   Role name: stocks-svc-github-actions-{environment}"
          echo "   This ensures proper least-privilege management via IaC"
