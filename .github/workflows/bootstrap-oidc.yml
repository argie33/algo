name: Bootstrap OIDC

on:
  workflow_dispatch:
  
env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    name: Create OIDC Provider & Role
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create OIDC Provider
        run: |
          echo "Creating GitHub OIDC Provider..."
          
          PROVIDER=$(aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[0].OpenIDConnectProviderArn' --output text 2>/dev/null || echo "NONE")
          
          if [ "$PROVIDER" = "NONE" ]; then
            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 1b511abead59c6ce207077c0bf4113469e1f0b03
            echo "✅ OIDC Provider created"
          else
            echo "✅ OIDC Provider exists: $PROVIDER"
          fi

      - name: Create GitHub Actions Role
        run: |
          echo "Creating github-actions-role..."
          
          if aws iam get-role --role-name github-actions-role 2>/dev/null; then
            echo "✅ Role already exists"
          else
            OIDC_ARN=$(aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[0].OpenIDConnectProviderArn' --output text)
            
            TRUST='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Federated":"'$OIDC_ARN'"},"Action":"sts:AssumeRoleWithWebIdentity","Condition":{"StringEquals":{"token.actions.githubusercontent.com:aud":"sts.amazonaws.com"},"StringLike":{"token.actions.githubusercontent.com:sub":"repo:argie33/algo:*"}}}]}'
            
            echo "$TRUST" > /tmp/trust.json
            
            aws iam create-role \
              --role-name github-actions-role \
              --assume-role-policy-document file:///tmp/trust.json
            
            echo "✅ Role created"
          fi

      - name: Attach Permissions
        run: |
          POLICY='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["iam:*","ec2:*","rds:*","ecs:*","ecr:*","lambda:*","apigateway:*","cloudfront:*","cognito-idp:*","s3:*","dynamodb:*","secretsmanager:*","cloudwatch:*","logs:*","events:*","scheduler:*","sns:*","kms:*","cloudformation:*","autoscaling:*"],"Resource":"*"}]}'
          
          echo "$POLICY" > /tmp/policy.json
          
          aws iam put-role-policy \
            --role-name github-actions-role \
            --policy-name terraform-deployment \
            --policy-document file:///tmp/policy.json
          
          echo "✅ Permissions attached"

      - name: Verify
        run: |
          echo "OIDC ARN:"
          aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[0].OpenIDConnectProviderArn' --output text
          echo ""
          echo "Role ARN:"
          aws iam get-role --role-name github-actions-role --query 'Role.Arn' --output text
          echo ""
          echo "✅ OIDC Bootstrap Ready!"

      - name: Summary
        run: |
          echo "## ✅ OIDC Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "OIDC provider and github-actions-role ready for Terraform!" >> $GITHUB_STEP_SUMMARY
