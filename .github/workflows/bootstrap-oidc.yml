name: Bootstrap OIDC Provider & Deploy Role

on:
  workflow_dispatch:
  workflow_call:


permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  create_oidc_and_role:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for the CFN template)
        uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys for bootstrap)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete CloudFormation validation hooks (if any)
        run: |
          echo "=== Removing validation hooks ==="
          HOOKS=$(aws cloudformation list-hooks --region us-east-1 --query 'Hooks[*].HookId' --output text 2>/dev/null || echo "")

          if [[ ! -z "$HOOKS" ]]; then
            echo "Found hooks: $HOOKS"
            for HOOK_ID in $HOOKS; do
              echo "Deactivating hook: $HOOK_ID"
              aws cloudformation deactivate-hook --hook-id "$HOOK_ID" --region us-east-1 2>/dev/null || echo "Could not deactivate (may already be inactive)"
            done
          else
            echo "No active hooks found"
          fi

      - name: Delete stuck bootstrap stack if needed
        run: |
          echo "=== Checking for stuck stacks ==="
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name stocks-oidc \
            --region us-east-1 \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STATUS"

          if [[ "$STATUS" == "ROLLBACK_COMPLETE" || "$STATUS" == "CREATE_FAILED" ]]; then
            echo "Stack in bad state ($STATUS). Deleting to start fresh..."
            aws cloudformation delete-stack \
              --stack-name stocks-oidc \
              --region us-east-1

            echo "Waiting for stack deletion..."
            aws cloudformation wait stack-delete-complete \
              --stack-name stocks-oidc \
              --region us-east-1 2>/dev/null || echo "Deletion in progress"
            echo "Stack cleanup complete"
          else
            echo "Stack in healthy state: $STATUS"
          fi

      - name: Deploy bootstrap CloudFormation
        run: |
          set -x  # Debug output

          echo "=== AWS Setup ==="
          aws --version
          echo "Region: us-east-1"
          echo "Account:"
          aws sts get-caller-identity

          echo ""
          echo "=== Template Validation ==="
          if ! aws cloudformation validate-template \
            --template-body file://template-bootstrap.yml \
            --region us-east-1; then
            echo "ERROR: Template validation failed"
            exit 1
          fi

          echo ""
          echo "=== CloudFormation Deploy ==="
          if ! aws cloudformation deploy \
            --stack-name stocks-oidc \
            --template-file template-bootstrap.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region us-east-1; then
            echo ""
            echo "ERROR: CloudFormation deploy failed"
            echo "Getting detailed stack events..."
            echo ""
            aws cloudformation describe-stack-events \
              --stack-name stocks-oidc \
              --region us-east-1 \
              --query 'StackEvents[*].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]' \
              --output table 2>&1 || echo "Could not retrieve events"
            echo ""
            echo "Stack status:"
            aws cloudformation describe-stacks \
              --stack-name stocks-oidc \
              --region us-east-1 \
              --query 'Stacks[0].[StackStatus,StackStatusReason]' \
              --output table 2>&1 || echo "Stack may not exist"
            exit 1
          fi

          echo "✅ Bootstrap deployment complete"
