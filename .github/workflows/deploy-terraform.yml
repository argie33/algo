name: Deploy Infrastructure with Terraform

on:
  push:
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy-terraform.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure instead of deploying'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO
  AWS_ACCOUNT_ID: '626216981288'

jobs:
  # Pre-flight checks
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials for pre-flight checks
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify AWS credentials and account limits
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ Missing secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ Missing secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ Missing secret: DB_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.NOTIFICATION_EMAIL }}" ]; then
            echo "❌ Missing secret: NOTIFICATION_EMAIL"
            exit 1
          fi

          echo "✓ AWS credentials configured"
          echo "✓ DB password configured"
          echo "✓ Notification email configured"

          # Check for existing stocks-vpc to reuse (if at VPC limit)
          STOCKS_VPC=$(aws ec2 describe-vpcs --region us-east-1 --filters "Name=tag:Name,Values=stocks-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")

          if [ -n "$STOCKS_VPC" ] && [ "$STOCKS_VPC" != "None" ]; then
            echo "✓ Found existing stocks-vpc to reuse: $STOCKS_VPC"
          else
            # Check VPC limit only if no existing stocks-vpc
            VPC_COUNT=$(aws ec2 describe-vpcs --region us-east-1 --query 'length(Vpcs)' --output text)
            echo "✓ Current VPC count in us-east-1: $VPC_COUNT/5"

            if [ "$VPC_COUNT" -ge 5 ]; then
              echo ""
              echo "⚠ At VPC limit (5/5). Checking for existing stocks-vpc to reuse..."
              STOCKS_VPCS=$(aws ec2 describe-vpcs --region us-east-1 --filters "Name=cidr,Values=10.*" --query 'Vpcs[*].[VpcId,CidrBlock]' --output text)
              if [ -z "$STOCKS_VPCS" ]; then
                echo "❌ No reusable VPCs found. Manual action required."
                exit 1
              fi
              echo "✓ Will reuse existing VPC"
            fi
          fi

  # Plan Terraform changes
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: pre-flight
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create backend infrastructure (S3 + DynamoDB)
        run: |
          aws s3 mb s3://terraform-state 2>/dev/null || echo "✓ S3 bucket exists"
          aws dynamodb create-table \
            --table-name terraform-lock \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region us-east-1 2>/dev/null || echo "✓ DynamoDB table exists"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend-config.hcl

      - name: Import existing resources into Terraform state
        working-directory: terraform
        run: |
          echo "Importing pre-existing AWS resources into Terraform state..."

          # Import OIDC Provider (if it exists, import succeeds; if not, error is harmless for apply)
          terraform import module.bootstrap[0].aws_iam_openid_connect_provider.github https://token.actions.githubusercontent.com 2>/dev/null || echo "⚠ OIDC provider not found or already in state (OK)"

          # Import other pre-existing resources
          terraform import module.data_infrastructure[0].aws_db_subnet_group.main stocks-db-subnet-group 2>/dev/null || echo "⚠ DB subnet group not found or already in state (OK)"
          terraform import module.data_infrastructure[0].aws_iam_role.ecs_task_execution_role stocks-ecs-task-execution-role 2>/dev/null || echo "⚠ ECS task role not found or already in state (OK)"
          terraform import module.data_infrastructure[0].aws_sns_topic.alerts arn:aws:sns:us-east-1:${{ env.AWS_ACCOUNT_ID }}:stocks-alerts 2>/dev/null || echo "⚠ SNS topic not found or already in state (OK)"

          echo "✓ Import phase complete (existing resources now managed by Terraform)"

      - name: Detect existing VPC for reuse
        id: vpc-detection
        run: |
          # Try to find an existing stocks-vpc to reuse if at limit
          STOCKS_VPC=$(aws ec2 describe-vpcs --region us-east-1 --filters "Name=tag:Name,Values=stocks-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          VPC_COUNT=$(aws ec2 describe-vpcs --region us-east-1 --query 'length(Vpcs)' --output text)

          if [ "$VPC_COUNT" -ge 5 ] && [ -n "$STOCKS_VPC" ] && [ "$STOCKS_VPC" != "None" ]; then
            echo "create_vpc=false" >> $GITHUB_OUTPUT
            echo "vpc_id=$STOCKS_VPC" >> $GITHUB_OUTPUT
            # Get subnets from existing VPC
            PRIVATE_SUBNETS=$(aws ec2 describe-subnets --region us-east-1 --filters "Name=vpc-id,Values=$STOCKS_VPC" "Name=cidr-block,Values=10.1.1*" --query 'Subnets[*].SubnetId' --output text)
            echo "private_subnets=$PRIVATE_SUBNETS" >> $GITHUB_OUTPUT
            echo "✓ Will reuse existing VPC: $STOCKS_VPC"
          else
            echo "create_vpc=true" >> $GITHUB_OUTPUT
            echo "vpc_id=" >> $GITHUB_OUTPUT
            echo "private_subnets=" >> $GITHUB_OUTPUT
            echo "✓ Will create new VPC"
          fi

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
          TF_VAR_create_vpc: ${{ steps.vpc-detection.outputs.create_vpc }}
          TF_VAR_vpc_id: ${{ steps.vpc-detection.outputs.vpc_id }}
          TF_VAR_existing_private_subnet_ids: ${{ steps.vpc-detection.outputs.private_subnets }}
          TF_VAR_deploy_bootstrap: true
          TF_VAR_deploy_core: true
          TF_VAR_deploy_data_infrastructure: true
          TF_VAR_deploy_loaders: true
          TF_VAR_deploy_webapp: true
          TF_VAR_deploy_algo: true
        run: terraform plan -out=tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\nTerraform Plan Output:\n' + plan + '\n```'
            });

  # Apply Terraform changes
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [pre-flight, plan]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect existing VPC for apply
        id: vpc-detection-apply
        run: |
          STOCKS_VPC=$(aws ec2 describe-vpcs --region us-east-1 --filters "Name=tag:Name,Values=stocks-vpc" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          VPC_COUNT=$(aws ec2 describe-vpcs --region us-east-1 --query 'length(Vpcs)' --output text)

          if [ "$VPC_COUNT" -ge 5 ] && [ -n "$STOCKS_VPC" ] && [ "$STOCKS_VPC" != "None" ]; then
            echo "create_vpc=false" >> $GITHUB_OUTPUT
            echo "vpc_id=$STOCKS_VPC" >> $GITHUB_OUTPUT
            PRIVATE_SUBNETS=$(aws ec2 describe-subnets --region us-east-1 --filters "Name=vpc-id,Values=$STOCKS_VPC" "Name=cidr-block,Values=10.1.1*" --query 'Subnets[*].SubnetId' --output text)
            echo "private_subnets=$PRIVATE_SUBNETS" >> $GITHUB_OUTPUT
          else
            echo "create_vpc=true" >> $GITHUB_OUTPUT
            echo "vpc_id=" >> $GITHUB_OUTPUT
            echo "private_subnets=" >> $GITHUB_OUTPUT
          fi

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend-config.hcl

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
          TF_VAR_create_vpc: ${{ steps.vpc-detection-apply.outputs.create_vpc }}
          TF_VAR_vpc_id: ${{ steps.vpc-detection-apply.outputs.vpc_id }}
          TF_VAR_existing_private_subnet_ids: ${{ steps.vpc-detection-apply.outputs.private_subnets }}
          TF_VAR_deploy_bootstrap: true
          TF_VAR_deploy_core: true
          TF_VAR_deploy_data_infrastructure: true
          TF_VAR_deploy_loaders: true
          TF_VAR_deploy_webapp: true
          TF_VAR_deploy_algo: true
        run: |
          echo "Applying Terraform changes..."
          terraform apply -no-color tfplan
          echo ""
          echo "✅ Infrastructure deployed successfully"

      - name: Export outputs
        working-directory: terraform
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: `\(.value.value)`"' >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Terraform infrastructure deployed successfully'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Destroy infrastructure (manual trigger only)
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform plan -destroy -out=tfplan_destroy -no-color

      - name: Confirm destruction
        run: |
          echo "⚠️  WARNING: This will DESTROY all infrastructure"
          echo "Press Ctrl+C to cancel (you have 10 seconds)"
          sleep 10

      - name: Terraform destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform destroy -auto-approve -no-color tfplan_destroy

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: '⚠️  Terraform infrastructure DESTROYED',
              attachments: [{
                color: 'warning',
                text: 'All AWS resources have been deleted'
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
