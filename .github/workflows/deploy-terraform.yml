name: Deploy Infrastructure with Terraform

on:
  push:
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy-terraform.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure instead of deploying'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO

jobs:
  # Pre-flight checks
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.vars.outputs.aws_account_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract variables from secrets
        id: vars
        run: |
          echo "aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_OUTPUT
          echo "✓ AWS Account ID configured"

      - name: Verify required secrets
        run: |
          required_secrets=(
            "AWS_ACCOUNT_ID"
            "DB_PASSWORD"
            "NOTIFICATION_EMAIL"
          )
          for secret in "${required_secrets[@]}"; do
            if [ -z "${{ secrets[secret] }}" ]; then
              echo "❌ Missing secret: $secret"
              exit 1
            fi
          done
          echo "✓ All required secrets present"

  # Plan Terraform changes
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: pre-flight
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/stocks-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform plan -out=tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\nTerraform Plan Output:\n' + plan + '\n```'
            });

  # Apply Terraform changes (manual approval required)
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [pre-flight, plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      approval_required: false  # Change to true to require manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/stocks-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-apply

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: |
          echo "Applying Terraform changes..."
          terraform apply -no-color tfplan
          echo ""
          echo "✅ Infrastructure deployed successfully"

      - name: Export outputs
        working-directory: terraform
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: `\(.value.value)`"' >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Terraform infrastructure deployed successfully'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Destroy infrastructure (manual trigger only)
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true'
    environment:
      name: production
      approval_required: true  # Always require approval for destroy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/stocks-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-destroy

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform plan -destroy -out=tfplan_destroy -no-color

      - name: Confirm destruction
        run: |
          echo "⚠️  WARNING: This will DESTROY all infrastructure"
          echo "Press Ctrl+C to cancel (you have 10 seconds)"
          sleep 10

      - name: Terraform destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform destroy -auto-approve -no-color tfplan_destroy

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: '⚠️  Terraform infrastructure DESTROYED',
              attachments: [{
                color: 'warning',
                text: 'All AWS resources have been deleted'
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
