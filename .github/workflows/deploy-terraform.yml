name: Deploy Infrastructure with Terraform

on:
  push:
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy-terraform.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure instead of deploying'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO
  AWS_ACCOUNT_ID: '626216981288'

jobs:
  # Pre-flight checks
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify AWS credentials
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ Missing secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ Missing secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ Missing secret: DB_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.NOTIFICATION_EMAIL }}" ]; then
            echo "❌ Missing secret: NOTIFICATION_EMAIL"
            exit 1
          fi
          echo "✓ AWS credentials configured"
          echo "✓ DB password configured"
          echo "✓ Notification email configured"

  # Plan Terraform changes
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: pre-flight
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
          TF_VAR_deploy_bootstrap: true
          TF_VAR_deploy_core: true
          TF_VAR_deploy_data_infrastructure: true
          TF_VAR_deploy_loaders: true
          TF_VAR_deploy_webapp: true
          TF_VAR_deploy_algo: true
        run: terraform plan -out=tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\nTerraform Plan Output:\n' + plan + '\n```'
            });

  # Apply Terraform changes
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [pre-flight, plan]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
          TF_VAR_deploy_bootstrap: true
          TF_VAR_deploy_core: true
          TF_VAR_deploy_data_infrastructure: true
          TF_VAR_deploy_loaders: true
          TF_VAR_deploy_webapp: true
          TF_VAR_deploy_algo: true
        run: |
          echo "Applying Terraform changes..."
          terraform apply -no-color tfplan
          echo ""
          echo "✅ Infrastructure deployed successfully"

      - name: Export outputs
        working-directory: terraform
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: `\(.value.value)`"' >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '✅ Terraform infrastructure deployed successfully'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Destroy infrastructure (manual trigger only)
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform plan -destroy -out=tfplan_destroy -no-color

      - name: Confirm destruction
        run: |
          echo "⚠️  WARNING: This will DESTROY all infrastructure"
          echo "Press Ctrl+C to cancel (you have 10 seconds)"
          sleep 10

      - name: Terraform destroy
        working-directory: terraform
        env:
          TF_VAR_aws_account_id: ${{ env.AWS_ACCOUNT_ID }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
          TF_VAR_github_org: argeropolos
          TF_VAR_github_repo: algo
        run: terraform destroy -auto-approve -no-color tfplan_destroy

      - name: Notify Slack
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: '⚠️  Terraform infrastructure DESTROYED',
              attachments: [{
                color: 'warning',
                text: 'All AWS resources have been deleted'
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
