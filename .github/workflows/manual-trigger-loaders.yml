name: Manual Trigger Loaders (Test Data Loading)

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Which loader tier to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - tier-0
          - tier-1-prices
          - tier-2-reference
          - tier-3-metrics

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: algo-cluster

jobs:
  trigger-loaders:
    name: "Trigger Loaders (Tier: ${{ inputs.tier }})"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Get network configuration
        id: network
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=algo-vpc" \
            --region ${{ env.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "ERROR: Could not find VPC"
            exit 1
          fi
          echo "✓ VPC: $VPC_ID"

          SUBNET=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ env.AWS_REGION }} \
            --query 'Subnets[0].SubnetId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$SUBNET" ] || [ "$SUBNET" = "None" ]; then
            echo "ERROR: Could not find subnet"
            exit 1
          fi
          echo "✓ Subnet: $SUBNET"

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=tag:Name,Values=algo-ecs-tasks" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 describe-security-groups \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'SecurityGroups[0].GroupId' \
              --output text 2>/dev/null || echo "")
          fi

          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            echo "ERROR: Could not find security group"
            exit 1
          fi
          echo "✓ Security Group: $SG"

          echo "subnet=$SUBNET" >> $GITHUB_OUTPUT
          echo "sg=$SG" >> $GITHUB_OUTPUT

      - name: Run loader
        shell: bash
        run: |
          run_loader() {
            local name="$1"
            local wait_sec="${2:-0}"
            local TASK_DEF
            TASK_DEF=$(aws ecs list-task-definitions \
              --family-prefix "algo-${name}-loader" \
              --region ${{ env.AWS_REGION }} \
              --sort DESC \
              --query 'taskDefinitionArns[0]' --output text 2>/dev/null || echo "")
            if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
              echo "⚠️  Task definition not found: algo-${name}-loader (skipping)"
              return 0
            fi
            local TASK_ARN
            TASK_ARN=$(aws ecs run-task \
              --cluster ${{ env.ECS_CLUSTER }} \
              --task-definition "$TASK_DEF" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.sg }}],assignPublicIp=DISABLED}" \
              --region ${{ env.AWS_REGION }} \
              --query 'tasks[0].taskArn' --output text 2>/dev/null || echo "")
            if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
              echo "❌ Failed to start task: $name"
              return 1
            fi
            echo "✓ Started: $name ($TASK_ARN)"
            if [ "$wait_sec" -gt 0 ]; then
              echo "  Waiting up to ${wait_sec}s for completion..."
              local end=$((SECONDS + wait_sec))
              while [ $SECONDS -lt $end ]; do
                STATUS=$(aws ecs describe-tasks \
                  --cluster ${{ env.ECS_CLUSTER }} \
                  --tasks "$TASK_ARN" \
                  --region ${{ env.AWS_REGION }} \
                  --query 'tasks[0].lastStatus' --output text 2>/dev/null || echo "UNKNOWN")
                if [ "$STATUS" = "STOPPED" ]; then
                  EXIT_CODE=$(aws ecs describe-tasks \
                    --cluster ${{ env.ECS_CLUSTER }} \
                    --tasks "$TASK_ARN" \
                    --region ${{ env.AWS_REGION }} \
                    --query 'tasks[0].containers[0].exitCode' --output text 2>/dev/null || echo "1")
                  if [ "$EXIT_CODE" = "0" ]; then
                    echo "  ✓ $name completed successfully"
                  else
                    echo "  ⚠️  $name stopped with exit code: $EXIT_CODE"
                  fi
                  return 0
                fi
                sleep 15
              done
              echo "  ⏳ $name still running after ${wait_sec}s (not waiting longer)"
            fi
          }

          TIER="${{ inputs.tier }}"
          NET_CONFIG="awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.sg }}],assignPublicIp=DISABLED}"

          # ── Tier 0: Stock symbols (must complete before prices) ──────────────
          if [ "$TIER" = "all" ] || [ "$TIER" = "tier-0" ]; then
            echo "═══ Tier 0: Stock Symbols ═══"
            run_loader "stock_symbols" 600
          fi

          # ── Tier 1: Price data (parallel) ────────────────────────────────────
          if [ "$TIER" = "all" ] || [ "$TIER" = "tier-1-prices" ]; then
            echo "═══ Tier 1: Price Data ═══"
            for name in stock_prices_daily stock_prices_weekly stock_prices_monthly \
                        etf_prices_daily etf_prices_weekly etf_prices_monthly \
                        market_indices; do
              run_loader "$name" 0
            done
            echo "⏳ Waiting 30 min for price loaders..."
            sleep 1800
          fi

          # ── Tier 2: Reference / company data (parallel) ──────────────────────
          if [ "$TIER" = "all" ] || [ "$TIER" = "tier-2-reference" ]; then
            echo "═══ Tier 2: Reference Data ═══"
            for name in company_profile analyst_sentiment analyst_upgrades_downgrades \
                        earnings_history earnings_revisions earnings_surprise earnings_calendar \
                        financials_annual_income financials_annual_balance financials_annual_cashflow \
                        financials_quarterly_income financials_quarterly_balance financials_quarterly_cashflow \
                        financials_ttm_income financials_ttm_cashflow \
                        econ_data aaiidata naaim_data feargreed \
                        sectors industry_ranking seasonality; do
              run_loader "$name" 0
            done
            echo "⏳ Waiting 45 min for reference data loaders..."
            sleep 2700
          fi

          # ── Tier 3: Computed metrics (need price + financials) ───────────────
          if [ "$TIER" = "all" ] || [ "$TIER" = "tier-3-metrics" ]; then
            echo "═══ Tier 3: Computed Metrics ═══"
            for name in key_metrics growth_metrics quality_metrics value_metrics \
                        stock_scores trend_template_data; do
              run_loader "$name" 0
            done
            echo "⏳ Waiting 30 min for metrics loaders..."
            sleep 1800
          fi

          echo "✅ All requested loaders triggered"

      - name: Verify Data Loaded
        run: |
          API_URL="https://2iqq1qhltj.execute-api.us-east-1.amazonaws.com"
          echo "Testing API endpoints..."
          curl -s "$API_URL/api/health" && echo ""
          STOCKS=$(curl -s "$API_URL/api/stocks?limit=1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Stocks: {d.get(\"total\",0)}')" 2>/dev/null)
          PRICES=$(curl -s "$API_URL/api/prices/history/AAPL?limit=1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'AAPL prices: {d.get(\"total\",0)}')" 2>/dev/null)
          echo "$STOCKS | $PRICES"

      - name: Summary
        if: always()
        run: |
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          echo "Tier: ${{ inputs.tier }}"
          echo "Monitor: https://console.aws.amazon.com/ecs/v2/clusters/${{ env.ECS_CLUSTER }}/tasks?region=us-east-1"
