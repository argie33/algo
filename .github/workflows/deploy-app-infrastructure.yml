name: Deploy Infrastructure (RDS/ECS/Secrets)

on:
  push:
    branches:
      - main
    paths:
      - template-app-stocks.yml
      - .github/workflows/deploy-app-infrastructure.yml
  workflow_dispatch:

concurrency:
  group: deploy-app-infrastructure-stocks-app-stack
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: stocks-app-stack
  RDS_ID: stocks

jobs:
  deploy-infrastructure:
    name: Deploy stocks-app-stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-deploy-app-infra
          aws-region: ${{ env.AWS_REGION }}

      - name: Inspect current state (stack + orphan RDS)
        id: state
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NOT_FOUND)
          echo "stack_status=$STACK_STATUS"
          echo "stack_status=$STACK_STATUS" >> $GITHUB_OUTPUT

          RDS_EXISTS=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_ID" --region "$AWS_REGION" \
            --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo NONE)
          echo "rds_exists=$RDS_EXISTS"
          echo "rds_exists=$RDS_EXISTS" >> $GITHUB_OUTPUT

      - name: Get CloudFormation templates bucket from core stack
        id: bucket
        run: |
          CF_BUCKET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-CfTemplatesBucketName'].Value" \
            --output text --region "$AWS_REGION")
          if [ -z "$CF_BUCKET" ] || [ "$CF_BUCKET" = "None" ]; then
            echo "Core stack export StocksCore-CfTemplatesBucketName not found - core deploy must run first"
            exit 1
          fi
          echo "bucket=$CF_BUCKET" >> $GITHUB_OUTPUT

      - name: Upload template to S3 (template > 51200 bytes for inline)
        run: |
          aws s3 cp template-app-stocks.yml "s3://${{ steps.bucket.outputs.bucket }}/template-app-stocks.yml"

      - name: Path A — IMPORT existing RDS into new stack, then UPDATE to add the rest
        if: steps.state.outputs.stack_status == 'NOT_FOUND' && steps.state.outputs.rds_exists != 'NONE'
        run: |
          echo "Stack does not exist but RDS '$RDS_ID' is orphaned. Importing it into a new stack to preserve data."

          CHANGE_SET=import-rds-$(date +%s)
          # IMPORT change-sets must use a template that contains ONLY the resource being
          # imported (or the imported resource plus exactly the resources already in the
          # stack). For a brand-new stack, that means a stub template with just the RDS.
          # We then UPDATE with the full template to materialize everything else.
          cat > /tmp/import-stub.yml <<STUB
          AWSTemplateFormatVersion: '2010-09-09'
          Description: Import-only stub for stocks-app-stack (RDS only)
          Parameters:
            RDSUsername: { Type: String }
            RDSPassword: { Type: String, NoEcho: true }
          Resources:
            StocksDBInstance:
              Type: AWS::RDS::DBInstance
              DeletionPolicy: Retain
              UpdateReplacePolicy: Retain
              Properties:
                DBInstanceIdentifier: $RDS_ID
                DBName: stocks
                Engine: postgres
                DBInstanceClass: db.t3.micro
                AllocatedStorage: 61
                MasterUsername: !Ref RDSUsername
                MasterUserPassword: !Ref RDSPassword
                PubliclyAccessible: true
          STUB

          aws s3 cp /tmp/import-stub.yml \
            "s3://${{ steps.bucket.outputs.bucket }}/template-app-stocks-import-stub.yml"

          aws cloudformation create-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET" \
            --change-set-type IMPORT \
            --resources-to-import "[{\"ResourceType\":\"AWS::RDS::DBInstance\",\"LogicalResourceId\":\"StocksDBInstance\",\"ResourceIdentifier\":{\"DBInstanceIdentifier\":\"$RDS_ID\"}}]" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-app-stocks-import-stub.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
            --region "$AWS_REGION"

          echo "Waiting for change set..."
          aws cloudformation wait change-set-create-complete \
            --stack-name "$STACK_NAME" --change-set-name "$CHANGE_SET" \
            --region "$AWS_REGION"

          echo "Executing import..."
          aws cloudformation execute-change-set \
            --stack-name "$STACK_NAME" --change-set-name "$CHANGE_SET" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-import-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"
          echo "Import complete. Now updating to materialize the full template..."

          aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-app-stocks.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
              ParameterKey=FREDApiKey,ParameterValue="${{ secrets.FRED_API_KEY }}" \
              ParameterKey=AlpacaApiKeyId,ParameterValue="${{ secrets.APCA_API_KEY_ID }}" \
              ParameterKey=AlpacaApiSecretKey,ParameterValue="${{ secrets.APCA_API_SECRET_KEY }}" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-update-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"
          echo "Stack fully populated."

      - name: Path B — CREATE fresh stack (no existing RDS)
        if: steps.state.outputs.stack_status == 'NOT_FOUND' && steps.state.outputs.rds_exists == 'NONE'
        run: |
          echo "No stack and no RDS — creating fresh."
          aws cloudformation create-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-app-stocks.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,ParameterValue="${{ secrets.RDS_USERNAME }}" \
              ParameterKey=RDSPassword,ParameterValue="${{ secrets.RDS_PASSWORD }}" \
              ParameterKey=FREDApiKey,ParameterValue="${{ secrets.FRED_API_KEY }}" \
              ParameterKey=AlpacaApiKeyId,ParameterValue="${{ secrets.APCA_API_KEY_ID }}" \
              ParameterKey=AlpacaApiSecretKey,ParameterValue="${{ secrets.APCA_API_SECRET_KEY }}" \
            --region "$AWS_REGION"

          aws cloudformation wait stack-create-complete \
            --stack-name "$STACK_NAME" --region "$AWS_REGION"

      - name: Path C — UPDATE existing stack
        if: steps.state.outputs.stack_status != 'NOT_FOUND' && steps.state.outputs.stack_status != 'CREATE_FAILED' && steps.state.outputs.stack_status != 'ROLLBACK_COMPLETE'
        run: |
          echo "Stack exists (status=${{ steps.state.outputs.stack_status }}). Running update."
          UPDATE_OUTPUT=$(aws cloudformation update-stack \
            --stack-name "$STACK_NAME" \
            --template-url "https://${{ steps.bucket.outputs.bucket }}.s3.amazonaws.com/template-app-stocks.yml" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameters \
              ParameterKey=RDSUsername,UsePreviousValue=true \
              ParameterKey=RDSPassword,UsePreviousValue=true \
              ParameterKey=FREDApiKey,UsePreviousValue=true \
              ParameterKey=AlpacaApiKeyId,UsePreviousValue=true \
              ParameterKey=AlpacaApiSecretKey,UsePreviousValue=true \
              ParameterKey=AlpacaBaseUrl,UsePreviousValue=true \
              ParameterKey=LogRetentionDays,UsePreviousValue=true \
            --region "$AWS_REGION" 2>&1) || true

          if echo "$UPDATE_OUTPUT" | grep -iq "No updates are to be performed"; then
            echo "No updates needed."
          elif echo "$UPDATE_OUTPUT" | grep -q "StackId"; then
            aws cloudformation wait stack-update-complete \
              --stack-name "$STACK_NAME" --region "$AWS_REGION"
            echo "Update complete."
          else
            echo "Unexpected response:"
            echo "$UPDATE_OUTPUT"
            exit 1
          fi

      - name: Diagnose stack events on failure
        if: failure()
        run: |
          echo "=== Root-cause events (cascade noise filtered) ==="
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" --max-items 60 \
            --query 'reverse(StackEvents[?ResourceStatusReason != null && ResourceStatusReason != `Resource creation cancelled` && ResourceStatusReason != `Resource update cancelled`].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason])' \
            --output table || echo "(no events)"
          echo ""
          echo "=== Stack status ==="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query 'Stacks[0].[StackStatus,StackStatusReason]' --output table || echo "(no stack)"

      - name: Verify exports for downstream stacks
        if: success()
        run: |
          echo "=== StocksApp-* exports (downstream needs these) ==="
          aws cloudformation list-exports --region "$AWS_REGION" \
            --query "Exports[?starts_with(Name, 'StocksApp-')].[Name,Value]" \
            --output table

      - name: Set up Python for TimescaleDB
        if: success()
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Enable TimescaleDB on RDS
        if: success()
        run: |
          pip install psycopg2-binary --quiet
          python3 - <<'PYTHON_EOF'
          import psycopg2
          import sys

          # Get RDS endpoint
          import subprocess
          result = subprocess.run([
              'aws', 'cloudformation', 'list-exports',
              '--region', 'us-east-1',
              '--query', "Exports[?Name=='StocksApp-DBEndpoint'].Value",
              '--output', 'text'
          ], capture_output=True, text=True)
          db_host = result.stdout.strip()
          if not db_host or db_host == 'None':
              print("ERROR: Could not get RDS endpoint")
              sys.exit(1)

          db_user = "${{ secrets.RDS_USERNAME }}"
          db_password = "${{ secrets.RDS_PASSWORD }}"
          db_name = "stocks"

          print(f"Enabling TimescaleDB on {db_host}...")

          try:
              conn = psycopg2.connect(
                  host=db_host,
                  port=5432,
                  user=db_user,
                  password=db_password,
                  database=db_name
              )
          except Exception as e:
              print(f"Connection failed (RDS may still be initializing): {e}")
              print("Will retry in 30 seconds...")
              import time
              time.sleep(30)
              conn = psycopg2.connect(
                  host=db_host,
                  port=5432,
                  user=db_user,
                  password=db_password,
                  database=db_name
              )

          with conn.cursor() as cur:
              # Enable extension
              print("  Creating TimescaleDB extension...")
              cur.execute("CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;")

              # Create hypertables
              hypertables = [
                  ("price_daily", "date", "1 month"),
                  ("price_weekly", "week_start", "3 months"),
                  ("price_monthly", "month_start", "6 months"),
                  ("etf_price_daily", "date", "1 month"),
                  ("buy_sell_daily", "signal_date", "1 month"),
              ]

              for table, time_col, chunk_interval in hypertables:
                  try:
                      cur.execute(
                          f"SELECT create_hypertable('{table}', '{time_col}', if_not_exists => TRUE);"
                      )
                      cur.execute(
                          f"SELECT set_chunk_time_interval('{table}', INTERVAL '{chunk_interval}');"
                      )
                      print(f"  ✓ {table} hypertable")
                  except Exception as e:
                      if "already a hypertable" in str(e):
                          print(f"  ⓘ {table} already a hypertable")
                      else:
                          print(f"  ⚠ {table}: {e}")

              # Enable compression
              print("  Enabling compression...")
              try:
                  cur.execute("ALTER TABLE price_daily SET (timescaledb.compress, timescaledb.compress_segmentby = 'symbol');")
                  cur.execute("SELECT add_compression_policy('price_daily', INTERVAL '7 days', if_not_exists => TRUE);")
                  cur.execute("ALTER TABLE etf_price_daily SET (timescaledb.compress, timescaledb.compress_segmentby = 'symbol');")
                  cur.execute("SELECT add_compression_policy('etf_price_daily', INTERVAL '7 days', if_not_exists => TRUE);")
                  print("  ✓ Compression policies")
              except Exception as e:
                  print(f"  ⚠ Compression: {e}")

              # Retention policies
              print("  Setting retention policies...")
              try:
                  cur.execute("SELECT add_retention_policy('price_daily', INTERVAL '5 years', if_not_exists => TRUE);")
                  cur.execute("SELECT add_retention_policy('etf_price_daily', INTERVAL '5 years', if_not_exists => TRUE);")
                  print("  ✓ Retention policies")
              except Exception as e:
                  print(f"  ⚠ Retention: {e}")

              # Indexes
              print("  Creating indexes...")
              cur.execute("CREATE INDEX IF NOT EXISTS idx_price_daily_symbol_date ON price_daily (symbol, date DESC);")
              cur.execute("CREATE INDEX IF NOT EXISTS idx_etf_price_daily_symbol_date ON etf_price_daily (symbol, date DESC);")
              cur.execute("CREATE INDEX IF NOT EXISTS idx_buy_sell_daily_symbol_date ON buy_sell_daily (symbol, signal_date DESC);")
              print("  ✓ Indexes")

              # Analyze
              cur.execute("ANALYZE;")

            conn.commit()
          print("✓ TimescaleDB setup complete")
          PYTHON_EOF
