name: Test API Lambda for 500 Errors

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  test-api:
    name: Test API Lambda Health Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@010d33100f185c1eae0439eac5e5e92e127b84ee  # v4.0.2
        with:
          role-to-assume: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev') }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@0b93645e9adb9ea7654cd5b3b5e474d3837c4398  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install boto3
        run: pip install boto3

      - name: Test API Lambda
        run: python3 tests/test_api_lambda.py

      - name: Get API Lambda Configuration
        if: always()
        run: |
          echo "=== API Lambda Configuration ==="
          aws lambda get-function-configuration \
            --function-name algo-api-dev \
            --region $AWS_REGION \
            --output json | jq '.Environment.Variables'

      - name: Get Recent Lambda Logs
        if: always()
        run: |
          echo "=== Recent API Lambda Logs ==="

          # Get log group for API Lambda
          LOG_GROUP="/aws/lambda/algo-api-dev"

          # Get latest log streams
          STREAMS=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --max-items 1 \
            --query 'logStreams[*].logStreamName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$STREAMS" ]; then
            for stream in $STREAMS; do
              echo "Stream: $stream"
              aws logs get-log-events \
                --log-group-name "$LOG_GROUP" \
                --log-stream-name "$stream" \
                --limit 50 \
                --query 'events[*].message' \
                --output text 2>/dev/null | head -20
            done
          else
            echo "No log streams found"
          fi
