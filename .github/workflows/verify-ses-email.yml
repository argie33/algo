name: Verify SES Email & Test Password Reset

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email to verify in SES'
        required: false
        default: 'argeropolos@gmail.com'

jobs:
  verify-and-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Verify email in SES
        run: |
          EMAIL="${{ github.event.inputs.email || 'argeropolos@gmail.com' }}"
          echo "Verifying $EMAIL in SES..."
          aws ses verify-email-identity --email-addresses "$EMAIL" --region us-east-1
          echo "✓ Verification email sent to $EMAIL"
          echo "Click the verification link in the email to complete setup"

      - name: Check verification status
        run: |
          EMAIL="${{ github.event.inputs.email || 'argeropolos@gmail.com' }}"
          echo "Checking verification status for $EMAIL..."
          aws ses get-identity-verification-attributes --identities "$EMAIL" --region us-east-1 || echo "Still pending verification"

      - name: Get Cognito user pool ID
        id: cognito
        run: |
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 10 --region us-east-1 --query "UserPools[?Name=='algo-pool-dev'].Id" --output text)
          echo "pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "User pool: $POOL_ID"

      - name: Test password reset request (dry run)
        if: steps.cognito.outputs.pool_id != ''
        run: |
          EMAIL="${{ github.event.inputs.email || 'argeropolos@gmail.com' }}"
          POOL_ID="${{ steps.cognito.outputs.pool_id }}"
          echo "Testing password reset for $EMAIL in pool $POOL_ID"
          echo "Note: Check CloudWatch logs for email delivery:"
          echo "  aws logs tail /aws/lambda/algo-cognito-email-trigger-dev --since 5m"
