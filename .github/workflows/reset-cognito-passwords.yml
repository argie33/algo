name: Reset Cognito User Passwords

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'New password for admin user'
        required: true
        type: string
        default: 'TempAdmin123!@'
      user_email:
        description: 'Email for secondary user'
        required: true
        type: string
        default: 'argeropolos@gmail.com'
      user_password:
        description: 'New password for secondary user'
        required: true
        type: string
        default: 'TempUser123!@'

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  reset_passwords:
    name: Reset Cognito Passwords
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.GITHUB_ACTIONS_ROLE_NAME || 'algo-svc-github-actions-dev' }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Get Cognito user pool ID
        id: pool
        run: |
          POOL_ID=$(aws cognito-idp list-user-pools --max-results 10 \
            --region ${{ env.AWS_REGION }} \
            --query 'UserPools[?contains(Name, `algo`) && contains(Name, `pool`)].Id' \
            --output text | head -1)
          echo "pool_id=${POOL_ID}" >> $GITHUB_OUTPUT
          echo "Found pool: ${POOL_ID}"

      - name: Reset admin user password
        run: |
          aws cognito-idp admin-set-user-password \
            --user-pool-id ${{ steps.pool.outputs.pool_id }} \
            --username admin \
            --password "${{ github.event.inputs.admin_password }}" \
            --permanent \
            --region ${{ env.AWS_REGION }}
          echo "✓ Admin password reset to: ${{ github.event.inputs.admin_password }}"

      - name: Create or reset argeropolos@gmail.com user
        run: |
          POOL_ID=${{ steps.pool.outputs.pool_id }}

          # Try to create user first
          aws cognito-idp admin-create-user \
            --user-pool-id ${POOL_ID} \
            --username "${{ github.event.inputs.user_email }}" \
            --temporary-password "${{ github.event.inputs.user_password }}" \
            --region ${{ env.AWS_REGION }} \
            --message-action SUPPRESS 2>/dev/null || echo "User already exists, updating password..."

          # Set permanent password
          aws cognito-idp admin-set-user-password \
            --user-pool-id ${POOL_ID} \
            --username "${{ github.event.inputs.user_email }}" \
            --password "${{ github.event.inputs.user_password }}" \
            --permanent \
            --region ${{ env.AWS_REGION }}
          echo "✓ User password reset to: ${{ github.event.inputs.user_password }}"

      - name: Summary
        run: |
          echo "## Cognito Passwords Reset ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Admin Login:**" >> $GITHUB_STEP_SUMMARY
          echo "- Username: admin" >> $GITHUB_STEP_SUMMARY
          echo "- Password: ${{ github.event.inputs.admin_password }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**User Login:**" >> $GITHUB_STEP_SUMMARY
          echo "- Username: ${{ github.event.inputs.user_email }}" >> $GITHUB_STEP_SUMMARY
          echo "- Password: ${{ github.event.inputs.user_password }}" >> $GITHUB_STEP_SUMMARY
