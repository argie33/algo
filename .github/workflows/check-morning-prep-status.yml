name: Check Morning Prep Pipeline Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  check-status:
    name: Check Pipeline Status & Table Freshness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/algo-svc-github-actions-dev
          aws-region: us-east-1

      - name: Check Step Functions - Morning Prep Pipeline
        id: sfn
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SM_ARN="arn:aws:states:us-east-1:${ACCOUNT_ID}:stateMachine:algo-morning-prep-pipeline-dev"
          echo "Checking state machine: $SM_ARN"

          # Get the most recent execution
          EXEC=$(aws stepfunctions list-executions \
            --state-machine-arn "$SM_ARN" \
            --max-results 1 \
            --region us-east-1 \
            --output json 2>&1)

          echo "--- Step Functions Executions ---"
          echo "$EXEC" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              execs = data.get('executions', [])
              if not execs:
                  print('[WARN] No executions found for morning-prep-pipeline-dev')
              else:
                  e = execs[0]
                  print(f'Most recent execution:')
                  print(f'  Name:   {e.get(\"name\")}')
                  print(f'  Status: {e.get(\"status\")}')
                  print(f'  Start:  {e.get(\"startDate\")}')
                  print(f'  Stop:   {e.get(\"stopDate\", \"(still running)\")}')
          except Exception as ex:
              print(f'[ERROR] Parsing executions: {ex}')
              print(sys.stdin.read())
          " || echo "$EXEC"

      - name: Fetch RDS Credentials
        id: rds
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier algo-db \
            --region us-east-1 \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)

          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id algo-db-credentials-dev \
            --region us-east-1 \
            --query SecretString \
            --output text)

          # Parse credentials with error checking
          DB_USER=$(echo "$SECRET" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('username','stocks'))" 2>&1) || DB_USER="stocks"
          if [[ "$DB_USER" == *"Traceback"* ]] || [[ "$DB_USER" == *"JSONDecodeError"* ]]; then
            echo "[ERROR] Failed to parse DB_USER from secret"
            DB_USER="stocks"
          fi

          DB_PASSWORD=$(echo "$SECRET" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('password',''))" 2>&1) || DB_PASSWORD=""
          if [[ "$DB_PASSWORD" == *"Traceback"* ]] || [[ "$DB_PASSWORD" == *"JSONDecodeError"* ]]; then
            echo "[ERROR] Failed to parse DB_PASSWORD from secret"
            DB_PASSWORD=""
          fi

          DB_NAME=$(echo "$SECRET" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('dbname','algo'))" 2>&1) || DB_NAME="algo"
          if [[ "$DB_NAME" == *"Traceback"* ]] || [[ "$DB_NAME" == *"JSONDecodeError"* ]]; then
            echo "[ERROR] Failed to parse DB_NAME from secret"
            DB_NAME="algo"
          fi

          echo "db_host=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "db_user=$DB_USER" >> $GITHUB_OUTPUT
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          # Use env file for password (never log it)
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

          echo "--- RDS Connection Info ---"
          echo "Host: $RDS_ENDPOINT"
          echo "User: $DB_USER"
          echo "DB:   $DB_NAME"

      - name: Install Python dependencies
        run: pip install -q psycopg2-binary pytz

      - name: Run Pipeline Status Check
        env:
          DB_HOST: ${{ steps.rds.outputs.db_host }}
          DB_PORT: "5432"
          DB_USER: ${{ steps.rds.outputs.db_user }}
          DB_NAME: ${{ steps.rds.outputs.db_name }}
          # DB_PASSWORD already in env from previous step
        run: |
          echo "--- Pipeline Status Check ---"
          python3 scripts/pipeline-status-check.py
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          exit $EXIT_CODE
