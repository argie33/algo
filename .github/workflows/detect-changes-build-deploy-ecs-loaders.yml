name: Detect Changes & Deploy ECS Loaders

on:
  push:
    branches:
      - main
    paths:
      - 'load*.py'
      - 'optimal_loader.py'
      - 'data_source_router.py'
      - 'bloom_dedup.py'
      - 'watermark_loader.py'
      - 'Dockerfile.loader'
      - '.github/workflows/detect-changes-build-deploy-ecs-loaders.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Modified Loaders
    runs-on: ubuntu-latest
    outputs:
      changed_loaders: ${{ steps.detect.outputs.changed_loaders }}
      build_needed: ${{ steps.detect.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed loader files
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger: build all loaders
            LOADERS=$(ls load*.py 2>/dev/null | tr '\n' ',' | sed 's/,$//')
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            # Auto trigger: only changed files
            LOADERS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'load.*\.py$' | tr '\n' ',' | sed 's/,$//')
          fi

          if [ -n "$LOADERS" ]; then
            echo "changed_loaders=$LOADERS" >> $GITHUB_OUTPUT
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "Modified loaders: $LOADERS"
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
            echo "No loader changes detected"
          fi

  deploy-infrastructure:
    name: Deploy Infrastructure (if needed)
    needs: detect-changes
    if: needs.detect-changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-loader-deploy
          aws-region: us-east-1

      - name: Deploy infrastructure stack
        run: |
          echo "Deploying CloudFormation infrastructure..."
          aws cloudformation deploy \
            --template-file template-app-stocks.yml \
            --stack-name stocks-app-stack \
            --region us-east-1 \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=production \
              ClusterName=stocks-cluster || true

  build-loaders:
    name: Build Loader Docker Images
    needs: detect-changes
    if: needs.detect-changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        loader: ${{ fromJson(format('[{0}]', needs.detect-changes.outputs.changed_loaders)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-loader-build-${{ matrix.loader }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push Docker image for ${{ matrix.loader }}
        run: |
          REPO_NAME="${{ matrix.loader }}"
          REPO_NAME="${REPO_NAME%.py}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com"

          # Ensure ECR repo exists
          aws ecr create-repository --repository-name "$REPO_NAME" --region us-east-1 2>/dev/null || true

          # Build image
          docker build \
            --build-arg LOADER_SCRIPT="${{ matrix.loader }}" \
            --tag "$REGISTRY/$REPO_NAME:latest" \
            --tag "$REGISTRY/$REPO_NAME:${{ github.sha }}" \
            -f Dockerfile.loader .

          # Push to ECR
          docker push "$REGISTRY/$REPO_NAME:latest"
          docker push "$REGISTRY/$REPO_NAME:${{ github.sha }}"

          echo "Pushed: $REGISTRY/$REPO_NAME:latest"

  register-task-defs:
    name: Register ECS Task Definitions
    needs: [detect-changes, build-loaders]
    if: needs.detect-changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          role-session-name: github-loader-register
          aws-region: us-east-1

      - name: Register task definitions
        run: |
          for loader in ${{ needs.detect-changes.outputs.changed_loaders }}; do
            REPO_NAME="${loader%.py}"
            REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com"
            IMAGE="$REGISTRY/$REPO_NAME:${{ github.sha }}"

            # Create task definition JSON
            cat > task-def-${REPO_NAME}.json <<EOF
          {
            "family": "$REPO_NAME",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "containerDefinitions": [
              {
                "name": "$REPO_NAME",
                "image": "$IMAGE",
                "essential": true,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/aws/ecs/stocks-cluster",
                    "awslogs-region": "us-east-1",
                    "awslogs-stream-prefix": "$REPO_NAME"
                  }
                },
                "environment": [
                  {"name": "DB_HOST", "value": "stocks.xxxxxxxxx.us-east-1.rds.amazonaws.com"},
                  {"name": "DB_PORT", "value": "5432"},
                  {"name": "DB_USER", "value": "stocks"},
                  {"name": "DB_NAME", "value": "stocks"}
                ],
                "secrets": [
                  {"name": "DB_PASSWORD", "valueFrom": "arn:aws:secretsmanager:us-east-1:${{ secrets.AWS_ACCOUNT_ID }}:secret:rds/stocks/password"}
                ]
              }
            ]
          }
          EOF

            # Register task definition
            aws ecs register-task-definition \
              --cli-input-json file://task-def-${REPO_NAME}.json \
              --region us-east-1 || true

            echo "Registered: $REPO_NAME"
          done

  summary:
    name: Deployment Summary
    needs: [detect-changes, build-loaders]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize deployment
        run: |
          echo "=========================================="
          echo "DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo "Modified loaders: ${{ needs.detect-changes.outputs.changed_loaders }}"
          echo "Build needed: ${{ needs.detect-changes.outputs.build_needed }}"
          echo "=========================================="
