                ParameterKey=SectorDataImageTag,ParameterValue=sectordata-latest \
                ParameterKey=LoadFinancialsImageTag,ParameterValue=financials-latest \
                ParameterKey=LoadHistoricalImageTag,ParameterValue=historical-latest \
                ParameterKey=SectorsImageTag,ParameterValue=sectors-latest \
                ParameterKey=PositioningImageTag,ParameterValue=positioning-latest \
                ParameterKey=MomentumImageTag,ParameterValue=momentum-latest \
                ParameterKey=RiskMetricsImageTag,ParameterValue=riskmetrics-latest \
                ParameterKey=FundamentalMetricsImageTag,ParameterValue=fundamentalmetrics-latest

            echo "Waiting for stack creation to complete..."
            aws cloudformation wait stack-create-complete --stack-name stocks-ecs-tasks-stack
          fi

      - name: Update container image
        run: |
          echo "🐳 Building and pushing loader container..."

          # Get the correct repository URI from CloudFormation exports
          echo "📋 Getting repository URI from CloudFormation..."
          REPOSITORY_URI=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-ContainerRepositoryUri'].Value" \
            --output text --region ${{ env.AWS_REGION }})

          if [[ -z "$REPOSITORY_URI" || "$REPOSITORY_URI" == "None" ]]; then
            echo "❌ ERROR: Could not get repository URI from CloudFormation export!"
            exit 1
          fi
          echo "✅ Repository URI: $REPOSITORY_URI"

          # Extract repository name from URI for Docker login
          REPO_NAME=$(echo "$REPOSITORY_URI" | cut -d'/' -f2)
          echo "Repository name: $REPO_NAME"

          # Check if unified Dockerfile exists (includes all 54 refactored loaders + db_helper.py)
          if [[ ! -f "Dockerfile" ]]; then
            echo "❌ ERROR: Unified Dockerfile not found!"
            echo "Expected: Dockerfile (includes all refactored loaders + db_helper.py)"
            exit 1
          fi

          # Verify db_helper.py exists (critical for S3 bulk loading)
          if [[ ! -f "db_helper.py" ]]; then
            echo "❌ ERROR: db_helper.py not found!"
            echo "db_helper.py is required for DatabaseHelper abstraction and S3 bulk loading"
            exit 1
          fi

          echo "✅ Unified Dockerfile found (includes all refactored loaders + db_helper.py)"
          echo "✅ db_helper.py abstraction layer found"

          # Login to ECR
          echo "🔑 Logging into ECR..."
          if ! aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com; then
            echo "❌ ERROR: ECR login failed!"
            exit 1
          fi
          echo "✅ ECR login successful"

          # Repository should already exist from core stack, but check anyway
          echo "📦 Verifying ECR repository exists..."
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region ${{ env.AWS_REGION }}; then
            echo "❌ ERROR: Repository $REPO_NAME does not exist! Check core stack deployment."
            exit 1
          fi
          echo "✅ ECR repository verified"

          # Build unified Docker image (includes all 54 refactored loaders + db_helper.py)
          echo "🔨 Building unified Docker image with all refactored loaders..."

          IMAGE_URI="${REPOSITORY_URI}:latest"
          CACHE_FROM="type=gha,scope=unified"
          CACHE_TO="type=gha,mode=max,scope=unified"

          # Build the unified image (single Dockerfile includes all loaders)
          timeout 30m docker build \
            --build-arg AWS_REGION="${{ env.AWS_REGION }}" \
            -t "$IMAGE_URI" \
            -f Dockerfile . 2>&1 | tee /tmp/docker_build.log

          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ ERROR: Docker build failed!"
            echo "Build log:"
            tail -50 /tmp/docker_build.log
            exit 1
          else
            echo "✅ Unified Docker image built successfully"
            echo "   Image includes: all 54 refactored loaders + db_helper.py abstraction"
          fi

          # Tag and push the unified image
          echo "🏷️ Tagging unified image..."
          docker tag "$IMAGE_URI" "${REPOSITORY_URI}:latest"

          echo "⬆️ Pushing unified image to ECR..."
          if ! docker push "${REPOSITORY_URI}:latest"; then
            echo "❌ ERROR: Docker push failed!"
            exit 1
          fi
          echo "✅ Unified image pushed successfully to: ${REPOSITORY_URI}:latest"
          echo ""
          echo "🎯 All loaders packaged in single optimized image with DatabaseHelper abstraction"

  # 3. Execute loaders using matrix strategy
  execute-loaders:
    name: Execute Loaders
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      needs.detect-changes.outputs.has-changes == 'true' &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
      max-parallel: 10
    
    timeout-minutes: ${{ matrix.timeout }}
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION }}

      - name: Get infrastructure info
        id: infra
        run: |
          # Get cluster ARN
          CLUSTER_ARN=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksApp-ClusterArn'].Value" \
            --output text)
          
          # Get task definition ARN pattern with proper case conversion
          # Convert buyselldaily -> BuySellDaily, buysellweekly -> BuySellWeekly, etc.
          LOADER_NAME="${{ matrix.loader }}"
          case "$LOADER_NAME" in
