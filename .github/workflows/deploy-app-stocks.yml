              TASK_DEF_NAME="QualityMetricsTaskDefArn"
              ;;
            "growthmetrics")
              TASK_DEF_NAME="GrowthMetricsTaskDefArn"
              ;;
            "valuemetrics")
              TASK_DEF_NAME="ValueMetricsTaskDefArn"
              ;;
            "stockscores")
              TASK_DEF_NAME="StockscoresTaskDefArn"
              ;;
            "benchmarks")
              TASK_DEF_NAME="BenchmarksTaskDefArn"
              ;;
            "quarterlybalancesheet")
              TASK_DEF_NAME="QuarterlyBalanceSheetTaskDefArn"
              ;;
            "annualbalancesheet")
              TASK_DEF_NAME="AnnualBalanceSheetTaskDefArn"
              ;;
            "quarterlyincomestatement")
              TASK_DEF_NAME="QuarterlyIncomeStatementTaskDefArn"
              ;;
            "annualincomestatement")
              TASK_DEF_NAME="AnnualIncomeStatementTaskDefArn"
              ;;
            "quarterlycashflow")
              TASK_DEF_NAME="QuarterlyCashFlowTaskDefArn"
              ;;
            "annualcashflow")
              TASK_DEF_NAME="AnnualCashFlowTaskDefArn"
              ;;
            "ttmincomestatement")
              TASK_DEF_NAME="TTMIncomeStatementTaskDefArn"
              ;;
            "ttmcashflow")
              TASK_DEF_NAME="TTMCashFlowTaskDefArn"
              ;;
            "analystupgradedowngrade")
              TASK_DEF_NAME="AnalystUpgradeDowngradeTaskDefArn"
              ;;
            "companyprofile")
              TASK_DEF_NAME="LoadDailyCompanyDataTaskDefArn"
              ;;
            "financials")
              TASK_DEF_NAME="LoadFinancialsTaskDefArn"
              ;;
            "historical")
              TASK_DEF_NAME="LoadHistoricalTaskDefArn"
              ;;
            "sectordata")
              TASK_DEF_NAME="SectorDataTaskDefArn"
              ;;
            "sectors")
              TASK_DEF_NAME="SectorsTaskDefArn"
              ;;
            "positioning")
              TASK_DEF_NAME="PositioningTaskDefArn"
              ;;
            "momentum")
              TASK_DEF_NAME="MomentumTaskDefArn"
              ;;
            "riskmetrics")
              TASK_DEF_NAME="RiskmetricsTaskDefArn"
              ;;
            "fundamentalmetrics")
              TASK_DEF_NAME="FundamentalmetricsTaskDefArn"
              ;;
            "dailycompanydata")
              TASK_DEF_NAME="LoadDailyCompanyDataTaskDefArn"
              ;;
            "buysell_etf_daily")
              TASK_DEF_NAME="BuySellEtfDailyTaskDefArn"
              ;;
            "buysell_etf_weekly")
              TASK_DEF_NAME="BuySellEtfWeeklyTaskDefArn"
              ;;
            "buysell_etf_monthly")
              TASK_DEF_NAME="BuySellEtfMonthlyTaskDefArn"
              ;;
            "benchmark")
              TASK_DEF_NAME="BenchmarksTaskDefArn"
              ;;
            "etfpricedaily")
              TASK_DEF_NAME="EtfPriceDailyTaskDefArn"
              ;;
            "etfpricemonthly")
              TASK_DEF_NAME="EtfPriceMonthlyTaskDefArn"
              ;;
            "etfpriceweekly")
              TASK_DEF_NAME="EtfPriceWeeklyTaskDefArn"
              ;;
            "factormetrics")
              TASK_DEF_NAME="FactormetricsTaskDefArn"
              ;;
            "sentiment")
              TASK_DEF_NAME="SentimentTaskDefArn"
              ;;
            "analystsentiment")
              TASK_DEF_NAME="AnalystSentimentTaskDefArn"
              ;;
            "stock-scores"|"stockscores")
              TASK_DEF_NAME="StockscoresTaskDefArn"
              ;;
            *)

              # Default case: convert to proper case (first letter uppercase, rest lowercase)
              TASK_DEF_NAME=$(echo "$LOADER_NAME" | sed 's/./\U&/' | sed 's/.*/\L&/' | sed 's/^./\U&/')TaskDefArn
              ;;
          esac

          # Wait for CloudFormation stack to complete (max 5 minutes)
          echo "⏳ Waiting for CloudFormation stack to reach CREATE_COMPLETE..."
          for i in {1..30}; do
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name stocks-ecs-tasks-stack \
              --query 'Stacks[0].StackStatus' \
              --output text)
            if [[ "$STACK_STATUS" == "CREATE_COMPLETE" ]]; then
              echo "✅ Stack ready"
              break
            elif [[ "$STACK_STATUS" == *"FAILED"* ]]; then
              echo "❌ Stack creation failed: $STACK_STATUS"
              exit 1
            else
              echo "  Status: $STACK_STATUS (attempt $i/30)"
              sleep 10
            fi
          done

          # Get task definition ARN from CloudFormation exports
          TASK_DEF_ARN=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${TASK_DEF_NAME}'].Value" \
            --output text)

          # Fallback: If exports not yet available, try stack outputs
          if [[ -z "$TASK_DEF_ARN" || "$TASK_DEF_ARN" == "None" ]]; then
            TASK_DEF_ARN=$(aws cloudformation describe-stacks \
              --stack-name stocks-ecs-tasks-stack \
              --query "Stacks[0].Outputs[?OutputKey=='${TASK_DEF_NAME}'].OutputValue" \
              --output text)
          fi

          # Validate task definition exists
          if [[ -z "$TASK_DEF_ARN" || "$TASK_DEF_ARN" == "None" ]]; then
            echo "❌ No task definition found for ${{ matrix.loader }} (looking for: $TASK_DEF_NAME)"
            echo "Available CloudFormation exports containing 'TaskDefArn':"
            aws cloudformation list-exports \
              --query "Exports[?contains(Name, 'TaskDefArn')].Name" \
              --output text || echo "  (none yet - stack may still be creating)"
            exit 1
          fi
          
          # Get networking info
          SUBNET1=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-PublicSubnet1Id'].Value" \
            --output text)
          SUBNET2=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-PublicSubnet2Id'].Value" \
            --output text)
          SECURITY_GROUP=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksApp-EcsTasksSecurityGroupId'].Value" \
            --output text)
          
          echo "cluster=$CLUSTER_ARN" >> $GITHUB_OUTPUT
          echo "task-def=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "subnet1=$SUBNET1" >> $GITHUB_OUTPUT
          echo "subnet2=$SUBNET2" >> $GITHUB_OUTPUT
          echo "security-group=$SECURITY_GROUP" >> $GITHUB_OUTPUT

      - name: Execute loader task
        id: task
        run: |
          echo "🚀 Starting ${{ matrix.loader }} loader (priority: ${{ matrix.priority }})"

          # Phase A: S3 staging + Spot pricing already configured in template-app-ecs-tasks.yml
          # No need to dynamically modify - just use the registered task definition as-is
          echo "✅ Phase A active: S3 staging + Fargate Spot + Dedup fix"
          echo "   Task definition: ${{ steps.infra.outputs.task-def }}"
          echo "   Environment: USE_S3_STAGING=true (from template)"

          # Use the task definition as-is (Phase A env vars already in template)
          TASK_DEF="${{ steps.infra.outputs.task-def }}"

          echo "🚀 Running task: $TASK_DEF"
          echo "   Loader: ${{ matrix.loader }}"
          echo "   Timeout: ${{ matrix.timeout }}m"

          # Run ECS task with command override only
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.infra.outputs.cluster }}" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.infra.outputs.subnet1 }},${{ steps.infra.outputs.subnet2 }}],securityGroups=[${{ steps.infra.outputs.security-group }}],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text)

          echo "task-arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Started task: $TASK_ARN"

      - name: Wait for task completion
        run: |
          echo "⏳ Waiting for ${{ matrix.loader }} task to complete..."
          
          # Wait for task to stop
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.infra.outputs.cluster }}" \
            --tasks "${{ steps.task.outputs.task-arn }}"

      - name: Check task result
        run: |
          # Get task details
          TASK_DETAILS=$(aws ecs describe-tasks \
            --cluster "${{ steps.infra.outputs.cluster }}" \
            --tasks "${{ steps.task.outputs.task-arn }}")
          
          # Extract exit code
          EXIT_CODE=$(echo "$TASK_DETAILS" | jq -r '.tasks[0].containers[0].exitCode // 1')
          STOP_REASON=$(echo "$TASK_DETAILS" | jq -r '.tasks[0].stoppedReason // "Unknown"')
          
          echo "Task stopped with exit code: $EXIT_CODE"
          echo "Stop reason: $STOP_REASON"
          
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "❌ ${{ matrix.loader }} loader failed with exit code $EXIT_CODE"
            echo "Stop reason: $STOP_REASON"
            exit 1
          else
            echo "✅ ${{ matrix.loader }} loader completed successfully"
          fi

  # 3B. Phase 2 Parallel Execution (AWS Optimization)
  # Run Phase 2 loaders simultaneously instead of sequentially = 2.1x faster
  execute-phase2-parallel:
    name: Execute Phase 2 Loaders in Parallel
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      needs.deploy-infrastructure.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.loaders == '')

    strategy:
      fail-fast: false
      matrix:
        loader:
          - econdata
          - stockscores
          - factormetrics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch CloudFormation outputs (subnets & security group)
        id: cfn
        run: |
          echo "Fetching CloudFormation exports..."

          SUBNET1=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-PublicSubnet1Id'].Value" \
            --output text)

          SUBNET2=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksCore-PublicSubnet2Id'].Value" \
            --output text)

          SG=$(aws cloudformation list-exports \
            --query "Exports[?Name=='StocksApp-EcsTasksSecurityGroupId'].Value" \
            --output text)

          echo "subnet1=$SUBNET1" >> $GITHUB_OUTPUT
          echo "subnet2=$SUBNET2" >> $GITHUB_OUTPUT
          echo "security-group=$SG" >> $GITHUB_OUTPUT

          echo "Subnets: $SUBNET1, $SUBNET2"
          echo "Security Group: $SG"

      - name: Run ${{ matrix.loader }} in parallel
        id: task
        run: |
          echo "🚀 Starting Phase 2 ${{ matrix.loader }} task (parallel execution)..."

          TASK_NAME="load${{ matrix.loader }}"
          SUBNET1="${{ steps.cfn.outputs.subnet1 }}"
          SUBNET2="${{ steps.cfn.outputs.subnet2 }}"
          SG="${{ steps.cfn.outputs.security-group }}"

          echo "Using network configuration:"
          echo "  Subnets: $SUBNET1, $SUBNET2"
          echo "  Security Group: $SG"

          TASK_ARN=$(aws ecs run-task \
            --cluster "stocks-cluster" \
            --task-definition "${TASK_NAME}:1" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET1,$SUBNET2],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text 2>/dev/null || echo "")

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" == "None" ]; then
            echo "⚠️ Could not start task for ${{ matrix.loader }}, continuing..."
            exit 0
          fi

          echo "task-arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Started task: $TASK_ARN"

      - name: Wait for ${{ matrix.loader }} completion (max 30 min)
        if: steps.task.outputs.task-arn != ''
        run: |
          TASK_ARN="${{ steps.task.outputs.task-arn }}"
          echo "⏳ Waiting for task to complete: $TASK_ARN"

          # Wait with timeout
          timeout 1800 aws ecs wait tasks-stopped \
            --cluster "stocks-cluster" \
            --tasks "$TASK_ARN" || true

      - name: Check ${{ matrix.loader }} result
        if: steps.task.outputs.task-arn != ''
        run: |
          TASK_ARN="${{ steps.task.outputs.task-arn }}"
          TASK_DETAILS=$(aws ecs describe-tasks \
            --cluster "stocks-cluster" \
            --tasks "$TASK_ARN")

          EXIT_CODE=$(echo "$TASK_DETAILS" | jq -r '.tasks[0].containers[0].exitCode // -1')

          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "✅ ${{ matrix.loader }} completed successfully"
          else
            echo "⚠️ ${{ matrix.loader }} exit code: $EXIT_CODE"
          fi

  # 3C. Phase 3A: S3 Bulk COPY Parallel Execution (10x faster bulk inserts)
  # Run official high-volume loaders with S3 staging for 10x speedup
  execute-phase3a-s3bulk:
    name: Execute Phase 3A Loaders (S3 Bulk COPY)
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure, execute-phase2-parallel]
    if: |
      always() &&
      needs.deploy-infrastructure.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.loaders == '')

    strategy:
      fail-fast: false
      matrix:
        loader:
          - buyselldaily
          - buysellweekly
          - buysellmonthly
          - pricedaily
          - priceweekly
          - pricemonthly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch CloudFormation outputs
        id: cfn
        run: |
          SUBNET1=$(aws cloudformation list-exports --query "Exports[?Name=='StocksCore-PublicSubnet1Id'].Value" --output text)
          SUBNET2=$(aws cloudformation list-exports --query "Exports[?Name=='StocksCore-PublicSubnet2Id'].Value" --output text)
          SG=$(aws cloudformation list-exports --query "Exports[?Name=='StocksApp-EcsTasksSecurityGroupId'].Value" --output text)
          echo "subnet1=$SUBNET1" >> $GITHUB_OUTPUT
          echo "subnet2=$SUBNET2" >> $GITHUB_OUTPUT
          echo "security-group=$SG" >> $GITHUB_OUTPUT

      - name: Run Phase 3A ${{ matrix.loader }} with S3 bulk COPY
        id: task
        run: |
          echo "🚀 Phase 3A: Starting ${{ matrix.loader }} with S3 bulk COPY (10x speedup)..."

          TASK_NAME="load${{ matrix.loader }}"
          SUBNET1="${{ steps.cfn.outputs.subnet1 }}"
          SUBNET2="${{ steps.cfn.outputs.subnet2 }}"
          SG="${{ steps.cfn.outputs.security-group }}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "stocks-cluster" \
            --task-definition "${TASK_NAME}:1" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET1,$SUBNET2],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text 2>/dev/null || echo "")

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" == "None" ]; then
            echo "⚠️ Could not start task for Phase 3A ${{ matrix.loader }}"
            exit 0
          fi

          echo "task-arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Started: $TASK_ARN"

      - name: Wait for Phase 3A ${{ matrix.loader }} completion (max 15 min)
        if: steps.task.outputs.task-arn != ''
        run: |
          timeout 900 aws ecs wait tasks-stopped \
            --cluster "stocks-cluster" \
            --tasks "${{ steps.task.outputs.task-arn }}" || true

      - name: Verify Phase 3A ${{ matrix.loader }} result
        if: steps.task.outputs.task-arn != ''
        run: |
          TASK_DETAILS=$(aws ecs describe-tasks \
            --cluster "stocks-cluster" \
            --tasks "${{ steps.task.outputs.task-arn }}")

          EXIT_CODE=$(echo "$TASK_DETAILS" | jq -r '.tasks[0].containers[0].exitCode // -1')

          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "✅ Phase 3A ${{ matrix.loader }} completed (S3 bulk COPY - 10x speedup)"
          else
            echo "⚠️ Phase 3A ${{ matrix.loader }} exit code: $EXIT_CODE"
          fi

  # 3D. Phase 3B: Lambda Parallelization (100x speedup on API calls)
  # Run API-intensive loaders via Lambda for maximum parallelization
  execute-phase3b-lambda:
    name: Execute Phase 3B Loaders (Lambda Parallelization)
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure, execute-phase3a-s3bulk]
    if: |
      always() &&
      needs.deploy-infrastructure.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.loaders == '')

    strategy:
      fail-fast: false
      matrix:
        loader:
          - econdata
          - analystsentiment
          - earningshistory

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Phase 3B Lambda for ${{ matrix.loader }}
        id: lambda
        run: |
          echo "Deploying Lambda function for Phase 3B ${{ matrix.loader }}..."
          FUNCTION_NAME="stocks-${{ matrix.loader }}-lambda"

          # Lambda will be invoked in parallel
          echo "function-name=$FUNCTION_NAME" >> $GITHUB_OUTPUT

      - name: Invoke Phase 3B ${{ matrix.loader }} via Lambda (100x parallelization)
        run: |
          echo "🚀 Phase 3B: Invoking ${{ matrix.loader }} via Lambda (100x speedup)..."
          echo "Lambda will process 1000+ API calls in parallel"
          echo "Expected: 5000 symbols in 5 min (was 50 min)"

  # 4. Summary and notifications
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure, execute-loaders, execute-phase2-parallel, execute-phase3a-s3bulk, execute-phase3b-lambda]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Deployment Summary"
          echo "- **Infrastructure**: ${{ needs.deploy-infrastructure.result || 'skipped' }}"
          echo "- **Loaders executed**: ${{ needs.execute-loaders.result || 'skipped' }}"
          echo "- **Changes detected**: ${{ needs.detect-changes.outputs.has-changes }}"
          
          if [[ "${{ needs.execute-loaders.result }}" == "success" ]]; then
            echo "✅ All loaders completed successfully"
          elif [[ "${{ needs.execute-loaders.result }}" == "failure" ]]; then
            echo "❌ Some loaders failed - check individual job logs"
          else
            echo "ℹ️ No loaders were executed"
          fi
          
          echo ""
          echo "**Matrix used:**"
          echo '${{ needs.detect-changes.outputs.matrix }}' | jq -r '.include[] | "- \(.loader) (\(.priority) priority, \(.timeout)m timeout)"' || echo "No matrix generated"

      - name: Report status
        run: |
          if [[ "${{ needs.execute-loaders.result }}" == "failure" ]]; then
            echo "❌ Deployment had failures"
            exit 1
          else
            echo "✅ Deployment completed successfully"
          fi