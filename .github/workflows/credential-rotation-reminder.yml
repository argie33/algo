name: Quarterly Credential Rotation Reminder

# Reminder to rotate API keys and passwords that don't have automatic rotation.
# Runs same schedule as the automatic AWS key rotation workflow.

on:
  schedule:
    # First Monday of February (Q1) at 02:30 UTC
    - cron: '30 2 3-9 2 1'
    # First Monday of May (Q2) at 02:30 UTC
    - cron: '30 2 3-9 5 1'
    # First Monday of August (Q3) at 02:30 UTC
    - cron: '30 2 3-9 8 1'
    # First Monday of November (Q4) at 02:30 UTC
    - cron: '30 2 3-9 11 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reminder:
    name: Quarterly Credential Rotation Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Create rotation checklist
        run: |
          QUARTER=$(date +%q)
          YEAR=$(date +%Y)
          case $QUARTER in
            1) QUARTER_NAME="Q1 (February)"; NEXT="Q2 (May)" ;;
            2) QUARTER_NAME="Q2 (May)"; NEXT="Q3 (August)" ;;
            3) QUARTER_NAME="Q3 (August)"; NEXT="Q4 (November)" ;;
            4) QUARTER_NAME="Q4 (November)"; NEXT="Q1 (February)" ;;
          esac
          NEXT_DATE=$(date -u -d "+3 months" +'%B %Y')

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Quarterly Credential Rotation Checklist

          **Current Quarter:** ${QUARTER_NAME}
          **Next Rotation:** ${NEXT} (${NEXT_DATE})

          ## Automatic Rotations (No Action Required)
          - [x] **AWS algo-developer key** — Automatically rotated by \`rotate-dev-credentials.yml\`
            - Users run: \`scripts/refresh-aws-credentials.ps1\` to get new credentials
            - Secrets Manager: \`algo/developer-credentials\` (auto-updated)

          ## Manual Rotations (Action Required)

          ### 1. Alpaca API Keys (Paper Trading)
          1. Go to alpaca.markets/dashboard → API Keys → Paper
          2. Regenerate key
          3. \`gh secret set ALPACA_API_KEY_ID --body "new_key"\`
          4. \`gh secret set ALPACA_API_SECRET_KEY --body "new_secret"\`
          5. Run: \`gh workflow run update-credentials.yml -f trading_mode=paper\`

          ### 2. Alpaca API Keys (Live Trading)
          1. Go to alpaca.markets/dashboard → API Keys → Live Trading
          2. Regenerate key
          3. \`gh secret set ALPACA_API_KEY --body "new_live_key"\`
          4. \`gh secret set ALPACA_SECRET_KEY --body "new_live_secret"\`
          5. Run: \`gh workflow run update-credentials.yml -f trading_mode=live\`
          **CAUTION:** Live trading is REAL MONEY — verify credentials before deploying

          ### 3. FRED API Key
          1. Go to fred.stlouisfed.org → My Account → API Keys
          2. Generate new API key
          3. \`gh secret set FRED_API_KEY --body "new_fred_key"\`
          4. Run: \`gh workflow run update-credentials.yml -f trading_mode=paper -f update_fred=true\`

          ### 4. RDS Database Password
          1. AWS Console → RDS → algo-db-dev → Modify → Master password
          2. Update PowerShell profile: \`\$env:DB_PASSWORD = "new_password"\`
          3. Run: \`terraform apply -var="rds_password=new_password"\`

          ---
          See \`steering/algo.md\` → CREDENTIAL ROTATION SCHEDULE for full details.
          EOF

      - name: Summary
        run: |
          echo "Credential Rotation Reminder completed for $(date +'%B %Y')" >> $GITHUB_STEP_SUMMARY
