name: Quarterly Credential Rotation Reminder

# Reminder to manually rotate API keys and database passwords that don't have
# automatic rotation (Alpaca, FRED, RDS). Runs same schedule as automatic
# AWS key rotation to sync all credential updates.
#
# Automatic credentials (handled by rotate-dev-credentials.yml):
# - algo-developer AWS access key
#
# Manual credentials (update via steps below):
# - Alpaca API keys (paper + live)
# - FRED API key
# - RDS database password

on:
  schedule:
    # First Monday of February (Q1) at 02:30 UTC
    - cron: '30 2 3-9 2 1'
    # First Monday of May (Q2) at 02:30 UTC
    - cron: '30 2 3-9 5 1'
    # First Monday of August (Q3) at 02:30 UTC
    - cron: '30 2 3-9 8 1'
    # First Monday of November (Q4) at 02:30 UTC
    - cron: '30 2 3-9 11 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reminder:
    name: Quarterly Credential Rotation Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Create rotation checklist
        run: |
          QUARTER=$(date +%q)
          YEAR=$(date +%Y)
          NEXT_MONTH=$(( ($(date +%m) % 12) + 3 ))
          NEXT_YEAR=$(( NEXT_MONTH <= 12 ? $YEAR : $YEAR + 1 ))
          NEXT_MONTH=$(( NEXT_MONTH > 12 ? NEXT_MONTH - 12 : NEXT_MONTH ))

          case $QUARTER in
            1) QUARTER_NAME="Q1 (February)"; NEXT="Q2 (May)" ;;
            2) QUARTER_NAME="Q2 (May)"; NEXT="Q3 (August)" ;;
            3) QUARTER_NAME="Q3 (August)"; NEXT="Q4 (November)" ;;
            4) QUARTER_NAME="Q4 (November)"; NEXT="Q1 (February)" ;;
          esac

          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          # Quarterly Credential Rotation Checklist

          **Current Quarter:** $QUARTER_NAME
          **Next Rotation:** $NEXT

          ## ✅ Automatic Rotations (No Action Required)

          - [x] **AWS algo-developer key** — Automatically rotated by `rotate-dev-credentials.yml`
            - Users run: `scripts/refresh-aws-credentials.ps1` to get new credentials
            - Secrets Manager: `algo/developer-credentials` (auto-updated)

          ## 📋 Manual Rotations (Action Required)

          ### 1. Alpaca API Keys (Paper Trading)

          **Steps:**
          1. Go to https://alpaca.markets/dashboard → API Keys → Paper
          2. Regenerate key
          3. Update GitHub Secrets:
             ```sh
             gh secret set ALPACA_API_KEY_ID --body "new_key"
             gh secret set ALPACA_API_SECRET_KEY --body "new_secret"
             ```
          4. Run: `gh workflow run update-credentials.yml -f trading_mode=paper`
          5. Verify: Check CloudWatch logs for `algo-api-dev` lambda (should see new credentials)

          **Secrets Manager:** `algo/alpaca`

          ---

          ### 2. Alpaca API Keys (Live Trading)

          **Steps:**
          1. Go to https://alpaca.markets/dashboard → API Keys → Live Trading
          2. Regenerate key
          3. Update GitHub Secrets:
             ```sh
             gh secret set ALPACA_API_KEY --body "new_live_key"
             gh secret set ALPACA_SECRET_KEY --body "new_live_secret"
             ```
          4. Run: `gh workflow run update-credentials.yml -f trading_mode=live`
          5. Verify: Check CloudWatch logs for `algo-api-dev` lambda

          **Secrets Manager:** `algo/alpaca` (same secret, different key)
          **⚠️ CAUTION:** Live trading is REAL MONEY — verify credentials before deploying

          ---

          ### 3. FRED API Key (Federal Reserve Economic Data)

          **Steps:**
          1. Go to https://fred.stlouisfed.org/docs/api/fred-api-key.html → My Account
          2. Generate new API key
          3. Update GitHub Secrets:
             ```sh
             gh secret set FRED_API_KEY --body "new_fred_key"
             ```
          4. Run: `gh workflow run update-credentials.yml -f trading_mode=paper -f update_fred=true`
             (or `-f trading_mode=live` if live is active)
          5. Verify: Check `loaders/load_economic_data.py` logs (should fetch data without 401 errors)

          **Secrets Manager:** `algo/fred`

          ---

          ### 4. RDS Database Password

          **Steps:**
          1. Go to AWS Console → RDS → Databases → algo-db-dev
          2. Modify → Master password → Change it
          3. Create new password (min 8 chars, mix of uppercase/lowercase/numbers/symbols)
          4. Update local PowerShell profile:
             ```powershell
             $env:DB_PASSWORD = "new_password"
             # Add to profile: $profile variable
             ```
          5. Update terraform:
             ```sh
             cd terraform
             terraform apply -var="rds_password=new_password"
             ```
          6. Verify: Run `scripts/test-db-connection.ps1` (if exists) or check Lambda logs

          **Secrets Manager:** `algo/database`
          **IaC:** `terraform/terraform.tfvars` (contains RDS_PASSWORD)

          ---

          ## 🔒 Security Checklist

          - [ ] All credentials rotated before end of quarter
          - [ ] Old credentials deleted/invalidated after new ones confirmed working
          - [ ] No credentials committed to git (verify with: `git log -p --all | grep -i "api_key\|password"`)
          - [ ] Lambdas tested with new credentials (check CloudWatch Logs)
          - [ ] No credential leaks in error messages or logs

          ## 🚨 Emergency Rotation (If Credential Leaked)

          Don't wait for quarterly schedule—rotate immediately:

          **AWS Key:** Delete from IAM console, trigger `gh workflow run rotate-dev-credentials.yml`
          **API Keys:** Regenerate in dashboard, update GitHub Secrets immediately
          **RDS:** Change password via RDS console, update terraform immediately

          ---

          **Questions?** See `steering/algo.md` → CREDENTIAL ROTATION SCHEDULE for full details.
          EOF

      - name: Summary
        run: |
          echo "## Credential Rotation Reminder Sent ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next reminder: $(date -u -d 'next quarter' +'%B %Y')" >> $GITHUB_STEP_SUMMARY
