version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "argeropolos"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore alpha/beta releases
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NPM dependencies (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "argeropolos"
    commit-message:
      prefix: "chore(deps):"

  # NPM dependencies (webapp/lambda)
  - package-ecosystem: "npm"
    directory: "/webapp/lambda"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    reviewers:
      - "argeropolos"
    commit-message:
      prefix: "chore(deps):"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    reviewers:
      - "argeropolos"
    commit-message:
      prefix: "chore(terraform):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
    reviewers:
      - "argeropolos"
    commit-message:
      prefix: "ci(actions):"
