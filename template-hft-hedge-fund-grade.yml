AWSTemplateFormatVersion: '2010-09'
Description: >
  Hedge Fund Grade High-Frequency Trading System Infrastructure
  Ultra-low latency trading platform with sub-millisecond capabilities
  Designed for institutional-grade performance and reliability

Parameters:
  EnvironmentName:
    Type: String
    Default: "hft-hedge-fund"
    Description: "Environment name for resource naming"
    
  TradingInstanceType:
    Type: String
    Default: "c5n.18xlarge"
    Description: "Trading engine instance type (100 Gbps network, 72 vCPU)"
    AllowedValues:
      - "c5n.18xlarge"   # 100 Gbps network, 72 vCPU, 192 GB RAM
      - "c5n.24xlarge"   # 100 Gbps network, 96 vCPU, 256 GB RAM
      - "m5dn.24xlarge"  # 100 Gbps network, 96 vCPU, 384 GB RAM, NVMe SSD
      - "r5n.24xlarge"   # 100 Gbps network, 96 vCPU, 768 GB RAM
    
  MarketDataInstanceType:
    Type: String
    Default: "c5n.9xlarge"
    Description: "Market data processing instance type (50 Gbps network)"
    
  DatabaseInstanceType:
    Type: String
    Default: "r5.24xlarge"
    Description: "High-performance database instance type"

Resources:
  #############################################################
  # Ultra-Low Latency VPC with Placement Groups
  #############################################################
  HftVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      # Enable enhanced networking
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: "Ultra-Low-Latency-Trading"

  # Single AZ subnet for co-location benefits
  TradingSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HftVPC
      # Use specific AZ for co-location (us-east-1a typically best for NYSE/NASDAQ)
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-subnet"

  # Cluster placement group for ultra-low latency
  TradingPlacementGroup:
    Type: AWS::EC2::PlacementGroup
    Properties:
      GroupName: !Sub "${EnvironmentName}-trading-cluster"
      Strategy: cluster
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-placement-group"

  #############################################################
  # Enhanced Networking Setup
  #############################################################
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref HftVPC
      InternetGatewayId: !Ref InternetGateway

  # NAT Gateway for outbound connections
  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIPForNAT.AllocationId
      SubnetId: !Ref TradingSubnet

  EIPForNAT:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  # Route table optimized for low latency
  TradingRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref HftVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-rt"

  TradingRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref TradingRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  TradingSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref TradingSubnet
      RouteTableId: !Ref TradingRouteTable

  #############################################################
  # Ultra-Low Latency Security Groups
  #############################################################
  TradingEngineSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Trading engine security group - ultra-low latency"
      VpcId: !Ref HftVPC
      SecurityGroupIngress:
        # Market data feeds (typical ports)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8090
          CidrIp: 10.0.0.0/16
        # Trading API
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
        # Internal communication
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9092
          CidrIp: 10.0.0.0/16
        # Redis
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/16
        # SSH for management
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-engine-sg"

  #############################################################
  # Primary Trading Engine (Ultra-High Performance)
  #############################################################
  TradingEngineInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c7217cdde317cfec  # Amazon Linux 2023 (latest)
      InstanceType: !Ref TradingInstanceType
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref TradingEngineSecurityGroup
      SubnetId: !Ref TradingSubnet
      PlacementGroupName: !Ref TradingPlacementGroup
      
      # Enable enhanced networking and SR-IOV
      EnaSupport: true
      SriovNetSupport: simple
      
      # Dedicated tenancy for consistent performance
      Tenancy: dedicated
      
      # Instance store for ultra-low latency local storage
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
            Iops: 16000
            Throughput: 1000
            DeleteOnTermination: true
            Encrypted: true
      
      # Optimized instance metadata
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
        InstanceMetadataTags: enabled
      
      # CPU pinning and NUMA optimization user data
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          
          # Update system
          yum update -y
          
          # Install performance tools
          yum install -y htop iotop perf tuned kernel-tools
          yum install -y docker git python3 python3-pip
          
          # Enable and configure tuned for low latency
          systemctl enable tuned
          tuned-adm profile latency-performance
          
          # Disable transparent huge pages for consistent latency
          echo never > /sys/kernel/mm/transparent_hugepage/enabled
          echo never > /sys/kernel/mm/transparent_hugepage/defrag
          
          # Set CPU governor to performance
          echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
          
          # Disable power saving features
          echo 1 > /sys/devices/system/cpu/intel_pstate/no_turbo
          
          # Set network interface optimizations
          echo 'net.core.rmem_max = 134217728' >> /etc/sysctl.conf
          echo 'net.core.wmem_max = 134217728' >> /etc/sysctl.conf
          echo 'net.ipv4.tcp_rmem = 4096 16384 134217728' >> /etc/sysctl.conf
          echo 'net.ipv4.tcp_wmem = 4096 65536 134217728' >> /etc/sysctl.conf
          echo 'net.core.netdev_max_backlog = 30000' >> /etc/sysctl.conf
          echo 'net.ipv4.tcp_congestion_control = bbr' >> /etc/sysctl.conf
          
          # Apply sysctl settings
          sysctl -p
          
          # Configure CPU isolation for trading threads
          # Reserve CPUs 0-3 for OS, use 4-71 for trading
          echo 'isolcpus=4-71 nohz_full=4-71 rcu_nocbs=4-71' >> /proc/cmdline
          
          # Install Docker
          systemctl start docker
          systemctl enable docker
          
          # Install DPDK for kernel bypass networking
          cd /opt
          wget https://fast.dpdk.org/rel/dpdk-23.11.tar.xz
          tar xf dpdk-23.11.tar.xz
          cd dpdk-*
          pip3 install meson ninja pyelftools
          
          # Create trading user with real-time privileges
          useradd -m trading
          usermod -aG docker trading
          echo 'trading soft rtprio 99' >> /etc/security/limits.conf
          echo 'trading hard rtprio 99' >> /etc/security/limits.conf
          echo 'trading soft memlock unlimited' >> /etc/security/limits.conf
          echo 'trading hard memlock unlimited' >> /etc/security/limits.conf
          
          # Signal completion
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource TradingEngineInstance --region ${AWS::Region}
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-engine"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Role
          Value: "Primary-Trading-Engine"
    
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M

  #############################################################
  # Market Data Processing Cluster
  #############################################################
  MarketDataInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c7217cdde317cfec
      InstanceType: !Ref MarketDataInstanceType
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref TradingEngineSecurityGroup
      SubnetId: !Ref TradingSubnet
      PlacementGroupName: !Ref TradingPlacementGroup
      EnaSupport: true
      SriovNetSupport: simple
      Tenancy: dedicated
      
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker python3 python3-pip
          systemctl start docker
          systemctl enable docker
          
          # Market data specific optimizations
          tuned-adm profile network-latency
          
          # Install market data processing tools
          pip3 install asyncio aiohttp websockets
          
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource MarketDataInstance1 --region ${AWS::Region}
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-market-data-1"
        - Key: Role
          Value: "Market-Data-Processor"
    
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  #############################################################
  # Ultra-Low Latency Redis Cluster
  #############################################################
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: "Redis subnet group for HFT"
      SubnetIds:
        - !Ref TradingSubnet

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub "${EnvironmentName}-redis"
      Description: "Ultra-low latency Redis for HFT"
      NumCacheClusters: 3
      Engine: redis
      CacheNodeType: cache.r7g.2xlarge  # Graviton3 for best performance
      Port: 6379
      
      # Network optimizations
      NetworkType: ipv4
      SubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref TradingEngineSecurityGroup
      
      # Performance optimizations
      AutoMinorVersionUpgrade: false
      MultiAZEnabled: false  # Single AZ for lowest latency
      
      # Memory optimization
      ParameterGroupName: default.redis7
      
      # Backup settings (minimal for performance)
      BackupRetentionPeriod: 1
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-redis-cluster"
        - Key: Purpose
          Value: "Ultra-Low-Latency-Cache"

  #############################################################
  # High-Performance Database (PostgreSQL)
  #############################################################
  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Database subnet group for HFT"
      SubnetIds:
        - !Ref TradingSubnet
        - !Ref TradingSubnet  # Single AZ setup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-db-subnet-group"

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentName}-trading-db"
      DBInstanceClass: !Ref DatabaseInstanceType
      Engine: postgres
      EngineVersion: "15.4"
      
      # Storage optimization
      AllocatedStorage: 1000
      StorageType: gp3
      Iops: 16000
      StorageEncrypted: true
      
      # Network settings
      VPCSecurityGroups:
        - !Ref TradingEngineSecurityGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      MultiAZ: false  # Single AZ for lowest latency
      
      # Performance optimization
      DBParameterGroupName: !Ref DatabaseParameterGroup
      
      # Credentials
      MasterUsername: trading_admin
      ManageMasterUserPassword: true
      
      # Backup settings (minimal for performance)
      BackupRetentionPeriod: 1
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"
      
      # Monitoring
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt DatabaseMonitoringRole.Arn
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-trading-database"
        - Key: Purpose
          Value: "High-Performance-Trading-Database"

  # Optimized database parameter group
  DatabaseParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: "High-performance parameter group for trading database"
      Family: postgres15
      Parameters:
        # Memory optimization
        shared_buffers: "{DBInstanceClassMemory/4}"
        effective_cache_size: "{DBInstanceClassMemory*3/4}"
        work_mem: "256MB"
        maintenance_work_mem: "2GB"
        
        # Connection optimization
        max_connections: "1000"
        
        # Write-ahead logging optimization
        wal_buffers: "64MB"
        checkpoint_completion_target: "0.9"
        max_wal_size: "4GB"
        
        # Query optimization
        random_page_cost: "1.1"
        effective_io_concurrency: "200"
        
        # Logging (minimal for performance)
        log_statement: "none"
        log_min_duration_statement: "1000"
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-db-params"

  DatabaseMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ''
            Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole'

  #############################################################
  # Load Balancer for API Access
  #############################################################
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets:
        - !Ref TradingSubnet
      SecurityGroups:
        - !Ref TradingEngineSecurityGroup
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb"

  #############################################################
  # CloudWatch Monitoring for Performance
  #############################################################
  TradingDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${EnvironmentName}-trading-performance"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization", "InstanceId", "${TradingEngineInstance}" ],
                  [ ".", "NetworkIn", ".", "." ],
                  [ ".", "NetworkOut", ".", "." ]
                ],
                "period": 60,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Trading Engine Performance"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/ElastiCache", "CPUUtilization", "CacheClusterId", "${RedisCluster}" ],
                  [ ".", "NetworkBytesIn", ".", "." ],
                  [ ".", "NetworkBytesOut", ".", "." ]
                ],
                "period": 60,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Redis Performance"
              }
            }
          ]
        }

  #############################################################
  # Auto Scaling for Market Data Processors
  #############################################################
  MarketDataLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentName}-market-data-template"
      LaunchTemplateData:
        ImageId: ami-0c7217cdde317cfec
        InstanceType: !Ref MarketDataInstanceType
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - !Ref TradingEngineSecurityGroup
        Placement:
          GroupName: !Ref TradingPlacementGroup
          Tenancy: dedicated
        
        NetworkInterfaces:
          - DeviceIndex: 0
            SubnetId: !Ref TradingSubnet
            Groups:
              - !Ref TradingEngineSecurityGroup
        
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y docker python3 python3-pip
            systemctl start docker
            systemctl enable docker
            tuned-adm profile network-latency

  MarketDataAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentName}-market-data-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref MarketDataLaunchTemplate
        Version: !GetAtt MarketDataLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 6
      DesiredCapacity: 3
      VPCZoneIdentifier:
        - !Ref TradingSubnet
      
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-market-data-processor"
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref EnvironmentName
          PropagateAtLaunch: true

# Additional parameter needed
Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: "EC2 Key Pair for SSH access"

Outputs:
  TradingEngineIP:
    Description: "Primary trading engine private IP"
    Value: !GetAtt TradingEngineInstance.PrivateIp
    Export:
      Name: !Sub "${EnvironmentName}-trading-engine-ip"

  RedisEndpoint:
    Description: "Redis cluster endpoint"
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Export:
      Name: !Sub "${EnvironmentName}-redis-endpoint"

  DatabaseEndpoint:
    Description: "Database endpoint"
    Value: !GetAtt DatabaseInstance.Endpoint.Address
    Export:
      Name: !Sub "${EnvironmentName}-database-endpoint"

  LoadBalancerDNS:
    Description: "Application Load Balancer DNS"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${EnvironmentName}-alb-dns"

  PlacementGroupName:
    Description: "Cluster placement group name"
    Value: !Ref TradingPlacementGroup
    Export:
      Name: !Sub "${EnvironmentName}-placement-group"

  VPCId:
    Description: "VPC ID for the HFT infrastructure"
    Value: !Ref HftVPC
    Export:
      Name: !Sub "${EnvironmentName}-vpc-id"
