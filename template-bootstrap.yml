# ============================================================
# Stock Analytics Platform — template-bootstrap.yml
# Layer:   Bootstrap (one-time OIDC setup for GitHub Actions)
# Stack:   stocks-oidc
# Exports: StocksOidc-WebIdentityProviderArn, -GitHubActionsDeployRoleArn
# Imports: None
# Deploy:  .github/workflows/bootstrap-oidc.yml
# ============================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bootstrap stack: create IAM OIDC provider for GitHub Actions
  and the GitHubActionsDeployRole.

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1b511abead59c6ce207077c0bf4113469e1f0b03

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Federated": "${GitHubOidcProvider.Arn}"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                },
                "StringLike": {
                  "token.actions.githubusercontent.com:sub": "repo:argeropolos/algo:*"
                }
              }
            }
          ]
        }
      Policies:
        - PolicyName: CloudFormationDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationAccess
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ListChangeSets
                  - cloudformation:ValidateTemplate
                  - cloudformation:GetTemplate
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                  - cloudformation:ListExports
                  - cloudformation:DescribeStackResource
                Resource: !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/stocks-*'
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/stocks-*'
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObjectVersion
                  - s3:ListBucketVersions
                Resource:
                  - !Sub 'arn:aws:s3:::stocks-*'
                  - !Sub 'arn:aws:s3:::stocks-*/*'
              - Sid: ECRAccess
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:GetRepositoryPolicy
                  - ecr:SetRepositoryPolicy
                Resource: !Sub 'arn:aws:ecr:*:${AWS::AccountId}:repository/stocks-*'
              - Sid: EC2Access
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeRouteTables
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:CreateNetworkInterface
                  - ec2:DeleteNetworkInterface
                  - ec2:ModifyNetworkInterfaceAttribute
                  - ec2:DescribeTags
                  - ec2:CreateTags
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoint
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeVpcEndpointServiceConfigurations
                  - ec2:ModifyVpcEndpoint
                Resource: '*'
              - Sid: RDSAccess
                Effect: Allow
                Action:
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:DescribeDBInstances
                  - rds:ModifyDBInstance
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  - rds:CreateDBCluster
                  - rds:DeleteDBCluster
                  - rds:DescribeDBClusters
                Resource: !Sub 'arn:aws:rds:*:${AWS::AccountId}:*'
              - Sid: LambdaAccess
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:ListFunctions
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:stocks-*'
              - Sid: SSMAccess
                Effect: Allow
                Action:
                  - ssm:CreateAssociation
                  - ssm:DeleteAssociation
                  - ssm:DescribeAssociation
                  - ssm:ListAssociations
                  - ssm:GetParameter
                  - ssm:DescribeParameters
                Resource: '*'
              - Sid: ECSAccess
                Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTaskDefinitions
                Resource: !Sub 'arn:aws:ecs:*:${AWS::AccountId}:*'
              - Sid: SecretsManagerAccess
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:UpdateSecret
                Resource: !Sub 'arn:aws:secretsmanager:*:${AWS::AccountId}:secret:stocks-*'
              - Sid: AutoScalingAccess
                Effect: Allow
                Action:
                  - autoscaling:CreateAutoScalingGroup
                  - autoscaling:DeleteAutoScalingGroup
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DescribeLaunchConfigurations
                  - autoscaling:DescribeLifecycleHooks
                Resource: '*'
              - Sid: EventBridgeAccess
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:ListRules
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:ListTargetsByRule
                Resource: !Sub 'arn:aws:events:*:${AWS::AccountId}:rule/stocks-*'
              - Sid: IAMRoleAccess
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:ListRoles
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRolePolicies
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/stocks-*'
              - Sid: CognitoAccess
                Effect: Allow
                Action:
                  - cognito-idp:CreateUserPool
                  - cognito-idp:DeleteUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                Resource: !Sub 'arn:aws:cognito-idp:*:${AWS::AccountId}:userpool/*'
              - Sid: CloudFrontAccess
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:DescribeDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:ListDistributions
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                Resource: '*'
              - Sid: CloudWatchAccess
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:CreateLogStream
                  - logs:PutRetentionPolicy
                  - logs:DescribeLogStreams
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                Resource: '*'
              - Sid: KMSAccess
                Effect: Allow
                Action:
                  - kms:CreateGrant
                  - kms:DescribeKey
                  - kms:ListGrants
                Resource: !Sub 'arn:aws:kms:*:${AWS::AccountId}:key/*'

Outputs:
  WebIdentityProviderArn:
    Description: ARN of the OIDC provider
    Value: !Ref GitHubOidcProvider
    Export:
      Name: StocksOidc-WebIdentityProviderArn

  GitHubActionsDeployRoleArn:
    Description: ARN of the GitHub Actions deploy role
    Value: !GetAtt GitHubActionsDeployRole.Arn
    Export:
      Name: StocksOidc-GitHubActionsDeployRoleArn
