  #############################################################
  # IAM Role for EventBridge to Invoke Step Functions 
  #############################################################
  EventsStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EventsStepFunctionsRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: StepFunctionsInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: "*"  # Will be scoped down by condition below
                Condition:
                  StringEquals:
                    "aws:ResourceAccount": !Ref "AWS::AccountId"

  #############################################################
  # Step Functions State Machine
  #############################################################
  FinancialDataStateMachine:
    Type: AWS::StepFunctions::StateMachine
    DependsOn: EventsStepFunctionsRole  # Explicitly depend on role
    Properties:
      StateMachineName: 'FinancialDataProcessingWorkflow'
      RoleArn: !GetAtt StepFunctionsExecutionRole.Arn
      DefinitionString: !Sub |
        {
          "Comment": "Financial Data Processing Workflow with Retries",
          "StartAt": "ProcessInitialData",
          "States": {
            "ProcessInitialData": {
              "Type": "Parallel",
              "Branches": [
                {
                  "StartAt": "RunPriceDaily",
                  "States": {
                    "RunPriceDaily": {
                      "Type": "Task",
                      "Resource": "arn:aws:states:::ecs:runTask",
                      "Parameters": {
                        "LaunchType": "FARGATE",
                        "TaskDefinition": "${PriceTaskDefinition}",
                        "NetworkConfiguration": {
                          "AwsvpcConfiguration": {
                            "AssignPublicIp": "ENABLED",
                            "SecurityGroups": [],
                            "Subnets": []
                          }
                        }
                      },
                      "Retry": [
                        {
                          "ErrorEquals": ["States.ALL"],
                          "IntervalSeconds": 60,
                          "MaxAttempts": 2,
                          "BackoffRate": 2
                        }
                      ],
                      "End": true
                    }
                  }
                }
              ],
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "Next": "NotifyError"
                }
              ],
              "Next": "WorkflowSuccess"
            },
            "WorkflowSuccess": {
              "Type": "Succeed"
            },
            "NotifyError": {
              "Type": "Task",
              "Resource": "arn:aws:states:::sns:publish",
              "Parameters": {
                "TopicArn": "${NotificationTopic}",
                "Message": "Financial data processing workflow failed. Please check CloudWatch logs for details."
              },
              "Next": "WorkflowFailed"
            },
            "WorkflowFailed": {
              "Type": "Fail",
              "Error": "FinancialDataProcessingFailed",
              "Cause": "One or more jobs failed after retry attempts"
            }
          }
        }

  #############################################################
  # EventBridge Schedule to Trigger the Step Function
  #############################################################
  FinancialDataProcessingSchedule:
    Type: AWS::Events::Rule
    DependsOn: FinancialDataStateMachine
    Properties:
      Description: "Run financial data processing workflow at 6:30 PM CT (23:30 UTC) on weekdays"
      ScheduleExpression: "cron(30 23 ? * MON-FRI *)"
      State: ENABLED
      Targets:
        - Id: FinancialDataProcessingTarget
          Arn: !Ref FinancialDataStateMachine
          RoleArn: !GetAtt EventsStepFunctionsRole.Arn
