repos:
  # Code formatting with Ruff (single tool for format + lint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        name: Ruff lint and auto-fix
      - id: ruff-format
        name: Ruff format code

  # Type checking — run on full directories for accurate cross-module analysis
  - repo: local
    hooks:
      - id: mypy-core
        name: MyPy — algo loaders utils config tools lambda-standalone
        entry: mypy algo/ loaders/ utils/ config/ tools/ lambda/base_handler.py lambda/algo_orchestrator/lambda_function.py lambda/monitoring/health_monitor.py lambda/monitoring/loader_failure_handler.py lambda/monitoring/loader_timeout_guardian.py --ignore-missing-imports --show-error-codes
        language: system
        pass_filenames: false
        types: [python]
      - id: mypy-lambda-api
        name: MyPy — lambda/api
        entry: bash -c 'cd lambda/api && mypy . --ignore-missing-imports --show-error-codes --explicit-package-bases'
        language: system
        pass_filenames: false
        types: [python]

  # Comprehensive CI validation (ruff + basic syntax checks)
  - repo: local
    hooks:
      - id: ci-validation
        name: CI validation (syntax + imports)
        entry: python -m py_compile
        language: system
        types: [python]
        exclude: ^(tests/|migrations/|\.github/|scripts/.*)
        stages: [commit]

  # Security scanning moved to CI (too slow for pre-commit)
  # Bandit runs async in GitHub Actions instead

  # Secret detection
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.0
    hooks:
      - id: trufflehog
        args: [--no-update, --only-verified]
        name: TruffleHog secret scan
        stages: [commit]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-added-large-files
        args: [--maxkb=1000]
        name: Check for large files (>1MB)
      - id: check-case-conflict
        name: Check for case conflicts in filenames

default_language_version:
  python: python3.11

# To skip hooks when needed: SKIP=bandit,mypy git commit
# To run all hooks manually: pre-commit run --all-files
